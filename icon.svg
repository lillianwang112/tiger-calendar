<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#c8b8ff" stroke-width="6"/>
  <!-- Calendar body -->
  <rect x="180" y="170" width="200" height="190" rx="16" fill="#1e1e2e" stroke="#c8b8ff" stroke-width="4"/>
  <!-- Calendar header -->
  <rect x="180" y="170" width="200" height="45" rx="16" fill="#c8b8ff"/>
  <rect x="180" y="195" width="200" height="20" fill="#c8b8ff"/>
  <!-- Calendar rings -->
  <rect x="220" y="155" width="8" height="30" rx="4" fill="#c8b8ff"/>
  <rect x="332" y="155" width="8" height="30" rx="4" fill="#c8b8ff"/>
  <!-- Calendar grid lines -->
  <line x1="230" y1="230" x2="230" y2="345" stroke="#2a2a42" stroke-width="1.5"/>
  <line x1="280" y1="230" x2="280" y2="345" stroke="#2a2a42" stroke-width="1.5"/>
  <line x1="330" y1="230" x2="330" y2="345" stroke="#2a2a42" stroke-width="1.5"/>
  <line x1="195" y1="268" x2="365" y2="268" stroke="#2a2a42" stroke-width="1.5"/>
  <line x1="195" y1="306" x2="365" y2="306" stroke="#2a2a42" stroke-width="1.5"/>
  <!-- Today highlight -->
  <rect x="232" y="270" width="46" height="34" rx="6" fill="rgba(200,184,255,0.2)" stroke="#c8b8ff" stroke-width="2"/>
  <!-- Tiger head (peeking from left side) -->
  <ellipse cx="145" cy="260" rx="75" ry="70" fill="#f4a030"/>
  <!-- Tiger ears -->
  <ellipse cx="100" cy="200" rx="22" ry="28" fill="#f4a030" transform="rotate(-15 100 200)"/>
  <ellipse cx="100" cy="200" rx="12" ry="16" fill="#ff8c4a" transform="rotate(-15 100 200)"/>
  <ellipse cx="175" cy="195" rx="22" ry="28" fill="#f4a030" transform="rotate(15 175 195)"/>
  <ellipse cx="175" cy="195" rx="12" ry="16" fill="#ff8c4a" transform="rotate(15 175 195)"/>
  <!-- Tiger stripes -->
  <path d="M110 230 Q125 225 115 245" stroke="#1a1a2e" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M100 255 Q118 248 108 270" stroke="#1a1a2e" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M165 225 Q148 222 158 242" stroke="#1a1a2e" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M170 250 Q155 245 162 268" stroke="#1a1a2e" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Tiger eyes -->
  <ellipse cx="120" cy="248" rx="10" ry="11" fill="white"/>
  <ellipse cx="155" cy="248" rx="10" ry="11" fill="white"/>
  <circle cx="122" cy="250" r="6" fill="#1a1a2e"/>
  <circle cx="157" cy="250" r="6" fill="#1a1a2e"/>
  <circle cx="124" cy="248" r="2" fill="white"/>
  <circle cx="159" cy="248" r="2" fill="white"/>
  <!-- Tiger nose -->
  <ellipse cx="138" cy="272" rx="8" ry="5" fill="#ff6b4a"/>
  <!-- Tiger mouth -->
  <path d="M130 278 Q138 286 146 278" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tiger whiskers -->
  <line x1="100" y1="268" x2="70" y2="262" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="275" x2="68" y2="278" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <line x1="175" y1="268" x2="195" y2="262" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <line x1="175" y1="275" x2="195" y2="278" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <!-- Tiger paw hugging calendar (right side) -->
  <ellipse cx="175" cy="330" rx="30" ry="18" fill="#f4a030" transform="rotate(-20 175 330)"/>
  <circle cx="160" cy="342" r="6" fill="#f4a030"/>
  <circle cx="172" cy="346" r="6" fill="#f4a030"/>
  <circle cx="185" cy="345" r="6" fill="#f4a030"/>
  <!-- Tiger paw pads -->
  <ellipse cx="168" cy="332" rx="12" ry="8" fill="#ff8c4a"/>
  <circle cx="160" cy="342" r="3.5" fill="#ff8c4a"/>
  <circle cx="172" cy="346" r="3.5" fill="#ff8c4a"/>
  <circle cx="185" cy="345" r="3.5" fill="#ff8c4a"/>
  <!-- Small heart -->
  <path d="M310 155 C310 148 318 145 322 150 C326 145 334 148 334 155 C334 165 322 172 322 172 C322 172 310 165 310 155Z" fill="#ff6b8a" opacity="0.8"/>
</svg>
