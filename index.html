<!-- App shell: renders instantly from HTML, no JS needed -->
<div id="app-shell">

    <h1>Tiger<span>Calendar</span></h1>
  </div>
  <div class="progress-track"><div class="progress-fill"></div></div>
  <div class="shell-body">
    <div class="shell-side"></div>
    <div class="shell-main">
      <div class="shell-dayrow" id="shell-dayrow"><div class="gutter"></div></div>
      <div class="shell-grid">
        <div class="shell-gutter" id="shell-gutter"></div>
        <div class="shell-cols" id="shell-cols"></div>
      </div>
    </div>
  </div>
</div>
<script>
// Populate the shell skeleton with today's week + time gutter (runs instantly, no deps)
(function(){
  var dn=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var now=new Date(),dow=now.getDay();
  var wkStart=new Date(now);wkStart.setDate(now.getDate()-dow);
  var row=document.getElementById("shell-dayrow");
  var cols=document.getElementById("shell-cols");
  var gut=document.getElementById("shell-gutter");
  if(!row||!cols||!gut)return;
  for(var i=0;i<7;i++){
    var d=new Date(wkStart);d.setDate(wkStart.getDate()+i);
    var isToday=d.toDateString()===now.toDateString();
    var dc=document.createElement("div");
    dc.className="daycol"+(isToday?" today":"");
    dc.innerHTML='<div>'+dn[d.getDay()]+'</div><div style="font-family:\'DM Serif Display\',serif;font-size:'+(isToday?'1.1rem':'1rem')+'">'+ d.getDate()+'</div>';
    row.appendChild(dc);
    var col=document.createElement("div");col.className="col";
    for(var h=0;h<24;h++){var hr=document.createElement("div");hr.className="hr";col.appendChild(hr);}
    cols.appendChild(col);
  }
  for(var h=0;h<24;h++){
    var hr=document.createElement("div");hr.className="hr";
    if(h>0){var ampm=h>=12?"PM":"AM";hr.textContent=(h%12||12)+" "+ampm;}
    gut.appendChild(hr);
  }
  // Scroll to ~7 AM
  var grid=document.querySelector("#app-shell .shell-grid");
  if(grid)grid.scrollTop=7*60;
})();
</script>

function $d(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function $p(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function $s(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function $w(d,ws=0){const r=new Date(d);const diff=(r.getDay()-ws+7)%7;r.setDate(r.getDate()-diff);return r;}
function $a(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

function $t(h,m){const p=h>=12?"PM":"AM";return`${h%12||12}:${String(m).padStart(2,"0")} ${p}`;}

function isCd(ds,sem){const c=PCAL[sem];if(!c)return false;if(ds<c.cs||ds>c.ce)return false;

// Generate recurring events from recurrence rule
function genRecurring(ev){
  if(!ev._recur||ev._recur.type==="none") return [ev];
  const r=ev._recur, results=[], base=$p(ev.date);
  let maxOcc=r.endAfter||365, endDate=r.endDate?$p(r.endDate):$a(base,730);
  let count=0;
  for(let d=new Date(base);d<=endDate&&count<maxOcc;){
    const ds=$d(d);
    let match=false;
    if(r.type==="daily") match=true;
    else if(r.type==="weekly") match=r.days?r.days.includes(d.getDay()):d.getDay()===base.getDay();
    else if(r.type==="monthly") match=d.getDate()===base.getDate();
    else if(r.type==="annually") match=d.getMonth()===base.getMonth()&&d.getDate()===base.getDate();
    else if(r.type==="weekdays") match=d.getDay()>=1&&d.getDay()<=5;
    else if(r.type==="custom"){
      if(r.unit==="day") match=true;
      else if(r.unit==="week") match=r.days?r.days.includes(d.getDay()):d.getDay()===base.getDay();
      else if(r.unit==="month") match=d.getDate()===base.getDate();
      else if(r.unit==="year") match=d.getMonth()===base.getMonth()&&d.getDate()===base.getDate();
    }
    if(match){results.push({...ev,id:gi(),date:ds,_recurParent:ev.id});count++;}
    // Advance
    if(r.type==="daily"||(r.type==="custom"&&r.unit==="day")) d=$a(d,r.every||1);
    else if(r.type==="weekly") d=$a(d,1);
    else if(r.type==="custom"&&r.unit==="week"){
      const next=$a(d,1);
      // If we've cycled through all days of the week, skip ahead
      if(next.getDay()===0&&r.every>1){d=$a(next,(r.every-1)*7);}else{d=next;}
    }
    else if(r.type==="monthly"||(r.type==="custom"&&r.unit==="month")){
      if(!match||count===0) d=$a(d,1);
      else{const n=new Date(d);n.setMonth(n.getMonth()+(r.every||1));d=n;}
    }
    else if(r.type==="annually"||(r.type==="custom"&&r.unit==="year")){
      if(!match) d=$a(d,1);
      else{const n=new Date(d);n.setFullYear(n.getFullYear()+(r.every||1));d=n;}
    }
    else if(r.type==="weekdays") d=$a(d,1);
    else d=$a(d,1);
  }
  return results;
}

// Reusable minute picker: 5-min dropdown + free-text input for exact values like 59
function MinPick({value,onChange,style={}}){
  const snap=[0,5,10,15,20,25,30,35,40,45,50,55];
  const isSnap=snap.includes(+value);
  const[manual,setManual]=useState(!isSnap);
  const IS2={background:"var(--ib,#1e1e2e)",border:"1px solid var(--ibd,#3a3a52)",borderRadius:5,
    padding:"3px 4px",color:"var(--tx,#e8e6f0)",fontFamily:"'DM Sans',sans-serif",
    fontSize:"0.75rem",outline:"none",WebkitAppearance:"none",...style};
  return <div style={{display:"flex",alignItems:"center",gap:2}}>
    {!manual&&<select value={value} onChange={e=>onChange(+e.target.value)}
      style={{...IS2,width:46,cursor:"pointer"}}>
      {snap.map(m=><option key={m} value={m}>{String(m).padStart(2,"0")}</option>)}
    </select>}
    {manual&&<input type="number" min={0} max={59} value={value}
      onChange={e=>{const v=Math.max(0,Math.min(59,+e.target.value||0));onChange(v);}}
      style={{...IS2,width:40,textAlign:"center"}}/>}
    <button onClick={()=>setManual(m=>!m)} title={manual?"Switch to quick-pick":"Type exact minute"}
      style={{background:"transparent",border:"none",color:"var(--t3,#6a6a82)",cursor:"pointer",
        fontSize:"0.55rem",padding:"1px 2px",lineHeight:1,fontFamily:"monospace"}}>
      {manual?"≡":"✎"}</button>
  </div>;
}

  const cal=PCAL[sem];if(!cal)return[];
  const evs=[],start=$p(cal.cs),end=$p(cal.ce);
  const slots=[
    {key:"lec",label:"Lecture",days:"lecDays",sh:"lSH",sm:"lSM",eh:"lEH",em:"lEM",loc:"lecLoc",flag:true,sameKey:"lecSameTime",sameLocKey:"lecSameLoc",slotKey:"lecSlots"},
    {key:"prec",label:"Precept",days:"precDays",sh:"pSH",sm:"pSM",eh:"pEH",em:"pEM",loc:"precLoc",flag:"hasPrec",sameKey:"precSameTime",sameLocKey:"precSameLoc",slotKey:"precSlots"},
    {key:"lab",label:"Lab",days:"labDays",sh:"labSH",sm:"labSM",eh:"labEH",em:"labEM",loc:"labLoc",flag:"hasLab",sameKey:"labSameTime",sameLocKey:"labSameLoc",slotKey:"labSlots"},
    {key:"drill",label:"Drill",days:"drillDays",sh:"drSH",sm:"drSM",eh:"drEH",em:"drEM",loc:"drillLoc",flag:"hasDrill",sameKey:"drillSameTime",sameLocKey:"drillSameLoc",slotKey:"drillSlots"},
  ];
  for(let d=new Date(start);d<=end;d=$a(d,1)){
    const ds=$d(d);if(!isCd(ds,sem))continue;
    const dow=d.getDay();
    for(const sl of slots){
      if(sl.flag!==true&&!course[sl.flag])continue;
      if(course[sl.days]?.includes(dow)){
        // Skip cancelled occurrences
        if((course._cancelled||[]).some(c=>c.date===ds&&c.type===sl.key))continue;
        const isSame=course[sl.sameKey]!==false;
        const isSameLoc=course[sl.sameLocKey]!==false;
        let sH=course[sl.sh],sM=course[sl.sm],eH=course[sl.eh],eM=course[sl.em];
        let loc=course[sl.loc]||"";
        const daySlots=course[sl.slotKey]||[];
        const ds2=daySlots.find(s=>s.days&&s.days.includes(dow));
        if(!isSame&&ds2){sH=ds2.sH??sH;sM=ds2.sM??sM;eH=ds2.eH??eH;eM=ds2.eM??eM;}
        if(!isSameLoc&&ds2&&ds2.loc!==undefined){loc=ds2.loc;}
        evs.push({id:gi(),title:course.name+" — "+sl.label,category:course.id,date:ds,
          startHour:sH,startMin:sM,endHour:eH,endMin:eM,
          detail:"",location:loc,_courseId:course.id,_type:sl.key});
      }
    }
  }
  return evs;
}

// Per-user storage keys: "tiger_calendar_v3:uid_XXX" for signed-in, "tiger_calendar_v3:guest" for guest
// The legacy keyless SK is only read once for migration, never written to again.
function ldForUser(uid){
  const key=uid?`${SK}:uid_${uid}`:`${SK}:guest`;
  try{const r=localStorage.getItem(key);if(r)return JSON.parse(r);}catch(e){}
  // One-time migration: if user has no per-user data yet, try the legacy shared key
  // but only migrate if it looks like it belongs to them (has a _uid field matching, or no _uid at all)
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);
    if(!d._uid||d._uid===uid){localStorage.setItem(key,JSON.stringify({...d,_uid:uid}));return d;}}}catch(e){}
  return null;}
function svForUser(uid,d){
  const key=uid?`${SK}:uid_${uid}`:`${SK}:guest`;
  try{localStorage.setItem(key,JSON.stringify({...d,_uid:uid}));}catch(e){}}
function clearUserStorage(uid){
  if(!uid)return;
  try{localStorage.removeItem(`${SK}:uid_${uid}`);}catch(e){}}
// ── Backup helpers ──────────────────────────────────────────────────────────
// Keeps up to 5 timestamped snapshots per user in localStorage so data can be
// recovered if a sync bug (or future bug) overwrites good cloud data.
function saveBackup(uid,data){
  if(!uid||!data||!data._ts)return;
  // Only worth saving if there is actual content to recover
  if(!data.events?.length&&!data.tasks?.length&&!data.courses?.length)return;
  try{
    const key=`${SK}:backups:uid_${uid}`;
    const prev=JSON.parse(localStorage.getItem(key)||'[]');
    if(prev.length&&prev[0]._ts===data._ts)return; // deduplicate
    localStorage.setItem(key,JSON.stringify([data,...prev].slice(0,5)));
  }catch(e){}
}
function getBackups(uid){
  if(!uid)return[];
  try{return JSON.parse(localStorage.getItem(`${SK}:backups:uid_${uid}`)||'[]');}catch(e){return[];}
}
// Keep legacy ld/sv pointing to guest slot for any code that calls them without uid context
function ld(){return ldForUser(null);}
function sv(d){svForUser(null,d);}

// ═══ FIREBASE AUTH & SYNC HOOKS ═══
function useFirebaseAuth(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(!!FB_AUTH);
  const[isGuest,setIsGuest]=useState(()=>!!localStorage.getItem("tc_guest"));
  useEffect(()=>{if(!FB_AUTH){setLoading(false);return;}
    const unsub=FB_AUTH.onAuthStateChanged(u=>{
      setUser(u);setLoading(false);
      if(u)setIsGuest(false); // signed-in user overrides guest mode
    });
    return unsub;
  },[]);
  const signInGoogle=async()=>{if(!FB_AUTH)return;const provider=new firebase.auth.GoogleAuthProvider();
    try{await FB_AUTH.signInWithPopup(provider);}catch(e){if(e.code==="auth/popup-blocked")await FB_AUTH.signInWithRedirect(provider);}};
  const signInEmail=async(email,password)=>{if(!FB_AUTH)throw new Error("Auth not available");
    await FB_AUTH.signInWithEmailAndPassword(email,password);};
  const signUpEmail=async(email,password)=>{if(!FB_AUTH)throw new Error("Auth not available");
    await FB_AUTH.createUserWithEmailAndPassword(email,password);};
  const continueAsGuest=()=>{localStorage.setItem("tc_guest","1");setIsGuest(true);};
  const signOut=async(uid)=>{
    // Clear guest storage on guest sign-out
    if(!uid){try{localStorage.removeItem(`${SK}:guest`);}catch(e){}}
    localStorage.removeItem("tc_guest");setIsGuest(false);
    if(FB_AUTH&&user)await FB_AUTH.signOut();};
  const deleteAccount=async()=>{
    if(!FB_DB||!FB_AUTH||!user)return;
    try{
      // Delete Firestore data
      await FB_DB.collection("calendars").doc(user.uid).delete();
      // Clear local storage
      try{localStorage.removeItem(`${SK}:uid_${user.uid}`);}catch(e){}
      localStorage.removeItem("tc_guest");
      // Delete the Firebase auth account
      await user.delete();
      setUser(null);setIsGuest(false);
    }catch(e){
      // If re-auth required, sign out and let them know
      if(e.code==="auth/requires-recent-login"){
        alert("For security, please sign in again and then delete your account.");
        await FB_AUTH.signOut();
      } else {
        console.error("Account deletion error:",e);
        alert("Failed to delete account. Please try again.");
      }
    }
  };
  // signIn kept for backward compat
  const signIn=signInGoogle;
  return{user,loading,isGuest,signIn,signInGoogle,signInEmail,signUpEmail,continueAsGuest,signOut,deleteAccount};
}

function useFirestoreSync(user,_localData,setters){
  // syncRef: true while applying incoming cloud data — blocks outbound upload
  const syncRef=useRef(false);
  // cloudReadyRef: stays false until the initial Firestore fetch resolves.
  // ALL uploads are blocked until this flips true, preventing a blank local
  // state on a fresh device from overwriting existing cloud data.
  const cloudReadyRef=useRef(false);
  const debounceRef=useRef(null);
  const lastUploadTs=useRef(0); // track the _ts of the last upload we sent
  const pendingDataRef=useRef(null); // latest unsaved data, flushed on visibility hide
  // cloudSyncReady: React state version of cloudReadyRef, exposed to App so
  // svForUser is only called AFTER the initial cloud snapshot is applied.
  // This prevents the empty-initial-state write from poisoning localStorage.
  const[cloudSyncReady,setCloudSyncReady]=useState(()=>!user);

  function applyCloud(cloud,isInitial){
    syncRef.current=true;
    // Track the highest-seen cloud timestamp so stale onSnapshot deliveries
    // (e.g. Firestore offline-persistence cache firing after cloudReadyRef goes true)
    // are rejected by the echo-protection check instead of overwriting fresh data.
    if(cloud._ts&&cloud._ts>lastUploadTs.current)lastUploadTs.current=cloud._ts;
    // Apply all source data first
    const newCourses=cloud.courses||[];
    const newSem=cloud.sem||"spring-2026";
    const newShowHolidays=cloud.showHolidays!==undefined?cloud.showHolidays:true;
    const newOH=cloud.officeHours||[];
    const newExams=cloud.exams||[];

    if(cloud.tasks)setters.setTk(cloud.tasks);
    if(cloud.courses)setters.setCo(cloud.courses);
    if(cloud.cats)setters.setCats(cloud.cats);
    if(cloud.sem)setters.setSem(cloud.sem);
    if(cloud.theme)setters.setTheme(cloud.theme);
    if(cloud.settings)setters.setSettings(cloud.settings);
    // Apply default view from cloud settings on initial load
    if(isInitial&&cloud.settings?.defaultView&&setters.setView){setters.setView(cloud.settings.defaultView);try{localStorage.setItem("tc_defaultView",cloud.settings.defaultView);}catch(e){}}
    if(cloud.exams)setters.setExams(cloud.exams);
    if(cloud.assignments)setters.setAssignments(cloud.assignments);
    if(cloud.officeHours)setters.setOfficeHours(cloud.officeHours);
    if(cloud.showHolidays!==undefined)setters.setShowHolidays(cloud.showHolidays);
    if(cloud.quickNotes!==undefined&&setters.setQuickNotes)setters.setQuickNotes(cloud.quickNotes);
    if(cloud.journalEntries&&setters.setJournalEntries)setters.setJournalEntries(cloud.journalEntries);
    if(cloud.sleepSettings&&setters.setSleepSettings)setters.setSleepSettings(cloud.sleepSettings);
    if(cloud.sleepDayData&&setters.setSleepDayData)setters.setSleepDayData(cloud.sleepDayData);

    // Directly regenerate ALL derived events rather than relying on useEffects.
    // This avoids race conditions where sem/showHolidays don't "change" (same value
    // as default) so their useEffects never re-fire.
    const cloudUserEvents=(cloud.events||[]).filter(e=>
      !e._taskDueId&&!e._ohId&&
      !(e._courseId&&!e._examId&&!e._studyBlock&&!e._courseOverride)&&
      e.category!=="_academic"&&e.category!=="_holidays"
    );

    // Regenerate course schedule events
    const courseEvs=newCourses.flatMap(c=>genCourseEv(c,newSem));

    // Regenerate academic calendar events
    const cal=PCAL[newSem];
    const acadEvs=[];
    if(cal)cal.ev.forEach(e=>{
      if(e.de){for(let d=$p(e.d);d<=$p(e.de);d=$a(d,1))acadEvs.push({id:gi(),title:e.t,date:$d(d),category:"_academic",startHour:0,startMin:0,endHour:0,endMin:0,detail:"",_allDay:true,_multiDay:true,_mdStart:e.d,_mdEnd:e.de});
      } else acadEvs.push({id:gi(),title:e.t,date:e.d,category:"_academic",startHour:0,startMin:0,endHour:0,endMin:0,detail:"",_allDay:true});
    });

    // Regenerate holiday events
    const holEvs=newShowHolidays?US_HOLIDAYS.map(e=>({id:gi(),title:e.t,date:e.d,category:"_holidays",startHour:0,startMin:0,endHour:0,endMin:0,detail:"",_allDay:true})):[];

    // Regenerate exam events
    const examEvs=newExams.map(ex=>{
      const c=newCourses.find(x=>x.id===ex.courseId);
      const cName=c?.name||"Course";
      return{id:gi(),title:`${cName} — ${ex.type}`,date:ex.date,category:ex.courseId,
        startHour:ex.startHour,startMin:ex.startMin,endHour:ex.endHour,endMin:ex.endMin,
        detail:ex.details,location:ex.location,_examId:ex.id,_courseId:ex.courseId};
    });

    // Regenerate office hours events
    const ohEvs=[];
    if(cal){
      const start=$p(cal.cs),end=$p(cal.ce);
      newOH.forEach(oh=>{
        if(!oh.days||oh.days.length===0)return;
        const c=newCourses.find(x=>x.id===oh.courseId);
        const cName=c?.name||"Course";
        for(let d=new Date(start);d<=end;d=$a(d,1)){
          const ds=$d(d);if(!isCd(ds,newSem))continue;
          const dow=d.getDay();
          if(!oh.days.includes(dow))continue;
          let sH=oh.startHour,sM=oh.startMin||0,eH=oh.endHour,eM=oh.endMin||0,loc=oh.location||"";
          if(!oh.sameTime){const sl=(oh.daySlots||[]).find(s=>s.dow===dow);if(sl){sH=sl.sH??sH;sM=sl.sM??sM;eH=sl.eH??eH;eM=sl.eM??eM;}}
          if(!oh.sameLoc){const sl=(oh.daySlots||[]).find(s=>s.dow===dow);if(sl&&sl.loc!==undefined)loc=sl.loc;}
          ohEvs.push({id:gi(),title:`${cName} OH — ${oh.person||"Office Hours"}`,date:ds,category:"_officehours",
            startHour:sH,startMin:sM,endHour:eH,endMin:eM,
            detail:(oh.person||""),location:loc,_ohId:oh.id,_courseId:oh.courseId});
        }
      });
    }

    // Set ALL events at once — user events + all derived events
    setters.setEv([...cloudUserEvents,...courseEvs,...acadEvs,...holEvs,...examEvs,...ohEvs]);

    // After initial cloud load, prompt course setup if user has no courses
    if(isInitial&&(!cloud.courses||cloud.courses.length===0)&&setters.setCsOpen)setters.setCsOpen(true);
    sv(cloud);
    // Wait for React to flush all state updates before re-enabling uploads.
    // The 800ms delay covers React batching + any residual useEffect cycles.
    setTimeout(()=>{syncRef.current=false;if(isInitial){cloudReadyRef.current=true;setCloudSyncReady(true);}},800);
  }

  useEffect(()=>{
    if(!FB_DB||!user){cloudReadyRef.current=false;setCloudSyncReady(true);return;}
    cloudReadyRef.current=false;
    setCloudSyncReady(false); // block svForUser until cloud snapshot is applied
    const docRef=FB_DB.collection("calendars").doc(user.uid);
    docRef.get().then(snap=>{
      if(snap.exists){
        const cloud=snap.data();
        saveBackup(user.uid,cloud);
        applyCloud(cloud,true);
      } else {
        // Brand new account — start with a clean slate, do NOT seed from localStorage
        // (localStorage may contain a previous user's data)
        const empty={events:[],tasks:[],courses:[],cats:{...BCAT},sem:"spring-2026",
          theme:"light",showHolidays:true,
          settings:{weekStart:0,timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone,hourFormat:"12"},
          exams:[],assignments:[],officeHours:[]};
        applyCloud(empty,true);
      }
    }).catch(e=>{
      console.warn("Firestore read error:",e);
      cloudReadyRef.current=true;setCloudSyncReady(true); // unblock on error so app remains usable
    });

    const unsub=docRef.onSnapshot(snap=>{
      if(!snap.exists||syncRef.current||!cloudReadyRef.current)return;
      const cloud=snap.data();
      if(!cloud._ts)return;
      const localTs=lastUploadTs.current||0;
      // Only apply if cloud is meaningfully newer (500ms buffer avoids echo)
      if(cloud._ts>localTs+500){saveBackup(user.uid,cloud);applyCloud(cloud,false);}
    });
    // Flush any pending debounced upload when the tab goes hidden (user switches
    // tabs, minimizes, or closes the window). This fires reliably before the
    // page is discarded, giving Firestore enough time to queue the write.
    const flushOnHide=()=>{
      if(document.visibilityState==="hidden"&&pendingDataRef.current){
        clearTimeout(debounceRef.current);
        uploadToFirestore(user.uid,pendingDataRef.current);
        pendingDataRef.current=null;
      }
    };
    document.addEventListener("visibilitychange",flushOnHide);
    return ()=>{unsub();document.removeEventListener("visibilitychange",flushOnHide);};
  },[user]);

  const upload=useCallback((data)=>{
    if(!FB_DB||!user||syncRef.current||!cloudReadyRef.current)return;
    if(data._ts)lastUploadTs.current=data._ts;
    pendingDataRef.current=data; // always track latest for visibility flush
    clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(()=>{uploadToFirestore(user.uid,data);pendingDataRef.current=null;},1500);
  },[user]);

  const restoreFromBackup=useCallback((backup)=>{
    // Apply the snapshot to all state and immediately write it to Firestore.
    applyCloud(backup,false);
    uploadToFirestore(user.uid,backup);
  },[user]);

  return{upload,restoreFromBackup,cloudSyncReady};
}

function uploadToFirestore(uid,data){
  if(!FB_DB||!uid)return;
  // JSON round-trip strips undefined values from task/event objects, which
  // Firestore rejects (throws "Unsupported field value: undefined"), causing
  // silent write failures for ASAP tasks and tasks without a time.
  const clean=JSON.parse(JSON.stringify({...data,_ts:data._ts||Date.now()}));
  FB_DB.collection("calendars").doc(uid).set(clean).catch(e=>console.warn("Firestore write error:",e));
}

// ═══ MAIN ═══
function App(){
  const{user,loading:authLoading,isGuest,signIn,signInGoogle,signInEmail,signUpEmail,continueAsGuest,signOut,deleteAccount}=useFirebaseAuth();

  // Derived events are always regenerated from their source data (tasks, officeHours, courses, PCAL).

  const persistableEvents=useMemo(()=>events.filter(e=>
    !e._taskDueId &&                                            // regenerated from tasks
    !e._ohId &&                                                 // regenerated from officeHours
    !(e._courseId&&!e._examId&&!e._studyBlock&&!e._courseOverride) && // regenerated from courses (keep exam+study blocks+overrides)
    e.category!=="_academic" &&                                 // regenerated from PCAL

  // Task-due shadow events — computed fresh every render from tasks, never persisted.

  const _taskDueEvs=tasks.filter(t=>t.hasDueTime&&t.date&&(!t.done||settings.showCompletedTasks)&&t.dueHour!=null).map(t=>{
    const dH=+(t.dueHour),dM=+(t.dueMin||0);
    // Block ENDS at due time, starts 30 min before (so 11:59 PM shows as 11:29–11:59)
    const endMins=dH*60+dM;
    const startMins=Math.max(0,endMins-30);

    return{id:"td_"+t.id,title:(t.done?"✓ ":"")+t.title,date:t.date,category:t.category,

      const[bH,bM]=bt.split(":").map(Number);

      if(isNaN(bH)||isNaN(wH))continue;
      const bEndMin=Math.min(bH*60+bM+45,bH*60+59);

      res.push({id:`_slp_b_${ds}`,_sleepId:ds,_sleepType:"bedtime",date:ds,
        title:"\uD83C\uDF19 Bedtime",startHour:bH,startMin:bM,
        endHour:Math.floor(bEndMin/60),endMin:bEndMin%60,
        category:"_sleep",_allDay:false});
      res.push({id:`_slp_w_${ds}`,_sleepId:ds,_sleepType:"wakeup",date:ds,
        title:"\u2600\uFE0F Wake up",startHour:wH,startMin:wM,
        endHour:Math.floor(wEndMin/60),endMin:wEndMin%60,
        category:"_sleep",_allDay:false});
    }
    return res;
  },[sleepSettings,sleepDayData]);
  const allEvents=[...events.filter(e=>!e._taskDueId),..._taskDueEvs,..._sleepEvs];
  const{upload,restoreFromBackup,cloudSyncReady}=useFirestoreSync(user,{events:persistableEvents,tasks,courses,cats,sem,theme,showHolidays,settings,exams,assignments,officeHours,quickNotes,journalEntries,sleepSettings,sleepDayData},syncSetters);

  useEffect(()=>{setAc(p=>{const n=new Set(p);Object.keys(cats).forEach(k=>n.add(k));n.add("_holidays");n.add("_officehours");return n;});},[cats]);
  useEffect(()=>{
    // Gate svForUser behind cloudSyncReady: prevents writing the empty initial

    svForUser(user?.uid||(isGuest?"guest":null),data);

  },[persistableEvents,tasks,courses,cats,sem,theme,showHolidays,settings,exams,assignments,officeHours,quickNotes,journalEntries,sleepSettings,sleepDayData,user,cloudSyncReady]);



  const ACCENTS={
    purple:{l:"#5c4db3",ld:"#8b7fd4",d:"#c8b8ff",dd:"#9b8ee0",tbl:"rgba(92,77,179,0.06)",tbd:"rgba(200,184,255,0.08)"},
    orange:{l:"#c44d0a",ld:"#e07840",d:"#ffb380",dd:"#e07840",tbl:"rgba(196,77,10,0.06)",tbd:"rgba(255,179,128,0.08)"},
    green: {l:"#1a7a4a",ld:"#4aad7a",d:"#6de0a8",dd:"#4aad7a",tbl:"rgba(26,122,74,0.06)",tbd:"rgba(109,224,168,0.08)"},
    blue:  {l:"#1a5fb4",ld:"#4a8fd4",d:"#90c4ff",dd:"#4a8fd4",tbl:"rgba(26,95,180,0.06)",tbd:"rgba(144,196,255,0.08)"},
    rose:  {l:"#b31a4a",ld:"#d45a80",d:"#ffb0c8",dd:"#d45a80",tbl:"rgba(179,26,74,0.06)",tbd:"rgba(255,176,200,0.08)"},
  };

  const acc=ACCENTS[accentKey]||ACCENTS.purple;
  // Helper: blend hex color toward white (light) or black (dark)
  const blendHex=(hex,amt)=>{// amt: positive = lighter, negative = darker

    ac:acc.d,a2:acc.dd,mb:blendHex(baseDark,0.08),ov:"rgba(0,0,0,0.65)",ib:blendHex(baseDark,0.04),ibd:"#2a2a32",

    tb:acc.tbl,nl:acc.l,dg:"#d94f4f"};

  const goT=()=>setCd(new Date());

    case"s":case"S":lastCalViewRef.current="schedule";setView("schedule");setViewOpen(false);break;case"ArrowLeft":nav(-1);break;case"ArrowRight":nav(1);break;
    case"n":case"N":setModal({type:"event",date:$d(cd)});break;case"[":setSbO(p=>!p);break;case"Escape":setViewOpen(false);break;}};

      setEv(p=>p.map(e=>e.id===id?{...e,...d}:e));

      if(ev._courseId&&ev._type&&!ev._examId&&!ev._studyBlock&&!ev._ohId){
        setCo(p=>p.map(c=>c.id===ev._courseId

  const tC=(c)=>setAc(p=>{const n=new Set(p);if(n.has(c))n.delete(c);else n.add(c);return n;});

      nc2[c.id]={label:c.name,color:col,bg:`rgba(${r},${g},${b},0.13)`};});
    // Just update the source data — useEffects below regenerate all derived events
    setCo(nc);setCats(nc2);setSem(ns);setCsOpen(false);
  };

  const MO="'DM Mono','SF Mono',monospace",SE="'DM Serif Display',Georgia,serif";

  // Sync assignments → tasks. Preserves manual edits via _manual* flags.
  useEffect(()=>{

// TGSwipe: owns ONE scrollRef, ONE time gutter, and slides only the day-column panels.
// This means the time gutter never moves and horizontal grid lines are perfectly continuous.
function TGSwipe({T,panels,events,tasks,cats,ac,setModal,modal,MO,SE,drag,setDrag,swipeDx,swiping,sharedScrollRef,settings={}}){
  const scrollRef=useRef(null);

  // Init + sync shared scroll position
  useEffect(()=>{
    if(!scrollRef.current)return;
    const el=scrollRef.current;
    const top=(sharedScrollRef?.current!=null)?sharedScrollRef.current:7*hh;
    el.scrollTop=top;
    if(sharedScrollRef&&sharedScrollRef.current==null)sharedScrollRef.current=top;
  },[]);

  useEffect(()=>{
    const el=scrollRef.current;if(!el)return;
    const h=()=>{if(!swiping&&sharedScrollRef)sharedScrollRef.current=el.scrollTop;};
    el.addEventListener("scroll",h,{passive:true});return()=>el.removeEventListener("scroll",h);
  },[swiping,sharedScrollRef]);

  // Pinch-to-zoom on the scroll container
  // Uses a CSS scaleY transform during the pinch for smooth 60fps visual feedback,
  // then commits the new hh to React state only on touchend to avoid per-frame re-renders.
  const hhRef=useRef(hh); // always reflects latest committed hh
  useEffect(()=>{hhRef.current=hh;},[hh]);

  useEffect(()=>{
    const el=scrollRef.current;if(!el)return;
    // The inner content div that we'll transform during pinch
    const inner=el.querySelector('[data-timegrid-inner]');

    const onTS=(e)=>{
      if(e.touches.length===2&&!_swipeNavActive){
        e.preventDefault();
        // Cancel any pending long-press or drag — second finger means pinch, not tap
        if(longPressRef.current?.timer)clearTimeout(longPressRef.current.timer);
        longPressRef.current=null;
        touchDragRef.current=null;
        setDrag(null);
        const midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
        const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        const currentHh=hhRef.current;
        const anchorRatio=(el.scrollTop+(midY-el.getBoundingClientRect().top))/(currentHh*24);
        pinchRef.current={dist,hh:currentHh,anchorRatio,midY,liveHh:currentHh};
      }
    };

    const onTM=(e)=>{
      if(e.touches.length===2&&pinchRef.current&&!_swipeNavActive){
        e.preventDefault();
        const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        const raw=pinchRef.current.hh*d/pinchRef.current.dist;
        const newHh=Math.max(30,Math.min(150,raw));
        pinchRef.current.liveHh=newHh;
        // Anchor-preserving scroll: reposition so the pinch midpoint stays on the same time
        const{anchorRatio,midY}=pinchRef.current;
        const rect=el.getBoundingClientRect();
        const newScrollTop=anchorRatio*newHh*24-(midY-rect.top);
        el.scrollTop=Math.max(0,newScrollTop);

        setHh(Math.round(newHh));
      }
    };

    const onTE=(e)=>{
      if(pinchRef.current){
        // Commit final snapped value
        const finalHh=Math.round(Math.max(30,Math.min(150,pinchRef.current.liveHh)));
        setHh(finalHh);
        pinchRef.current=null;
      }
    };

    el.addEventListener("touchcancel",onTE);

      el.removeEventListener("touchstart",onTS);
      el.removeEventListener("touchmove",onTM);
      el.removeEventListener("touchend",onTE);
      el.removeEventListener("touchcancel",onTE);
    };
  },[]);

        setModal({type:"event",date,prefill:{startHour:sH,startMin:sM%60,endHour:eH,endMin:eM%60},noAutoFocus:true});
      } else if(lp&&!lp.active&&!didScroll){

    clusters.forEach(cluster=>{
      const colEnds=[];
      cluster.forEach(i=>{
        const s=sorted[i].startHour*60+(sorted[i].startMin||0),e=sorted[i].endHour*60+(sorted[i].endMin||0);
        let col=colEnds.findIndex(end=>end<=s);if(col===-1){col=colEnds.length;colEnds.push(0);}colEnds[col]=e;
        result[i]._col=col;
      });

    });

  };

  const mD=(e,ds)=>{if(e.button!==0||e.target.closest("[data-ev]"))return;

function SemV({T,sem,events,tasks,exams,assignments,courses,cats,ac,setModal,MO,SE,setCd,setView}){
  const cal=PCAL[sem];

  const semStart=$p(cal.cs),semEnd=$p(cal.ce);

  const extEnd=$a(semEnd,42);

  const months=[];

  while(cur<=extEnd){months.push({y:cur.getFullYear(),m:cur.getMonth()});cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}

  // Collect items to display: assignments (as tasks), exams, standalone tasks

        time:t.hasDueTime?$t(t.dueHour,t.dueMin||0):null,

    });
    // Standalone tasks (not from assignments)

      items.push({type:"task",label:t.title,color:(cats[t.category]||cats.other).color,id:t.id,done:t.done,
        time:t.hasDueTime?$t(t.dueHour,t.dueMin||0):null,

        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
          {DN.map(d=><div key={d} style={{fontFamily:MO,fontSize:"0.38rem",color:T.t3,textAlign:"center",padding:"2px 0",letterSpacing:"0.04em"}}>{d[0]}</div>)}
          {cells.map((day,i)=>{
            if(!day)return <div key={i} style={{minHeight:isMobile?36:42}}/>;
            const ds=$d(new Date(y,m,day));
            const it=$td(new Date(y,m,day));

              style={{minHeight:isMobile?36:42,background:it?T.tb:isBreak?`${T.ac}06`:inSem?T.b3:"transparent",

                opacity:inSem||items.length>0?1:0.4}}>
              <div style={{fontSize:"0.52rem",color:it?T.ac:T.tx,fontWeight:it?700:400,textAlign:"right",padding:"0 1px",lineHeight:1.4}}>{day}</div>

      {asapTasks.length>0&&<div style={{marginBottom:2}}>
        <div style={{padding:"6px 16px 4px",fontFamily:MO,fontSize:"0.5rem",color:"#f97316",letterSpacing:"0.1em",textTransform:"uppercase",background:"rgba(249,115,22,0.06)",borderBottom:"1px solid rgba(249,115,22,0.15)"}}>ASAP — No date</div>
        <div style={{paddingLeft:80,paddingRight:12,paddingTop:8,paddingBottom:4}}>
          {asapTasks.map(tk=>{const cat=cats[tk.category]||cats.other;
            return <div key={tk.id} onClick={()=>setModal({type:"task",data:tk})}
              style={{background:cat.color,color:"#fff",borderRadius:4,padding:"10px 14px",marginBottom:4,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:"0.85rem",opacity:0.9}}>✓</span>
              <div style={{fontSize:"0.85rem",fontWeight:600,lineHeight:1.2}}>{tk.title}</div>
            </div>;})}
        </div>
      </div>}
      {days.length===0&&asapTasks.length===0&&<div style={{padding:40,textAlign:"center",color:T.t3,fontFamily:MO,fontSize:"0.6rem",letterSpacing:"0.08em"}}>NO UPCOMING EVENTS</div>}
      {days.map(({d,ds,dEv,dAl,dTk})=>{
        const it=$td(d);
        const dayLabel=DNF[d.getDay()].slice(0,3).toUpperCase();
        return <div key={ds} style={{marginBottom:2}}>
          {d.getDay()===1&&<div style={{padding:"10px 16px 4px",fontFamily:MO,fontSize:"0.5rem",color:T.t3,
            letterSpacing:"0.1em",textTransform:"uppercase",borderTop:`1px solid ${T.bd}`,background:T.b2}}>
            {MN2[d.getMonth()].toUpperCase()} {d.getDate()}–{Math.min(d.getDate()+6,$m(d.getFullYear(),d.getMonth()))}
          </div>}
          <div style={{display:"flex"}}>
            <div style={{width:64,flexShrink:0,paddingTop:12,paddingLeft:16,paddingBottom:4}}>
              <div style={{fontFamily:MO,fontSize:"0.48rem",color:it?"#1a73e8":T.t3,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:2}}>{dayLabel}</div>
              <div onClick={()=>setCd(d)} style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                background:it?"#1a73e8":"transparent",color:it?"#fff":T.tx,fontSize:"1.1rem",fontWeight:it?700:400,cursor:"pointer",userSelect:"none"}}>{d.getDate()}</div>
            </div>
            <div style={{flex:1,paddingTop:8,paddingBottom:4,paddingRight:12}}>
              {dAl.map(ev=>{const cat=cats[ev.category]||cats.other;
                return <div key={ev.id} onClick={()=>setModal({type:"event",data:ev})}
                  style={{background:cat.color,color:"#fff",borderRadius:4,padding:"10px 14px",marginBottom:4,cursor:"pointer"}}>
                  <div style={{fontSize:"0.85rem",fontWeight:600,lineHeight:1.2}}>{ev.title}</div>
                  <div style={{fontSize:"0.72rem",opacity:0.85,marginTop:2}}>All day</div>
                </div>;})}
              {dEv.map(ev=>{const cat=cats[ev.category]||cats.other;
                return <div key={ev.id} onClick={()=>setModal({type:"event",data:ev})}
                  style={{background:cat.color,color:"#fff",borderRadius:4,padding:"10px 14px",marginBottom:4,cursor:"pointer"}}>
                  <div style={{fontSize:"0.85rem",fontWeight:600,lineHeight:1.2}}>{ev.title}</div>
                  <div style={{fontSize:"0.72rem",opacity:0.85,marginTop:3}}>
                    {$t(ev.startHour,ev.startMin||0)}–{$t(ev.endHour,ev.endMin||0)}
                    {ev.location&&` at ${ev.location}`}
                  </div>
                </div>;})}
              {dTk.map(tk=>{const cat=cats[tk.category]||cats.other;
                return <div key={tk.id} onClick={()=>setModal({type:"task",data:tk})}
                  style={{background:cat.color,color:"#fff",borderRadius:4,padding:"10px 14px",marginBottom:4,cursor:"pointer",display:"flex",alignItems:"center",gap:8,opacity:tk.done?0.55:1}}>
                  <span style={{fontSize:"0.85rem",opacity:0.9}}>{tk.done?"✓":"○"}</span>
                  <div>
                    <div style={{fontSize:"0.85rem",fontWeight:600,lineHeight:1.2,textDecoration:tk.done?"line-through":"none"}}>{tk.title}</div>
                    {tk.hasDueTime&&<div style={{fontSize:"0.72rem",opacity:0.85,marginTop:2}}>{$t(tk.dueHour,tk.dueMin||0)}</div>}
                  </div>
                </div>;})}
            </div>
          </div>
        </div>;})}
    </div>;
  }

  // Desktop: two-column layout
  return <div style={{flex:1,overflow:"auto",background:T.bg}}>
    {asapTasks.length>0&&<div style={{display:"flex",borderBottom:`1px solid ${T.bd}`,minHeight:52,background:"rgba(249,115,22,0.03)"}}>
      <div style={{width:140,flexShrink:0,padding:"14px 20px 14px 32px",borderRight:"1px solid rgba(249,115,22,0.2)"}}>
        <div style={{fontFamily:MO,fontSize:"0.45rem",color:"#f97316",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>ASAP</div>
        <div style={{fontFamily:MO,fontSize:"0.4rem",color:"#f97316",opacity:0.7}}>No date</div>
      </div>
      <div style={{flex:1,padding:"10px 32px 10px 20px"}}>
        {asapTasks.map(tk=>{const cat=cats[tk.category]||cats.other;
          return <div key={tk.id} onClick={()=>setModal({type:"task",data:tk})}
            style={{display:"flex",alignItems:"center",gap:12,padding:"4px 0",cursor:"pointer"}}>
            <div style={{width:10,height:10,borderRadius:2,border:`2px solid ${cat.color}`,flexShrink:0}}/>
            <span style={{fontFamily:MO,fontSize:"0.52rem",color:"#f97316",width:80,flexShrink:0}}>ASAP</span>
            <span style={{fontSize:"0.82rem",color:T.tx,fontWeight:400,opacity:0.85,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tk.title}</span>
          </div>;})}
      </div>
    </div>}
    {days.length===0&&asapTasks.length===0&&<div style={{padding:40,textAlign:"center",color:T.t3,fontFamily:MO,fontSize:"0.6rem",letterSpacing:"0.08em"}}>NO UPCOMING EVENTS</div>}
    {days.map(({d,ds,dEv,dAl,dTk})=>{
      const it=$td(d);
      const allItems=[...dAl.map(e=>({...e,_kind:"allday"})),...dEv.map(e=>({...e,_kind:"event"})),...dTk.map(t=>({...t,_kind:"task"}))];
      return <div key={ds} style={{display:"flex",borderBottom:`1px solid ${T.bd}`,minHeight:52}}>
        <div style={{width:140,flexShrink:0,padding:"14px 20px 14px 32px",borderRight:`1px solid ${T.bd}`}}>
          {it&&<div style={{fontFamily:MO,fontSize:"0.45rem",color:T.ac,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>TODAY</div>}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div onClick={()=>setCd(d)} style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
              background:it?T.ac:"transparent",color:it?T.bg:T.tx,fontSize:"0.85rem",fontWeight:it?700:400,cursor:"pointer",userSelect:"none",flexShrink:0}}>{d.getDate()}</div>
            <div>
              <div style={{fontFamily:MO,fontSize:"0.42rem",color:it?T.ac:T.t3,letterSpacing:"0.06em",textTransform:"uppercase"}}>{DN[d.getDay()]}</div>
              <div style={{fontFamily:MO,fontSize:"0.42rem",color:T.t3}}>{MN2[d.getMonth()].slice(0,3)} {d.getFullYear()}</div>
            </div>
          </div>
        </div>
        <div style={{flex:1,padding:"10px 32px 10px 20px"}}>
          {allItems.map((item)=>{
            const cat=cats[item.category]||cats.other;
            if(item._kind==="allday")return(
              <div key={item.id} onClick={()=>setModal({type:"event",data:item})}
                style={{display:"flex",alignItems:"center",gap:12,padding:"4px 0",cursor:"pointer"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:cat.color,flexShrink:0}}/>
                <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t3,width:80,flexShrink:0}}>All day</span>
                <span style={{fontSize:"0.82rem",color:T.tx,fontWeight:500}}>{item.title}</span>
              </div>);
            if(item._kind==="event")return(
              <div key={item.id} onClick={()=>setModal({type:"event",data:item})}
                style={{display:"flex",alignItems:"center",gap:12,padding:"4px 0",cursor:"pointer"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:cat.color,flexShrink:0}}/>
                <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t3,width:80,flexShrink:0,whiteSpace:"nowrap"}}>{$t(item.startHour,item.startMin||0)}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.82rem",color:T.tx,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div>
                  {item.location&&<div style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3,marginTop:1}}>{item.location}</div>}
                </div>
                <span style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3,whiteSpace:"nowrap",flexShrink:0}}>{$t(item.startHour,item.startMin||0)}–{$t(item.endHour,item.endMin||0)}</span>
              </div>);
            return(
              <div key={item.id} onClick={()=>setModal({type:"task",data:item})}
                style={{display:"flex",alignItems:"center",gap:12,padding:"4px 0",cursor:"pointer",opacity:item.done?0.5:1}}>
                <div style={{width:10,height:10,borderRadius:2,border:`2px solid ${cat.color}`,flexShrink:0,background:item.done?cat.color:"transparent"}}/>
                <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t3,width:80,flexShrink:0,whiteSpace:"nowrap"}}>{item.hasDueTime?$t(item.dueHour,item.dueMin||0):"Task"}</span>
                <span style={{fontSize:"0.82rem",color:T.tx,fontWeight:400,opacity:0.85,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:item.done?"line-through":"none"}}>{item.title}</span>
              </div>);
          })}
        </div>
      </div>;})}
  </div>;
}

// ═══ COURSE SETUP ═══
function CSModal({T,MO,SE,courses:ec,sem:es,onSave,onClose}){
  const AUTO_CC=["#ff8c69","#69d4ff","#ff6fa0","#a8e06a","#ffd06a","#e88bff","#6affb4","#b0b0c0","#ff6b6b","#69ffd2"];
  function eC(idx=0){return{id:gi(),name:"",color:AUTO_CC[idx%AUTO_CC.length],lecDays:[1,3],lSH:10,lSM:0,lEH:10,lEM:50,lecLoc:"",lecSameTime:true,lecSameLoc:true,lecSlots:[],
    hasPrec:false,precDays:[4],pSH:13,pSM:30,pEH:14,pEM:20,precLoc:"",precSameTime:true,precSameLoc:true,precSlots:[],
    hasLab:false,labDays:[2],labSH:13,labSM:30,labEH:16,labEM:20,labLoc:"",labSameTime:true,labSameLoc:true,labSlots:[],
    hasDrill:false,drillDays:[5],drSH:9,drSM:0,drEH:9,drEM:50,drillLoc:"",drillSameTime:true,drillSameLoc:true,drillSlots:[]};}
  const[sem,setSem]=useState(es);
  const[cl,setCl]=useState(ec.length?JSON.parse(JSON.stringify(ec.map((c,i)=>({color:AUTO_CC[i%AUTO_CC.length],...c})))):[eC(0)]);
  const add=()=>setCl(p=>[...p,eC(p.length)]);
  const rm=(id)=>setCl(p=>p.filter(c=>c.id!==id));
  const up=(id,f,v)=>setCl(p=>p.map(c=>c.id===id?{...c,[f]:v}:c));
  const td=(cid,f,day)=>setCl(p=>p.map(c=>{if(c.id!==cid)return c;const a=c[f];return{...c,[f]:a.includes(day)?a.filter(d=>d!==day):[...a,day].sort()};}));

  const IS={background:T.ib,border:`1px solid ${T.ibd}`,borderRadius:5,padding:"5px 8px",color:T.tx,fontFamily:"'DM Sans',sans-serif",fontSize:"0.78rem",outline:"none",WebkitAppearance:"none"};
  const SS={...IS,cursor:"pointer"};
  const hO=HOURS.map(h=><option key={h} value={h}>{$t(h,0).replace(":00 "," ")}</option>);
  const mO=[0,5,10,15,20,25,30,35,40,45,50,55].map(m=><option key={m} value={m}>{String(m).padStart(2,"0")}</option>);

  const DB=(cid,f)=><div style={{display:"flex",gap:2}}>
    {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>{const c=cl.find(x=>x.id===cid);const a=c?.[f]?.includes(i);
      return <button key={d} onClick={()=>td(cid,f,i)} style={{width:26,height:22,border:`1px solid ${a?T.ac:T.bd}`,borderRadius:3,cursor:"pointer",
        fontFamily:MO,fontSize:"0.46rem",background:a?`${T.ac}30`:"transparent",color:a?T.ac:T.t3}}>{d}</button>;})}</div>;

  const TS=(cid,pre)=>{const c=cl.find(x=>x.id===cid);return <div style={{display:"flex",gap:3,alignItems:"center"}}>
    <select value={c[pre+"SH"]} onChange={e=>up(cid,pre+"SH",+e.target.value)} style={{...SS,width:72}}>{hO}</select>
    <MinPick value={c[pre+"SM"]} onChange={v=>up(cid,pre+"SM",v)}/>
    <span style={{color:T.t3,fontSize:"0.6rem"}}>–</span>
    <select value={c[pre+"EH"]} onChange={e=>up(cid,pre+"EH",+e.target.value)} style={{...SS,width:72}}>{hO}</select>
    <MinPick value={c[pre+"EM"]} onChange={v=>up(cid,pre+"EM",v)}/>
  </div>;};

  const Tog=({cid,field,label})=>{const c=cl.find(x=>x.id===cid);return <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:c[field]?5:0,marginTop:4}}>
    <div onClick={()=>up(cid,field,!c[field])} style={{width:32,height:16,background:c[field]?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer"}}>
      <div style={{width:10,height:10,background:c[field]?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:c[field]?18:3,transition:"left 0.2s"}}/></div>
    <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2,letterSpacing:"0.06em",textTransform:"uppercase"}}>{label}</span>
  </div>;};

  const DAY_NAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Per-slot time selector for custom schedules
  const SlotTS=(cid,slotKey,sameTimeKey,sameLocKey,daysKey,pre,defaultLoc)=>{
    const c=cl.find(x=>x.id===cid);
    if(!c)return null;
    const isSame=c[sameTimeKey]!==false;
    const isSameLoc=sameLocKey?c[sameLocKey]!==false:true;
    const days=c[daysKey]||[];
    // Group days that share the same time into slots
    const slots=c[slotKey]||[];
    const getSlot=(day)=>slots.find(s=>s.days.includes(day));
    const updateSlotTime=(day,field,val)=>{
      setCl(p=>p.map(co=>{
        if(co.id!==cid)return co;
        let sl=[...(co[slotKey]||[])];
        const idx=sl.findIndex(s=>s.days.includes(day));
        if(idx>=0){sl[idx]={...sl[idx],[field]:val};}
        else{sl.push({days:[day],sH:co[pre+"SH"],sM:co[pre+"SM"],eH:co[pre+"EH"],eM:co[pre+"EM"],[field]:val});}
        return{...co,[slotKey]:sl};
      }));
    };
    const getDayVal=(day,field,fallbackPre)=>{
      const s=getSlot(day);
      if(s&&s[field]!==undefined)return s[field];
      return c[fallbackPre+field.charAt(0).toUpperCase()+field.slice(1)]??c[fallbackPre+(field==="sH"?"SH":field==="sM"?"SM":field==="eH"?"EH":"EM")];
    };
    return <div>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,marginTop:2}}>
        <div onClick={()=>up(cid,sameTimeKey,!isSame)} style={{width:28,height:15,background:isSame?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer"}}>
          <div style={{width:9,height:9,background:isSame?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:isSame?16:2,transition:"left 0.2s"}}/></div>
        <span style={{fontFamily:MO,fontSize:"0.48rem",color:T.t2,letterSpacing:"0.05em"}}>Same time every day</span>
      </div>
      {sameLocKey&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,marginTop:0}}>
        <div onClick={()=>up(cid,sameLocKey,!isSameLoc)} style={{width:28,height:15,background:isSameLoc?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer"}}>
          <div style={{width:9,height:9,background:isSameLoc?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:isSameLoc?16:2,transition:"left 0.2s"}}/></div>
        <span style={{fontFamily:MO,fontSize:"0.48rem",color:T.t2,letterSpacing:"0.05em"}}>Same location every day</span>
      </div>}
      {isSame?TS(cid,pre):
        <div style={{marginTop:3}}>
          {days.sort((a,b)=>a-b).map(day=>{
            const slotLoc=(()=>{const s=getSlot(day);return s?.loc!==undefined?s.loc:defaultLoc||"";})();
            return <div key={day} style={{marginBottom:4,padding:"6px 6px",background:T.b2,borderRadius:5,border:`1px solid ${T.bd}`}}>
              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:isSameLoc?0:4}}>
                <span style={{fontFamily:MO,fontSize:"0.46rem",color:T.ac,width:22,textAlign:"center",letterSpacing:"0.04em"}}>{DAY_NAMES[day]}</span>
                <select value={getDayVal(day,"sH",pre)} onChange={e=>updateSlotTime(day,"sH",+e.target.value)} style={{...SS,width:64,fontSize:"0.7rem",padding:"2px 3px"}}>{hO}</select>
                <MinPick value={getDayVal(day,"sM",pre)} onChange={v=>updateSlotTime(day,"sM",v)}/>
                <span style={{color:T.t3,fontSize:"0.55rem"}}>–</span>
                <select value={getDayVal(day,"eH",pre)} onChange={e=>updateSlotTime(day,"eH",+e.target.value)} style={{...SS,width:64,fontSize:"0.7rem",padding:"2px 3px"}}>{hO}</select>
                <MinPick value={getDayVal(day,"eM",pre)} onChange={v=>updateSlotTime(day,"eM",v)}/>
              </div>
              {!isSameLoc&&<input value={slotLoc} onChange={e=>updateSlotTime(day,"loc",e.target.value)}
                placeholder="Location for this day" style={{...IS,width:"100%",fontSize:"0.7rem",padding:"2px 6px",marginTop:2}}/>}
            </div>;})}
          {days.length===0&&<div style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3,padding:"4px 0"}}>Select days above first</div>}
        </div>}
    </div>;
  };

  const Section=({cid,flag,dayF,timePre,locF,label,sameTimeKey,sameLocKey,slotKey})=>{const c=cl.find(x=>x.id===cid);if(!c[flag])return null;
    return <>
      <div style={{marginBottom:5,marginTop:3}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>{label} Days</label>{DB(cid,dayF)}</div>
      <div style={{marginBottom:4}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>{label} Time</label>{SlotTS(cid,slotKey,sameTimeKey,sameLocKey,dayF,timePre,c[locF])}</div>
      <div style={{marginBottom:4}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>{label} Location</label>
        <input value={c[locF]||""} onChange={e=>up(cid,locF,e.target.value)} placeholder="e.g. McCosh 50" style={{...IS,width:"100%"}}/></div>
    </>;};

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:T.ov,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:14}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.mb,border:`1px solid ${T.bd}`,borderRadius:14,
      padding:20,width:"100%",maxWidth:560,maxHeight:"88vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{fontFamily:SE,fontSize:"1.2rem",color:T.tx,marginBottom:12}}>Course Setup</div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",gap:5}}>
          {Object.entries(PCAL).map(([k,c])=><button key={k} onClick={()=>setSem(k)} style={{flex:1,padding:"5px 0",border:"none",borderRadius:5,cursor:"pointer",
            fontFamily:MO,fontSize:"0.6rem",letterSpacing:"0.06em",textTransform:"uppercase",
            background:sem===k?T.ac:T.b3,color:sem===k?T.bg:T.t3}}>{c.label}</button>)}
        </div>
      </div>
      {cl.map((c,ci)=><div key={c.id} style={{border:`1px solid ${T.bd}`,borderRadius:7,padding:10,marginBottom:7,
        background:T.b3,borderLeft:`4px solid ${CC[ci%CC.length].c}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,gap:6}}>
          {/* Color swatch picker */}
          <div style={{position:"relative",flexShrink:0}}>
            <div style={{width:20,height:20,borderRadius:"50%",background:c.color||"#ff8c69",cursor:"pointer",border:`2px solid ${T.bd}`,boxSizing:"border-box"}}
              onClick={()=>up(c.id,"_showColorPicker",!c._showColorPicker)}/>
            {c._showColorPicker&&<div style={{position:"absolute",top:26,left:0,zIndex:20,background:T.mb,border:`1px solid ${T.bd}`,borderRadius:8,padding:6,boxShadow:"0 4px 16px rgba(0,0,0,0.2)",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4,width:120}}>
              {AUTO_CC.map(col=><div key={col} onClick={()=>{up(c.id,"color",col);up(c.id,"_showColorPicker",false);}}
                style={{width:18,height:18,borderRadius:"50%",background:col,cursor:"pointer",
                  border:`2px solid ${col===c.color?"#fff":"transparent"}`,outline:col===c.color?`2px solid ${col}`:"none",boxSizing:"border-box"}}/>)}
            </div>}
          </div>
          <input value={c.name} onChange={e=>up(c.id,"name",e.target.value)} placeholder="Course (e.g. MAT 217)"
            style={{...IS,flex:1,fontWeight:600}}/>
          <button onClick={()=>rm(c.id)} style={{background:"transparent",border:"none",color:T.dg,cursor:"pointer",fontSize:"0.9rem",marginLeft:2}}>✕</button>
        </div>
        <div style={{marginBottom:5}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>Lecture Days</label>{DB(c.id,"lecDays")}</div>

  </div>;
}

          <button onClick={handleDelete} style={{padding:"5px 14px",borderRadius:6,border:"none",background:T.dg,color:"#fff",cursor:"pointer",fontSize:"0.72rem",fontWeight:600}}>Delete my account</button>
        </div>
      </div>}
      {delStep===2&&<div style={{marginTop:4,padding:12,background:`${T.dg}18`,borderRadius:8,border:`1px solid ${T.dg}50`}}>
        <div style={{fontFamily:MO,fontSize:"0.52rem",color:T.dg,fontWeight:600,marginBottom:6}}>Final confirmation</div>
        <div style={{fontSize:"0.68rem",color:T.tx,marginBottom:10,lineHeight:1.4,fontWeight:500}}>

  const typeLabel={lec:"Lectures",prec:"Precepts",lab:"Labs",drill:"Drills"};
  const sortedExams=[...exams].sort((a,b)=>a.date.localeCompare(b.date));
  const sortedAsgn=[...assignments].sort((a,b)=>a.dueDate.localeCompare(b.dueDate));

      {evs.slice(0,5).map(e=><Row key={e.id} date={e.date} title={e.title.replace(course.name+" — ","")} sub={`${$t(e.startHour,e.startMin||0)}–${$t(e.endHour,e.endMin||0)}${e.location?" · "+e.location:""}`}/>)}
      {evs.length>5&&<div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,padding:"2px 0"}}>+{evs.length-5} more</div>}
    </div>)}
    {sortedExams.length>0&&<div style={{marginBottom:8}}>
      <div style={{fontFamily:MO,fontSize:"0.5rem",color:"#ff8c69",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>Exams ({sortedExams.length})</div>
      {sortedExams.map(ex=><Row key={ex.id} date={ex.date} title={ex.type} sub={`${$t(ex.startHour,ex.startMin||0)}–${$t(ex.endHour,ex.endMin||0)}${ex.location?" · "+ex.location:""}`} color="#ff8c69"/>)}
    </div>}
    {sortedAsgn.length>0&&<div style={{marginBottom:8}}>
      <div style={{fontFamily:MO,fontSize:"0.5rem",color:"#69d4ff",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>Assignments ({sortedAsgn.length})</div>
      {sortedAsgn.map(a=><Row key={a.id} date={a.dueDate} title={`${a.type}${a.title?" — "+a.title:""}`}
        sub={[a.tags,a.estHours].filter(Boolean).join(" · ")} color="#69d4ff"/>)}
    </div>}
    {Object.keys(byType).length===0&&sortedExams.length===0&&sortedAsgn.length===0&&
      <div style={{color:T.t3,fontSize:"0.72rem",fontStyle:"italic"}}>No events yet for this course.</div>}
  </div>;
}

// ═══ RELATIVE DATES TAB ═══
function RelativeTab({T,MO,IS,SS,LS,hO,course,assignments,setAssignments,events,sem}){
  const[rule,setRule]=useState({anchor:"lecture",offset:0,offsetUnit:"day",dow:2,timeH:11,timeM:59,timeAP:"PM",type:"Problem Set",customType:"",title:"",tags:"",estHours:"",autoCounter:true,counterStart:1});
  const[preview,setPreview]=useState([]);
  const up=(f,v)=>setRule(p=>({...p,[f]:v}));

  // 12h → 24h helper
  const to24=(h,ap)=>{let h24=h%12;if(ap==="PM")h24+=12;return h24;};

  const generate=()=>{
    if(!course)return;
    const courseEvs=events.filter(e=>e._courseId===course.id&&!e._allDay);
    let anchors=[];
    if(rule.anchor==="lecture")anchors=courseEvs.filter(e=>e._type==="lec");
    else if(rule.anchor==="precept")anchors=courseEvs.filter(e=>e._type==="prec");
    else if(rule.anchor==="lectureweek"){
      // One anchor per lecture week — use the first lecture of each calendar week
      const lecEvs=courseEvs.filter(e=>e._type==="lec").sort((a,b)=>a.date.localeCompare(b.date));
      const seenWeeks=new Set();
      lecEvs.forEach(e=>{const wk=$d($w($p(e.date)));if(!seenWeeks.has(wk)){seenWeeks.add(wk);anchors.push(e);}});
    }
    else if(rule.anchor==="dow"){
      const cal=PCAL[sem];
      if(cal){
        const start=$p(cal.cs),end=$p(cal.ce);
        for(let d=new Date(start);d<=end;d=$a(d,1)){
          const ds=$d(d);if(!isCd(ds,sem))continue;
          if(d.getDay()===rule.dow)anchors.push({date:ds});
        }
      } else {
        const weeks=new Set(courseEvs.map(e=>$d($w($p(e.date)))));
        weeks.forEach(ws=>{
          const wd=$p(ws);const target=new Date(wd);
          const diff=(rule.dow-wd.getDay()+7)%7;target.setDate(wd.getDate()+diff);
          anchors.push({date:$d(target)});
        });
      }
    }
    const dueH=to24(rule.timeH,rule.timeAP);
    const resolvedType=rule.type==="Other"?(rule.customType||"Other"):rule.type;
    const results=anchors.map(ev=>{
      const base=$p(ev.date);base.setDate(base.getDate()+(rule.offsetUnit==="week"?rule.offset*7:+rule.offset));
      return{id:gi(),courseId:course.id,type:resolvedType,title:rule.title,dueDate:$d(base),
        dueHour:dueH,dueMin:rule.timeM,hasDueTime:true,tags:rule.tags,estHours:rule.estHours,details:"",_enabled:true};
    }).filter((a,i,arr)=>arr.findIndex(x=>x.dueDate===a.dueDate)===i).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
    // Apply auto-counter
    if(rule.autoCounter){const start=rule.counterStart??1;results.forEach((a,i)=>{a.title=(rule.title||resolvedType)+" "+(i+start);});}
    setPreview(results);
  };

  const commit=()=>{
    const enabled=preview.filter(a=>a._enabled);
    if(enabled.length===0)return;
    const cleaned=enabled.map(({_enabled,...rest})=>rest);
    setAssignments(p=>[...p,...cleaned]);setPreview([]);
  };

  const updatePreview=(id,field,value)=>{setPreview(p=>p.map(a=>a.id===id?{...a,[field]:value}:a));};
  const removePreview=(id)=>{setPreview(p=>p.filter(a=>a.id!==id));};
  const togglePreview=(id)=>{setPreview(p=>p.map(a=>a.id===id?{...a,_enabled:!a._enabled}:a));};

  const DN2=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  // 12h hour options
  const h12Opts=Array.from({length:12},(_,i)=>i===0?12:i);

  return <div>
    <div style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,marginBottom:6}}>Auto-create assignments relative to course schedule</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
      <div><label style={LS}>Anchor</label>
        <select value={rule.anchor} onChange={e=>up("anchor",e.target.value)} style={{...SS,width:"100%"}}>
          <option value="lecture">After each Lecture</option>
          <option value="precept">After each Precept</option>
          <option value="lectureweek">Each Lecture Week</option>
          <option value="dow">Each week on day:</option>
        </select></div>
      {rule.anchor==="dow"&&<div><label style={LS}>Day of Week</label>
        <select value={rule.dow} onChange={e=>up("dow",+e.target.value)} style={{...SS,width:"100%"}}>
          {DN2.map((d,i)=><option key={i} value={i}>{d}</option>)}
        </select></div>}
      <div><label style={LS}>Offset</label>
        <div style={{display:"flex",gap:3}}>
          <input type="number" min={-7} max={14} value={rule.offset} onChange={e=>up("offset",+e.target.value)}
            style={{...IS,width:48,textAlign:"center"}}/>
          <select value={rule.offsetUnit} onChange={e=>up("offsetUnit",e.target.value)} style={{...SS,flex:1}}>
            <option value="day">day(s)</option><option value="week">week(s)</option>
          </select>
        </div></div>
      <div><label style={LS}>Due Time</label>
        <div style={{display:"flex",gap:2,alignItems:"center"}}>
          <select value={rule.timeH} onChange={e=>up("timeH",+e.target.value)} style={{...SS,flex:1,fontSize:"0.72rem",padding:"3px 4px"}}>
            {h12Opts.map(h=><option key={h} value={h}>{h}</option>)}
          </select>
          <span style={{color:T.t3,fontSize:"0.72rem"}}>:</span>
          <input type="number" min={0} max={59} value={String(rule.timeM).padStart(2,"0")} onChange={e=>up("timeM",Math.max(0,Math.min(59,+e.target.value||0)))}
            style={{...IS,width:38,textAlign:"center",fontSize:"0.72rem",padding:"3px 4px"}}/>
          <select value={rule.timeAP} onChange={e=>up("timeAP",e.target.value)} style={{...SS,width:52,fontSize:"0.72rem",padding:"3px 4px"}}>
            <option value="AM">AM</option><option value="PM">PM</option>
          </select>
        </div></div>
      <div><label style={LS}>Type</label>
        <select value={ASGN_TYPES.includes(rule.type)?rule.type:"Other"} onChange={e=>up("type",e.target.value)} style={{...SS,width:"100%"}}>
          {ASGN_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        {(rule.type==="Other"||!ASGN_TYPES.includes(rule.type))&&<input value={rule.customType} onChange={e=>{up("customType",e.target.value);}} placeholder="Custom type name…" style={{...IS,width:"100%",marginTop:3,fontSize:"0.72rem"}}/>}
      </div>
      <div><label style={LS}>Title Prefix</label>
        <input value={rule.title} onChange={e=>up("title",e.target.value)} placeholder="e.g. Pset" style={{...IS,width:"100%"}}/></div>
      <div><label style={LS}>Tags</label><input value={rule.tags} onChange={e=>up("tags",e.target.value)} placeholder="reading, pset..." style={{...IS,width:"100%"}}/></div>
      <div><label style={LS}>Est. Hours</label>
        <select value={rule.estHours} onChange={e=>up("estHours",e.target.value)} style={{...SS,width:"100%"}}>
          <option value="">—</option>{["<1h","1–2h","2–3h","3–5h","5–8h","8h+"].map(h=><option key={h} value={h}>{h}</option>)}
        </select></div>
    </div>
    {/* Auto-counter toggle */}
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:rule.autoCounter?4:8,padding:"5px 0"}}>
      <div onClick={()=>up("autoCounter",!rule.autoCounter)} style={{width:32,height:17,background:rule.autoCounter?T.ac:T.b2,borderRadius:9,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer",flexShrink:0,transition:"background 0.2s"}}>
        <div style={{width:11,height:11,background:rule.autoCounter?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:rule.autoCounter?18:2,transition:"left 0.2s"}}/></div>
      <span style={{fontFamily:MO,fontSize:"0.5rem",color:T.t2,letterSpacing:"0.04em"}}>Auto-number (e.g. PSET 1, PSET 2…)</span>
    </div>
    {rule.autoCounter&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,paddingLeft:2}}>
      <span style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.06em"}}>Start at:</span>
      {[0,1].map(n=><button key={n} onClick={()=>up("counterStart",n)}
        style={{padding:"2px 10px",borderRadius:4,border:`1px solid ${(rule.counterStart??1)===n?T.ac:T.bd}`,
          background:(rule.counterStart??1)===n?`${T.ac}18`:"transparent",
          color:(rule.counterStart??1)===n?T.ac:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.52rem",fontWeight:600}}>
        {n}</button>)}
    </div>}
    <button onClick={generate} style={{width:"100%",padding:6,background:T.ac,border:"none",borderRadius:5,color:T.bg,fontFamily:MO,fontSize:"0.55rem",cursor:"pointer",marginBottom:8}}>Preview →</button>
    {preview.length>0&&<div>
      <div style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,marginBottom:4}}>{preview.filter(a=>a._enabled).length} of {preview.length} assignments to create:</div>
      <div style={{maxHeight:200,overflow:"auto",marginBottom:6}}>
        {preview.map((a,idx)=><div key={a.id} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 0",borderBottom:`1px solid ${T.bd}22`,opacity:a._enabled?1:0.4}}>
          {/* Enable/disable checkbox */}
          <div onClick={()=>togglePreview(a.id)} style={{width:16,height:16,borderRadius:3,border:`1.5px solid ${a._enabled?T.ac:T.bd}`,
            cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,background:a._enabled?`${T.ac}20`:"transparent"}}>
            {a._enabled&&<span style={{color:T.ac,fontSize:"0.6rem",lineHeight:1}}>✓</span>}
          </div>
          {/* Editable date */}
          <input type="date" value={a.dueDate} onChange={e=>updatePreview(a.id,"dueDate",e.target.value)}
            style={{...IS,width:110,fontSize:"0.65rem",padding:"2px 4px",opacity:a._enabled?1:0.5}}/>
          {/* Editable title */}
          <input value={a.title} onChange={e=>updatePreview(a.id,"title",e.target.value)}
            style={{...IS,flex:1,fontSize:"0.65rem",padding:"2px 4px",opacity:a._enabled?1:0.5}}
            placeholder={a.type}/>
          {/* Time display */}
          <span style={{color:T.t3,fontFamily:MO,fontSize:"0.44rem",flexShrink:0,width:46,textAlign:"right"}}>{a.hasDueTime?$t(a.dueHour,a.dueMin):""}</span>
          {/* Delete button */}
          <button onClick={()=>removePreview(a.id)} style={{background:"none",border:"none",color:T.dg,cursor:"pointer",fontSize:"0.65rem",padding:"0 2px",flexShrink:0,lineHeight:1}} title="Remove">×</button>
        </div>)}
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={commit} style={{flex:1,padding:5,background:T.ac,border:"none",borderRadius:5,color:T.bg,fontFamily:MO,fontSize:"0.55rem",cursor:"pointer",fontWeight:600}}>Add {preview.filter(a=>a._enabled).length} Assignment{preview.filter(a=>a._enabled).length!==1?"s":""}</button>
        <button onClick={()=>setPreview([])} style={{padding:5,background:"transparent",border:`1px solid ${T.bd}`,borderRadius:5,color:T.t3,fontFamily:MO,fontSize:"0.55rem",cursor:"pointer"}}>Clear</button>
      </div>
    </div>}
  </div>;
}

  const[days,setDays]=useState([0]);
  const[sH,setSH]=useState(20);const[sM,setSM]=useState(0);const[eH,setEH]=useState(22);const[eM,setEM]=useState(0);

  </div>;
}

// ═══ WEEK LOAD CHART ═══
function WeekLoadChart({T,MO,SE,events,assignments,exams,cats,weekDates}){
  const HOUR_EST={"<1h":0.5,"1–2h":1.5,"2–3h":2.5,"3–5h":4,"5–8h":6.5,"8h+":9};
  const days=weekDates.map(d=>{
    const ds=$d(d);
    const classHrs=events.filter(e=>e.date===ds&&!e._allDay&&e._courseId)
      .reduce((s,e)=>s+((e.endHour+(e.endMin||0)/60)-(e.startHour+(e.startMin||0)/60)),0);
    const examHrs=events.filter(e=>e.date===ds&&!e._allDay&&e._examId)
      .reduce((s,e)=>s+((e.endHour+(e.endMin||0)/60)-(e.startHour+(e.startMin||0)/60)),0);
    const asgnHrs=assignments.filter(a=>a.dueDate===ds)
      .reduce((s,a)=>s+(HOUR_EST[a.estHours]||0),0);
    const total=classHrs+examHrs+asgnHrs;
    return{label:DN[d.getDay()],classHrs,examHrs,asgnHrs,total,isToday:$td(d)};
  });
  const maxH=Math.max(...days.map(d=>d.total),4);
  return <div style={{padding:"8px 10px",borderTop:`1px solid ${T.bd}`,background:T.b2}}>
    <div style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Week Load</div>
    <div style={{display:"flex",gap:3,alignItems:"flex-end",height:42}}>
      {days.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
        <div style={{width:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end",height:36,gap:0}}>
          {d.asgnHrs>0&&<div style={{width:"100%",background:"#69d4ff",borderRadius:"2px 2px 0 0",
            height:`${(d.asgnHrs/maxH)*36}px`,minHeight:2,opacity:0.8}} title={`Work: ${d.asgnHrs.toFixed(1)}h`}/>}
          {d.examHrs>0&&<div style={{width:"100%",background:"#ff8c69",
            height:`${(d.examHrs/maxH)*36}px`,minHeight:2,opacity:0.9}} title={`Exam: ${d.examHrs.toFixed(1)}h`}/>}
          {d.classHrs>0&&<div style={{width:"100%",background:T.ac,borderRadius:d.asgnHrs===0&&d.examHrs===0?"2px 2px 0 0":"0",
            height:`${(d.classHrs/maxH)*36}px`,minHeight:2,opacity:0.7}} title={`Class: ${d.classHrs.toFixed(1)}h`}/>}
        </div>
        <div style={{fontFamily:MO,fontSize:"0.38rem",color:d.isToday?T.ac:T.t3,fontWeight:d.isToday?700:400}}>{d.label[0]}</div>
      </div>)}
    </div>
    <div style={{display:"flex",gap:8,marginTop:2}}>
      {[["Class",T.ac],["Exam","#ff8c69"],["Work","#69d4ff"]].map(([l,c])=>
        <div key={l} style={{display:"flex",alignItems:"center",gap:2}}>
          <div style={{width:6,height:6,background:c,borderRadius:1}}/>
          <span style={{fontFamily:MO,fontSize:"0.38rem",color:T.t3}}>{l}</span>
        </div>)}
    </div>
  </div>;
}
