        <div style={{fontFamily:MO,fontSize:"0.42rem",color:T.t3,textAlign:"center",marginTop:5,letterSpacing:"0.04em"}}>
          Powered by Puter.js · Free · {CHAT_MODELS.find(m=>m.id===model)?.label||model}
        </div>
      </div>
    </div>
  </>;
}

// ═══ GMAIL IMPORT MODAL ═══
function GmailImportModal({T,MO,SE,cats,onImport,onClose,user}){
  const[tab,setTab]=useState("gmail"); // "gmail" | "ics" | "paste"
  const[gmailStatus,setGmailStatus]=useState("idle"); // idle | connecting | connected | error
  const[gmailEmails,setGmailEmails]=useState([]);
  const[gmailSelected,setGmailSelected]=useState(new Set());
  const[gmailToken,setGmailToken]=useState(null);
  const[gmailError,setGmailError]=useState("");
  const[aiText,setAiText]=useState("");
  const[aiStatus,setAiStatus]=useState("idle"); // idle | parsing | done | error
  const[aiResults,setAiResults]=useState([]);
  const[aiSelected,setAiSelected]=useState(new Set());
  const[aiError,setAiError]=useState("");
  const[icsStatus,setIcsStatus]=useState("idle");
  const[icsResults,setIcsResults]=useState([]);
  const[icsSelected,setIcsSelected]=useState(new Set());
  const[targetCat,setTargetCat]=useState("personal");
  const fileRef=useRef(null);

  const GMAIL_CLIENT_ID=typeof GMAIL_OAUTH_CLIENT_ID!=="undefined"?GMAIL_OAUTH_CLIENT_ID:"YOUR_GOOGLE_CLIENT_ID";
  const GMAIL_SCOPE="https://www.googleapis.com/auth/gmail.readonly";

  const IS={background:T.ib,border:`1px solid ${T.ibd}`,borderRadius:5,padding:"5px 8px",color:T.tx,
    fontFamily:"'DM Sans',sans-serif",fontSize:"0.78rem",outline:"none",width:"100%",boxSizing:"border-box"};
  const btnRow={display:"flex",gap:8,marginTop:12,justifyContent:"flex-end"};
  const pill=(active)=>({padding:"5px 14px",borderRadius:20,border:`1px solid ${active?T.ac:T.bd}`,
    background:active?`${T.ac}18`:"transparent",color:active?T.ac:T.t2,cursor:"pointer",
    fontFamily:MO,fontSize:"0.52rem",letterSpacing:"0.04em",transition:"all 0.15s"});

  // ── Gmail OAuth ──
  const connectGmail=()=>{
    if(GMAIL_CLIENT_ID==="YOUR_GOOGLE_CLIENT_ID"){
      setGmailError("Gmail OAuth not configured yet — see setup instructions below.");
      setGmailStatus("error");
      return;
    }
    setGmailStatus("connecting");
    setGmailError("");
    const params=new URLSearchParams({
      client_id:GMAIL_CLIENT_ID,
      redirect_uri:"https://oauth2.googleapis.com/token",
      response_type:"token",
      scope:GMAIL_SCOPE,
      prompt:"consent",
    });
    const w=window.open(`https://accounts.google.com/o/oauth2/v2/auth?${params}`,"_blank","width=520,height=620");
    const timer=setInterval(()=>{
      try{
        if(w&&w.location&&w.location.hash){
          const hash=new URLSearchParams(w.location.hash.slice(1));
          const token=hash.get("access_token");
          if(token){clearInterval(timer);w.close();fetchGmailEvents(token);}
        }
        if(w&&w.closed){clearInterval(timer);if(gmailStatus==="connecting"){setGmailStatus("idle");}}
      }catch(e){}
    },500);
  };

  const fetchGmailEvents=async(token)=>{
    setGmailToken(token);
    try{
      // Search for event-like emails: calendar invites, .ics attachments, event confirmations
      const queries=[
        "has:attachment filename:ics",
        "subject:(invitation OR invite OR confirmed OR \"you're invited\" OR \"event confirmation\")",
      ];
      const allMsgIds=new Set();
      for(const q of queries){
        const r=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${encodeURIComponent(q)}&maxResults=20`,
          {headers:{Authorization:`Bearer ${token}`}});
        if(!r.ok)throw new Error("Gmail API error "+r.status);
        const d=await r.json();
        (d.messages||[]).forEach(m=>allMsgIds.add(m.id));
      }
      if(allMsgIds.size===0){setGmailEmails([]);setGmailStatus("connected");return;}
      // Fetch full messages to parse
      const emails=[];
      for(const id of [...allMsgIds].slice(0,30)){
        const r=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}?format=full`,
          {headers:{Authorization:`Bearer ${token}`}});
        if(!r.ok)continue;
        const msg=await r.json();
        const parsed=parseGmailMessage(msg);
        if(parsed)emails.push(parsed);
      }
      setGmailEmails(emails);
      // Auto-select all
      setGmailSelected(new Set(emails.map((_,i)=>i)));
      setGmailStatus("connected");
    }catch(e){
      setGmailError("Failed to fetch emails: "+e.message);
      setGmailStatus("error");
    }
  };

  const parseGmailMessage=(msg)=>{
    // Try to extract .ics attachment content or surface the email for AI parsing
    const headers=msg.payload?.headers||[];
    const subject=(headers.find(h=>h.name==="Subject")||{}).value||"(no subject)";
    const from=(headers.find(h=>h.name==="From")||{}).value||"";
    const date=(headers.find(h=>h.name==="Date")||{}).value||"";
    // Recursively find .ics parts
    const findIcsParts=(part)=>{
      if(!part)return[];
      if(part.filename&&part.filename.endsWith(".ics")&&part.body?.data)return[part];
      if(part.parts)return part.parts.flatMap(findIcsParts);
      return[];
    };
    const icsParts=findIcsParts(msg.payload);
    let icsContent=null;
    if(icsParts.length>0){
      try{icsContent=atob(icsParts[0].body.data.replace(/-/g,"+").replace(/_/g,"/"));}catch(e){}
    }
    // Get plain-text body for AI fallback
    const findTextPart=(part)=>{
      if(!part)return null;
      if(part.mimeType==="text/plain"&&part.body?.data)return part;
      if(part.parts){for(const p of part.parts){const r=findTextPart(p);if(r)return r;}}
      return null;
    };
    const textPart=findTextPart(msg.payload);
    let bodyText="";
    if(textPart?.body?.data){
      try{bodyText=atob(textPart.body.data.replace(/-/g,"+").replace(/_/g,"/"));}catch(e){}
    }
    return{subject,from,date,icsContent,bodyText:bodyText.slice(0,1000),id:msg.id};
  };

  const importGmail=async()=>{
    const selected=[...gmailSelected].map(i=>gmailEmails[i]);
    const allEvs=[];
    const needsAi=[];
    for(const email of selected){
      if(email.icsContent){
        const evs=parseICS(email.icsContent);
        evs.forEach(e=>allEvs.push({...e,category:targetCat}));
      } else {
        needsAi.push(email);
      }
    }
    if(needsAi.length>0){
      // Use AI to parse email bodies
      const combinedText=needsAi.map(e=>`Subject: ${e.subject}\nFrom: ${e.from}\nDate: ${e.date}\n${e.bodyText}`).join("\n\n---\n\n");
      const aiEvs=await parseWithAI(combinedText);
      aiEvs.forEach(e=>allEvs.push({...e,category:targetCat}));
    }
    if(allEvs.length>0){onImport(allEvs);onClose();}
    else alert("No events could be extracted from the selected emails.");
  };

  // ── ICS file import ──
  const handleIcsFile=(e)=>{
    const f=e.target.files[0];if(!f)return;
    setIcsStatus("parsing");
    const r=new FileReader();
    r.onload=(ev)=>{
      const evs=parseICS(ev.target.result);
      setIcsResults(evs);
      setIcsSelected(new Set(evs.map((_,i)=>i)));
      setIcsStatus(evs.length>0?"done":"empty");
    };
    r.readAsText(f);
  };

  const importIcs=()=>{
    const evs=[...icsSelected].map(i=>({...icsResults[i],category:targetCat}));
    if(evs.length>0){onImport(evs);onClose();}
  };

  // ── AI paste import ──
  const parseWithAI=async(text)=>{
    if(!window.puter?.ai?.chat)throw new Error("Puter.js AI is not ready yet — wait a moment and try again.");
    try{
      const response=await window.puter.ai.chat([
        {role:"system",content:`Extract calendar events from the text. Return ONLY a JSON array, no other text, no markdown fences. Each event object: {"title":"...","date":"YYYY-MM-DD","startHour":H,"startMin":M,"endHour":H,"endMin":M,"location":"...","detail":"..."}. Use 0 for time fields if unknown. Only include events with a recognizable date.`},
        {role:"user",content:text.slice(0,3000)}
      ]);
      const raw=response?.message?.content||(typeof response==="string"?response:"[]");
      const clean=raw.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      return parsed.map(e=>({id:gi(),title:e.title||"Event",date:e.date,
        startHour:e.startHour||0,startMin:e.startMin||0,endHour:e.endHour||0,endMin:e.endMin||0,
        location:e.location||"",detail:e.detail||"",category:targetCat,
        _allDay:!e.startHour&&!e.endHour}));
    }catch(err){console.warn("AI parse error",err);throw err;}
  };

  const runAiParse=async()=>{
    if(!aiText.trim())return;
    setAiStatus("parsing");setAiError("");
    try{
      const evs=await parseWithAI(aiText);
      if(evs.length===0){setAiError("No events found. Try pasting more of the email including dates and times.");setAiStatus("error");}
      else{setAiResults(evs);setAiSelected(new Set(evs.map((_,i)=>i)));setAiStatus("done");}
    }catch(e){setAiError("Parse failed: "+e.message);setAiStatus("error");}
  };

  const importAi=()=>{
    const evs=[...aiSelected].map(i=>({...aiResults[i],category:targetCat}));
    if(evs.length>0){onImport(evs);onClose();}
  };

  const fmtTime=(h,m)=>{const p=h>=12?"PM":"AM";return`${h%12||12}:${String(m).padStart(2,"0")} ${p}`;};
  const fmtDate=(ds)=>{try{const d=$p(ds);return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}catch(e){return ds;}};

  const EventPreviewList=({items,selected,setSelected})=>(
    <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:240,overflowY:"auto",marginTop:8}}>
      {items.map((ev,i)=>{
        const sel=selected.has(i);
        return <div key={i} onClick={()=>setSelected(p=>{const n=new Set(p);if(n.has(i))n.delete(i);else n.add(i);return n;})}
          style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 10px",borderRadius:7,
            border:`1px solid ${sel?T.ac:T.bd}`,background:sel?`${T.ac}10`:T.ib,cursor:"pointer",transition:"all 0.12s"}}>
          <div style={{width:14,height:14,borderRadius:3,border:`2px solid ${sel?T.ac:T.t3}`,
            background:sel?T.ac:"transparent",flexShrink:0,marginTop:1,transition:"all 0.12s"}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.78rem",color:T.tx,fontWeight:500,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
            <div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,marginTop:2,letterSpacing:"0.02em"}}>
              {fmtDate(ev.date)}
              {!ev._allDay&&ev.startHour!==ev.endHour&&<> · {fmtTime(ev.startHour,ev.startMin)}–{fmtTime(ev.endHour,ev.endMin)}</>}
              {ev.location&&<> · 📍 {ev.location.slice(0,40)}</>}
            </div>
          </div>
        </div>;
      })}
    </div>
  );

  const GmailEmailList=({emails,selected,setSelected})=>(
    <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:200,overflowY:"auto",marginTop:8}}>
      {emails.map((email,i)=>{
        const sel=selected.has(i);
        const hasIcs=!!email.icsContent;
        return <div key={i} onClick={()=>setSelected(p=>{const n=new Set(p);if(n.has(i))n.delete(i);else n.add(i);return n;})}
          style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 10px",borderRadius:7,
            border:`1px solid ${sel?T.ac:T.bd}`,background:sel?`${T.ac}10`:T.ib,cursor:"pointer"}}>
          <div style={{width:14,height:14,borderRadius:3,border:`2px solid ${sel?T.ac:T.t3}`,
            background:sel?T.ac:"transparent",flexShrink:0,marginTop:2}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.78rem",color:T.tx,fontWeight:500,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{email.subject}</div>
            <div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,marginTop:2}}>
              {email.from.slice(0,50)}
              {hasIcs&&<span style={{marginLeft:6,color:T.ac,fontWeight:600}}> · .ics</span>}
              {!hasIcs&&<span style={{marginLeft:6,color:T.t3}}> · AI parse</span>}
            </div>
          </div>
        </div>;
      })}
    </div>
  );

  const catOptions=Object.entries(cats).filter(([k])=>!k.startsWith("_"));

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:T.ov,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.mb,border:`1px solid ${T.bd}`,borderRadius:14,padding:20,
      width:"100%",maxWidth:480,maxHeight:"88vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontFamily:SE,fontSize:"1.1rem",color:T.tx}}>Import Events</div>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:T.t3,fontSize:"1rem",lineHeight:1,padding:"2px 4px"}}>✕</button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:`1px solid ${T.bd}`,paddingBottom:10}}>
        {[["gmail","📧 Gmail"],["ics","📎 .ics File"],["paste","🤖 Paste Email"]].map(([k,label])=>
          <button key={k} onClick={()=>setTab(k)} style={pill(tab===k)}>{label}</button>)}
      </div>

      {/* Category picker — shared across all tabs */}
      <div style={{marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.06em",textTransform:"uppercase",flexShrink:0}}>Add to calendar</span>
        <select value={targetCat} onChange={e=>setTargetCat(e.target.value)} style={{...IS,width:"auto",flex:1}}>
          {catOptions.map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
        </select>
      </div>

      {/* ── Gmail Tab ── */}
      {tab==="gmail"&&<div>
        {gmailStatus==="idle"&&<div>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",color:T.t2,lineHeight:1.6,marginBottom:12}}>
            Connect your Google account to scan for calendar invites and event confirmation emails. TigerCalendar requests <strong>read-only</strong> access.
          </div>
          <button onClick={connectGmail}
            style={{width:"100%",padding:"10px 0",borderRadius:7,border:`1px solid ${T.bd}`,
              background:T.b3,color:T.tx,cursor:"pointer",fontFamily:MO,fontSize:"0.58rem",
              letterSpacing:"0.06em",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Connect Gmail
          </button>
          {gmailStatus==="error"&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:6,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",fontFamily:MO,fontSize:"0.52rem",color:"#ef4444"}}>{gmailError}</div>}
          {/* Setup instructions */}
          <details style={{marginTop:14}}>
            <summary style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,cursor:"pointer",letterSpacing:"0.04em",userSelect:"none"}}>
              ▸ How to set up Gmail OAuth (one-time, free)
            </summary>
            <div style={{marginTop:8,fontFamily:"'DM Sans',sans-serif",fontSize:"0.72rem",color:T.t2,lineHeight:1.7,
              background:T.b2,border:`1px solid ${T.bd}`,borderRadius:7,padding:"10px 12px"}}>
              <ol style={{paddingLeft:18,margin:0}}>
                <li>Go to <strong>console.cloud.google.com</strong> → your Firebase project (tiger-calendar-112)</li>
                <li>APIs & Services → <strong>OAuth consent screen</strong> → External → fill in App name "TigerCalendar", your email</li>
                <li>Scopes → Add scope → search "gmail.readonly" → Save</li>
                <li>Test users → Add your own Princeton/Gmail address</li>
                <li>Credentials → <strong>Create credentials → OAuth client ID</strong> → Web application</li>
                <li>Authorized JavaScript origins: add your site URL (e.g. <code>https://lillianwang112.github.io</code>)</li>
                <li>Copy the <strong>Client ID</strong>, then add this line to your HTML before the React script:<br/>
                  <code style={{background:T.b3,padding:"2px 5px",borderRadius:3,fontSize:"0.65rem",display:"block",marginTop:4}}>{"var GMAIL_OAUTH_CLIENT_ID = \"YOUR_CLIENT_ID.apps.googleusercontent.com\";"}</code>
                </li>
              </ol>
              <div style={{marginTop:8,color:T.t3,fontSize:"0.68rem"}}>This uses the same Google Cloud project as Firebase — no new billing needed. The app stays in "Testing" mode which allows up to 100 users for free forever.</div>
            </div>
          </details>
        </div>}
        {gmailStatus==="connecting"&&<div style={{textAlign:"center",padding:"32px 0",fontFamily:MO,fontSize:"0.6rem",color:T.t3}}>
          Waiting for Google sign-in…
        </div>}
        {gmailStatus==="connected"&&<div>
          {gmailEmails.length===0
            ?<div style={{textAlign:"center",padding:"20px 0",fontFamily:MO,fontSize:"0.6rem",color:T.t3}}>
              No event-related emails found. Try the Paste Email tab instead.
            </div>
            :<div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.05em"}}>
                  {gmailEmails.length} email{gmailEmails.length!==1?"s":""} found · {gmailSelected.size} selected
                </span>
                <div style={{display:"flex",gap:5}}>
                  <button onClick={()=>setGmailSelected(new Set(gmailEmails.map((_,i)=>i)))} style={{...pill(false),padding:"2px 8px"}}>All</button>
                  <button onClick={()=>setGmailSelected(new Set())} style={{...pill(false),padding:"2px 8px"}}>None</button>
                </div>
              </div>
              <GmailEmailList emails={gmailEmails} selected={gmailSelected} setSelected={setGmailSelected}/>
              <div style={btnRow}>
                <button onClick={()=>setGmailStatus("idle")} style={{...pill(false),padding:"6px 14px"}}>↩ Reconnect</button>
                <button onClick={importGmail} disabled={gmailSelected.size===0}
                  style={{padding:"7px 18px",borderRadius:7,border:"none",
                    background:gmailSelected.size>0?T.ac:T.b2,color:gmailSelected.size>0?T.bg:T.t3,
                    cursor:gmailSelected.size>0?"pointer":"default",fontFamily:MO,fontSize:"0.56rem",fontWeight:600}}>
                  Import {gmailSelected.size} email{gmailSelected.size!==1?"s":""}
                </button>
              </div>
            </div>}
        </div>}
      </div>}

      {/* ── ICS File Tab ── */}
      {tab==="ics"&&<div>
        <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",color:T.t2,lineHeight:1.6,marginBottom:12}}>
          Import a <code>.ics</code> calendar file. Works with event invites saved from Gmail, Outlook, or any calendar app.
        </div>
        <input ref={fileRef} type="file" accept=".ics,.ical" onChange={handleIcsFile} style={{display:"none"}}/>
        {icsStatus==="idle"&&<button onClick={()=>fileRef.current?.click()}
          style={{width:"100%",padding:"28px 0",borderRadius:8,border:`2px dashed ${T.bd}`,background:T.ib,
            color:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.56rem",letterSpacing:"0.06em"}}>
          📎 Click to choose .ics file
        </button>}
        {icsStatus==="parsing"&&<div style={{textAlign:"center",padding:"20px 0",fontFamily:MO,fontSize:"0.6rem",color:T.t3}}>Parsing…</div>}
        {icsStatus==="empty"&&<div style={{textAlign:"center",padding:"20px 0",fontFamily:MO,fontSize:"0.58rem",color:"#ef4444"}}>
          No events found in file.
          <button onClick={()=>{setIcsStatus("idle");setIcsResults([]);}} style={{marginLeft:8,...pill(false),padding:"3px 10px"}}>Try again</button>
        </div>}
        {icsStatus==="done"&&<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3}}>
              {icsResults.length} event{icsResults.length!==1?"s":""} found · {icsSelected.size} selected
            </span>
            <div style={{display:"flex",gap:5}}>
              <button onClick={()=>setIcsSelected(new Set(icsResults.map((_,i)=>i)))} style={{...pill(false),padding:"2px 8px"}}>All</button>
              <button onClick={()=>setIcsSelected(new Set())} style={{...pill(false),padding:"2px 8px"}}>None</button>
              <button onClick={()=>{setIcsStatus("idle");setIcsResults([]);}} style={{...pill(false),padding:"2px 8px"}}>↩</button>
            </div>
          </div>
          <EventPreviewList items={icsResults} selected={icsSelected} setSelected={setIcsSelected}/>
          <div style={btnRow}>
            <button onClick={importIcs} disabled={icsSelected.size===0}
              style={{padding:"7px 18px",borderRadius:7,border:"none",
                background:icsSelected.size>0?T.ac:T.b2,color:icsSelected.size>0?T.bg:T.t3,
                cursor:icsSelected.size>0?"pointer":"default",fontFamily:MO,fontSize:"0.56rem",fontWeight:600}}>
              Add {icsSelected.size} event{icsSelected.size!==1?"s":""}
            </button>
          </div>
        </div>}
      </div>}

      {/* ── AI Paste Tab ── */}
      {tab==="paste"&&<div>
        {aiStatus!=="done"&&<div>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",color:T.t2,lineHeight:1.6,marginBottom:8}}>
            Paste the text of any email, and AI will extract the event details automatically. Powered by <strong>Puter.js</strong> — free, no API key needed.
          </div>
          <textarea value={aiText} onChange={e=>setAiText(e.target.value)}
            placeholder={"Paste email text here…\n\nWorks with event confirmations, meeting invites, club announcements, course emails, anything with a date and time."}
            rows={7}
            style={{...IS,resize:"vertical",lineHeight:1.5,fontSize:"0.76rem",marginBottom:8}}/>
          {aiError&&<div style={{padding:"6px 10px",borderRadius:5,background:"rgba(239,68,68,0.1)",
            border:"1px solid rgba(239,68,68,0.25)",fontFamily:MO,fontSize:"0.5rem",color:"#ef4444",marginBottom:8}}>{aiError}</div>}
          <div style={btnRow}>
            <button onClick={runAiParse} disabled={!aiText.trim()||aiStatus==="parsing"}
              style={{padding:"7px 20px",borderRadius:7,border:"none",
                background:aiText.trim()?T.ac:T.b2,color:aiText.trim()?T.bg:T.t3,
                cursor:aiText.trim()?"pointer":"default",fontFamily:MO,fontSize:"0.56rem",fontWeight:600}}>
              {aiStatus==="parsing"?"Parsing…":"Extract Events →"}
            </button>
          </div>
        </div>}
        {aiStatus==="done"&&<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3}}>
              {aiResults.length} event{aiResults.length!==1?"s":""} found · {aiSelected.size} selected
            </span>
            <div style={{display:"flex",gap:5}}>
              <button onClick={()=>setAiSelected(new Set(aiResults.map((_,i)=>i)))} style={{...pill(false),padding:"2px 8px"}}>All</button>
              <button onClick={()=>setAiSelected(new Set())} style={{...pill(false),padding:"2px 8px"}}>None</button>
              <button onClick={()=>{setAiStatus("idle");setAiResults([]);}} style={{...pill(false),padding:"2px 8px"}}>↩ Re-paste</button>
            </div>
          </div>
          <EventPreviewList items={aiResults} selected={aiSelected} setSelected={setAiSelected}/>
          <div style={btnRow}>
            <button onClick={importAi} disabled={aiSelected.size===0}
              style={{padding:"7px 18px",borderRadius:7,border:"none",
                background:aiSelected.size>0?T.ac:T.b2,color:aiSelected.size>0?T.bg:T.t3,
                cursor:aiSelected.size>0?"pointer":"default",fontFamily:MO,fontSize:"0.56rem",fontWeight:600}}>
              Add {aiSelected.size} event{aiSelected.size!==1?"s":""}
            </button>
          </div>
        </div>}
      </div>}
    </div>
  </div>;
}

function SettingsModal({T,MO,SE,settings,setSettings,onClose,events,tasks,exams,assignments,cats,courses,onImport,user,onRestore}){
  const upS=(k,v)=>{setSettings(p=>({...p,[k]:v}));if(k==="defaultView")try{v?localStorage.setItem("tc_defaultView",v):localStorage.removeItem("tc_defaultView");}catch(e){}};
  const IS={background:T.ib,border:`1px solid ${T.ibd}`,borderRadius:5,padding:"5px 8px",color:T.tx,fontFamily:"'DM Sans',sans-serif",fontSize:"0.78rem",outline:"none",WebkitAppearance:"none",cursor:"pointer",width:"100%"};
  const fileRef=useRef(null);
  const[confirmRestore,setConfirmRestore]=useState(null); // index of backup pending confirmation
  const backups=user?getBackups(user.uid):[];
  const fmtBackupDate=(ts)=>{
    const d=new Date(ts),now=new Date();
    const diffMs=now-d,diffDays=Math.floor(diffMs/86400000);
    const time=d.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
    if(diffDays===0)return`Today at ${time}`;
    if(diffDays===1)return`Yesterday at ${time}`;
    if(diffDays<7)return`${d.toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"})} at ${time}`;
    return`${d.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"})} at ${time}`;
  };
  const fmtBackupSummary=(b)=>{
    const ev=(b.events||[]).filter(e=>!e._taskDueId&&!e._ohId&&!(e._courseId&&!e._examId&&!e._studyBlock&&!e._courseOverride)&&e.category!=="_academic"&&e.category!=="_holidays").length;
    const tk=(b.tasks||[]).length,co=(b.courses||[]).length;
    return[co&&`${co} course${co!==1?"s":""}`,ev&&`${ev} event${ev!==1?"s":""}`,tk&&`${tk} task${tk!==1?"s":""}`].filter(Boolean).join(", ")||"empty";
  };
  const handleImport=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{
    const imported=parseICS(ev.target.result);if(imported.length>0){onImport(imported);alert(`Imported ${imported.length} events!`);}else alert("No events found in file.");
  };r.readAsText(f);};

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:T.ov,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.mb,border:`1px solid ${T.bd}`,borderRadius:14,padding:20,width:"100%",maxWidth:400,maxHeight:"80vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{fontFamily:SE,fontSize:"1.1rem",color:T.tx,marginBottom:14}}>Settings</div>
      <div style={{marginBottom:10}}>
        <label style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",display:"block",marginBottom:3}}>Week Starts On</label>
        <select value={settings.weekStart} onChange={e=>upS("weekStart",+e.target.value)} style={IS}>
          <option value={0}>Sunday</option><option value={1}>Monday</option><option value={6}>Saturday</option>
        </select>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",display:"block",marginBottom:3}}>Time Format</label>
        <select value={settings.hourFormat} onChange={e=>upS("hourFormat",e.target.value)} style={IS}>
          <option value="12">12-hour (1:00 PM)</option><option value="24">24-hour (13:00)</option>
        </select>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",display:"block",marginBottom:3}}>Timezone</label>
        <select value={settings.timeZone} onChange={e=>upS("timeZone",e.target.value)} style={IS}>
          {TIMEZONES.map(tz=><option key={tz} value={tz}>{tz.replace(/_/g," ")}</option>)}
        </select>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",display:"block",marginBottom:3}}>Default View</label>
        <select value={settings.defaultView||""} onChange={e=>upS("defaultView",e.target.value||undefined)} style={IS}>
          <option value="">Auto (mobile: schedule, desktop: week)</option>
          <option value="day">Day</option>
          <option value="week">Week</option>
          <option value="month">Month</option>
          <option value="year">Year</option>
          <option value="schedule">Schedule</option>
          <option value="semester">Semester</option>
        </select>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <label style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase"}}>Show completed tasks on calendar</label>
          <div onClick={()=>upS("showCompletedTasks",!settings.showCompletedTasks)}
            style={{width:28,height:15,background:settings.showCompletedTasks?T.ac:T.b2,borderRadius:8,
              border:`1px solid ${settings.showCompletedTasks?T.ac:T.bd}`,position:"relative",cursor:"pointer",flexShrink:0,transition:"all 0.2s"}}>
            <div style={{width:9,height:9,background:settings.showCompletedTasks?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,
              left:settings.showCompletedTasks?16:3,transition:"left 0.2s"}}/>
          </div>
        </div>
        <div style={{fontFamily:MO,fontSize:"0.42rem",color:T.t3,marginTop:3}}>Displays done tasks on week and schedule views with strikethrough</div>
      </div>
      {/* Import/Export */}
      <div style={{borderTop:`1px solid ${T.bd}`,paddingTop:10,marginBottom:10}}>
        <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Import / Export</div>
        <div style={{display:"flex",gap:6,marginBottom:5}}>
          <button onClick={()=>exportICSFlat(events,tasks,exams,assignments,cats,courses)} style={{flex:1,padding:"6px 0",borderRadius:5,border:`1px solid ${T.bd}`,background:"transparent",color:T.tx,cursor:"pointer",fontFamily:MO,fontSize:"0.58rem"}}>Export .ics</button>
          <button onClick={()=>fileRef.current?.click()} style={{flex:1,padding:"6px 0",borderRadius:5,border:`1px solid ${T.bd}`,background:"transparent",color:T.tx,cursor:"pointer",fontFamily:MO,fontSize:"0.58rem"}}>Import .ics</button>
          <input ref={fileRef} type="file" accept=".ics,.ical" onChange={handleImport} style={{display:"none"}}/>
        </div>
        <button onClick={()=>exportICSByCalendar(events,tasks,exams,assignments,cats,courses)} style={{width:"100%",padding:"6px 0",borderRadius:5,border:`1px solid ${T.ac}40`,background:`${T.ac}08`,color:T.ac,cursor:"pointer",fontFamily:MO,fontSize:"0.58rem",fontWeight:500}}>
          Export by course (separate calendars)</button>
        <div style={{fontFamily:MO,fontSize:"0.42rem",color:T.t3,marginTop:4}}>Separate calendars import into Google Calendar as individual sub‑calendars with their own colors</div>
      </div>
      {user&&<div style={{borderTop:`1px solid ${T.bd}`,paddingTop:10,marginBottom:10}}>
        <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Data Backups</div>
        {backups.length===0
          ?<div style={{fontFamily:MO,fontSize:"0.58rem",color:T.t3}}>No backups yet — one is saved each time your data loads from the server.</div>
          :backups.map((b,i)=><div key={b._ts} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",borderBottom:i<backups.length-1?`1px solid ${T.bd}40`:"none"}}>
            <div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.72rem",color:T.tx}}>{fmtBackupDate(b._ts)}</div>
              <div style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,marginTop:1}}>{fmtBackupSummary(b)}</div>
            </div>
            {confirmRestore===i
              ?<div style={{display:"flex",gap:4}}>

// ═══ RICH NOTES — link detection + insert ═══
// Storage format: plain text, with [label](url) for named links. Bare URLs auto-detected too.
function parseNotes(text){
  if(!text)return[];
  // Match [label](url) OR bare https?:// URLs
  const re=/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)|(https?:\/\/[^\s<>"')\]]+)/g;
  const parts=[];let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last)parts.push({type:"text",text:text.slice(last,m.index)});
    if(m[1]&&m[2])parts.push({type:"link",label:m[1],url:m[2]});
    else parts.push({type:"link",label:m[3],url:m[3]});
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push({type:"text",text:text.slice(last)});
  return parts;
}

function RenderNotes({text,T,style={},inline=false}){
  if(!text)return null;
  const parts=parseNotes(text);
  const Tag=inline?"span":"div";
  return <Tag style={{whiteSpace:"pre-wrap",wordBreak:"break-word",...style}}>
    {parts.map((p,i)=>p.type==="text"
      ?<span key={i}>{p.text}</span>
      :<a key={i} href={p.url} target="_blank" rel="noopener noreferrer"
          onClick={e=>e.stopPropagation()}
          style={{color:T.ac,textDecoration:"underline",textDecorationStyle:"dotted",
            textUnderlineOffset:2,cursor:"pointer",fontWeight:500,wordBreak:"break-all"}}>
          {p.label}
        </a>
    )}
  </Tag>;
}

function NotesField({value,onChange,placeholder,T,MO,IS,minHeight=45}){

  const[linkUrl,setLinkUrl]=useState("");
  const[linkLabel,setLinkLabel]=useState("");

  const hasLinks=parseNotes(value).some(p=>p.type==="link");

  const insertLink=()=>{
    const url=linkUrl.trim();
    if(!url)return;
    const label=linkLabel.trim()||url;
    const insert=`[${label}](${url})`;
    const ta=textareaRef.current;
    if(ta){
      const start=ta.selectionStart,end=ta.selectionEnd;
      const next=value.slice(0,start)+insert+value.slice(end);
      onChange(next);

      setTimeout(()=>{ta.focus();ta.setSelectionRange(start+insert.length,start+insert.length);},0);
    } else {

        </span>}
      </div>
    </div>

    {linkOpen&&<div style={{background:T.b2,border:`1px solid ${T.ac}40`,borderRadius:7,
      padding:"10px 12px",marginBottom:6,display:"flex",flexDirection:"column",gap:6}}>
      <div style={{display:"flex",gap:6}}>
        <div style={{flex:2}}>
          <div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,textTransform:"uppercase",
            letterSpacing:"0.07em",marginBottom:3}}>URL</div>
          <input value={linkUrl} onChange={e=>setLinkUrl(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&insertLink()}
            placeholder="https://…" autoFocus
            style={{...IS,fontSize:"0.76rem",padding:"4px 8px"}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,textTransform:"uppercase",
            letterSpacing:"0.07em",marginBottom:3}}>Display text <span style={{opacity:0.5}}>(optional)</span></div>
          <input value={linkLabel} onChange={e=>setLinkLabel(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&insertLink()}
            placeholder="Canvas, Ed, …"

        </div>
      </div>
      <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
        <button type="button" onClick={()=>setLinkOpen(false)}
          style={{padding:"3px 10px",borderRadius:5,border:`1px solid ${T.bd}`,background:"transparent",
            color:T.t3,cursor:"pointer",fontFamily:MO,fontSize:"0.46rem"}}>Cancel</button>
        <button type="button" onClick={insertLink} disabled={!linkUrl.trim()}
