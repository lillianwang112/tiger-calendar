const TIMEZONES=["America/New_York","America/Chicago","America/Denver","America/Los_Angeles","America/Anchorage","Pacific/Honolulu","America/Phoenix","Europe/London","Europe/Paris","Europe/Berlin","Asia/Tokyo","Asia/Shanghai","Asia/Kolkata","Australia/Sydney","UTC"];

function buildICSEvents(evList,cats){
  const lines=[];
  // Separate course-generated events from regular events
  const courseEvs=evList.filter(e=>e._courseId&&e._type&&!e._examId&&!e._studyBlock&&!e._ohId);
  const regularEvs=evList.filter(e=>!(e._courseId&&e._type&&!e._examId&&!e._studyBlock&&!e._ohId));

  // Group course events by courseId+type+startHour+startMin+endHour+endMin (same slot)
  const courseGroups={};
  courseEvs.forEach(ev=>{
    const key=`${ev._courseId}|${ev._type}|${ev.startHour}|${ev.startMin||0}|${ev.endHour}|${ev.endMin||0}`;
    if(!courseGroups[key])courseGroups[key]=[];
    courseGroups[key].push(ev);
  });

  // Emit one RRULE VEVENT per course slot group
  const dayMap={0:"SU",1:"MO",2:"TU",3:"WE",4:"TH",5:"FR",6:"SA"};
  Object.values(courseGroups).forEach(group=>{
    if(group.length===0)return;
    // Sort by date to find first and last
    group.sort((a,b)=>a.date.localeCompare(b.date));
    const first=group[0],last=group[group.length-1];
    // Determine which days of week this recurs on
    const daysSet=new Set();
    group.forEach(ev=>{const d=$p(ev.date);daysSet.add(d.getDay());});
    const byDay=[...daysSet].sort().map(d=>dayMap[d]).join(",");
    // Build UNTIL date (day after last occurrence)
    const lastDate=$p(last.date);
    const untilDate=$a(lastDate,1);
    const untilStr=$d(untilDate).replace(/-/g,"")+"T000000Z";

    lines.push("BEGIN:VEVENT");
    lines.push("UID:course-"+first._courseId+"-"+first._type+"-slot@tigercalendar");
    const ds=first.date.replace(/-/g,"");
    lines.push("DTSTART:"+ds+"T"+String(first.startHour).padStart(2,"0")+String(first.startMin||0).padStart(2,"0")+"00");
    lines.push("DTEND:"+ds+"T"+String(first.endHour).padStart(2,"0")+String(first.endMin||0).padStart(2,"0")+"00");
    lines.push("RRULE:FREQ=WEEKLY;BYDAY="+byDay+";INTERVAL=1;UNTIL="+untilStr);
    lines.push("SUMMARY:"+(first.title||"").replace(/\n/g,"\\n"));
    if(first.location)lines.push("LOCATION:"+first.location.replace(/\n/g,"\\n"));
    const cat=cats[first.category];if(cat)lines.push("CATEGORIES:"+cat.label);
    // Add EXDATE entries for cancelled occurrences (breaks, holidays, etc.)
    // Find all dates in the RRULE range that SHOULD exist but DON'T have an event
    const allDates=new Set(group.map(e=>e.date));
    const exDates=[];
    for(let d=new Date($p(first.date));d<=lastDate;d=$a(d,1)){
      if(!daysSet.has(d.getDay()))continue;
      const ds2=$d(d);
      if(!allDates.has(ds2)){
        exDates.push(ds2.replace(/-/g,"")+"T"+String(first.startHour).padStart(2,"0")+String(first.startMin||0).padStart(2,"0")+"00");
      }
    }
    if(exDates.length>0)lines.push("EXDATE:"+exDates.join(","));
    lines.push("END:VEVENT");
  });

  // Regular (non-course) events as individual VEVENTs
  regularEvs.forEach(ev=>{
    lines.push("BEGIN:VEVENT");
    lines.push("UID:"+ev.id+"@tigercalendar");
    const ds=ev.date.replace(/-/g,"");
    if(ev._allDay){lines.push("DTSTART;VALUE=DATE:"+ds);lines.push("DTEND;VALUE=DATE:"+ds);}
    else{lines.push("DTSTART:"+ds+"T"+String(ev.startHour).padStart(2,"0")+String(ev.startMin||0).padStart(2,"0")+"00");
      lines.push("DTEND:"+ds+"T"+String(ev.endHour).padStart(2,"0")+String(ev.endMin||0).padStart(2,"0")+"00");}
    lines.push("SUMMARY:"+(ev.title||"").replace(/\n/g,"\\n"));
    if(ev.location)lines.push("LOCATION:"+ev.location.replace(/\n/g,"\\n"));
    if(ev.detail)lines.push("DESCRIPTION:"+ev.detail.replace(/\n/g,"\\n"));
    const cat=cats[ev.category];if(cat)lines.push("CATEGORIES:"+cat.label);
    lines.push("END:VEVENT");
  });
  return lines;
}

// Tasks → VEVENT (Google Calendar ignores VTODO)
// Tasks with a due time become timed 30-min events; date-only become all-day
function buildICSTasks(taskList,cats){
  const lines=[];
  taskList.filter(tk=>tk.date&&!tk._asgnId).forEach(tk=>{
    lines.push("BEGIN:VEVENT");
    lines.push("UID:task-"+tk.id+"@tigercalendar");
    const ds=tk.date.replace(/-/g,"");
    if(tk.hasDueTime&&tk.dueHour!=null){
      const sH=tk.dueHour,sM=tk.dueMin||0;
      const endMins=sH*60+sM,startMins=Math.max(0,endMins-30);
      const startH=Math.floor(startMins/60),startM=startMins%60;
      lines.push("DTSTART:"+ds+"T"+String(startH).padStart(2,"0")+String(startM).padStart(2,"0")+"00");
      lines.push("DTEND:"+ds+"T"+String(sH).padStart(2,"0")+String(sM).padStart(2,"0")+"00");
    } else {
      lines.push("DTSTART;VALUE=DATE:"+ds);
      lines.push("DTEND;VALUE=DATE:"+ds);
    }
    const prefix=tk.done?"[Done] ":"[Task] ";
    lines.push("SUMMARY:"+prefix+(tk.title||"").replace(/\n/g,"\\n"));
    if(tk.detail)lines.push("DESCRIPTION:"+tk.detail.replace(/\n/g,"\\n"));
    const cat=cats[tk.category];if(cat)lines.push("CATEGORIES:"+cat.label);
    lines.push("END:VEVENT");
  });
  return lines;
}

// Exams → VEVENT with time slots
function buildICSExams(examList,courses,cats){
  const lines=[];
  examList.forEach(ex=>{
    const c=courses.find(x=>x.id===ex.courseId);
    const cName=c?.name||"Course";
    lines.push("BEGIN:VEVENT");
    lines.push("UID:exam-"+ex.id+"@tigercalendar");
    const ds=ex.date.replace(/-/g,"");
    lines.push("DTSTART:"+ds+"T"+String(ex.startHour).padStart(2,"0")+String(ex.startMin||0).padStart(2,"0")+"00");
    lines.push("DTEND:"+ds+"T"+String(ex.endHour).padStart(2,"0")+String(ex.endMin||0).padStart(2,"0")+"00");
    lines.push("SUMMARY:"+cName+" — "+ex.type);
    if(ex.location)lines.push("LOCATION:"+ex.location.replace(/\n/g,"\\n"));
    if(ex.details)lines.push("DESCRIPTION:"+ex.details.replace(/\n/g,"\\n"));
    const cat=cats[ex.courseId];if(cat)lines.push("CATEGORIES:"+cat.label);
    lines.push("END:VEVENT");
  });
  return lines;
}

// Assignments → VEVENT (all-day on due date, or timed 30-min block ending at due time)
function buildICSAssignments(asgnList,courses,cats){
  const lines=[];
  asgnList.forEach(a=>{
    const c=courses.find(x=>x.id===a.courseId);
    const cName=c?.name||"Course";
    lines.push("BEGIN:VEVENT");
    lines.push("UID:asgn-"+a.id+"@tigercalendar");
    if(a.dueDate){
      const ds=a.dueDate.replace(/-/g,"");
      if(a.hasDueTime&&a.dueHour!=null){
        const endMins=a.dueHour*60+(a.dueMin||0),startMins=Math.max(0,endMins-30);
        const startH=Math.floor(startMins/60),startM=startMins%60;
        lines.push("DTSTART:"+ds+"T"+String(startH).padStart(2,"0")+String(startM).padStart(2,"0")+"00");
        lines.push("DTEND:"+ds+"T"+String(a.dueHour).padStart(2,"0")+String(a.dueMin||0).padStart(2,"0")+"00");
      } else {
        lines.push("DTSTART;VALUE=DATE:"+ds);
        lines.push("DTEND;VALUE=DATE:"+ds);
      }
    }
    lines.push("SUMMARY:"+cName+" — "+(a.type||"Assignment")+(a.title?" — "+a.title:""));
    if(a.details)lines.push("DESCRIPTION:"+a.details.replace(/\n/g,"\\n"));
    const cat=cats[a.courseId];if(cat)lines.push("CATEGORIES:"+cat.label);
    lines.push("END:VEVENT");
  });
  return lines;
}

function exportICSFlat(events,tasks,exams,assignments,cats,courses){
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TigerCalendar//EN","CALSCALE:GREGORIAN",
    "X-WR-CALNAME:TigerCalendar"];
  // Exclude exam-derived events (handled by buildICSExams) to avoid duplicates
  // Also exclude task-due shadow events (handled by buildICSTasks/buildICSAssignments)
  lines.push(...buildICSEvents(events.filter(e=>!e._examId&&!e._taskDueId&&(!e._allDay||e.category!=="_academic")),cats));
  lines.push(...buildICSTasks(tasks,cats));
  lines.push(...buildICSExams(exams,courses,cats));
  lines.push(...buildICSAssignments(assignments,courses,cats));
  lines.push("END:VCALENDAR");
  const blob=new Blob([lines.join("\r\n")],{type:"text/calendar"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tigercalendar.ics";a.click();URL.revokeObjectURL(a.href);
}

function exportICSByCalendar(events,tasks,exams,assignments,cats,courses){
  const groups={};
  const addToGroup=(key,type,item)=>{
    if(!groups[key])groups[key]={events:[],tasks:[],exams:[],assignments:[]};
    groups[key][type].push(item);
  };
  // Exclude exam-derived events and task-due shadows to avoid duplicates
  events.filter(e=>!e._examId&&!e._taskDueId&&(!e._allDay||e.category!=="_academic"))
    .forEach(ev=>addToGroup(ev.category||"personal","events",ev));
  tasks.forEach(tk=>addToGroup(tk.category||"personal","tasks",tk));
  exams.forEach(ex=>addToGroup(ex.courseId||"personal","exams",ex));
  assignments.forEach(a=>addToGroup(a.courseId||"personal","assignments",a));

  const files=[];
  Object.entries(groups).forEach(([catKey,data])=>{
    const cat=cats[catKey];
    const label=cat?.label||catKey;
    const safeName=label.replace(/[^a-zA-Z0-9_ -]/g,"").replace(/\s+/g,"-").toLowerCase()||"other";
    const color=cat?.color||"#5c4db3";
    const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TigerCalendar//EN","CALSCALE:GREGORIAN",
      "X-WR-CALNAME:"+label,"X-APPLE-CALENDAR-COLOR:"+color];
    lines.push(...buildICSEvents(data.events,cats));
    lines.push(...buildICSTasks(data.tasks,cats));
    lines.push(...buildICSExams(data.exams,courses,cats));
    lines.push(...buildICSAssignments(data.assignments,courses,cats));
    lines.push("END:VCALENDAR");
    files.push({name:"tigercal-"+safeName+".ics",content:lines.join("\r\n")});
  });

  if(files.length<=1){
    const f=files[0]||{name:"tigercalendar.ics",content:"BEGIN:VCALENDAR\r\nVERSION:2.0\r\nEND:VCALENDAR"};
    const blob=new Blob([f.content],{type:"text/calendar"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=f.name;a.click();URL.revokeObjectURL(a.href);
    return;
  }

  files.forEach((f,i)=>{
    setTimeout(()=>{
      const blob=new Blob([f.content],{type:"text/calendar"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=f.name;a.click();URL.revokeObjectURL(a.href);
    },i*400);
  });
}

function parseICS(text){
  const events=[];let cur=null;
  text.split(/\r?\n/).forEach(line=>{
    if(line==="BEGIN:VEVENT")cur={};
    else if(line==="END:VEVENT"&&cur){
      if(cur.title&&cur.date)events.push({id:gi(),title:cur.title,date:cur.date,category:"personal",
        startHour:cur.startHour||0,startMin:cur.startMin||0,endHour:cur.endHour||0,endMin:cur.endMin||0,
        detail:cur.detail||"",location:cur.location||"",_allDay:cur.allDay||false});
      cur=null;
    } else if(cur){
      const[k,...v]=line.split(":");const val=v.join(":");
      if(k==="SUMMARY")cur.title=val.replace(/\\n/g,"\n");
      else if(k==="LOCATION")cur.location=val.replace(/\\n/g,"\n");
      else if(k==="DESCRIPTION")cur.detail=val.replace(/\\n/g,"\n");
      else if(k.startsWith("DTSTART")){
        if(k.includes("VALUE=DATE")){cur.date=val.slice(0,4)+"-"+val.slice(4,6)+"-"+val.slice(6,8);cur.allDay=true;}
        else{cur.date=val.slice(0,4)+"-"+val.slice(4,6)+"-"+val.slice(6,8);cur.startHour=+val.slice(9,11);cur.startMin=+val.slice(11,13);}
      } else if(k.startsWith("DTEND")&&!k.includes("VALUE=DATE")){
        cur.endHour=+val.slice(9,11);cur.endMin=+val.slice(11,13);
      }
    }
  });
  return events;
}

  const insertCb=()=>{
    restoreRange();

    if(!sel||!sel.rangeCount||!editorRef.current)return;
    const range=sel.getRangeAt(0);
    let nd=range.startContainer;

  const handleEditorKeyDown=(e)=>{
    // Checkbox row: Enter splits/creates next checkbox, Backspace on empty exits
    if(e.key==="Enter"||e.key==="Backspace"){

            // Content span is always the direct second child (children[0]=input, children[1]=span)
            const sp=nd.children&&nd.children.length>1?nd.children[1]:nd.querySelector('span');
            const isEmpty=!sp||!sp.textContent.trim();

              const newSpan=document.createElement('span');

            }

function SleepModal({T,MO,SE,modal,setModal,sleepSettings,setSleepSettings,sleepDayData,setSleepDayData}){
  const date=modal.sleepDate;
  const dayData=useMemo(()=>date?sleepDayData[date]||{}:{},[date,sleepDayData]);
  const calcMins=(wt,bt)=>{if(!wt||!bt)return null;const[wH,wM]=wt.split(":").map(Number);const[bH,bM]=bt.split(":").map(Number);let w=wH*60+wM,b=bH*60+bM;if(w<=b)w+=1440;return w-b;};
  const fmtMins=(m)=>m?`${Math.floor(m/60)}h ${m%60}m`:"—";

  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const DAYS_FULL=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  const initWeekSchedule=()=>{
    const base={bedtime:sleepSettings.bedtime||"22:00",wakeTime:sleepSettings.wakeTime||"07:00"};
    const ws=sleepSettings.weekSchedule||{};
    return Object.fromEntries(Array.from({length:7},(_,i)=>[i,{bedtime:ws[i]?.bedtime||base.bedtime,wakeTime:ws[i]?.wakeTime||base.wakeTime}]));
  };

  const[gEn,setGEn]=useState(sleepSettings.enabled||false);
  const[weekSched,setWeekSched]=useState(initWeekSchedule);
  const updateDay=(dow,field,val)=>setWeekSched(p=>({...p,[dow]:{...p[dow],[field]:val}}));

  const dowOfDate=date?new Date(date+"T12:00").getDay():null;
  const schedForDate=dowOfDate!=null?weekSched[dowOfDate]:null;
  const[dBed,setDBed]=useState(dayData.bedtime||schedForDate?.bedtime||sleepSettings.bedtime||"22:00");
  const[dWake,setDWake]=useState(dayData.wakeTime||schedForDate?.wakeTime||sleepSettings.wakeTime||"07:00");
  const[override,setOverride]=useState(!!(dayData.bedtime||dayData.wakeTime));
  const[skip,setSkip]=useState(!!dayData.skip);
  const[actH,setActH]=useState(dayData.actualHours!=null?String(dayData.actualHours):"");
  const[actM,setActM]=useState(dayData.actualMins!=null?String(dayData.actualMins):"");

  const IS2={background:T.ib,border:`1px solid ${T.ibd||T.bd}`,borderRadius:5,padding:"5px 9px",
    color:T.tx,fontFamily:"'DM Sans',sans-serif",fontSize:"0.88rem",outline:"none"};
  const LB={fontFamily:MO,fontSize:"0.44rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5,display:"block"};
  const Toggle=({val,set,label,sub})=><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
    <div onClick={()=>set(p=>!p)} style={{width:34,height:17,background:val?T.ac:T.b2,borderRadius:9,
      border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer",flexShrink:0,transition:"background 0.2s"}}>
      <div style={{width:11,height:11,background:val?T.bg:T.t3,borderRadius:"50%",position:"absolute",
        top:2,left:val?19:3,transition:"left 0.2s"}}/></div>
    <div><div style={{fontFamily:MO,fontSize:"0.52rem",color:T.tx}}>{label}</div>
      {sub&&<div style={{fontFamily:MO,fontSize:"0.43rem",color:T.t3,marginTop:1}}>{sub}</div>}</div>
  </div>;

  const dateLabel=date?$p(date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}):null;
  const intendedDay=calcMins(override?dWake:(schedForDate?.wakeTime||"07:00"),override?dBed:(schedForDate?.bedtime||"22:00"));

  const save=()=>{
    setSleepSettings({enabled:gEn,bedtime:weekSched[1]?.bedtime||"22:00",wakeTime:weekSched[1]?.wakeTime||"07:00",weekSchedule:weekSched});
    if(date){
      if(override||skip||actH||actM){
        setSleepDayData(p=>({...p,[date]:{...p[date],
          bedtime:override?dBed:null,wakeTime:override?dWake:null,
          skip,
          actualHours:actH!==""?+actH:undefined,
          actualMins:actM!==""?+actM:undefined,
        }}));
      } else {
        setSleepDayData(p=>{const n={...p};delete n[date];return n;});
      }
    }
    setModal(null);
  };

  return <div onClick={()=>setModal(null)}
    style={{position:"fixed",inset:0,background:T.ov,zIndex:1000,display:"flex",
      alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()}
      style={{background:T.b3,border:`1px solid ${T.bd}`,borderRadius:14,
        padding:"22px 26px",maxWidth:500,width:"100%",
        boxShadow:"0 8px 32px rgba(0,0,0,0.28)",maxHeight:"90vh",overflowY:"auto"}}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div style={{fontFamily:SE,fontSize:"1.3rem",color:T.tx,marginBottom:2}}>Sleep Settings</div>
          {dateLabel&&<div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t2}}>{dateLabel}</div>}
        </div>
        <button onClick={()=>setModal(null)} style={{background:"none",border:"none",color:T.t3,cursor:"pointer",fontSize:"1.1rem"}}>✕</button>
      </div>

      {/* Enable toggle */}
      <div style={{padding:"10px 12px",borderRadius:8,background:T.b2,border:`1px solid ${T.bd}`,marginBottom:16}}>
        <Toggle val={gEn} set={setGEn} label="Show sleep blocks on calendar" sub="Bedtime & wake-up appear as calendar indicators"/>
      </div>

      {gEn&&<>
        {/* Weekly schedule grid */}
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <span style={LB}>Weekly recurring schedule</span>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {[["College",{1:{bedtime:"22:30",wakeTime:"07:00"},2:{bedtime:"22:30",wakeTime:"07:00"},3:{bedtime:"22:30",wakeTime:"07:00"},4:{bedtime:"22:30",wakeTime:"07:00"},5:{bedtime:"23:30",wakeTime:"09:00"},6:{bedtime:"01:00",wakeTime:"10:00"},0:{bedtime:"23:00",wakeTime:"08:30"}}],
                ["9–5",{1:{bedtime:"22:30",wakeTime:"06:30"},2:{bedtime:"22:30",wakeTime:"06:30"},3:{bedtime:"22:30",wakeTime:"06:30"},4:{bedtime:"22:30",wakeTime:"06:30"},5:{bedtime:"22:30",wakeTime:"06:30"},6:{bedtime:"23:30",wakeTime:"08:00"},0:{bedtime:"23:30",wakeTime:"08:00"}}],
              ].map(([label,map])=>
                <button key={label} onClick={()=>setWeekSched(p=>Object.fromEntries(Object.entries(p).map(([k,v])=>[k,map[k]||v])))}
                  style={{padding:"2px 8px",borderRadius:4,border:`1px solid ${T.bd}`,background:"transparent",
                    color:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.42rem"}}>{label}</button>
              )}
            </div>
          </div>
          {/* Grid header */}
          <div style={{display:"grid",gridTemplateColumns:"2.6rem 1fr 1fr 3.2rem",gap:"4px 8px",alignItems:"center"}}>
            <div/>
            <div style={{fontFamily:MO,fontSize:"0.39rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.06em",paddingLeft:2}}>🌙 Bedtime</div>
            <div style={{fontFamily:MO,fontSize:"0.39rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.06em",paddingLeft:2}}>☀ Wake up</div>
            <div style={{fontFamily:MO,fontSize:"0.39rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.06em"}}>Sleep</div>
            {[1,2,3,4,5,6,0].map(dow=>{
              const s=weekSched[dow]||{bedtime:"22:00",wakeTime:"07:00"};
              const mins=calcMins(s.wakeTime,s.bedtime);
              const isWeekend=dow===0||dow===6;
              const isToday=dowOfDate===dow;

            </div>

        </div>}

      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:18}}>

        <button onClick={save} style={{padding:"7px 22px",borderRadius:6,border:"none",
          background:T.ac,color:T.bg,cursor:"pointer",fontFamily:MO,fontSize:"0.56rem",fontWeight:600}}>Save</button>

    </div>
  </div>;
}

function SleepSection({T,MO,SE,sleepSettings,setSleepSettings,sleepDayData,setSleepDayData,setModal}){
  const todayStr=$d(new Date());
  const todayData=sleepDayData[todayStr]||{};
  const[logH,setLogH]=useState(todayData.actualHours!=null?String(todayData.actualHours):"");
  const[logM,setLogM]=useState(todayData.actualMins!=null?String(todayData.actualMins):"");

  const calcMins=(wt,bt)=>{if(!wt||!bt)return 0;const[wH,wM]=wt.split(":").map(Number);const[bH,bM]=bt.split(":").map(Number);let w=wH*60+wM,b=bH*60+bM;if(w<=b)w+=1440;return w-b;};
  const fmtMins=(m)=>`${Math.floor(m/60)}h ${m%60}m`;

  // Last 7 days
  const days=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return $d(d);});
  const dayStats=days.map(ds=>{
    const ovr=sleepDayData[ds]||{};
    const dow=new Date(ds+"T12:00").getDay();
    const wkSc=sleepSettings.weekSchedule?.[dow];
    const bt=ovr.bedtime||wkSc?.bedtime||sleepSettings.bedtime||"22:00";
    const wt=ovr.wakeTime||wkSc?.wakeTime||sleepSettings.wakeTime||"07:00";
    const intended=calcMins(wt,bt);
    const actual=ovr.actualHours!=null?(+ovr.actualHours*60+(+ovr.actualMins||0)):null;
    return{ds,intended,actual,skip:!!ovr.skip};
  });
  const maxMins=Math.max(...dayStats.map(d=>Math.max(d.intended,d.actual||0)),480);
  const validActuals=dayStats.filter(d=>d.actual!=null&&!d.skip);
  const avgActual=validActuals.length?Math.round(validActuals.reduce((s,d)=>s+d.actual,0)/validActuals.length):null;
  const avgIntended=Math.round(dayStats.filter(d=>!d.skip).reduce((s,d)=>s+d.intended,0)/Math.max(1,dayStats.filter(d=>!d.skip).length));

  const saveLog=()=>{
    const h=Math.max(0,+logH||0),m=Math.max(0,Math.min(59,+logM||0));
    setSleepDayData(p=>({...p,[todayStr]:{...p[todayStr],actualHours:h,actualMins:m}}));
  };

  return <div style={{background:T.b3,border:`1px solid ${T.bd}`,borderRadius:10,padding:"16px 20px",marginBottom:20}}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
      <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.08em"}}>Sleep Tracker</div>
      <button onClick={()=>setModal&&setModal({type:"_sleep",sleepDate:null})} style={{padding:"4px 10px",borderRadius:5,border:`1px solid ${T.bd}`,background:"transparent",color:T.t3,cursor:"pointer",fontFamily:MO,fontSize:"0.46rem",letterSpacing:"0.05em"}}>⚙ Settings</button>
      {sleepSettings.enabled&&<div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
        <div><div style={{fontFamily:SE,fontSize:"1.15rem",color:T.ac,lineHeight:1}}>{fmtMins(avgIntended)}</div>
          <div style={{fontFamily:MO,fontSize:"0.43rem",color:T.t3,marginTop:1}}>avg planned/night</div></div>
        {avgActual&&<div><div style={{fontFamily:SE,fontSize:"1.15rem",color:"#4ade80",lineHeight:1}}>{fmtMins(avgActual)}</div>
          <div style={{fontFamily:MO,fontSize:"0.43rem",color:T.t3,marginTop:1}}>avg actual/night</div></div>}
      </div>}
    </div>
    {sleepSettings.enabled&&<>
      {/* Bar chart */}
      <div style={{display:"flex",gap:5,alignItems:"flex-end",height:90,marginBottom:8}}>
        {dayStats.map(({ds,intended,actual,skip})=>{
          const label=new Date(ds+"T12:00").toLocaleDateString("en-US",{weekday:"short"}).slice(0,2);
          const isToday=ds===todayStr;
          const iH=maxMins>0?(intended/maxMins)*74:0;
          const aH=actual!=null&&!skip&&maxMins>0?(actual/maxMins)*74:null;
          return <div key={ds} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{flex:1,width:"100%",display:"flex",gap:2,alignItems:"flex-end",justifyContent:"center"}}>
              <div title={`Planned: ${fmtMins(intended)}`}
                style={{flex:1,maxWidth:13,background:`${T.ac}40`,borderRadius:"2px 2px 0 0",height:iH,minHeight:2,
                  border:isToday?`1px solid ${T.ac}80`:"none"}}/>
              {aH!=null
                ?<div title={`Actual: ${fmtMins(actual)}`}
                  style={{flex:1,maxWidth:13,background:"#4ade8066",border:"1px solid #4ade8088",borderRadius:"2px 2px 0 0",height:aH,minHeight:2}}/>
                :isToday?<div style={{flex:1,maxWidth:13,background:T.b2,border:`1px dashed ${T.bd}`,borderRadius:"2px 2px 0 0",height:24}}/>
                :null}
            </div>
            <div style={{fontFamily:MO,fontSize:"0.37rem",color:isToday?T.ac:T.t3}}>{label}</div>
          </div>;
        })}
      </div>
      {/* Legend */}
      <div style={{display:"flex",gap:12,marginBottom:14}}>
        {[["Planned",`${T.ac}40`,"none"],["Actual","#4ade8066","1px solid #4ade8088"]].map(([l,bg,bo])=>
          <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:11,height:8,background:bg,border:bo,borderRadius:2}}/>
            <span style={{fontFamily:MO,fontSize:"0.43rem",color:T.t3}}>{l}</span>
          </div>)}
      </div>
      {/* Log today */}
      <div style={{borderTop:`1px solid ${T.bd}`,paddingTop:12}}>
        <div style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:7}}>Log actual sleep</div>
        <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
          <input type="number" value={logH} onChange={e=>setLogH(e.target.value)} min={0} max={24} placeholder="0"
            style={{width:52,padding:"5px 8px",borderRadius:5,border:`1px solid ${T.bd}`,background:T.ib,color:T.tx,fontSize:"0.88rem",outline:"none"}}/>
          <span style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3}}>h</span>
          <input type="number" value={logM} onChange={e=>setLogM(e.target.value)} min={0} max={59} placeholder="0"
            style={{width:52,padding:"5px 8px",borderRadius:5,border:`1px solid ${T.bd}`,background:T.ib,color:T.tx,fontSize:"0.88rem",outline:"none"}}/>
          <span style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3}}>min</span>
          <button onClick={saveLog} style={{padding:"5px 14px",borderRadius:5,border:"none",
            background:T.ac,color:T.bg,cursor:"pointer",fontFamily:MO,fontSize:"0.52rem",fontWeight:600}}>Log</button>
          {todayData.actualHours!=null&&<span style={{fontFamily:MO,fontSize:"0.46rem",color:"#4ade80"}}>
            ✓ {todayData.actualHours}h {todayData.actualMins||0}m saved</span>}
        </div>
      </div>
    </>}
  </div>;
}

function DayCountdownSection({T,MO,SE,sleepSettings,sleepDayData}){
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const iv=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(iv);},[]);

  const todayStr=$d(new Date());
  const ovr=sleepDayData[todayStr]||{};
  const dow=new Date(todayStr+"T12:00").getDay();
  const wkSc=sleepSettings?.weekSchedule?.[dow];
  const wt=(ovr.wakeTime||wkSc?.wakeTime||sleepSettings?.wakeTime||"07:00");
  const bt=(ovr.bedtime||wkSc?.bedtime||sleepSettings?.bedtime||"22:00");
  const[wH,wM]=wt.split(":").map(Number);
  const[bH,bM]=bt.split(":").map(Number);

  const dayStartMins=wH*60+wM;
  const dayEndMinsRaw=bH*60+bM;
  let dayEndMins=dayEndMinsRaw;
  if(dayEndMins<=dayStartMins)dayEndMins+=1440;
  const totalMins=dayEndMins-dayStartMins;

  const nowMins=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  let nowAdj=nowMins;
  if(dayEndMins>1440&&nowMins<dayEndMinsRaw)nowAdj=nowMins+1440;
  const elapsed=Math.max(0,Math.min(totalMins,nowAdj-dayStartMins));
  const remaining=Math.max(0,totalMins-elapsed);
  const pctElapsed=totalMins>0?elapsed/totalMins*100:0;
  const pctLeft=100-pctElapsed;

  const remSecs=Math.round(remaining*60)-now.getSeconds();
  const dH=Math.floor(Math.max(0,remSecs)/3600);
  const dM=Math.floor((Math.max(0,remSecs)%3600)/60);
  const dS=Math.max(0,remSecs)%60;

  const isDone=nowAdj>=dayEndMins;
  const notStarted=nowAdj<dayStartMins;
  const urgColor=pctLeft<10?"#ef4444":pctLeft<25?"#f97316":pctLeft<50?"#eab308":T.ac;

  // 24h calendar clock (midnight → midnight)
  const pct24=nowMins/1440*100;
  const rem24Secs=Math.max(0,(1440-(now.getHours()*60+now.getMinutes()))*60-now.getSeconds());
  const h24=Math.floor(rem24Secs/3600);
  const m24=Math.floor((rem24Secs%3600)/60);
  const s24=rem24Secs%60;
  const dayColor="#7c6af7";

  const R=38,CX=50,CY=50,circ=2*Math.PI*R;
  const mkTip=(p)=>{const a=-Math.PI/2+(p/100)*2*Math.PI;return[CX+R*Math.cos(a),CY+R*Math.sin(a)];};
  const[tipX,tipY]=mkTip(pctElapsed);
  const[tipX24,tipY24]=mkTip(pct24);

  const ClockFace=({pctE,color,label,sub,tX,tY,noArc})=><div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:108}}>
    <svg width={108} height={108} viewBox="0 0 100 100">
      {Array.from({length:12},(_,i)=>{const a=(i/12)*2*Math.PI-Math.PI/2;const r1=R-7,r2=R-1;
        return <line key={i} x1={CX+r1*Math.cos(a)} y1={CY+r1*Math.sin(a)}
          x2={CX+r2*Math.cos(a)} y2={CY+r2*Math.sin(a)} stroke={T.bd} strokeWidth={1.5}/>;
      })}
      <circle cx={CX} cy={CY} r={R} fill="none" stroke={T.b2} strokeWidth={7}/>
      {!noArc&&<circle cx={CX} cy={CY} r={R} fill="none" stroke={color} strokeWidth={7}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pctE/100)}
        strokeLinecap="round" transform={`rotate(-90 ${CX} ${CY})`}
        style={{transition:"stroke-dashoffset 1s linear,stroke 0.5s"}}/>}
      {!noArc&&pctE>0&&pctE<100&&<circle cx={tX} cy={tY} r={4} fill={color}
        style={{animation:"dayTick 1.2s ease-in-out infinite"}}/>}
      <text x={CX} y={CY-4} textAnchor="middle"
        style={{fontFamily:"'DM Mono',monospace",fontSize:"0.58rem",fontWeight:700,fill:noArc?T.t3:color}}>
        {noArc?"—":(100-pctE).toFixed(0)+"%"}
      </text>
      <text x={CX} y={CY+9} textAnchor="middle"
        style={{fontFamily:"'DM Mono',monospace",fontSize:"0.42rem",fill:T.t3}}>{label}</text>
    </svg>
    <div style={{fontFamily:MO,fontSize:"0.38rem",color:T.t3,marginTop:3,textAlign:"center"}}>{sub}</div>
  </div>;

  return <div style={{background:T.b3,border:`1px solid ${T.bd}`,borderRadius:10,padding:"18px 22px",marginBottom:20}}>
    <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>
      Day Countdown
    </div>
    <div style={{display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
      <ClockFace pctE={pctElapsed} color={urgColor}
        label={isDone?"done":notStarted?"not yet":"left"}
        sub={`☀ ${wt} – 🌙 ${bt}`}
        tX={tipX} tY={tipY} noArc={notStarted}/>
      <ClockFace pctE={pct24} color={dayColor}
        label="left" sub="12:00 am – 11:59 pm"
        tX={tipX24} tY={tipY24} noArc={false}/>
      <div style={{flex:1,minWidth:130}}>
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:MO,fontSize:"0.4rem",color:urgColor,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2}}>Waking day</div>
          {notStarted
            ?<div style={{fontFamily:MO,fontSize:"0.58rem",color:T.t2}}>starts at {wt}</div>
            :isDone
            ?<div style={{fontFamily:MO,fontSize:"0.58rem",color:T.t3}}>complete</div>
            :<div style={{fontFamily:"'DM Mono',monospace",fontSize:"1.5rem",color:urgColor,fontWeight:700,lineHeight:1,letterSpacing:"-0.02em",animation:"dayTick 1s ease-in-out infinite"}}>
              {String(dH).padStart(2,"0")}:{String(dM).padStart(2,"0")}:{String(dS).padStart(2,"0")}
            </div>}
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontFamily:MO,fontSize:"0.4rem",color:dayColor,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2}}>Calendar day</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:"1.5rem",color:dayColor,fontWeight:700,lineHeight:1,letterSpacing:"-0.02em"}}>
            {String(h24).padStart(2,"0")}:{String(m24).padStart(2,"0")}:{String(s24).padStart(2,"0")}
          </div>
        </div>
        {!notStarted&&<>
          <div style={{marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",fontFamily:MO,fontSize:"0.38rem",color:T.t3,marginBottom:2}}>
              <span>☀ {wt}</span><span>{pctElapsed.toFixed(1)}%</span><span>🌙 {bt}</span>
            </div>
            <div style={{height:5,background:T.b2,borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",background:urgColor,width:`${pctElapsed}%`,borderRadius:3,transition:"width 1s linear"}}/>
            </div>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",fontFamily:MO,fontSize:"0.38rem",color:T.t3,marginBottom:2}}>
              <span>12 am</span><span>{pct24.toFixed(1)}%</span><span>midnight</span>
            </div>
            <div style={{height:5,background:T.b2,borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",background:dayColor,width:`${pct24}%`,borderRadius:3,transition:"width 1s linear"}}/>
            </div>
          </div>
        </>}
      </div>
    </div>
  </div>;
}

const FOCUS_STORE_KEY="tc_focus_prefs_v1";
const CHAT_MSGS_KEY="tc_chat_msgs_v1";
const COACH_MSGS_KEY="tc_coach_msgs_v1";
const MAX_CHAT_MSGS=100;
const TONES=[
  {key:"drill",label:"Drill Sergeant",emoji:"🪖",desc:"No excuses. Get it done.",sys:"You are a no-nonsense drill sergeant productivity coach. Be blunt, direct, and demanding. No coddling. Push the user hard. Use short punchy sentences. You may use mild military metaphors. Never be mean-spirited, but absolutely be relentless about getting work done."},

function FocusDashboard({T,MO,SE,tasks,events,courses,cats,exams,assignments,sem,setChatOpen,sleepSettings,setSleepSettings,sleepDayData,setSleepDayData,setModal}){
  const saved=useMemo(()=>{try{const s=localStorage.getItem(FOCUS_STORE_KEY);return s?JSON.parse(s):{};}catch(e){return{};}}, []);
  const save=(d)=>{try{localStorage.setItem(FOCUS_STORE_KEY,JSON.stringify(d));}catch(e){}};

  const[gradYear,setGradYear]=useState(saved.gradYear||2029);
  const[gradMonth,setGradMonth]=useState(saved.gradMonth??4); // 0-indexed, April=4 (May commencement)
  const[classYear,setClassYear]=useState(saved.classYear||"Freshman");
  const[tone,setTone]=useState(saved.tone||"tough");
  const[customDeadlines,setCustomDeadlines]=useState(saved.customDeadlines||[]);
  const[showSetup,setShowSetup]=useState(!saved.gradYear);
  const[addDl,setAddDl]=useState(false);
  const[dlLabel,setDlLabel]=useState("");
  const[dlDate,setDlDate]=useState("");
  const[coachMsgs,setCoachMsgsRaw]=useState(()=>{try{const s=localStorage.getItem(COACH_MSGS_KEY);return s?JSON.parse(s):[];}catch(e){return[];}});
  const setCoachMsgs=(v)=>{const next=typeof v==="function"?v(coachMsgs):v;const trimmed=next.slice(-MAX_CHAT_MSGS);try{localStorage.setItem(COACH_MSGS_KEY,JSON.stringify(trimmed));}catch(e){}setCoachMsgsRaw(trimmed);};
  const[coachInput,setCoachInput]=useState("");
  const[coachLoading,setCoachLoading]=useState(false);
  const[puterReady,setPuterReady]=useState(!!window.puter?.ai);
  const coachScrollRef=useRef(null);
  const coachInputRef=useRef(null);

  useEffect(()=>{save({gradYear,gradMonth,classYear,tone,customDeadlines});},[gradYear,gradMonth,classYear,tone,customDeadlines]);
  useEffect(()=>{const iv=setInterval(()=>{if(window.puter?.ai){setPuterReady(true);clearInterval(iv);}},500);return()=>clearInterval(iv);},[]);
  useEffect(()=>{if(coachScrollRef.current)coachScrollRef.current.scrollTop=coachScrollRef.current.scrollHeight;},[coachMsgs]);

  const today=new Date();today.setHours(0,0,0,0);
  const daysUntil=(dateStr)=>{const d=new Date(dateStr+"T00:00:00");d.setHours(0,0,0,0);return Math.round((d-today)/(1000*60*60*24));};

  // Finals countdown per course
  const courseFinalsCountdowns=useMemo(()=>{
    const results=[];
    courses.forEach(c=>{
      const courseExams=exams.filter(e=>e.courseId===c.id).sort((a,b)=>a.date<b.date?1:-1);
      const lastExam=courseExams[0];
      if(lastExam){
        const d=daysUntil(lastExam.date);
        results.push({courseId:c.id,name:c.name,date:lastExam.date,type:lastExam.type,days:d,color:(cats[c.id]||cats.other)?.color||T.ac});
      } else {
        // Use PCAL finals if no exam set
        const cal=PCAL[sem];
        if(cal){const finalsEv=cal.ev.find(e=>e.t==="Finals");
          if(finalsEv){const d=daysUntil(finalsEv.d);results.push({courseId:c.id,name:c.name,date:finalsEv.d,type:"Finals",days:d,color:(cats[c.id]||cats.other)?.color||T.ac,estimated:true});}}
      }
    });
    return results.sort((a,b)=>a.days-b.days);
  },[courses,exams,cats,sem]);

  // College countdown
  const gradDate=useMemo(()=>{
    // Use May 15 of grad year as commencement approximation
    return new Date(gradYear,gradMonth,15);
  },[gradYear,gradMonth]);
  const daysToGrad=Math.round((gradDate-today)/(1000*60*60*24));
  const yearsToGrad=(daysToGrad/365).toFixed(1);

  // Urgent tasks for coach context
  const urgentTasks=useMemo(()=>tasks.filter(t=>!t.done&&(t._urgent||(!t.date&&t.hasDueTime)||
    (t.date&&daysUntil(t.date)<=3))).slice(0,10),[tasks]);

  const buildCoachContext=()=>{
    const todayStr=today.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
    const taskLines=urgentTasks.map(t=>`- ${t.title}${t.date?` (due ${t.date})`:"(ASAP)"}`).join("\n")||"No urgent tasks.";
    const finalsLines=courseFinalsCountdowns.slice(0,6).map(c=>`- ${c.name} ${c.type}: ${c.days} days (${c.date})`).join("\n")||"No finals data.";
    const customLines=customDeadlines.filter(d=>daysUntil(d.date)>=0).map(d=>`- ${d.label}: ${daysUntil(d.date)} days (${d.date})`).join("\n")||"None.";
    return `Today is ${todayStr}. The student is a ${classYear} graduating in ${gradYear} (${daysToGrad} days left in college).\n\nURGENT TASKS:\n${taskLines}\n\nFINALS COUNTDOWNS:\n${finalsLines}\n\nCUSTOM DEADLINES:\n${customLines}`;
  };

  const sendCoach=async(text)=>{
    const content=text||coachInput.trim();
    if(!content||coachLoading)return;
    setCoachInput("");
    const newMsgs=[...coachMsgs,{role:"user",content}];
    setCoachMsgs(newMsgs);
    setCoachLoading(true);
    if(!window.puter?.ai?.chat){setCoachMsgs(p=>[...p,{role:"assistant",content:"⚠️ Puter.js is still loading — wait a moment."}]);setCoachLoading(false);return;}
    try{
      const selectedTone=TONES.find(t=>t.key===tone)||TONES[1];
      const systemPrompt=`${selectedTone.sys}\n\nCONTEXT ABOUT THE STUDENT:\n${buildCoachContext()}\n\nBe concise. Max 3-4 sentences per response unless they ask for a plan. Always end with one specific, concrete action they should do RIGHT NOW.`;
      const resp=await window.puter.ai.chat([
        {role:"system",content:systemPrompt},
        ...newMsgs.map(m=>({role:m.role,content:m.content}))
      ],{model:"google/gemini-2.5-flash"});
      const reply=resp?.message?.content||(typeof resp==="string"?resp:"No response.");
      setCoachMsgs(p=>[...p,{role:"assistant",content:reply}]);
    }catch(e){setCoachMsgs(p=>[...p,{role:"assistant",content:`⚠️ Error: ${e.message}`}]);}
    finally{setCoachLoading(false);setTimeout(()=>coachInputRef.current?.focus(),50);}
  };

  const urgencyColor=(days)=>{
    if(days<0)return"#ef4444";
    if(days<=2)return"#ef4444";
    if(days<=7)return"#f97316";
    if(days<=14)return"#eab308";
    return T.t2;
  };
  const CountdownRing=({days,color,size=56})=>{
    const max=days>0?Math.min(days,30):30;
    const pct=days>0?1-(days/max):1;
    const r=size/2-5,circ=2*Math.PI*r;
    return <svg width={size} height={size} style={{flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.b2} strokeWidth={4}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={4}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
        strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{transition:"stroke-dashoffset 0.6s ease"}}/>
      <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
        style={{fontFamily:"'DM Mono',monospace",fontSize:days<0||days>99?"8px":"10px",fontWeight:700,fill:color}}>
        {days<0?"past":days>365?`${Math.round(days/365)}yr`:days}
      </text>
    </svg>;
  };

  const IS={background:T.ib,border:`1px solid ${T.bd}`,borderRadius:6,padding:"6px 10px",
    color:T.tx,fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",outline:"none",width:"100%",boxSizing:"border-box"};
  const cardStyle={background:T.b3,border:`1px solid ${T.bd}`,borderRadius:10,padding:"16px 20px"};

  // ── Setup banner ──
  const SetupBanner=()=><div style={{...cardStyle,marginBottom:20,border:`1px solid ${T.ac}40`,background:`${T.ac}08`}}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
      <div>
        <div style={{fontFamily:SE,fontSize:"1.1rem",color:T.tx,marginBottom:4}}>Set up your Focus profile</div>
        <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t2,letterSpacing:"0.04em"}}>Personalize countdowns and coach tone</div>
      </div>
      <button onClick={()=>setShowSetup(false)} style={{background:"none",border:"none",cursor:"pointer",color:T.t3,fontSize:"1rem"}}>✕</button>
    </div>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:14}}>
      <div style={{flex:"1 1 160px"}}>
        <div style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Class Year</div>
        <select value={classYear} onChange={e=>setClassYear(e.target.value)} style={IS}>
          {["Freshman","Sophomore","Junior","Senior","Grad Student","Other"].map(y=><option key={y}>{y}</option>)}
        </select>
      </div>
      <div style={{flex:"1 1 120px"}}>
        <div style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Graduation Year</div>
        <select value={gradYear} onChange={e=>setGradYear(+e.target.value)} style={IS}>
          {[2025,2026,2027,2028,2029,2030,2031,2032].map(y=><option key={y}>{y}</option>)}
        </select>
      </div>
      <div style={{flex:"1 1 160px"}}>
        <div style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Commencement Month</div>
        <select value={gradMonth} onChange={e=>setGradMonth(+e.target.value)} style={IS}>
          {MN2.map((m,i)=><option key={i} value={i}>{m}</option>)}
        </select>
      </div>
    </div>
    <button onClick={()=>setShowSetup(false)}
      style={{marginTop:12,padding:"7px 20px",borderRadius:6,border:"none",background:T.ac,color:T.bg,
        cursor:"pointer",fontFamily:MO,fontSize:"0.56rem",fontWeight:600}}>Save & Close</button>
  </div>;

  return <div style={{flex:1,overflow:"auto",padding:"24px 28px 48px",background:T.bg,boxSizing:"border-box"}}>
    <div style={{maxWidth:1100,margin:"0 auto"}}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:24}}>
        <div>
          <h2 style={{fontFamily:SE,fontSize:"2rem",fontWeight:400,margin:0,color:T.tx,letterSpacing:"-0.02em"}}>
            Focus<span style={{color:T.ac,fontStyle:"italic"}}> Dashboard</span>
          </h2>
          <div style={{fontFamily:MO,fontSize:"0.56rem",color:T.t2,letterSpacing:"0.05em",marginTop:4}}>
            {urgentTasks.length} urgent · {courseFinalsCountdowns.length} finals tracked · {daysToGrad} days to graduation
          </div>
        </div>
        <button onClick={()=>setShowSetup(p=>!p)}
          style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${T.bd}`,background:T.b3,
            color:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.54rem"}}>⚙ Profile</button>
      </div>

      {showSetup&&<SetupBanner/>}

      {/* Top row: College countdown + Coach tone picker */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>

        {/* College countdown card */}
        <div style={{...cardStyle,display:"flex",alignItems:"center",gap:20}}>
          <CountdownRing days={daysToGrad} color={T.ac} size={72}/>
          <div>
            <div style={{fontFamily:SE,fontSize:"1.5rem",color:T.tx,lineHeight:1}}>{daysToGrad.toLocaleString()}</div>
            <div style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2,marginTop:3,letterSpacing:"0.04em"}}>days left in college</div>
            <div style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,marginTop:2}}>{classYear} · Class of {gradYear} · ~{yearsToGrad} years</div>
          </div>
        </div>

        {/* Coach tone picker */}
        <div style={cardStyle}>
          <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Coach Tone</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {TONES.map(t=>{
              const isActive=tone===t.key;
              return <button key={t.key} onClick={()=>setTone(t.key)}
                style={{padding:"8px 10px",borderRadius:7,border:`1px solid ${isActive?T.ac:T.bd}`,
                  background:isActive?`${T.ac}14`:T.b2,cursor:"pointer",textAlign:"left",transition:"all 0.12s"}}>
                <div style={{fontSize:"1rem",marginBottom:2}}>{t.emoji}</div>
                <div style={{fontFamily:MO,fontSize:"0.5rem",color:isActive?T.ac:T.tx,fontWeight:isActive?600:400,letterSpacing:"0.03em"}}>{t.label}</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.68rem",color:T.t3,marginTop:1}}>{t.desc}</div>
              </button>;
            })}
          </div>
        </div>
      </div>

      {/* Finals countdowns */}
      {courseFinalsCountdowns.length>0&&<div style={{...cardStyle,marginBottom:20}}>
        <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Finals Countdowns</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
          {courseFinalsCountdowns.map(c=>{
            const col=urgencyColor(c.days);
            return <div key={c.courseId} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
              borderRadius:8,background:T.b2,border:`1px solid ${T.bd}`}}>
              <CountdownRing days={c.days} color={c.days<=7?col:c.color} size={46}/>
              <div style={{minWidth:0}}>
                <div style={{fontFamily:MO,fontSize:"0.52rem",color:c.days<=7?col:T.tx,fontWeight:600,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:"0.02em"}}>{c.name}</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.7rem",color:T.t3,marginTop:1}}>{c.type}{c.estimated?" *":""}</div>
                <div style={{fontFamily:MO,fontSize:"0.46rem",color:col,marginTop:1}}>{c.days<0?"PAST":c.days===0?"TODAY":c.days===1?"TOMORROW":`${c.date}`}</div>
              </div>
            </div>;
          })}
        </div>
        {courseFinalsCountdowns.some(c=>c.estimated)&&<div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,marginTop:8}}>* Using semester finals dates — add exams in "Exams & More" for exact dates</div>}
      </div>}

      {/* Custom deadlines */}
      <div style={{...cardStyle,marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,textTransform:"uppercase",letterSpacing:"0.08em"}}>Custom Deadlines</div>
          <button onClick={()=>setAddDl(p=>!p)}
            style={{padding:"4px 12px",borderRadius:5,border:`1px solid ${T.bd}`,background:"transparent",
              color:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.52rem"}}>
            {addDl?"Cancel":"+ Add"}
          </button>
        </div>
        {addDl&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,padding:"12px",borderRadius:7,background:T.b2,border:`1px solid ${T.bd}`}}>
          <input value={dlLabel} onChange={e=>setDlLabel(e.target.value)} placeholder="Deadline label…"
            style={{...IS,flex:"1 1 160px"}}/>
          <input type="date" value={dlDate} onChange={e=>setDlDate(e.target.value)}
            style={{...IS,flex:"1 1 130px"}}/>
          <button onClick={()=>{if(!dlLabel.trim()||!dlDate)return;
            const nd=[...customDeadlines,{id:gi(),label:dlLabel.trim(),date:dlDate}];
            setCustomDeadlines(nd);setDlLabel("");setDlDate("");setAddDl(false);}}
            disabled={!dlLabel.trim()||!dlDate}
            style={{padding:"6px 16px",borderRadius:6,border:"none",
              background:dlLabel.trim()&&dlDate?T.ac:T.b2,color:dlLabel.trim()&&dlDate?T.bg:T.t3,
              cursor:dlLabel.trim()&&dlDate?"pointer":"default",fontFamily:MO,fontSize:"0.54rem",fontWeight:600}}>Add</button>
        </div>}
        {customDeadlines.length===0&&!addDl&&<div style={{fontFamily:MO,fontSize:"0.56rem",color:T.t3,padding:"8px 0"}}>No custom deadlines yet. Add a competition, application, or personal goal.</div>}
        {customDeadlines.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
          {[...customDeadlines].sort((a,b)=>a.date<b.date?-1:1).map(dl=>{
            const d=daysUntil(dl.date),col=urgencyColor(d);
            return <div key={dl.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
              borderRadius:8,background:T.b2,border:`1px solid ${T.bd}`}}>
              <CountdownRing days={d} color={col} size={46}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",color:T.tx,fontWeight:500,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dl.label}</div>
                <div style={{fontFamily:MO,fontSize:"0.46rem",color:col,marginTop:2}}>{d<0?"PAST":d===0?"TODAY":d===1?"TOMORROW":dl.date}</div>
              </div>
              <button onClick={()=>setCustomDeadlines(p=>p.filter(x=>x.id!==dl.id))}
                style={{background:"none",border:"none",cursor:"pointer",color:T.t3,fontSize:"0.9rem",padding:"2px 4px",flexShrink:0}}>✕</button>
            </div>;
          })}
        </div>}
      </div>

      {/* Day countdown */}
      <DayCountdownSection T={T} MO={MO} SE={SE} sleepSettings={sleepSettings||{}} sleepDayData={sleepDayData||{}}/>

      {/* Sleep tracker */}
      <SleepSection T={T} MO={MO} SE={SE}
        sleepSettings={sleepSettings||{enabled:false,bedtime:"22:00",wakeTime:"07:00"}}
        setSleepSettings={setSleepSettings||function(){}}
        sleepDayData={sleepDayData||{}}
        setSleepDayData={setSleepDayData||function(){}}
        setModal={setModal}/>

      {/* Coach chat */}
      <div style={cardStyle}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontFamily:SE,fontSize:"1.1rem",color:T.tx}}>
              {TONES.find(t=>t.key===tone)?.emoji} {TONES.find(t=>t.key===tone)?.label}
            </div>
            <div style={{fontFamily:MO,fontSize:"0.48rem",color:puterReady?"#4ade80":T.t3,marginTop:2}}>
              {puterReady?"● Online — Powered by Puter.js":"● Loading AI…"}
            </div>
          </div>
          {coachMsgs.length>0&&<button onClick={()=>{setCoachMsgs([]);try{localStorage.removeItem(COACH_MSGS_KEY);}catch(e){};}}
            style={{padding:"4px 12px",borderRadius:5,border:`1px solid ${T.bd}`,background:"transparent",
              color:T.t3,cursor:"pointer",fontFamily:MO,fontSize:"0.5rem"}}>Clear</button>}
        </div>

        {/* Messages */}
        <div ref={coachScrollRef} style={{maxHeight:320,overflowY:"auto",display:"flex",flexDirection:"column",
          gap:8,marginBottom:12,padding:"4px 0"}}>
          {coachMsgs.length===0&&<div style={{padding:"20px 0",textAlign:"center"}}>
            <div style={{fontSize:"2rem",marginBottom:8}}>{TONES.find(t=>t.key===tone)?.emoji}</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.88rem",color:T.t2,lineHeight:1.6,maxWidth:380,margin:"0 auto",marginBottom:14}}>
              Ready to hold you accountable. I can see your tasks, upcoming finals, and deadlines. Let's get to work.
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
              {["What should I work on right now?","Give me a reality check on my schedule","I've been procrastinating on everything","Make me a priority list for this week"].map(s=>
                <button key={s} onClick={()=>sendCoach(s)}
                  style={{padding:"5px 12px",borderRadius:16,border:`1px solid ${T.bd}`,
                    background:`${T.ac}12`,color:T.t2,fontSize:"0.72rem",cursor:"pointer",
                    fontFamily:"'DM Sans',sans-serif"}}>{s}</button>)}
            </div>
          </div>}
          {coachMsgs.map((m,i)=>{
            const isUser=m.role==="user";
            return <div key={i} style={{display:"flex",justifyContent:isUser?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"85%",padding:"9px 14px",fontSize:"0.84rem",lineHeight:1.65,
                borderRadius:isUser?"14px 14px 4px 14px":"14px 14px 14px 4px",
                background:isUser?T.ac:T.b2,color:isUser?T.bg:T.tx,
                border:isUser?"none":`1px solid ${T.bd}`,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                {m.content}
              </div>
            </div>;
          })}
          {coachLoading&&<div style={{display:"flex",justifyContent:"flex-start"}}>
            <div style={{padding:"10px 14px",borderRadius:"14px 14px 14px 4px",background:T.b2,border:`1px solid ${T.bd}`,display:"flex",gap:4}}>
              {[0,1,2].map(j=><div key={j} style={{width:6,height:6,borderRadius:"50%",background:T.ac,
                animation:`tcChatBounce 1.2s ease-in-out ${j*0.15}s infinite`,opacity:0.5}}/>)}
            </div>
          </div>}
        </div>

        {/* Input */}
        <div style={{display:"flex",gap:8}}>
          <input ref={coachInputRef} value={coachInput} onChange={e=>setCoachInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendCoach()}
            placeholder="Talk to your coach…"
            style={{...IS,flex:1,padding:"9px 12px"}}/>
          <button onClick={()=>sendCoach()} disabled={!coachInput.trim()||coachLoading}
            style={{padding:"9px 18px",borderRadius:8,border:"none",
              background:coachInput.trim()&&!coachLoading?T.ac:T.b2,
              color:coachInput.trim()&&!coachLoading?T.bg:T.t3,
              cursor:coachInput.trim()&&!coachLoading?"pointer":"default",
              fontFamily:MO,fontSize:"0.56rem",fontWeight:600,transition:"all 0.15s",whiteSpace:"nowrap"}}>
            Send
          </button>
        </div>
      </div>

    </div>
  </div>;
}

// ═══ PALETTE MENU (replaces 5 accent dots + dark toggle + custom bg in toolbar) ═══
function PaletteMenu({T,MO,isDark,accentKey,ACCENTS,setTheme,settings,setSettings}){
  const[open,setOpen]=useState(false);
  const activeColor=isDark?ACCENTS[accentKey]?.d:ACCENTS[accentKey]?.l;
  const bgRef=useRef(null);
  return <div style={{position:"relative",zIndex:open?500:1}}>
    <button onClick={()=>setOpen(p=>!p)} title="Theme & colors"
      style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${open?activeColor:T.bd}`,
        background:activeColor,cursor:"pointer",flexShrink:0,
        boxShadow:open?`0 0 0 2px ${T.bg}, 0 0 0 4px ${activeColor}`:"none",
        transition:"all 0.15s"}}/>
    {open&&<>
      <div onClick={()=>setOpen(false)} style={{position:"fixed",inset:0,zIndex:499}}/>
      <div style={{position:"absolute",top:"calc(100% + 8px)",right:0,background:T.mb,
        border:`1px solid ${T.bd}`,borderRadius:10,boxShadow:"0 8px 28px rgba(0,0,0,0.22)",
        zIndex:500,padding:"14px 16px",minWidth:196}}>
        {/* Accent color */}
        <div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Accent Color</div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {Object.entries(ACCENTS).map(([k,a])=>{
            const col=isDark?a.d:a.l;
            const isActive=accentKey===k;
            return <div key={k} onClick={()=>{setTheme(isDark?`dark-${k}`:k==="purple"?"light":`light-${k}`);}}
              style={{width:20,height:20,borderRadius:"50%",background:col,cursor:"pointer",
                outline:isActive?`3px solid ${col}`:"3px solid transparent",
                outlineOffset:2,transition:"outline 0.12s",flexShrink:0}}/>;
          })}
        </div>
        {/* Light / Dark mode */}
        <div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Mode</div>
        <div style={{display:"flex",gap:4,marginBottom:14}}>
          {[["light","☀ Light"],["dark","☾ Dark"]].map(([m,label])=>{
            const isActive=m==="dark"?isDark:!isDark;
            return <button key={m} onClick={()=>setTheme(m==="dark"?(accentKey==="purple"?"dark":`dark-${accentKey}`):(accentKey==="purple"?"light":`light-${accentKey}`))}
              style={{flex:1,padding:"5px 0",borderRadius:5,border:`1px solid ${isActive?T.ac:T.bd}`,
                background:isActive?`${T.ac}18`:"transparent",color:isActive?T.ac:T.t2,
                cursor:"pointer",fontFamily:MO,fontSize:"0.5rem",letterSpacing:"0.04em"}}>{label}</button>;
          })}
        </div>
        {/* Custom background — separate from accent */}
        <div style={{borderTop:`1px solid ${T.bd}`,paddingTop:12}}>
          <div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Background Color</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <label style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8,flex:1}}>
              {/* Swatch shows current bg color */}
              <div style={{width:22,height:22,borderRadius:5,border:`2px solid ${T.bd}`,
                background:settings?.customBg||T.bg,flexShrink:0,position:"relative",
                outline:settings?.customBg?`2px solid ${T.ac}`:"none",outlineOffset:2}}>
                <input ref={bgRef} type="color" value={settings?.customBg||(isDark?"#0d0d0f":"#f5f3ef")}
                  onChange={e=>setSettings(p=>({...p,customBg:e.target.value}))}
                  style={{position:"absolute",inset:0,opacity:0,width:"100%",height:"100%",cursor:"pointer",border:"none",padding:0}}/>
              </div>
              <span style={{fontFamily:MO,fontSize:"0.5rem",color:settings?.customBg?T.tx:T.t3}}>
                {settings?.customBg||"Default"}
              </span>
            </label>
            {settings?.customBg&&<button onClick={()=>setSettings(p=>({...p,customBg:null}))}
              style={{padding:"3px 9px",borderRadius:4,border:`1px solid ${T.bd}`,background:"transparent",
                color:T.t3,cursor:"pointer",fontFamily:MO,fontSize:"0.46rem",whiteSpace:"nowrap"}}>Reset</button>}
          </div>
        </div>
      </div>
    </>}
  </div>;
}

const CHAT_MODELS=[
  {id:"google/gemini-2.5-flash",label:"Gemini 2.5 Flash",desc:"Fast, recommended"},

  {id:"deepseek/deepseek-r1",label:"DeepSeek R1",desc:"Great reasoning"},
  {id:"claude-sonnet-4-20250514",label:"Claude Sonnet",desc:"Excellent at analysis"},
];
const CHAT_SUGGESTED=[
  "What's on my schedule this week?",
  "Help me plan study time for my courses",
  "Draft a reminder email for an assignment",
  "What should I prioritize today?",
];

function ChatSidebar({T,MO,SE,open,onClose}){
  const[msgs,setMsgsRaw]=useState(()=>{try{const s=localStorage.getItem(CHAT_MSGS_KEY);return s?JSON.parse(s):[];}catch(e){return[];}});
  const setMsgs=(v)=>{const next=typeof v==="function"?v(msgs):v;const trimmed=next.slice(-MAX_CHAT_MSGS);try{localStorage.setItem(CHAT_MSGS_KEY,JSON.stringify(trimmed));}catch(e){}setMsgsRaw(trimmed);};
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[model,setModel]=useState(()=>{try{return localStorage.getItem("tc_chat_model")||"google/gemini-2.5-flash";}catch(e){return"google/gemini-2.5-flash";}});
  const[showSettings,setShowSettings]=useState(false);
  const[puterReady,setPuterReady]=useState(false);
  const scrollRef=useRef(null);
  const inputRef=useRef(null);

  // Poll for Puter.js readiness
  useEffect(()=>{
    if(puterReady)return;
    const iv=setInterval(()=>{
      if(window.puter?.ai){setPuterReady(true);clearInterval(iv);}
    },500);
    const t=setTimeout(()=>{clearInterval(iv);if(window.puter)setPuterReady(true);},15000);
    return()=>{clearInterval(iv);clearTimeout(t);};
  },[]);

  useEffect(()=>{
    if(open)setTimeout(()=>inputRef.current?.focus(),100);
  },[open]);

  useEffect(()=>{
    if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[msgs]);

  const renderMd=(text)=>{
    if(!text)return"";
    return text.split("\n").map(line=>{
      line=line.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
      line=line.replace(/`([^`]+)`/g,`<code style="background:${T.b2};padding:1px 5px;border-radius:3px;font-size:0.85em;font-family:'DM Mono',monospace;">$1</code>`);
      if(line.startsWith("### "))return`<div style="font-weight:700;margin-top:6px;margin-bottom:2px;font-size:0.88em;">${line.slice(4)}</div>`;
      if(line.startsWith("## "))return`<div style="font-weight:700;margin-top:6px;margin-bottom:2px;">${line.slice(3)}</div>`;
      if(line.trim()==="")return`<div style="height:5px;"></div>`;
      if(/^[-•]\s/.test(line))return`<div style="margin-left:8px;">${line}</div>`;
      if(/^\d+[.)]\s/.test(line))return`<div style="margin-left:8px;">${line}</div>`;
      return`<div>${line}</div>`;
    }).join("");
  };

  const sendMsg=async(text)=>{
    const content=text||input.trim();
    if(!content||loading)return;
    setInput("");
    const newMsgs=[...msgs,{role:"user",content}];
    setMsgs(newMsgs);
    setLoading(true);
    if(!window.puter?.ai?.chat){
      setMsgs(p=>[...p,{role:"assistant",content:"⚠️ Puter.js is still loading — wait a moment and try again."}]);
      setLoading(false);return;
    }
    try{
      const apiMsgs=[
        {role:"system",content:"You are a helpful AI assistant built into TigerCalendar, a calendar and task manager for Princeton students. Help with scheduling, studying, planning, and general questions. Be concise and friendly."},
        ...newMsgs.map(m=>({role:m.role,content:m.content}))
      ];
      const resp=await window.puter.ai.chat(apiMsgs,{model});
      const reply=resp?.message?.content||(typeof resp==="string"?resp:"Sorry, something went wrong.");
      if(!puterReady)setPuterReady(true);
      setMsgs(p=>[...p,{role:"assistant",content:reply}]);
    }catch(e){
      setMsgs(p=>[...p,{role:"assistant",content:`⚠️ Error: ${e.message||"Something went wrong"}. Try again or switch models.`}]);
    }finally{setLoading(false);setTimeout(()=>inputRef.current?.focus(),50);}
  };

  const IS={flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${T.bd}`,
    background:T.ib,color:T.tx,fontSize:"0.82rem",fontFamily:"'DM Sans',sans-serif",
    resize:"none",outline:"none",minHeight:38,lineHeight:1.5};

  if(!open)return null;
  return <>
    {/* Backdrop */}
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:295}}/>
    {/* Sidebar panel */}
    <div style={{position:"fixed",top:0,right:0,bottom:0,width:"100%",maxWidth:400,
      background:T.b2,zIndex:296,display:"flex",flexDirection:"column",
      boxShadow:"-8px 0 32px rgba(0,0,0,0.25)",
      animation:"chatSlideIn 0.22s ease-out"}}>
      <style>{`@keyframes chatSlideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        @keyframes tcChatBounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}`}
      </style>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"12px 16px",borderBottom:`1px solid ${T.bd}`,background:T.b3,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:T.ac,display:"flex",
            alignItems:"center",justifyContent:"center",color:T.bg,fontFamily:SE,fontSize:"1rem",fontWeight:700}}>T</div>
          <div>
            <div style={{fontFamily:MO,fontSize:"0.6rem",fontWeight:600,color:T.tx,letterSpacing:"0.04em"}}>TigerCal Assistant</div>
            <div style={{fontFamily:MO,fontSize:"0.48rem",color:puterReady?"#4ade80":T.t3,marginTop:1}}>
              {puterReady?"● Online":"● Loading…"}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:2}}>
          <button onClick={()=>setShowSettings(p=>!p)} title="Switch model"
            style={{background:"none",border:"none",color:T.t3,cursor:"pointer",padding:"5px 7px",borderRadius:6,fontSize:"0.9rem"}}>⚙</button>
          <button onClick={()=>{setMsgs([]);try{localStorage.removeItem(CHAT_MSGS_KEY);}catch(e){}setShowSettings(false);}} title="Clear chat"
            style={{background:"none",border:"none",color:T.t3,cursor:"pointer",padding:"5px 7px",borderRadius:6,fontSize:"0.9rem"}}>🗑</button>
          <button onClick={onClose} title="Close"
            style={{background:"none",border:"none",color:T.t3,cursor:"pointer",padding:"5px 7px",borderRadius:6,fontSize:"1rem"}}>✕</button>
        </div>
      </div>
      {/* Model picker */}
      {showSettings&&<div style={{padding:"10px 14px",borderBottom:`1px solid ${T.bd}`,background:T.b3}}>
        <div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>AI Model</div>
        {CHAT_MODELS.map(m=><button key={m.id} onClick={()=>{setModel(m.id);try{localStorage.setItem("tc_chat_model",m.id);}catch(e){}setShowSettings(false);}}
          style={{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",marginBottom:3,
            border:model===m.id?`1px solid ${T.ac}`:"1px solid transparent",
            borderRadius:7,background:model===m.id?`${T.ac}18`:"transparent",
            color:T.tx,cursor:"pointer"}}>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.78rem",fontWeight:500}}>{m.label}</div>
          <div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,marginTop:1}}>{m.desc}</div>
        </button>)}
      </div>}
      {/* Messages */}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:8}}>
        {msgs.length===0&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          height:"100%",textAlign:"center",padding:"20px 10px"}}>
          <div style={{fontFamily:SE,fontSize:"2.5rem",color:T.ac,marginBottom:8,lineHeight:1}}>🐯</div>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:T.t2,lineHeight:1.6,maxWidth:260,marginBottom:16}}>
            Your TigerCal AI assistant. Ask about your schedule, get planning help, or just chat.
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",maxWidth:340}}>
            {CHAT_SUGGESTED.map(s=><button key={s} onClick={()=>sendMsg(s)}
              style={{padding:"5px 12px",borderRadius:16,border:`1px solid ${T.bd}`,
                background:`${T.ac}12`,color:T.t2,fontSize:"0.72rem",cursor:"pointer",
                fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s"}}>{s}</button>)}
          </div>
        </div>}
        {msgs.map((m,i)=>{
          const isUser=m.role==="user";
          return <div key={i} style={{display:"flex",justifyContent:isUser?"flex-end":"flex-start",marginBottom:2}}>
            {!isUser&&<div style={{width:26,height:26,borderRadius:"50%",background:T.ac,
              display:"flex",alignItems:"center",justifyContent:"center",color:T.bg,
              fontSize:"0.6rem",fontFamily:SE,fontWeight:700,flexShrink:0,marginRight:7,marginTop:2}}>T</div>}
            <div style={{maxWidth:"80%",padding:"8px 12px",fontSize:"0.8rem",lineHeight:1.65,
              borderRadius:isUser?"14px 14px 4px 14px":"14px 14px 14px 4px",
              background:isUser?T.ac:T.b3,color:isUser?T.bg:T.tx,
              border:isUser?"none":`1px solid ${T.bd}`,wordBreak:"break-word"}}
              dangerouslySetInnerHTML={isUser?undefined:{__html:renderMd(m.content)}}>
              {isUser?m.content:undefined}
            </div>
          </div>;
        })}
        {loading&&<div style={{display:"flex",justifyContent:"flex-start",marginBottom:2}}>
          <div style={{width:26,height:26,borderRadius:"50%",background:T.ac,display:"flex",
            alignItems:"center",justifyContent:"center",color:T.bg,fontSize:"0.6rem",
            fontFamily:SE,fontWeight:700,flexShrink:0,marginRight:7}}>T</div>
          <div style={{padding:"10px 14px",borderRadius:"14px 14px 14px 4px",
            background:T.b3,border:`1px solid ${T.bd}`,display:"flex",gap:4,alignItems:"center"}}>
            {[0,1,2].map(j=><div key={j} style={{width:6,height:6,borderRadius:"50%",background:T.ac,
              animation:`tcChatBounce 1.2s ease-in-out ${j*0.15}s infinite`,opacity:0.5}}/>)}
          </div>
        </div>}
      </div>
      {/* Input */}
      <div style={{padding:"10px 14px",borderTop:`1px solid ${T.bd}`,background:T.b3,flexShrink:0}}>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}}
            onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}
            placeholder="Ask anything…" rows={1} style={IS}/>
          <button onClick={()=>sendMsg()} disabled={!input.trim()||loading}

              background:input.trim()&&!loading?T.ac:T.b2,
              color:input.trim()&&!loading?T.bg:T.t3,

            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
