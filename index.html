function $d(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function $p(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function $s(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function $w(d,ws=0){const r=new Date(d);const diff=(r.getDay()-ws+7)%7;r.setDate(r.getDate()-diff);return r;}
function $a(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function $m(y,m){return new Date(y,m+1,0).getDate();}
function $t(h,m){const p=h>=12?"PM":"AM";return`${h%12||12}:${String(m).padStart(2,"0")} ${p}`;}
function $td(d){return $s(d,new Date());}

function isCd(ds,sem){const c=PCAL[sem];if(!c)return false;if(ds<c.cs||ds>c.ce)return false;
  for(const[s,e]of c.brk)if(ds>=s&&ds<=e)return false;return true;}

// Generate recurring events from recurrence rule
function genRecurring(ev){
  if(!ev._recur||ev._recur.type==="none") return [ev];
  const r=ev._recur, results=[], base=$p(ev.date);
  let maxOcc=r.endAfter||365, endDate=r.endDate?$p(r.endDate):$a(base,730);
  let count=0;
  for(let d=new Date(base);d<=endDate&&count<maxOcc;){
    const ds=$d(d);
    let match=false;
    if(r.type==="daily") match=true;
    else if(r.type==="weekly") match=r.days?r.days.includes(d.getDay()):d.getDay()===base.getDay();
    else if(r.type==="monthly") match=d.getDate()===base.getDate();
    else if(r.type==="annually") match=d.getMonth()===base.getMonth()&&d.getDate()===base.getDate();
    else if(r.type==="weekdays") match=d.getDay()>=1&&d.getDay()<=5;
    else if(r.type==="custom"){
      if(r.unit==="day") match=true;
      else if(r.unit==="week") match=r.days?r.days.includes(d.getDay()):d.getDay()===base.getDay();
      else if(r.unit==="month") match=d.getDate()===base.getDate();
      else if(r.unit==="year") match=d.getMonth()===base.getMonth()&&d.getDate()===base.getDate();
    }
    if(match){results.push({...ev,id:gi(),date:ds,_recurParent:ev.id});count++;}
    // Advance
    if(r.type==="daily"||(r.type==="custom"&&r.unit==="day")) d=$a(d,r.every||1);
    else if(r.type==="weekly") d=$a(d,1);
    else if(r.type==="custom"&&r.unit==="week"){
      const next=$a(d,1);
      // If we've cycled through all days of the week, skip ahead
      if(next.getDay()===0&&r.every>1){d=$a(next,(r.every-1)*7);}else{d=next;}
    }
    else if(r.type==="monthly"||(r.type==="custom"&&r.unit==="month")){
      if(!match||count===0) d=$a(d,1);
      else{const n=new Date(d);n.setMonth(n.getMonth()+(r.every||1));d=n;}
    }
    else if(r.type==="annually"||(r.type==="custom"&&r.unit==="year")){
      if(!match) d=$a(d,1);
      else{const n=new Date(d);n.setFullYear(n.getFullYear()+(r.every||1));d=n;}
    }
    else if(r.type==="weekdays") d=$a(d,1);
    else d=$a(d,1);
  }
  return results;
}

}

function genCourseEv(course,sem){
  const cal=PCAL[sem];if(!cal)return[];
  const evs=[],start=$p(cal.cs),end=$p(cal.ce);
  const slots=[
    {key:"lec",label:"Lecture",days:"lecDays",sh:"lSH",sm:"lSM",eh:"lEH",em:"lEM",loc:"lecLoc",flag:true,sameKey:"lecSameTime",sameLocKey:"lecSameLoc",slotKey:"lecSlots"},
    {key:"prec",label:"Precept",days:"precDays",sh:"pSH",sm:"pSM",eh:"pEH",em:"pEM",loc:"precLoc",flag:"hasPrec",sameKey:"precSameTime",sameLocKey:"precSameLoc",slotKey:"precSlots"},
    {key:"lab",label:"Lab",days:"labDays",sh:"labSH",sm:"labSM",eh:"labEH",em:"labEM",loc:"labLoc",flag:"hasLab",sameKey:"labSameTime",sameLocKey:"labSameLoc",slotKey:"labSlots"},
    {key:"drill",label:"Drill",days:"drillDays",sh:"drSH",sm:"drSM",eh:"drEH",em:"drEM",loc:"drillLoc",flag:"hasDrill",sameKey:"drillSameTime",sameLocKey:"drillSameLoc",slotKey:"drillSlots"},
  ];
  for(let d=new Date(start);d<=end;d=$a(d,1)){
    const ds=$d(d);if(!isCd(ds,sem))continue;
    const dow=d.getDay();
    for(const sl of slots){
      if(sl.flag!==true&&!course[sl.flag])continue;
      if(course[sl.days]?.includes(dow)){
        // Skip cancelled occurrences
        if((course._cancelled||[]).some(c=>c.date===ds&&c.type===sl.key))continue;
        const isSame=course[sl.sameKey]!==false;
        const isSameLoc=course[sl.sameLocKey]!==false;
        let sH=course[sl.sh],sM=course[sl.sm],eH=course[sl.eh],eM=course[sl.em];
        let loc=course[sl.loc]||"";
        const daySlots=course[sl.slotKey]||[];
        const ds2=daySlots.find(s=>s.days&&s.days.includes(dow));
        if(!isSame&&ds2){sH=ds2.sH??sH;sM=ds2.sM??sM;eH=ds2.eH??eH;eM=ds2.eM??eM;}
        if(!isSameLoc&&ds2&&ds2.loc!==undefined){loc=ds2.loc;}
        evs.push({id:gi(),title:course.name+" — "+sl.label,category:course.id,date:ds,
          startHour:sH,startMin:sM,endHour:eH,endMin:eM,
          detail:"",location:loc,_courseId:course.id,_type:sl.key});
      }
    }
  }
  return evs;
}

// Per-user storage keys: "tiger_calendar_v3:uid_XXX" for signed-in, "tiger_calendar_v3:guest" for guest
// The legacy keyless SK is only read once for migration, never written to again.
function ldForUser(uid){
  const key=uid?`${SK}:uid_${uid}`:`${SK}:guest`;
  try{const r=localStorage.getItem(key);if(r)return JSON.parse(r);}catch(e){}
  // One-time migration: if user has no per-user data yet, try the legacy shared key
  // but only migrate if it looks like it belongs to them (has a _uid field matching, or no _uid at all)
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);
    if(!d._uid||d._uid===uid){localStorage.setItem(key,JSON.stringify({...d,_uid:uid}));return d;}}}catch(e){}
  return null;}
function svForUser(uid,d){
  const key=uid?`${SK}:uid_${uid}`:`${SK}:guest`;
  try{localStorage.setItem(key,JSON.stringify({...d,_uid:uid}));}catch(e){}}
function clearUserStorage(uid){
  if(!uid)return;
  try{localStorage.removeItem(`${SK}:uid_${uid}`);}catch(e){}}
// Keep legacy ld/sv pointing to guest slot for any code that calls them without uid context
function ld(){return ldForUser(null);}
function sv(d){svForUser(null,d);}

// ═══ FIREBASE AUTH & SYNC HOOKS ═══
function useFirebaseAuth(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(!!FB_AUTH);
  const[isGuest,setIsGuest]=useState(()=>!!localStorage.getItem("tc_guest"));
  useEffect(()=>{if(!FB_AUTH){setLoading(false);return;}
    const unsub=FB_AUTH.onAuthStateChanged(u=>{
      setUser(u);setLoading(false);
      if(u)setIsGuest(false); // signed-in user overrides guest mode
    });
    return unsub;
  },[]);
  const signInGoogle=async()=>{if(!FB_AUTH)return;const provider=new firebase.auth.GoogleAuthProvider();
    try{await FB_AUTH.signInWithPopup(provider);}catch(e){if(e.code==="auth/popup-blocked")await FB_AUTH.signInWithRedirect(provider);}};
  const signInEmail=async(email,password)=>{if(!FB_AUTH)throw new Error("Auth not available");
    await FB_AUTH.signInWithEmailAndPassword(email,password);};
  const signUpEmail=async(email,password)=>{if(!FB_AUTH)throw new Error("Auth not available");
    await FB_AUTH.createUserWithEmailAndPassword(email,password);};
  const continueAsGuest=()=>{localStorage.setItem("tc_guest","1");setIsGuest(true);};
  const signOut=async(uid)=>{
    // Clear guest storage on guest sign-out
    if(!uid){try{localStorage.removeItem(`${SK}:guest`);}catch(e){}}
    localStorage.removeItem("tc_guest");setIsGuest(false);
    if(FB_AUTH&&user)await FB_AUTH.signOut();};
  // signIn kept for backward compat
  const signIn=signInGoogle;
  return{user,loading,isGuest,signIn,signInGoogle,signInEmail,signUpEmail,continueAsGuest,signOut};
}

function useFirestoreSync(user,localData,setters){
  // syncRef: true while applying incoming cloud data — blocks outbound upload
  const syncRef=useRef(false);
  // cloudReadyRef: stays false until the initial Firestore fetch resolves.
  // ALL uploads are blocked until this flips true, preventing a blank local
  // state on a fresh device from overwriting existing cloud data.
  const cloudReadyRef=useRef(false);
  const debounceRef=useRef(null);
  const localDataRef=useRef(localData);
  const lastUploadTs=useRef(0); // track the _ts of the last upload we sent

  useEffect(()=>{localDataRef.current=localData;});

  function applyCloud(cloud,isInitial){
    syncRef.current=true;
    // Seed events with only the truly user-created events.
    // All derived events (_taskDueId, _ohId, course schedule, academic, holidays)
    // are regenerated automatically by their respective useEffects when tasks/
    // officeHours/courses/exams/assignments update below.
    // HOWEVER: sem and showHolidays useEffects only fire when those deps change.
    // If the cloud sem/showHolidays match the current values, academic/holiday
    // events won't be regenerated. So we must preserve them from current state
    // when stripping derived events from cloud data.
    if(cloud.events){
      const cloudUserEvents=cloud.events.filter(e=>
        !e._taskDueId&&!e._ohId&&
        !(e._courseId&&!e._examId&&!e._studyBlock)&&
        e.category!=="_academic"&&e.category!=="_holidays"
      );
      setters.setEv(prev=>{
        // Keep existing academic + holiday events from current state
        const existingAcad=prev.filter(e=>e.category==="_academic");
        const existingHol=prev.filter(e=>e.category==="_holidays");
        return[...cloudUserEvents,...existingAcad,...existingHol];
      });
    }
    if(cloud.tasks)setters.setTk(cloud.tasks);
    if(cloud.courses)setters.setCo(cloud.courses);
    if(cloud.cats)setters.setCats(cloud.cats);
    if(cloud.sem)setters.setSem(cloud.sem);
    if(cloud.theme)setters.setTheme(cloud.theme);
    if(cloud.settings)setters.setSettings(cloud.settings);
    if(cloud.exams)setters.setExams(cloud.exams);
    if(cloud.assignments)setters.setAssignments(cloud.assignments);
    if(cloud.officeHours)setters.setOfficeHours(cloud.officeHours);
    if(cloud.showHolidays!==undefined)setters.setShowHolidays(cloud.showHolidays);
    // After initial cloud load, prompt course setup if user has no courses
    if(isInitial&&(!cloud.courses||cloud.courses.length===0)&&setters.setCsOpen)setters.setCsOpen(true);
    sv(cloud);
    // Wait for React to flush all state updates before re-enabling uploads
    setTimeout(()=>{syncRef.current=false;if(isInitial)cloudReadyRef.current=true;},300);
  }

  useEffect(()=>{
    if(!FB_DB||!user){cloudReadyRef.current=false;return;}
    cloudReadyRef.current=false; // block uploads immediately on sign-in
    const docRef=FB_DB.collection("calendars").doc(user.uid);
    docRef.get().then(snap=>{
      if(snap.exists){
        // Cloud has data — always prefer cloud on initial load
        applyCloud(snap.data(),true);
      } else {
        // Brand new account — start with a clean slate, do NOT seed from localStorage
        // (localStorage may contain a previous user's data)
        const empty={events:[],tasks:[],courses:[],cats:{...BCAT},sem:"spring-2026",
          theme:"light",showHolidays:true,
          settings:{weekStart:0,timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone,hourFormat:"12"},
          exams:[],assignments:[],officeHours:[]};
        applyCloud(empty,true);
      }
    }).catch(e=>{
      console.warn("Firestore read error:",e);
      cloudReadyRef.current=true; // unblock on error so app remains usable
    });

    const unsub=docRef.onSnapshot(snap=>{
      if(!snap.exists||syncRef.current||!cloudReadyRef.current)return;
      const cloud=snap.data();
      if(!cloud._ts)return;
      const localTs=lastUploadTs.current||0;
      // Only apply if cloud is meaningfully newer (500ms buffer avoids echo)
      if(cloud._ts>localTs+500)applyCloud(cloud,false);
    });
    return unsub;
  },[user]);

  const upload=useCallback((data)=>{
    if(!FB_DB||!user||syncRef.current||!cloudReadyRef.current)return;
    if(data._ts)lastUploadTs.current=data._ts;
    clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(()=>{uploadToFirestore(user.uid,data);},1500);
  },[user]);

  return{upload};
}

function uploadToFirestore(uid,data){
  if(!FB_DB||!uid)return;
  const ts=Date.now();
  const clean={...data,_ts:ts};
  // Use set() WITHOUT merge so deletions are fully written (not merged back in)
  FB_DB.collection("calendars").doc(uid).set(clean).catch(e=>console.warn("Firestore write error:",e));
}

  const syncSetters=useMemo(()=>({setEv,setTk:setTk,setCo,setCats,setSem,setTheme,setSettings,setExams,setAssignments,setOfficeHours,setShowHolidays,setCsOpen}),[]);
  // Derived events are always regenerated from their source data (tasks, officeHours, courses, PCAL).
  // Never persist them — doing so causes duplicates on reload and stale data across devices.
  const persistableEvents=useMemo(()=>events.filter(e=>
    !e._taskDueId &&                              // regenerated from tasks
    !e._ohId &&                                   // regenerated from officeHours
    !(e._courseId&&!e._examId&&!e._studyBlock) && // regenerated from courses (keep exam+study blocks)
    e.category!=="_academic" &&                   // regenerated from PCAL
    e.category!=="_holidays"                      // regenerated from US_HOLIDAYS
  ),[events]);
  // Task-due shadow events — computed fresh every render from tasks, never persisted.
  // Compute task-due shadow events and merge with real events every render.
  // Deliberately NOT memoized — avoids any staleness/ordering issues with React batching.
  const _taskDueEvs=tasks.filter(t=>t.hasDueTime&&t.date&&!t.done&&t.dueHour!=null).map(t=>{
    const dH=+(t.dueHour),dM=+(t.dueMin||0);

    const endMins=dH*60+dM;

    const sH=Math.floor(startMins/60),sM=startMins%60;
    return{id:"td_"+t.id,title:"📌 "+t.title,date:t.date,category:t.category,
      startHour:sH,startMin:sM,endHour:dH,endMin:dM,
      detail:t.detail||"",_taskDueId:t.id,_allDay:false};
  });
  const allEvents=[...events.filter(e=>!e._taskDueId),..._taskDueEvs];
  const{upload}=useFirestoreSync(user,{events:persistableEvents,tasks,courses,cats,sem,theme,showHolidays,settings,exams,assignments,officeHours},syncSetters);

  useEffect(()=>{setAc(p=>{const n=new Set(p);Object.keys(cats).forEach(k=>n.add(k));n.add("_holidays");n.add("_officehours");return n;});},[cats]);

  },[persistableEvents,tasks,courses,cats,sem,theme,showHolidays,settings,exams,assignments,officeHours,user]);



  const ACCENTS={
    purple:{l:"#5c4db3",ld:"#8b7fd4",d:"#c8b8ff",dd:"#9b8ee0",tbl:"rgba(92,77,179,0.06)",tbd:"rgba(200,184,255,0.08)"},

    rose:  {l:"#b31a4a",ld:"#d45a80",d:"#ffb0c8",dd:"#d45a80",tbl:"rgba(179,26,74,0.06)",tbd:"rgba(255,176,200,0.08)"},
  };
  const isDark=theme.startsWith("dark");

  const acc=ACCENTS[accentKey]||ACCENTS.purple;
  // Helper: blend hex color toward white (light) or black (dark)
  const blendHex=(hex,amt)=>{// amt: positive = lighter, negative = darker
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    const t=amt>0?255:0,f=Math.abs(amt);
    const nr=Math.round(r+(t-r)*f),ng=Math.round(g+(t-g)*f),nb=Math.round(b+(t-b)*f);
    return`#${nr.toString(16).padStart(2,"0")}${ng.toString(16).padStart(2,"0")}${nb.toString(16).padStart(2,"0")}`;};
  const customBg=settings?.customBg||null;
  const baseLight=customBg||"#f5f3ef";
  const baseDark=isDark?(customBg?blendHex(customBg,-0.85):"#0d0d0f"):"#0d0d0f";
  const T=isDark?{bg:baseDark,b2:blendHex(baseDark,0.06),b3:blendHex(baseDark,0.12),bd:"#2a2a32",tx:"#e8e6f0",t2:"#9896a8",t3:"#5a5868",
    ac:acc.d,a2:acc.dd,mb:blendHex(baseDark,0.08),ov:"rgba(0,0,0,0.65)",ib:blendHex(baseDark,0.04),ibd:"#2a2a32",
    tb:acc.tbd,nl:acc.d,dg:"#ff6b6b"}:
    {bg:baseLight,b2:blendHex(baseLight,-0.04),b3:customBg?blendHex(baseLight,0.5):"#ffffff",bd:blendHex(baseLight,-0.12),tx:"#1a1820",t2:"#6b6578",t3:"#aaa5b5",
    ac:acc.l,a2:acc.ld,mb:customBg?blendHex(baseLight,0.3):"#ffffff",ov:"rgba(0,0,0,0.35)",ib:baseLight,ibd:blendHex(baseLight,-0.12),
    tb:acc.tbl,nl:acc.l,dg:"#d94f4f"};

  const goT=()=>setCd(new Date());
  const navDate=(base,dir)=>{const d=new Date(base);
    if(view==="day")d.setDate(d.getDate()+dir);
    else if(view==="week")d.setDate(d.getDate()+dir*7);
    else if(view==="month")d.setMonth(d.getMonth()+dir);
    else d.setFullYear(d.getFullYear()+dir);return d;};
  const nav=(dir)=>setCd(navDate(cd,dir));

  useEffect(()=>{const h=(e)=>{
    if((e.metaKey||e.ctrlKey)&&e.key==="z"&&!e.shiftKey){e.preventDefault();undo();return;}
    if(modal||csOpen||settingsOpen||eaOpen)return;if(["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName))return;
    switch(e.key){case"t":case"T":goT();break;case"d":case"D":setView("day");break;
    case"w":case"W":setView("week");break;case"m":case"M":setView("month");break;
    case"y":case"Y":setView("year");break;case"s":case"S":setView("schedule");break;case"ArrowLeft":nav(-1);break;case"ArrowRight":nav(1);break;

  // Push snapshot to undo stack before any mutation
  const pushUndo=useCallback(()=>{

    undoStackRef.current=undoStackRef.current.slice(1);
    setEv(prev.events);setTk(prev.tasks);setExams(prev.exams);setAssignments(prev.assignments);if(prev.officeHours)setOfficeHours(prev.officeHours);

      if(ev._courseId&&ev._type&&!ev._examId&&!ev._studyBlock&&!ev._ohId){

          <Sidebar T={T} m={sbM} sm={setSbM} tasks={tasks} events={allEvents} cats={cats}
            ac={ac} tC={tC} tT={tT} dT={dT} setModal={setModal} cd={cd} setCd={setCd}

        onTouchStart={e=>{

            swipeRef.current={startX:e.touches[0].clientX,startY:e.touches[0].clientY,startTime:Date.now(),active:false,locked:false,axis:null};}}}
        onTouchMove={e=>{
          const sw=swipeRef.current;if(!sw)return;

          if(!sw.locked){

            if(sw.axis==="h")_swipeNavActive=true;

          sw.active=true;

          _swipeNavActive=false;
          const sw=swipeRef.current;swipeRef.current=null;

          const rawDx=e.changedTouches[0].clientX-sw.startX;

// ═══ SIDEBAR ═══
function Sidebar({T,m,sm,tasks,events,cats,ac,tC,tT,dT,setModal,cd,setCd,mcM,setMcM,MO,SE,insights,showHolidays,setShowHolidays,weekStart=0,assignments=[],exams=[],undo}){

// ═══ TIME GRID ═══
// TGSwipe: owns ONE scrollRef, ONE time gutter, and slides only the day-column panels.
// This means the time gutter never moves and horizontal grid lines are perfectly continuous.
function TGSwipe({T,panels,events,tasks,cats,ac,setModal,modal,MO,SE,drag,setDrag,swipeDx,swiping,sharedScrollRef}){
  const scrollRef=useRef(null);
  const[hh,setHh]=useState(HH);
  const[nowP,setNowP]=useState(null);
  const pinchRef=useRef(null);
  const longPressRef=useRef(null);
  const touchDragRef=useRef(null);
  const[,setTDA]=useState(false); // touchDragActive — triggers re-render for cursor style

  useEffect(()=>{const u=()=>{const n=new Date();setNowP(n.getHours()*hh+(n.getMinutes()/60)*hh);};u();const iv=setInterval(u,60000);return()=>clearInterval(iv);},[hh]);

  // Init + sync shared scroll position
  useEffect(()=>{
    if(!scrollRef.current)return;
    const el=scrollRef.current;
    const top=(sharedScrollRef?.current!=null)?sharedScrollRef.current:7*hh;
    el.scrollTop=top;
    if(sharedScrollRef&&sharedScrollRef.current==null)sharedScrollRef.current=top;
  },[]);

  useEffect(()=>{
    const el=scrollRef.current;if(!el)return;
    const h=()=>{if(!swiping&&sharedScrollRef)sharedScrollRef.current=el.scrollTop;};
    el.addEventListener("scroll",h,{passive:true});return()=>el.removeEventListener("scroll",h);
  },[swiping,sharedScrollRef]);

  // Pinch-to-zoom on the scroll container
  // Uses a CSS scaleY transform during the pinch for smooth 60fps visual feedback,
  // then commits the new hh to React state only on touchend to avoid per-frame re-renders.
  const hhRef=useRef(hh); // always reflects latest committed hh
  useEffect(()=>{hhRef.current=hh;},[hh]);

  useEffect(()=>{
    const el=scrollRef.current;if(!el)return;
    // The inner content div that we'll transform during pinch
    const inner=el.querySelector('[data-timegrid-inner]');

    const onTS=(e)=>{
      if(e.touches.length===2&&!_swipeNavActive){
        e.preventDefault();
        // Cancel any pending long-press or drag — second finger means pinch, not tap
        if(longPressRef.current?.timer)clearTimeout(longPressRef.current.timer);
        longPressRef.current=null;
        touchDragRef.current=null;
        setDrag(null);
        const midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
        const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        const currentHh=hhRef.current;
        const anchorRatio=(el.scrollTop+(midY-el.getBoundingClientRect().top))/(currentHh*24);
        pinchRef.current={dist,hh:currentHh,anchorRatio,midY,liveHh:currentHh};
      }
    };

    const onTM=(e)=>{
      if(e.touches.length===2&&pinchRef.current&&!_swipeNavActive){
        e.preventDefault();
        const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        const raw=pinchRef.current.hh*d/pinchRef.current.dist;
        const newHh=Math.max(30,Math.min(150,raw));
        pinchRef.current.liveHh=newHh;
        // Anchor-preserving scroll: reposition so the pinch midpoint stays on the same time
        const{anchorRatio,midY}=pinchRef.current;
        const rect=el.getBoundingClientRect();
        const newScrollTop=anchorRatio*newHh*24-(midY-rect.top);
        el.scrollTop=Math.max(0,newScrollTop);
        // Commit to state — React batches this efficiently in React 18
        setHh(Math.round(newHh));
      }
    };

    const onTE=(e)=>{
      if(pinchRef.current){
        // Commit final snapped value
        const finalHh=Math.round(Math.max(30,Math.min(150,pinchRef.current.liveHh)));
        setHh(finalHh);
        pinchRef.current=null;
      }
    };

    el.addEventListener("touchstart",onTS,{passive:false});
    el.addEventListener("touchmove",onTM,{passive:false});
    el.addEventListener("touchend",onTE);
    el.addEventListener("touchcancel",onTE);
    return()=>{
      el.removeEventListener("touchstart",onTS);
      el.removeEventListener("touchmove",onTM);
      el.removeEventListener("touchend",onTE);
      el.removeEventListener("touchcancel",onTE);
    };
  },[]);

        }
      }

    };
    const onTE=(e)=>{
      // If we're finishing a pinch, don't treat it as a tap/drag end

      const td=touchDragRef.current,lp=longPressRef.current,didScroll=lp?.scrolled||false;

      if(!td&&!lp){setDrag(null);return;}
      if(td&&td.moved){
        let{date,sH,sM,eH,eM}=td;if(sH>eH||(sH===eH&&sM>=eM))[sH,sM,eH,eM]=[eH,eM,sH,sM];
        if(eH-sH===0&&eM-sM<15)eM=sM+30;setDrag(null);
        setModal({type:"event",date,prefill:{startHour:sH,startMin:sM%60,endHour:eH,endMin:eM%60},noAutoFocus:true});
      } else if(lp&&!lp.active&&!didScroll){
        setDrag(null);setModal({type:"_tapPreview",date:lp.ds,sH:lp.sH,sM:lp.sM,eH:lp.sH,eM:lp.sM+60});
      } else setDrag(null);
    };
    el.addEventListener("touchmove",onTM,{passive:false});el.addEventListener("touchend",onTE);el.addEventListener("touchcancel",onTE);

  },[clientYToHour,cancelLP,setDrag,setModal]);

  const layoutEvents=(evs)=>{
    if(!evs.length)return[];
    const sorted=[...evs].sort((a,b)=>(a.startHour*60+(a.startMin||0))-(b.startHour*60+(b.startMin||0)));
    const overlaps=(a,b)=>{const as=a.startHour*60+(a.startMin||0),ae=a.endHour*60+(a.endMin||0),bs=b.startHour*60+(b.startMin||0),be=b.endHour*60+(b.endMin||0);return as<be&&bs<ae;};
    const clusters=[];const visited=new Set();
    sorted.forEach((_,i)=>{
      if(visited.has(i))return;
      const cluster=[i];visited.add(i);
      for(let k=0;k<cluster.length;k++){sorted.forEach((_,j)=>{if(!visited.has(j)&&overlaps(sorted[cluster[k]],sorted[j])){cluster.push(j);visited.add(j);}});}
      clusters.push(cluster);
    });
    const result=sorted.map(ev=>({...ev,_col:0,_totalCols:1}));
    clusters.forEach(cluster=>{
      const colEnds=[];
      cluster.forEach(i=>{
        const s=sorted[i].startHour*60+(sorted[i].startMin||0),e=sorted[i].endHour*60+(sorted[i].endMin||0);
        let col=colEnds.findIndex(end=>end<=s);if(col===-1){col=colEnds.length;colEnds.push(0);}colEnds[col]=e;
        result[i]._col=col;
      });
      const totalCols=colEnds.length;
      cluster.forEach(i=>{result[i]._totalCols=totalCols;});
    });
    return result;
  };

  const mousePendingRef=useRef(null);
  const mD=(e,ds)=>{if(e.button!==0||e.target.closest("[data-ev]"))return;
    const h=clientYToHour(e.clientY),sH=Math.floor(h),sM=Math.round((h-sH)*60/15)*15;
    mousePendingRef.current={date:ds,sH,sM,startY:e.clientY,startX:e.clientX};};
  const mM=(e)=>{
    if(drag?.active){const h=clientYToHour(e.clientY),eH=Math.floor(h),eM=Math.round((h-eH)*60/15)*15;setDrag(p=>({...p,eH,eM}));return;}
    const mp=mousePendingRef.current;if(!mp)return;
    if(Math.abs(e.clientY-mp.startY)>6||Math.abs(e.clientX-mp.startX)>6){mousePendingRef.current=null;setDrag({date:mp.date,sH:mp.sH,sM:mp.sM,eH:mp.sH,eM:mp.sM+30,active:true});}};
  const mU=()=>{mousePendingRef.current=null;if(!drag?.active)return;
    let{date,sH,sM,eH,eM}=drag;if(sH>eH||(sH===eH&&sM>=eM))[sH,sM,eH,eM]=[eH,eM,sH,sM];
    if(eH-sH===0&&eM-sM<15)eM=sM+30;setDrag(null);
    setModal({type:"event",date,prefill:{startHour:sH,startMin:sM%60,endHour:eH,endMin:eM%60}});};
  const tSD=useCallback((e,ds)=>{
    if(e.touches.length!==1||pinchRef.current||e.target.closest("[data-ev]")||_swipeNavActive)return;

      longPressRef.current={...longPressRef.current,active:true};
      if(navigator.vibrate)navigator.vibrate(30);

      setTDA(true);setDrag({date:ds,sH,sM,eH:sH,eM:sM+60,active:true,isTouchDrag:true});

  },[clientYToHour,cancelLP,setDrag]);

  const slideStyle={display:"flex",width:"300%",height:"100%",
    transform:`translateX(calc(-33.333% + ${swipeDx}px))`,
    transition:swipeDx===0?"transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)":"none",
    willChange:"transform"};

  // Build all-day data for each panel
  const panelAD=panels.map(({key,dates})=>{
    const ad=dates.map(d=>{const ds=$d(d);return{d,
      ad:events.filter(x=>x._allDay&&x.date===ds&&ac.has(x.category)),
      tk:tasks.filter(x=>x.date===ds&&ac.has(x.category))};});
    return{key,dates,ad,hasAD:ad.some(x=>x.ad.length>0||x.tk.length>0)};
  });
  const anyAD=panelAD.some(p=>p.hasAD);

  return <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}} onMouseMove={mM} onMouseUp={mU} onMouseLeave={()=>drag?.active&&!drag?.isTouchDrag&&mU()}>

    {/* ── STICKY HEADER: fixed gutter spacer + sliding day-name strip ── */}
    <div style={{flexShrink:0,background:T.b2,borderBottom:`1px solid ${T.bd}`,zIndex:10,display:"flex",position:"relative"}}>
      <div style={{width:48,flexShrink:0}}/>
      <div style={{flex:1,overflow:"hidden"}}>
        <div style={slideStyle}>
          {panelAD.map(({key,dates,ad,hasAD})=>
            <div key={key} style={{width:"33.333%",flexShrink:0}}>
              <div style={{display:"flex"}}>
                {dates.map(d=>{const it=$td(d);return <div key={$d(d)} style={{flex:1,padding:"4px 4px 2px",textAlign:"center",background:it?T.tb:"transparent"}}>
                  <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase"}}>{DN[d.getDay()]}</div>
                  <div style={{fontFamily:SE,fontSize:"1.1rem",color:it?T.ac:T.tx,fontWeight:it?700:400}}>{d.getDate()}</div>
                </div>;})}
              </div>
              {anyAD&&(()=>{
                // Separate multi-day spanning events from single-day events
                const allEventsInPanel=[];
                ad.forEach(({d,ad:dA})=>dA.forEach(ev=>{if(!allEventsInPanel.find(x=>x.id===ev.id))allEventsInPanel.push(ev);}));
                const multiDay=allEventsInPanel.filter(ev=>ev._multiDay&&ev._mdStart&&ev._mdEnd);

  const hO=HOURS.map(h=><option key={h} value={h}>{$t(h,0).replace(":00 "," ")}</option>);
  const mO=[0,5,10,15,20,25,30,35,40,45,50,55].map(m=><option key={m} value={m}>{String(m).padStart(2,"0")}</option>);

  const DB=(cid,f)=><div style={{display:"flex",gap:2}}>
    {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>{const c=cl.find(x=>x.id===cid);const a=c?.[f]?.includes(i);
      return <button key={d} onClick={()=>td(cid,f,i)} style={{width:26,height:22,border:`1px solid ${a?T.ac:T.bd}`,borderRadius:3,cursor:"pointer",
        fontFamily:MO,fontSize:"0.46rem",background:a?`${T.ac}30`:"transparent",color:a?T.ac:T.t3}}>{d}</button>;})}</div>;

  const TS=(cid,pre)=>{const c=cl.find(x=>x.id===cid);return <div style={{display:"flex",gap:3,alignItems:"center"}}>
    <select value={c[pre+"SH"]} onChange={e=>up(cid,pre+"SH",+e.target.value)} style={{...SS,width:72}}>{hO}</select>
    <MinPick value={c[pre+"SM"]} onChange={v=>up(cid,pre+"SM",v)}/>
    <span style={{color:T.t3,fontSize:"0.6rem"}}>–</span>
    <select value={c[pre+"EH"]} onChange={e=>up(cid,pre+"EH",+e.target.value)} style={{...SS,width:72}}>{hO}</select>
    <MinPick value={c[pre+"EM"]} onChange={v=>up(cid,pre+"EM",v)}/>
  </div>;};

  const Tog=({cid,field,label})=>{const c=cl.find(x=>x.id===cid);return <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:c[field]?5:0,marginTop:4}}>
    <div onClick={()=>up(cid,field,!c[field])} style={{width:32,height:16,background:c[field]?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer"}}>
      <div style={{width:10,height:10,background:c[field]?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:c[field]?18:3,transition:"left 0.2s"}}/></div>
    <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2,letterSpacing:"0.06em",textTransform:"uppercase"}}>{label}</span>
  </div>;};

  const DAY_NAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Per-slot time selector for custom schedules
  const SlotTS=(cid,slotKey,sameTimeKey,sameLocKey,daysKey,pre,defaultLoc)=>{
    const c=cl.find(x=>x.id===cid);
    if(!c)return null;
    const isSame=c[sameTimeKey]!==false;
    const isSameLoc=sameLocKey?c[sameLocKey]!==false:true;
    const days=c[daysKey]||[];
    // Group days that share the same time into slots
    const slots=c[slotKey]||[];
    const getSlot=(day)=>slots.find(s=>s.days.includes(day));
    const updateSlotTime=(day,field,val)=>{
      setCl(p=>p.map(co=>{
        if(co.id!==cid)return co;
        let sl=[...(co[slotKey]||[])];
        const idx=sl.findIndex(s=>s.days.includes(day));
        if(idx>=0){sl[idx]={...sl[idx],[field]:val};}
        else{sl.push({days:[day],sH:co[pre+"SH"],sM:co[pre+"SM"],eH:co[pre+"EH"],eM:co[pre+"EM"],[field]:val});}
        return{...co,[slotKey]:sl};
      }));
    };
    const getDayVal=(day,field,fallbackPre)=>{
      const s=getSlot(day);
      if(s&&s[field]!==undefined)return s[field];
      return c[fallbackPre+field.charAt(0).toUpperCase()+field.slice(1)]??c[fallbackPre+(field==="sH"?"SH":field==="sM"?"SM":field==="eH"?"EH":"EM")];
    };
    return <div>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,marginTop:2}}>
        <div onClick={()=>up(cid,sameTimeKey,!isSame)} style={{width:28,height:15,background:isSame?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer"}}>
          <div style={{width:9,height:9,background:isSame?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:isSame?16:2,transition:"left 0.2s"}}/></div>
        <span style={{fontFamily:MO,fontSize:"0.48rem",color:T.t2,letterSpacing:"0.05em"}}>Same time every day</span>
      </div>
      {sameLocKey&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,marginTop:0}}>
        <div onClick={()=>up(cid,sameLocKey,!isSameLoc)} style={{width:28,height:15,background:isSameLoc?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer"}}>
          <div style={{width:9,height:9,background:isSameLoc?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:isSameLoc?16:2,transition:"left 0.2s"}}/></div>
        <span style={{fontFamily:MO,fontSize:"0.48rem",color:T.t2,letterSpacing:"0.05em"}}>Same location every day</span>
      </div>}
      {isSame?TS(cid,pre):
        <div style={{marginTop:3}}>
          {days.sort((a,b)=>a-b).map(day=>{
            const slotLoc=(()=>{const s=getSlot(day);return s?.loc!==undefined?s.loc:defaultLoc||"";})();
            return <div key={day} style={{marginBottom:4,padding:"6px 6px",background:T.b2,borderRadius:5,border:`1px solid ${T.bd}`}}>
              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:isSameLoc?0:4}}>
                <span style={{fontFamily:MO,fontSize:"0.46rem",color:T.ac,width:22,textAlign:"center",letterSpacing:"0.04em"}}>{DAY_NAMES[day]}</span>
                <select value={getDayVal(day,"sH",pre)} onChange={e=>updateSlotTime(day,"sH",+e.target.value)} style={{...SS,width:64,fontSize:"0.7rem",padding:"2px 3px"}}>{hO}</select>
                <MinPick value={getDayVal(day,"sM",pre)} onChange={v=>updateSlotTime(day,"sM",v)}/>
                <span style={{color:T.t3,fontSize:"0.55rem"}}>–</span>
                <select value={getDayVal(day,"eH",pre)} onChange={e=>updateSlotTime(day,"eH",+e.target.value)} style={{...SS,width:64,fontSize:"0.7rem",padding:"2px 3px"}}>{hO}</select>
                <MinPick value={getDayVal(day,"eM",pre)} onChange={v=>updateSlotTime(day,"eM",v)}/>
              </div>
              {!isSameLoc&&<input value={slotLoc} onChange={e=>updateSlotTime(day,"loc",e.target.value)}
                placeholder="Location for this day" style={{...IS,width:"100%",fontSize:"0.7rem",padding:"2px 6px",marginTop:2}}/>}
            </div>;})}
          {days.length===0&&<div style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3,padding:"4px 0"}}>Select days above first</div>}
        </div>}
    </div>;
  };

  const Section=({cid,flag,dayF,timePre,locF,label,sameTimeKey,sameLocKey,slotKey})=>{const c=cl.find(x=>x.id===cid);if(!c[flag])return null;
    return <>
      <div style={{marginBottom:5,marginTop:3}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>{label} Days</label>{DB(cid,dayF)}</div>
      <div style={{marginBottom:4}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>{label} Time</label>{SlotTS(cid,slotKey,sameTimeKey,sameLocKey,dayF,timePre,c[locF])}</div>
      <div style={{marginBottom:4}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>{label} Location</label>
        <input value={c[locF]||""} onChange={e=>up(cid,locF,e.target.value)} placeholder="e.g. McCosh 50" style={{...IS,width:"100%"}}/></div>
    </>;};

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:T.ov,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:14}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.mb,border:`1px solid ${T.bd}`,borderRadius:14,
      padding:20,width:"100%",maxWidth:560,maxHeight:"88vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{fontFamily:SE,fontSize:"1.2rem",color:T.tx,marginBottom:12}}>Course Setup</div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",gap:5}}>
          {Object.entries(PCAL).map(([k,c])=><button key={k} onClick={()=>setSem(k)} style={{flex:1,padding:"5px 0",border:"none",borderRadius:5,cursor:"pointer",
            fontFamily:MO,fontSize:"0.6rem",letterSpacing:"0.06em",textTransform:"uppercase",
            background:sem===k?T.ac:T.b3,color:sem===k?T.bg:T.t3}}>{c.label}</button>)}
        </div>
      </div>
      {cl.map((c,ci)=><div key={c.id} style={{border:`1px solid ${T.bd}`,borderRadius:7,padding:10,marginBottom:7,
        background:T.b3,borderLeft:`4px solid ${CC[ci%CC.length].c}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,gap:6}}>
          {/* Color swatch picker */}
          <div style={{position:"relative",flexShrink:0}}>
            <div style={{width:20,height:20,borderRadius:"50%",background:c.color||"#ff8c69",cursor:"pointer",border:`2px solid ${T.bd}`,boxSizing:"border-box"}}
              onClick={()=>up(c.id,"_showColorPicker",!c._showColorPicker)}/>
            {c._showColorPicker&&<div style={{position:"absolute",top:26,left:0,zIndex:20,background:T.mb,border:`1px solid ${T.bd}`,borderRadius:8,padding:6,boxShadow:"0 4px 16px rgba(0,0,0,0.2)",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4,width:120}}>
              {AUTO_CC.map(col=><div key={col} onClick={()=>{up(c.id,"color",col);up(c.id,"_showColorPicker",false);}}
                style={{width:18,height:18,borderRadius:"50%",background:col,cursor:"pointer",
                  border:`2px solid ${col===c.color?"#fff":"transparent"}`,outline:col===c.color?`2px solid ${col}`:"none",boxSizing:"border-box"}}/>)}
            </div>}
          </div>
          <input value={c.name} onChange={e=>up(c.id,"name",e.target.value)} placeholder="Course (e.g. MAT 217)"
            style={{...IS,flex:1,fontWeight:600}}/>
          <button onClick={()=>rm(c.id)} style={{background:"transparent",border:"none",color:T.dg,cursor:"pointer",fontSize:"0.9rem",marginLeft:2}}>✕</button>
        </div>
        <div style={{marginBottom:5}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>Lecture Days</label>{DB(c.id,"lecDays")}</div>
        <div style={{marginBottom:4}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>Lecture Time</label>{SlotTS(c.id,"lecSlots","lecSameTime","lecSameLoc","lecDays","l",c.lecLoc)}</div>
        <div style={{marginBottom:6}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>Lecture Location</label>
          <input value={c.lecLoc||""} onChange={e=>up(c.id,"lecLoc",e.target.value)} placeholder="e.g. Fine Hall 214" style={{...IS,width:"100%"}}/></div>
        {Tog({cid:c.id, field:"hasPrec", label:"Has Precept"})}
        {Section({cid:c.id, flag:"hasPrec", dayF:"precDays", timePre:"p", locF:"precLoc", label:"Precept", sameTimeKey:"precSameTime", sameLocKey:"precSameLoc", slotKey:"precSlots"})}
        {Tog({cid:c.id, field:"hasLab", label:"Has Lab"})}
        {Section({cid:c.id, flag:"hasLab", dayF:"labDays", timePre:"lab", locF:"labLoc", label:"Lab", sameTimeKey:"labSameTime", sameLocKey:"labSameLoc", slotKey:"labSlots"})}
        {Tog({cid:c.id, field:"hasDrill", label:"Has Drill"})}
        {Section({cid:c.id, flag:"hasDrill", dayF:"drillDays", timePre:"dr", locF:"drillLoc", label:"Drill", sameTimeKey:"drillSameTime", sameLocKey:"drillSameLoc", slotKey:"drillSlots"})}
      </div>)}
      <button onClick={add} style={{width:"100%",padding:8,background:"transparent",border:`1px dashed ${T.bd}`,
        borderRadius:6,color:T.t3,fontFamily:MO,fontSize:"0.62rem",cursor:"pointer",marginBottom:12}}>+ Add Course</button>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{padding:"6px 14px",borderRadius:6,border:"none",background:T.b3,color:T.t3,cursor:"pointer",fontSize:"0.78rem",fontWeight:500}}>Cancel</button>
        <button onClick={()=>{const v=cl.filter(c=>c.name.trim()).map(({_showColorPicker,...rest})=>rest);onSave(v,sem);}} style={{padding:"6px 18px",borderRadius:6,border:"none",background:T.ac,color:T.bg,cursor:"pointer",fontSize:"0.78rem",fontWeight:600}}>Save &amp; Generate</button>
      </div>
    </div>
  </div>;
}

// ═══ SYLLABUS TAB ═══
function SyllabusTab({T,MO,SE,course,events,exams,assignments}){
  if(!course)return <div style={{color:T.t3,fontSize:"0.75rem"}}>No course selected.</div>;
  const courseEvs=events.filter(e=>e._courseId===course.id&&!e._allDay).sort((a,b)=>a.date.localeCompare(b.date));
  const byType={};
  courseEvs.forEach(e=>{const t=e._type||"lec";byType[t]=(byType[t]||[]);byType[t].push(e);});
  const typeLabel={lec:"Lectures",prec:"Precepts",lab:"Labs",drill:"Drills"};
  const sortedExams=[...exams].sort((a,b)=>a.date.localeCompare(b.date));
  const sortedAsgn=[...assignments].sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const Row=({date,title,sub,color})=><div style={{display:"flex",gap:8,padding:"4px 0",borderBottom:`1px solid ${T.bd}22`,alignItems:"flex-start"}}>
    <div style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,flexShrink:0,paddingTop:2,minWidth:60}}>{date}</div>
    <div style={{flex:1}}>
      <div style={{fontSize:"0.72rem",color:T.tx,fontWeight:500}}>{title}</div>
      {sub&&<div style={{fontFamily:MO,fontSize:"0.44rem",color:color||T.t3,marginTop:1}}>{sub}</div>}
    </div>
  </div>;
  return <div style={{maxHeight:340,overflow:"auto"}}>
    {Object.entries(byType).map(([type,evs])=><div key={type} style={{marginBottom:8}}>
      <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.ac,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>{typeLabel[type]||type} ({evs.length})</div>
      {evs.slice(0,5).map(e=><Row key={e.id} date={e.date} title={e.title.replace(course.name+" — ","")} sub={`${$t(e.startHour,e.startMin||0)}–${$t(e.endHour,e.endMin||0)}${e.location?" · "+e.location:""}`}/>)}
      {evs.length>5&&<div style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3,padding:"2px 0"}}>+{evs.length-5} more</div>}
    </div>)}
    {sortedExams.length>0&&<div style={{marginBottom:8}}>
      <div style={{fontFamily:MO,fontSize:"0.5rem",color:"#ff8c69",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>Exams ({sortedExams.length})</div>
      {sortedExams.map(ex=><Row key={ex.id} date={ex.date} title={ex.type} sub={`${$t(ex.startHour,ex.startMin||0)}–${$t(ex.endHour,ex.endMin||0)}${ex.location?" · "+ex.location:""}`} color="#ff8c69"/>)}
    </div>}
    {sortedAsgn.length>0&&<div style={{marginBottom:8}}>
      <div style={{fontFamily:MO,fontSize:"0.5rem",color:"#69d4ff",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>Assignments ({sortedAsgn.length})</div>
      {sortedAsgn.map(a=><Row key={a.id} date={a.dueDate} title={`${a.type}${a.title?" — "+a.title:""}`}
        sub={[a.tags,a.estHours].filter(Boolean).join(" · ")} color="#69d4ff"/>)}
    </div>}
    {Object.keys(byType).length===0&&sortedExams.length===0&&sortedAsgn.length===0&&
      <div style={{color:T.t3,fontSize:"0.72rem",fontStyle:"italic"}}>No events yet for this course.</div>}
  </div>;
}

// ═══ RELATIVE DATES TAB ═══
function RelativeTab({T,MO,IS,SS,LS,hO,course,assignments,setAssignments,events,sem}){
  const[rule,setRule]=useState({anchor:"lecture",offset:0,offsetUnit:"day",dow:2,timeH:11,timeM:59,timeAP:"PM",type:"Problem Set",customType:"",title:"",tags:"",estHours:"",autoCounter:true,counterStart:1});
  const[preview,setPreview]=useState([]);
  const up=(f,v)=>setRule(p=>({...p,[f]:v}));

  // 12h → 24h helper
  const to24=(h,ap)=>{let h24=h%12;if(ap==="PM")h24+=12;return h24;};

  const generate=()=>{
    if(!course)return;
    const courseEvs=events.filter(e=>e._courseId===course.id&&!e._allDay);
    let anchors=[];
    if(rule.anchor==="lecture")anchors=courseEvs.filter(e=>e._type==="lec");
    else if(rule.anchor==="precept")anchors=courseEvs.filter(e=>e._type==="prec");
    else if(rule.anchor==="lectureweek"){
      // One anchor per lecture week — use the first lecture of each calendar week
      const lecEvs=courseEvs.filter(e=>e._type==="lec").sort((a,b)=>a.date.localeCompare(b.date));
      const seenWeeks=new Set();
      lecEvs.forEach(e=>{const wk=$d($w($p(e.date)));if(!seenWeeks.has(wk)){seenWeeks.add(wk);anchors.push(e);}});
    }
    else if(rule.anchor==="dow"){
      const cal=PCAL[sem];
      if(cal){
        const start=$p(cal.cs),end=$p(cal.ce);
        for(let d=new Date(start);d<=end;d=$a(d,1)){
          const ds=$d(d);if(!isCd(ds,sem))continue;
          if(d.getDay()===rule.dow)anchors.push({date:ds});
        }
      } else {
        const weeks=new Set(courseEvs.map(e=>$d($w($p(e.date)))));
        weeks.forEach(ws=>{
          const wd=$p(ws);const target=new Date(wd);
          const diff=(rule.dow-wd.getDay()+7)%7;target.setDate(wd.getDate()+diff);
          anchors.push({date:$d(target)});
        });
      }
    }
    const dueH=to24(rule.timeH,rule.timeAP);
    const resolvedType=rule.type==="Other"?(rule.customType||"Other"):rule.type;
    const results=anchors.map(ev=>{
      const base=$p(ev.date);base.setDate(base.getDate()+(rule.offsetUnit==="week"?rule.offset*7:+rule.offset));
      return{id:gi(),courseId:course.id,type:resolvedType,title:rule.title,dueDate:$d(base),
        dueHour:dueH,dueMin:rule.timeM,hasDueTime:true,tags:rule.tags,estHours:rule.estHours,details:"",_enabled:true};
    }).filter((a,i,arr)=>arr.findIndex(x=>x.dueDate===a.dueDate)===i).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
    // Apply auto-counter
    if(rule.autoCounter){const start=rule.counterStart??1;results.forEach((a,i)=>{a.title=(rule.title||resolvedType)+" "+(i+start);});}
    setPreview(results);
  };

  const commit=()=>{
    const enabled=preview.filter(a=>a._enabled);
    if(enabled.length===0)return;
    const cleaned=enabled.map(({_enabled,...rest})=>rest);
    setAssignments(p=>[...p,...cleaned]);setPreview([]);
  };

  const updatePreview=(id,field,value)=>{setPreview(p=>p.map(a=>a.id===id?{...a,[field]:value}:a));};
  const removePreview=(id)=>{setPreview(p=>p.filter(a=>a.id!==id));};
  const togglePreview=(id)=>{setPreview(p=>p.map(a=>a.id===id?{...a,_enabled:!a._enabled}:a));};

  const DN2=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  // 12h hour options
  const h12Opts=Array.from({length:12},(_,i)=>i===0?12:i);

  return <div>
    <div style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,marginBottom:6}}>Auto-create assignments relative to course schedule</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
      <div><label style={LS}>Anchor</label>
        <select value={rule.anchor} onChange={e=>up("anchor",e.target.value)} style={{...SS,width:"100%"}}>
          <option value="lecture">After each Lecture</option>
          <option value="precept">After each Precept</option>
          <option value="lectureweek">Each Lecture Week</option>
          <option value="dow">Each week on day:</option>
        </select></div>
      {rule.anchor==="dow"&&<div><label style={LS}>Day of Week</label>
        <select value={rule.dow} onChange={e=>up("dow",+e.target.value)} style={{...SS,width:"100%"}}>
          {DN2.map((d,i)=><option key={i} value={i}>{d}</option>)}
        </select></div>}
      <div><label style={LS}>Offset</label>
        <div style={{display:"flex",gap:3}}>
          <input type="number" min={-7} max={14} value={rule.offset} onChange={e=>up("offset",+e.target.value)}
            style={{...IS,width:48,textAlign:"center"}}/>

// ═══ WEEK LOAD CHART ═══
function WeekLoadChart({T,MO,SE,events,assignments,exams,cats,weekDates}){
  const HOUR_EST={"<1h":0.5,"1–2h":1.5,"2–3h":2.5,"3–5h":4,"5–8h":6.5,"8h+":9};
  const days=weekDates.map(d=>{
    const ds=$d(d);
    const classHrs=events.filter(e=>e.date===ds&&!e._allDay&&e._courseId)
      .reduce((s,e)=>s+((e.endHour+(e.endMin||0)/60)-(e.startHour+(e.startMin||0)/60)),0);
    const examHrs=events.filter(e=>e.date===ds&&!e._allDay&&e._examId)
      .reduce((s,e)=>s+((e.endHour+(e.endMin||0)/60)-(e.startHour+(e.startMin||0)/60)),0);
    const asgnHrs=assignments.filter(a=>a.dueDate===ds)
      .reduce((s,a)=>s+(HOUR_EST[a.estHours]||0),0);
    const total=classHrs+examHrs+asgnHrs;
    return{label:DN[d.getDay()],classHrs,examHrs,asgnHrs,total,isToday:$td(d)};
  });
  const maxH=Math.max(...days.map(d=>d.total),4);
  return <div style={{padding:"8px 10px",borderTop:`1px solid ${T.bd}`,background:T.b2}}>
    <div style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Week Load</div>
    <div style={{display:"flex",gap:3,alignItems:"flex-end",height:42}}>
      {days.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
        <div style={{width:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end",height:36,gap:0}}>
          {d.asgnHrs>0&&<div style={{width:"100%",background:"#69d4ff",borderRadius:"2px 2px 0 0",
            height:`${(d.asgnHrs/maxH)*36}px`,minHeight:2,opacity:0.8}} title={`Work: ${d.asgnHrs.toFixed(1)}h`}/>}
          {d.examHrs>0&&<div style={{width:"100%",background:"#ff8c69",
            height:`${(d.examHrs/maxH)*36}px`,minHeight:2,opacity:0.9}} title={`Exam: ${d.examHrs.toFixed(1)}h`}/>}
          {d.classHrs>0&&<div style={{width:"100%",background:T.ac,borderRadius:d.asgnHrs===0&&d.examHrs===0?"2px 2px 0 0":"0",
            height:`${(d.classHrs/maxH)*36}px`,minHeight:2,opacity:0.7}} title={`Class: ${d.classHrs.toFixed(1)}h`}/>}
        </div>
        <div style={{fontFamily:MO,fontSize:"0.38rem",color:d.isToday?T.ac:T.t3,fontWeight:d.isToday?700:400}}>{d.label[0]}</div>
      </div>)}
    </div>
    <div style={{display:"flex",gap:8,marginTop:2}}>
      {[["Class",T.ac],["Exam","#ff8c69"],["Work","#69d4ff"]].map(([l,c])=>
        <div key={l} style={{display:"flex",alignItems:"center",gap:2}}>
          <div style={{width:6,height:6,background:c,borderRadius:1}}/>
          <span style={{fontFamily:MO,fontSize:"0.38rem",color:T.t3}}>{l}</span>
        </div>)}
    </div>
  </div>;
}

const TIMEZONES=["America/New_York","America/Chicago","America/Denver","America/Los_Angeles","America/Anchorage","Pacific/Honolulu","America/Phoenix","Europe/London","Europe/Paris","Europe/Berlin","Asia/Tokyo","Asia/Shanghai","Asia/Kolkata","Australia/Sydney","UTC"];

function exportICS(events,cats){
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TigerCalendar//EN","CALSCALE:GREGORIAN"];
  events.filter(e=>!e._allDay||e.category!=="_academic").forEach(ev=>{
    lines.push("BEGIN:VEVENT");
    lines.push("UID:"+ev.id+"@tigercalendar");
    const ds=ev.date.replace(/-/g,"");
    if(ev._allDay){lines.push("DTSTART;VALUE=DATE:"+ds);lines.push("DTEND;VALUE=DATE:"+ds);}
    else{lines.push("DTSTART:"+ds+"T"+String(ev.startHour).padStart(2,"0")+String(ev.startMin||0).padStart(2,"0")+"00");
      lines.push("DTEND:"+ds+"T"+String(ev.endHour).padStart(2,"0")+String(ev.endMin||0).padStart(2,"0")+"00");}
    lines.push("SUMMARY:"+(ev.title||"").replace(/\n/g,"\\n"));
    if(ev.location)lines.push("LOCATION:"+ev.location.replace(/\n/g,"\\n"));
    if(ev.detail)lines.push("DESCRIPTION:"+ev.detail.replace(/\n/g,"\\n"));
    const cat=cats[ev.category];if(cat)lines.push("CATEGORIES:"+cat.label);
    lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  const blob=new Blob([lines.join("\r\n")],{type:"text/calendar"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tigercalendar.ics";a.click();URL.revokeObjectURL(a.href);
}

function parseICS(text){
  const events=[];let cur=null;
  text.split(/\r?\n/).forEach(line=>{
    if(line==="BEGIN:VEVENT")cur={};
    else if(line==="END:VEVENT"&&cur){
      if(cur.title&&cur.date)events.push({id:gi(),title:cur.title,date:cur.date,category:"personal",
        startHour:cur.startHour||0,startMin:cur.startMin||0,endHour:cur.endHour||0,endMin:cur.endMin||0,
        detail:cur.detail||"",location:cur.location||"",_allDay:cur.allDay||false});
      cur=null;
    } else if(cur){
      const[k,...v]=line.split(":");const val=v.join(":");
      if(k==="SUMMARY")cur.title=val.replace(/\\n/g,"\n");
      else if(k==="LOCATION")cur.location=val.replace(/\\n/g,"\n");
      else if(k==="DESCRIPTION")cur.detail=val.replace(/\\n/g,"\n");
      else if(k.startsWith("DTSTART")){
        if(k.includes("VALUE=DATE")){cur.date=val.slice(0,4)+"-"+val.slice(4,6)+"-"+val.slice(6,8);cur.allDay=true;}
        else{cur.date=val.slice(0,4)+"-"+val.slice(4,6)+"-"+val.slice(6,8);cur.startHour=+val.slice(9,11);cur.startMin=+val.slice(11,13);}
      } else if(k.startsWith("DTEND")&&!k.includes("VALUE=DATE")){
        cur.endHour=+val.slice(9,11);cur.endMin=+val.slice(11,13);
      }
    }
  });
  return events;
}

function SettingsModal({T,MO,SE,settings,setSettings,onClose,events,cats,onImport}){

  const fileRef=useRef(null);
  const handleImport=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{
    const imported=parseICS(ev.target.result);if(imported.length>0){onImport(imported);alert(`Imported ${imported.length} events!`);}else alert("No events found in file.");
  };r.readAsText(f);};

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:T.ov,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

      </div>
      <div style={{display:"flex",justifyContent:"flex-end"}}>

function CatModal({T,MO,SE,cats,setCats,setModal}){

  const[editing,setEditing]=useState(null);
  const[editLabel,setEditLabel]=useState("");
  const[editColor,setEditColor]=useState(CAT_COLORS[0]);

  const addCat=()=>{if(!newName.trim())return;const id="cat_"+gi();
    setCats(p=>({...p,[id]:{label:newName.trim(),color:newColor,bg:newColor+"1e"}}));setNewName("");};
  const delCat=(k)=>setCats(p=>{const n={...p};delete n[k];return n;});
  const startEdit=(k,c)=>{setEditing(k);setEditLabel(c.label);setEditColor(c.color);};
  const saveCat=(k)=>{if(!editLabel.trim())return;setCats(p=>({...p,[k]:{...p[k],label:editLabel.trim(),color:editColor,bg:editColor+"1e"}}));setEditing(null);};

  const CatRow=({k,c,canDelete})=><div key={k} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:`1px solid ${T.bd}22`}}>

        {CAT_COLORS.slice(0,8).map(col=><div key={col} onClick={()=>setEditColor(col)}
          style={{width:12,height:12,borderRadius:"50%",background:col,cursor:"pointer",
            border:editColor===col?`2px solid ${T.tx}`:"2px solid transparent"}}/>)}
      </div>
      <input value={editLabel} onChange={e=>setEditLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveCat(k)} autoFocus
        style={{flex:1,background:T.ib,border:`1px solid ${T.ibd}`,borderRadius:4,padding:"2px 6px",color:T.tx,fontSize:"0.78rem",outline:"none"}}/>
      <button onClick={()=>saveCat(k)} style={{background:"none",border:"none",color:T.ac,cursor:"pointer",fontSize:"0.7rem",fontWeight:600}}>Save</button>
      <button onClick={()=>setEditing(null)} style={{background:"none",border:"none",color:T.t3,cursor:"pointer",fontSize:"0.7rem"}}>✕</button>
    </>:<>
      <div style={{width:10,height:10,borderRadius:"50%",background:c.color,flexShrink:0}}/>
      <span style={{flex:1,fontSize:"0.78rem",color:T.tx}}>{c.label}</span>
      <button onClick={()=>startEdit(k,c)} style={{background:"none",border:"none",color:T.t3,cursor:"pointer",fontSize:"0.6rem",padding:"1px 4px"}}>Edit</button>
      {canDelete&&<button onClick={()=>delCat(k)} style={{background:"none",border:"none",color:T.dg,cursor:"pointer",fontSize:"0.6rem",padding:"1px 4px"}}>Delete</button>}
      {!canDelete&&<span style={{fontSize:"0.46rem",color:T.t3,fontFamily:MO,padding:"1px 4px"}}>auto</span>}
    </>}
  </div>;

  return <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:T.ov,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.mb,border:`1px solid ${T.bd}`,borderRadius:14,padding:20,width:"100%",maxWidth:400,maxHeight:"80vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{fontFamily:SE,fontSize:"1.1rem",color:T.tx,marginBottom:12}}>Edit Categories</div>
      <div style={{marginBottom:10}}>
        {Object.entries(cats).map(([k,c])=><CatRow key={k} k={k} c={c} canDelete={!NODELE.has(k)}/>)}
      </div>
      {/* Add new */}
      <div style={{borderTop:`1px solid ${T.bd}`,paddingTop:8}}>
        <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Add New</div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCat()} placeholder="Category name"
            style={{flex:1,background:T.ib,border:`1px solid ${T.ibd}`,borderRadius:5,padding:"5px 8px",color:T.tx,fontSize:"0.78rem",outline:"none"}}/>
          <div style={{display:"flex",gap:2}}>
            {CAT_COLORS.slice(0,6).map(c=><div key={c} onClick={()=>setNewColor(c)} style={{width:14,height:14,borderRadius:"50%",background:c,cursor:"pointer",border:newColor===c?`2px solid ${T.tx}`:"2px solid transparent"}}/>)}
          </div>
          <button onClick={addCat} style={{padding:"4px 10px",borderRadius:5,border:"none",background:T.ac,color:T.bg,cursor:"pointer",fontSize:"0.72rem",fontWeight:600}}>Add</button>
        </div>
      </div>
      <div style={{marginTop:12,display:"flex",justifyContent:"flex-end"}}>
        <button onClick={()=>setModal(null)} style={{padding:"5px 14px",borderRadius:6,border:"none",background:T.b3,color:T.t3,cursor:"pointer",fontSize:"0.76rem"}}>Done</button>
      </div>
    </div>
  </div>;
}

// ═══ EVENT/TASK MODAL ═══
function EModal({T,modal,setModal,aE,uE,dE,aT,uT,dT,cats,MO,SE}){
  const isEd=!!modal.data;const[tp,setTp]=useState(modal.type);const pf=modal.prefill||{};
  const[title,setTitle]=useState(modal.data?.title||"");
  const[cat,setCat]=useState(modal.data?.category||"personal");
  const[date,setDate]=useState(modal.data?.date||modal.date||$d(new Date()));
  const[sH,setSH]=useState(modal.data?.startHour??pf.startHour??9);
  const[sM,setSM]=useState(modal.data?.startMin??pf.startMin??0);
  const[eH,setEH]=useState(modal.data?.endHour??pf.endHour??10);
  const[eM,setEM]=useState(modal.data?.endMin??pf.endMin??0);
  const[det,setDet]=useState(modal.data?.detail||"");
  const[loc,setLoc]=useState(modal.data?.location||"");
  const[dl,setDl]=useState(modal.data?.deadline||"");
  const[allDay,setAllDay]=useState(modal.data?._allDay||false);
  // Task-specific deadline time (mirrors assignment editor)
  const[dueHour,setDueHour]=useState(modal.data?.dueHour??modal.data?.startHour??23);
  const[dueMin,setDueMin]=useState(modal.data?.dueMin??modal.data?.startMin??59);
  const[hasDueTime,setHasDueTime]=useState(!!(modal.data?.hasDueTime||modal.data?.startHour!=null));
  const[cd2,setCd2]=useState(false);
  const isCE=modal.data?._courseId;

  // Recurrence
  const[recType,setRecType]=useState("none");
  const[recEvery,setRecEvery]=useState(1);
  const[recUnit,setRecUnit]=useState("week");
  const[recDays,setRecDays]=useState([new Date().getDay()]);
  const[recEnd,setRecEnd]=useState("never"); // never, date, after
  const[recEndDate,setRecEndDate]=useState("");
  const[recEndAfter,setRecEndAfter]=useState(10);

  useEffect(()=>{const h=e=>{if(e.key==="Escape")setModal(null);};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);

  const toggleRecDay=(d)=>setRecDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d].sort());

  const save=()=>{
    if(!title.trim())return;
    if(tp==="event"){
      let recur=null;
      if(recType!=="none"){
        recur={type:recType};
        if(recType==="custom"){recur.every=recEvery;recur.unit=recUnit;if(recUnit==="week")recur.days=recDays;}
        if(recType==="weekly")recur.days=recDays;
        if(recEnd==="date")recur.endDate=recEndDate;
        else if(recEnd==="after")recur.endAfter=recEndAfter;
        else recur.endAfter=200;
      }
      const d={title,category:cat,date,startHour:+sH,startMin:+sM,endHour:+eH,endMin:+eM,detail:det,location:loc,_allDay:allDay,_recur:recur};
      if(isEd&&modal.data?.id)uE(modal.data.id,d);else aE(d);
    } else {
      const d={title,category:cat,date,detail:det,deadline:dl,
        dueHour:hasDueTime?+dueHour:undefined,dueMin:hasDueTime?+dueMin:undefined,hasDueTime};
      if(isEd&&modal.data?.id)uT(modal.data.id,d);else aT(d);
    }
    setModal(null);
  };
  const handleDel=()=>{if(!cd2){setCd2(true);return;}if(modal.data?.id){if(tp==="event")dE(modal.data.id);else dT(modal.data.id);}setModal(null);};

  const IS={width:"100%",background:T.ib,border:`1px solid ${T.ibd}`,borderRadius:6,padding:"6px 8px",color:T.tx,fontFamily:"'DM Sans',sans-serif",fontSize:"0.8rem",outline:"none",WebkitAppearance:"none"};
  const SS={...IS,cursor:"pointer"};
  const LS={fontFamily:MO,fontSize:"0.52rem",color:T.t3,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3,display:"block"};
  const hO=HOURS.map(h=><option key={h} value={h}>{$t(h,0).replace(":00 "," ")}</option>);

  return <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:T.ov,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.mb,border:`1px solid ${T.bd}`,borderRadius:14,
      padding:20,width:"100%",maxWidth:440,maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{fontFamily:SE,fontSize:"1.1rem",color:T.tx,marginBottom:12}}>{isEd?"Edit":"New"} {tp==="event"?"Event":"Task"}</div>
      {isCE&&<div style={{fontFamily:MO,fontSize:"0.55rem",color:T.ac,background:`${T.ac}15`,padding:"4px 8px",borderRadius:5,marginBottom:8,lineHeight:1.3}}>
        Recurring class — changes only affect this occurrence.</div>}
      {!isEd&&<div style={{display:"flex",marginBottom:10,gap:4}}>
        {["event","task"].map(x=><button key={x} onClick={()=>setTp(x)} style={{flex:1,padding:"4px 0",border:"none",borderRadius:5,cursor:"pointer",
          fontFamily:MO,fontSize:"0.58rem",letterSpacing:"0.06em",textTransform:"uppercase",
          background:tp===x?T.ac:T.b3,color:tp===x?T.bg:T.t3}}>{x}</button>)}</div>}
      <div style={{marginBottom:8}}><label style={LS}>Title</label>
        <input value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()}
          style={IS}/></div>
      {tp==="event"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
        <div><label style={LS}>Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={IS}/></div>
        <div><label style={LS}>Category</label><select value={cat} onChange={e=>setCat(e.target.value)} style={SS}>
          {Object.entries(cats).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
      </div>}
      {tp==="task"&&<div style={{marginBottom:8}}><label style={LS}>Category</label>
        <select value={cat} onChange={e=>setCat(e.target.value)} style={SS}>
          {Object.entries(cats).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>}
      {tp==="event"&&<>
        {/* All day toggle */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
          <div onClick={()=>setAllDay(!allDay)} style={{width:32,height:16,background:allDay?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer"}}>
            <div style={{width:10,height:10,background:allDay?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:allDay?18:3,transition:"left 0.2s"}}/></div>
          <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2,letterSpacing:"0.06em",textTransform:"uppercase"}}>All Day</span>
        </div>
        {!allDay&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
          <div><label style={LS}>Start</label><div style={{display:"flex",gap:2,alignItems:"center"}}>
            <select value={sH} onChange={e=>setSH(+e.target.value)} style={{...SS,flex:2}}>{hO}</select>
            <MinPick value={sM} onChange={setSM}/></div></div>
          <div><label style={LS}>End</label><div style={{display:"flex",gap:2,alignItems:"center"}}>
            <select value={eH} onChange={e=>setEH(+e.target.value)} style={{...SS,flex:2}}>{hO}</select>
            <MinPick value={eM} onChange={setEM}/></div></div>
        </div>}
        {/* Location */}
        <div style={{marginBottom:8}}><label style={LS}>Location <span style={{opacity:0.5}}>(optional)</span></label>
          <input value={loc} onChange={e=>setLoc(e.target.value)} placeholder="e.g. Friend Center 101" style={IS}/></div>
        {/* Recurrence (only for new events) */}
        {!isEd&&<div style={{marginBottom:8}}>
          <label style={LS}>Repeat</label>
          <select value={recType} onChange={e=>setRecType(e.target.value)} style={SS}>
            <option value="none">Does not repeat</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="annually">Annually</option>
            <option value="weekdays">Every weekday (Mon–Fri)</option>
            <option value="custom">Custom…</option>
          </select>
          {(recType==="weekly")&&<div style={{marginTop:5}}>
            <label style={{...LS,marginBottom:2}}>On days</label>
            <div style={{display:"flex",gap:2}}>
              {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>
                <button key={d} onClick={()=>toggleRecDay(i)} style={{width:26,height:22,border:`1px solid ${recDays.includes(i)?T.ac:T.bd}`,borderRadius:3,
                  cursor:"pointer",fontFamily:MO,fontSize:"0.46rem",background:recDays.includes(i)?`${T.ac}30`:"transparent",
                  color:recDays.includes(i)?T.ac:T.t3}}>{d}</button>)}
            </div>
          </div>}
          {recType==="custom"&&<div style={{marginTop:5,padding:8,background:T.b2,borderRadius:6,border:`1px solid ${T.bd}`}}>
            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:5}}>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>Every</span>
              <input type="number" min={1} max={99} value={recEvery} onChange={e=>setRecEvery(+e.target.value||1)}
                style={{...IS,width:48,textAlign:"center",padding:"3px 4px"}}/>
              <select value={recUnit} onChange={e=>setRecUnit(e.target.value)} style={{...SS,width:80}}>
                <option value="day">day(s)</option><option value="week">week(s)</option>
                <option value="month">month(s)</option><option value="year">year(s)</option>
              </select>
            </div>
            {recUnit==="week"&&<div style={{marginBottom:5}}>
              <label style={{...LS,marginBottom:2}}>On days</label>
              <div style={{display:"flex",gap:2}}>
                {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>
                  <button key={d} onClick={()=>toggleRecDay(i)} style={{width:26,height:22,border:`1px solid ${recDays.includes(i)?T.ac:T.bd}`,borderRadius:3,
                    cursor:"pointer",fontFamily:MO,fontSize:"0.46rem",background:recDays.includes(i)?`${T.ac}30`:"transparent",
                    color:recDays.includes(i)?T.ac:T.t3}}>{d}</button>)}
              </div>
            </div>}
            <div>
              <label style={{...LS,marginBottom:2}}>Ends</label>
              <select value={recEnd} onChange={e=>setRecEnd(e.target.value)} style={{...SS,marginBottom:4}}>
                <option value="never">Never</option><option value="date">On date</option><option value="after">After # occurrences</option>
              </select>
              {recEnd==="date"&&<input type="date" value={recEndDate} onChange={e=>setRecEndDate(e.target.value)} style={{...IS,marginTop:3}}/>}
              {recEnd==="after"&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}}>
                <input type="number" min={1} max={365} value={recEndAfter} onChange={e=>setRecEndAfter(+e.target.value||1)}
                  style={{...IS,width:60,textAlign:"center",padding:"3px 4px"}}/>
                <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>occurrences</span>
              </div>}
            </div>
          </div>}
          {recType!=="none"&&recType!=="custom"&&<div style={{marginTop:5}}>
            <label style={{...LS,marginBottom:2}}>Ends</label>
            <select value={recEnd} onChange={e=>setRecEnd(e.target.value)} style={{...SS,marginBottom:3}}>
              <option value="never">Never</option><option value="date">On date</option><option value="after">After # occurrences</option>
            </select>
            {recEnd==="date"&&<input type="date" value={recEndDate} onChange={e=>setRecEndDate(e.target.value)} style={{...IS,marginTop:2}}/>}
            {recEnd==="after"&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:2}}>
              <input type="number" min={1} max={365} value={recEndAfter} onChange={e=>setRecEndAfter(+e.target.value||1)}
                style={{...IS,width:60,textAlign:"center",padding:"3px"}}/>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>occurrences</span>
            </div>}
          </div>}
        </div>}
      </>}
      {tp==="task"&&<>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <div style={{flex:1}}>
            <label style={LS}>Due Date</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...IS,width:"100%"}}/>
          </div>
          <div style={{flex:1}}>
            <label style={LS}>Due Time</label>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div onClick={()=>setHasDueTime(!hasDueTime)} style={{width:28,height:15,background:hasDueTime?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer",flexShrink:0}}>
                <div style={{width:9,height:9,background:hasDueTime?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:hasDueTime?16:2,transition:"left 0.2s"}}/></div>
              {hasDueTime&&<div style={{display:"flex",gap:2,alignItems:"center"}}>
                <select value={dueHour} onChange={e=>setDueHour(+e.target.value)} style={{...SS,flex:1,fontSize:"0.7rem",padding:"3px 4px"}}>{hO}</select>
                <MinPick value={dueMin} onChange={setDueMin}/>
              </div>}
            </div>
          </div>
        </div>
        <div style={{marginBottom:10}}><label style={LS}>Details <span style={{opacity:0.5,fontFamily:"sans-serif",textTransform:"none",letterSpacing:0}}>(optional)</span></label>
          <textarea value={det} onChange={e=>setDet(e.target.value)} placeholder="Instructions, links, notes…"
            style={{...IS,minHeight:36,resize:"vertical",lineHeight:1.3}}/></div>
      </>}
      {tp==="event"&&<div style={{marginBottom:10}}><label style={LS}>Notes</label>
        <textarea value={det} onChange={e=>setDet(e.target.value)} placeholder="Details, readings, links…"
          style={{...IS,minHeight:45,resize:"vertical",lineHeight:1.4}}/></div>}

      <div style={{display:"flex",gap:7,justifyContent:"space-between"}}>
        <div>{isEd&&<button onClick={handleDel} style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${T.dg}`,
          background:cd2?T.dg:`${T.dg}15`,color:cd2?"#fff":T.dg,cursor:"pointer",fontSize:"0.76rem",fontWeight:500}}>
          {cd2?"Confirm":"Delete"}</button>}</div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={()=>setModal(null)} style={{padding:"5px 14px",borderRadius:6,border:"none",background:T.b3,color:T.t3,cursor:"pointer",fontSize:"0.76rem",fontWeight:500}}>Cancel</button>
          <button onClick={save} style={{padding:"5px 16px",borderRadius:6,border:"none",background:T.ac,color:T.bg,cursor:"pointer",fontSize:"0.76rem",fontWeight:600}}>{isEd?"Save":"Create"}</button>
        </div>
      </div>
    </div>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
document.getElementById("root").classList.add("ready");
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
