<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TigerCalendar</title>
<meta name="description" content="TigerCalendar — a calendar and task manager for Princeton students">
<meta name="theme-color" content="#0d0d0f">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐯</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;width:100%;overflow:hidden}
  body{font-family:'DM Sans',-apple-system,sans-serif}
  #root{opacity:0;transition:opacity .2s}#root.ready{opacity:1}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#2a2a32;border-radius:3px}
  select option{font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel" data-type="module">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const HOURS=Array.from({length:24},(_,i)=>i);
const HH=60;
const MN2=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DNF=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const SK="tiger_calendar_v3";
const gi=()=>"id_"+Math.random().toString(36).slice(2,10)+Date.now().toString(36);

const PCAL={
  "spring-2026":{label:"Spring 2026",cs:"2026-01-26",ce:"2026-04-24",
    brk:[["2026-03-07","2026-03-15"]],
    ev:[{t:"Spring Classes Begin",d:"2026-01-26"},{t:"Add/Drop Ends",d:"2026-02-06"},
      {t:"Midterm Week",d:"2026-03-02"},{t:"Spring Break",d:"2026-03-07"},
      {t:"Classes Resume",d:"2026-03-16"},{t:"P/D/F Deadline",d:"2026-04-10"},
      {t:"Last Day of Classes",d:"2026-04-24"},{t:"Reading Period",d:"2026-04-27"},
      {t:"Dean's Date",d:"2026-05-07"},{t:"Finals Begin",d:"2026-05-08"},
      {t:"Finals End",d:"2026-05-14"},{t:"Commencement",d:"2026-05-26"}]},
  "fall-2026":{label:"Fall 2026",cs:"2026-09-02",ce:"2026-12-04",
    brk:[["2026-10-17","2026-10-25"],["2026-11-25","2026-11-30"]],
    ev:[{t:"Fall Classes Begin",d:"2026-09-02"},{t:"Add/Drop Ends",d:"2026-09-15"},
      {t:"Midterm Week",d:"2026-10-06"},{t:"Fall Recess",d:"2026-10-17"},
      {t:"Classes Resume",d:"2026-10-26"},{t:"P/D/F Deadline",d:"2026-11-07"},
      {t:"Thanksgiving Recess",d:"2026-11-25"},{t:"Classes Resume",d:"2026-12-01"},
      {t:"Last Day of Classes",d:"2026-12-04"},{t:"Reading Period",d:"2026-12-05"},
      {t:"Dean's Date",d:"2026-12-12"},{t:"Finals Begin",d:"2026-12-13"},
      {t:"Finals End",d:"2026-12-19"}]},
};

const CC=[
  {c:"#ff8c69",b:"rgba(255,140,105,0.12)"},{c:"#69d4ff",b:"rgba(105,212,255,0.12)"},
  {c:"#ff6fa0",b:"rgba(255,111,160,0.12)"},{c:"#a8e06a",b:"rgba(168,224,106,0.12)"},
  {c:"#ffd06a",b:"rgba(255,208,106,0.12)"},{c:"#e88bff",b:"rgba(232,139,255,0.12)"},
  {c:"#6affb4",b:"rgba(106,255,180,0.12)"},{c:"#b0b0c0",b:"rgba(176,176,192,0.12)"},
  {c:"#ff6b6b",b:"rgba(255,107,107,0.12)"},{c:"#69ffd2",b:"rgba(105,255,210,0.12)"},
];

const BCAT={personal:{label:"Personal",color:"#c8b8ff",bg:"rgba(200,184,255,0.12)"},
  other:{label:"Other",color:"#8ecae6",bg:"rgba(142,202,230,0.12)"},
  _academic:{label:"Academic Cal",color:"#ffa94d",bg:"rgba(255,169,77,0.12)"}};

function $d(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function $p(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function $s(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function $w(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());return r;}
function $a(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function $m(y,m){return new Date(y,m+1,0).getDate();}
function $t(h,m){const p=h>=12?"PM":"AM";return`${h%12||12}:${String(m).padStart(2,"0")} ${p}`;}
function $td(d){return $s(d,new Date());}

function isCd(ds,sem){const c=PCAL[sem];if(!c)return false;if(ds<c.cs||ds>c.ce)return false;
  for(const[s,e]of c.brk)if(ds>=s&&ds<=e)return false;return true;}

// Generate recurring events from recurrence rule
function genRecurring(ev){
  if(!ev._recur||ev._recur.type==="none") return [ev];
  const r=ev._recur, results=[], base=$p(ev.date);
  let maxOcc=r.endAfter||365, endDate=r.endDate?$p(r.endDate):$a(base,730);
  let count=0;
  for(let d=new Date(base);d<=endDate&&count<maxOcc;){
    const ds=$d(d);
    let match=false;
    if(r.type==="daily") match=true;
    else if(r.type==="weekly") match=r.days?r.days.includes(d.getDay()):d.getDay()===base.getDay();
    else if(r.type==="monthly") match=d.getDate()===base.getDate();
    else if(r.type==="annually") match=d.getMonth()===base.getMonth()&&d.getDate()===base.getDate();
    else if(r.type==="weekdays") match=d.getDay()>=1&&d.getDay()<=5;
    else if(r.type==="custom"){
      if(r.unit==="day") match=true;
      else if(r.unit==="week") match=r.days?r.days.includes(d.getDay()):d.getDay()===base.getDay();
      else if(r.unit==="month") match=d.getDate()===base.getDate();
      else if(r.unit==="year") match=d.getMonth()===base.getMonth()&&d.getDate()===base.getDate();
    }
    if(match){results.push({...ev,id:gi(),date:ds,_recurParent:ev.id});count++;}
    // Advance
    if(r.type==="daily"||(r.type==="custom"&&r.unit==="day")) d=$a(d,r.every||1);
    else if(r.type==="weekly") d=$a(d,1);
    else if(r.type==="custom"&&r.unit==="week"){
      const next=$a(d,1);
      // If we've cycled through all days of the week, skip ahead
      if(next.getDay()===0&&r.every>1){d=$a(next,(r.every-1)*7);}else{d=next;}
    }
    else if(r.type==="monthly"||(r.type==="custom"&&r.unit==="month")){
      if(!match||count===0) d=$a(d,1);
      else{const n=new Date(d);n.setMonth(n.getMonth()+(r.every||1));d=n;}
    }
    else if(r.type==="annually"||(r.type==="custom"&&r.unit==="year")){
      if(!match) d=$a(d,1);
      else{const n=new Date(d);n.setFullYear(n.getFullYear()+(r.every||1));d=n;}
    }
    else if(r.type==="weekdays") d=$a(d,1);
    else d=$a(d,1);
  }
  return results;
}

function genCourseEv(course,sem){
  const cal=PCAL[sem];if(!cal)return[];
  const evs=[],start=$p(cal.cs),end=$p(cal.ce);
  const slots=[
    {key:"lec",label:"Lecture",days:"lecDays",sh:"lSH",sm:"lSM",eh:"lEH",em:"lEM",loc:"lecLoc",flag:true},
    {key:"prec",label:"Precept",days:"precDays",sh:"pSH",sm:"pSM",eh:"pEH",em:"pEM",loc:"precLoc",flag:"hasPrec"},
    {key:"lab",label:"Lab",days:"labDays",sh:"labSH",sm:"labSM",eh:"labEH",em:"labEM",loc:"labLoc",flag:"hasLab"},
    {key:"drill",label:"Drill",days:"drillDays",sh:"drSH",sm:"drSM",eh:"drEH",em:"drEM",loc:"drillLoc",flag:"hasDrill"},
  ];
  for(let d=new Date(start);d<=end;d=$a(d,1)){
    const ds=$d(d);if(!isCd(ds,sem))continue;
    const dow=d.getDay();
    for(const sl of slots){
      if(sl.flag!==true&&!course[sl.flag])continue;
      if(course[sl.days]?.includes(dow)){
        const loc=course[sl.loc]||"";
        evs.push({id:gi(),title:course.name+" — "+sl.label,category:course.id,date:ds,
          startHour:course[sl.sh],startMin:course[sl.sm],endHour:course[sl.eh],endMin:course[sl.em],
          detail:loc?("📍 "+loc):"",location:loc,_courseId:course.id,_type:sl.key});
      }
    }
  }
  return evs;
}

function ld(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return null;}
function sv(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}

// ═══ MAIN ═══
function App(){
  const saved=useMemo(()=>ld(),[]);
  const[theme,setTheme]=useState(saved?.theme||"dark");
  const[view,setView]=useState(()=>window.innerWidth<768?"day":"week");
  const[sbM,setSbM]=useState("both");
  const[cd,setCd]=useState(new Date());
  const[events,setEv]=useState(saved?.events||[]);
  const[tasks,setTk]=useState(saved?.tasks||[]);
  const[courses,setCo]=useState(saved?.courses||[]);
  const[cats,setCats]=useState(saved?.cats||{...BCAT});
  const[sem,setSem]=useState(saved?.sem||"spring-2026");
  const[modal,setModal]=useState(null);
  const[csOpen,setCsOpen]=useState(!saved?.courses);
  const[ac,setAc]=useState(()=>{const s=new Set(Object.keys(saved?.cats||BCAT));s.add("personal");s.add("other");s.add("_academic");return s;});
  const[drag,setDrag]=useState(null);
  const[mcM,setMcM]=useState(()=>new Date());
  const[sbO,setSbO]=useState(()=>window.innerWidth>=768);

  useEffect(()=>{
    const onResize=()=>{if(window.innerWidth<768)setSbO(false);};
    window.addEventListener("resize",onResize);return()=>window.removeEventListener("resize",onResize);
  },[]);

  useEffect(()=>{setAc(p=>{const n=new Set(p);Object.keys(cats).forEach(k=>n.add(k));return n;});},[cats]);
  useEffect(()=>{sv({events,tasks,courses,cats,sem,theme});},[events,tasks,courses,cats,sem,theme]);

  useEffect(()=>{const cal=PCAL[sem];if(!cal)return;
    setEv(p=>{const na=p.filter(e=>e.category!=="_academic");
      const ae=cal.ev.map(e=>({id:gi(),title:e.t,date:e.d,category:"_academic",startHour:0,startMin:0,endHour:0,endMin:0,detail:"",_allDay:true}));
      return[...na,...ae];});
  },[sem]);

  const T=theme==="dark"?{bg:"#0d0d0f",b2:"#131316",b3:"#1a1a1f",bd:"#2a2a32",tx:"#e8e6f0",t2:"#9896a8",t3:"#5a5868",
    ac:"#c8b8ff",a2:"#8b7fd4",mb:"#1a1a1f",ov:"rgba(0,0,0,0.65)",ib:"#131316",ibd:"#2a2a32",
    tb:"rgba(200,184,255,0.08)",nl:"#c8b8ff",dg:"#ff6b6b"}:
    {bg:"#f5f3ef",b2:"#eeece8",b3:"#ffffff",bd:"#dddad4",tx:"#1a1820",t2:"#6b6578",t3:"#aaa5b5",
    ac:"#5c4db3",a2:"#8b7fd4",mb:"#ffffff",ov:"rgba(0,0,0,0.35)",ib:"#f5f3ef",ibd:"#dddad4",
    tb:"rgba(92,77,179,0.06)",nl:"#5c4db3",dg:"#d94f4f"};

  const goT=()=>setCd(new Date());
  const nav=(dir)=>{const d=new Date(cd);
    if(view==="day")d.setDate(d.getDate()+dir);
    else if(view==="week")d.setDate(d.getDate()+dir*7);
    else if(view==="month")d.setMonth(d.getMonth()+dir);
    else d.setFullYear(d.getFullYear()+dir);setCd(d);};

  useEffect(()=>{const h=(e)=>{if(modal||csOpen)return;if(["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName))return;
    switch(e.key){case"t":case"T":goT();break;case"d":case"D":setView("day");break;
    case"w":case"W":setView("week");break;case"m":case"M":setView("month");break;
    case"y":case"Y":setView("year");break;case"ArrowLeft":nav(-1);break;case"ArrowRight":nav(1);break;
    case"n":case"N":setModal({type:"event",date:$d(cd)});break;case"[":setSbO(p=>!p);break;}};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[modal,csOpen,cd,view]);

  const hl=useMemo(()=>{
    if(view==="day")return`${DNF[cd.getDay()]}, ${MN2[cd.getMonth()]} ${cd.getDate()}, ${cd.getFullYear()}`;
    if(view==="week"){const s=$w(cd),e=$a(s,6);
      if(s.getMonth()===e.getMonth())return`${MN2[s.getMonth()]} ${s.getDate()}–${e.getDate()}, ${s.getFullYear()}`;
      return`${MN2[s.getMonth()]} ${s.getDate()} – ${MN2[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`;}
    if(view==="month")return`${MN2[cd.getMonth()]} ${cd.getFullYear()}`;
    return`${cd.getFullYear()}`;
  },[view,cd]);

  const aE=(ev)=>{
    // Handle recurring
    if(ev._recur&&ev._recur.type!=="none"){
      const all=genRecurring(ev);
      setEv(p=>[...p,...all]);
    } else setEv(p=>[...p,{...ev,id:gi()}]);
  };
  const uE=(id,d)=>setEv(p=>p.map(e=>e.id===id?{...e,...d}:e));
  const dE=(id)=>setEv(p=>p.filter(e=>e.id!==id));
  const aT=(tk)=>setTk(p=>[...p,{...tk,id:gi(),done:false}]);
  const uT=(id,d)=>setTk(p=>p.map(x=>x.id===id?{...x,...d}:x));
  const dT=(id)=>setTk(p=>p.filter(x=>x.id!==id));
  const tT=(id)=>setTk(p=>p.map(x=>x.id===id?{...x,done:!x.done}:x));
  const tC=(c)=>setAc(p=>{const n=new Set(p);if(n.has(c))n.delete(c);else n.add(c);return n;});

  const saveCo=(nc,ns)=>{
    const oi=new Set(courses.map(c=>c.id));
    let f=events.filter(e=>!e._courseId||!oi.has(e._courseId)).filter(e=>e.category!=="_academic");
    const nc2={...BCAT};
    nc.forEach((c,i)=>{const ci=i%CC.length;nc2[c.id]={label:c.name,color:CC[ci].c,bg:CC[ci].b};});
    const gen=nc.flatMap(c=>genCourseEv(c,ns));
    const cal=PCAL[ns];
    const ae=cal?cal.ev.map(e=>({id:gi(),title:e.t,date:e.d,category:"_academic",startHour:0,startMin:0,endHour:0,endMin:0,detail:"",_allDay:true})):[];
    setCo(nc);setCats(nc2);setEv([...f,...gen,...ae]);setSem(ns);setCsOpen(false);
  };

  const MO="'DM Mono','SF Mono',monospace",SE="'DM Serif Display',Georgia,serif";

  // Time insights: hours per category this week
  const insights=useMemo(()=>{
    const ws=$w(cd),we=$a(ws,6),wsd=$d(ws),wed=$d(we);
    const bycat={};let total=0;
    events.filter(e=>e.date>=wsd&&e.date<=wed&&!e._allDay&&ac.has(e.category)).forEach(e=>{
      const hrs=((e.endHour+(e.endMin||0)/60)-(e.startHour+(e.startMin||0)/60));
      if(hrs<=0)return;
      bycat[e.category]=(bycat[e.category]||0)+hrs;total+=hrs;
    });
    return{bycat,total};
  },[events,cd,ac]);

  return <div style={{fontFamily:"'DM Sans',-apple-system,sans-serif",background:T.bg,color:T.tx,
    height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",fontSize:14}}>
    {/* Top Bar */}
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderBottom:`1px solid ${T.bd}`,
      background:T.b2,flexShrink:0,justifyContent:"space-between",flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <button onClick={()=>setSbO(p=>!p)} style={{background:"none",border:"none",color:T.t2,cursor:"pointer",fontSize:"1.1rem",padding:"2px 4px"}}>☰</button>
        <h1 style={{fontFamily:SE,fontSize:"1.2rem",margin:0,letterSpacing:"-0.02em",lineHeight:1}}>Tiger<span style={{color:T.ac,fontStyle:"italic"}}>Calendar</span></h1>
        <div style={{display:"flex",background:T.b3,border:`1px solid ${T.bd}`,borderRadius:6,overflow:"hidden"}}>
          {Object.entries(PCAL).map(([k,c])=><button key={k} onClick={()=>setSem(k)} style={{padding:"3px 8px",border:"none",cursor:"pointer",
            fontFamily:MO,fontSize:"0.52rem",letterSpacing:"0.05em",textTransform:"uppercase",
            background:sem===k?T.ac:"transparent",color:sem===k?T.bg:T.t3}}>{c.label}</button>)}
        </div>
        <button onClick={()=>setCsOpen(true)} style={{background:"transparent",border:`1px solid ${T.bd}`,color:T.t2,padding:"3px 8px",borderRadius:5,cursor:"pointer",fontFamily:MO,fontSize:"0.55rem"}}>⚙ Courses</button>
        <button onClick={goT} style={{background:"transparent",border:`1px solid ${T.bd}`,color:T.t2,padding:"3px 8px",borderRadius:5,cursor:"pointer",fontFamily:MO,fontSize:"0.58rem"}}>TODAY</button>
        <div style={{display:"flex",gap:2}}>
          <button onClick={()=>nav(-1)} style={{width:24,height:24,background:"transparent",border:`1px solid ${T.bd}`,color:T.t2,borderRadius:5,cursor:"pointer",fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <button onClick={()=>nav(1)} style={{width:24,height:24,background:"transparent",border:`1px solid ${T.bd}`,color:T.t2,borderRadius:5,cursor:"pointer",fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <span style={{fontFamily:SE,fontSize:"0.92rem",color:T.tx}}>{hl}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{display:"flex",background:T.b3,border:`1px solid ${T.bd}`,borderRadius:7,overflow:"hidden"}}>
          {["day","week","month","year"].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:"3px 10px",border:"none",cursor:"pointer",
            fontFamily:MO,fontSize:"0.55rem",letterSpacing:"0.07em",textTransform:"uppercase",
            background:view===v?T.ac:"transparent",color:view===v?T.bg:T.t3}}>{v}</button>)}
        </div>
        <div onClick={()=>setTheme(theme==="dark"?"light":"dark")} style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",userSelect:"none"}}>
          <span style={{fontFamily:MO,fontSize:"0.55rem",color:T.t3}}>{theme==="dark"?"☾":"☀"}</span>
          <div style={{width:30,height:16,background:T.b3,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative"}}>
            <div style={{width:10,height:10,background:T.ac,borderRadius:"50%",position:"absolute",top:2,left:theme==="dark"?3:17,transition:"left 0.3s"}}/>
          </div>
        </div>
      </div>
    </div>

    <div style={{display:"flex",flex:1,overflow:"hidden",position:"relative"}}>
      {sbO&&<>
        {window.innerWidth<768&&<div onClick={()=>setSbO(false)} style={{position:"absolute",inset:0,background:T.ov,zIndex:49}}/>}
        <div style={window.innerWidth<768?{position:"absolute",left:0,top:0,bottom:0,zIndex:50}:{}}>
          <Sidebar T={T} m={sbM} sm={setSbM} tasks={tasks} events={events} cats={cats}
            ac={ac} tC={tC} tT={tT} dT={dT} setModal={setModal} cd={cd} setCd={setCd}
            mcM={mcM} setMcM={setMcM} MO={MO} SE={SE} insights={insights}/>
        </div>
      </>}
      <div style={{flex:1,overflow:"hidden",position:"relative",display:"flex",flexDirection:"column"}}>
        {view==="day"&&<TG T={T} dates={[cd]} events={events} tasks={tasks} cats={cats} ac={ac}
          setModal={setModal} MO={MO} SE={SE} drag={drag} setDrag={setDrag}/>}
        {view==="week"&&<TG T={T} dates={Array.from({length:7},(_,i)=>$a($w(cd),i))} events={events} tasks={tasks}
          cats={cats} ac={ac} setModal={setModal} MO={MO} SE={SE} drag={drag} setDrag={setDrag}/>}
        {view==="month"&&<MonV T={T} date={cd} events={events} tasks={tasks} cats={cats} ac={ac}
          setModal={setModal} MO={MO} SE={SE} setCd={setCd} setView={setView}/>}
        {view==="year"&&<YrV T={T} date={cd} events={events} tasks={tasks} MO={MO} SE={SE} setCd={setCd} setView={setView}/>}
      </div>
    </div>
    {modal&&<EModal T={T} modal={modal} setModal={setModal} aE={aE} uE={uE} dE={dE} aT={aT} uT={uT} dT={dT} cats={cats} MO={MO} SE={SE}/>}
    {csOpen&&<CSModal T={T} MO={MO} SE={SE} courses={courses} sem={sem} onSave={saveCo} onClose={()=>setCsOpen(false)}/>}
  </div>;
}

// ═══ SIDEBAR ═══
function Sidebar({T,m,sm,tasks,events,cats,ac,tC,tT,dT,setModal,cd,setCd,mcM,setMcM,MO,SE,insights}){
  const tf=tasks.filter(x=>ac.has(x.category)),dn=tf.filter(x=>x.done),pn=tf.filter(x=>!x.done);
  const mcY=mcM.getFullYear(),mcMo=mcM.getMonth(),fd=new Date(mcY,mcMo,1).getDay(),dm=$m(mcY,mcMo);

// ═══ TIME GRID (Day/Week) ═══
// The key fix: day headers are in a SEPARATE sticky div OUTSIDE the scrollable area
function TG({T,dates,events,tasks,cats,ac,setModal,MO,SE,drag,setDrag}){
  const scrollRef=useRef(null);
  const[nowP,setNowP]=useState(null);

  useEffect(()=>{const u=()=>{const n=new Date();setNowP(n.getHours()*HH+(n.getMinutes()/60)*HH);};u();const iv=setInterval(u,60000);return()=>clearInterval(iv);},[]);

  const gH=useCallback((cY,col)=>{if(!col)return 0;const r=col.getBoundingClientRect();return Math.max(0,Math.min(23.75,(cY-r.top)/HH));},[]);
  const mD=(e,ds)=>{if(e.button!==0)return;const col=e.currentTarget,h=gH(e.clientY,col),sH=Math.floor(h),sM=Math.round((h-sH)*60/15)*15;
    setDrag({date:ds,sH,sM,eH:sH,eM:sM+30,active:true,col});};
  const mM=(e)=>{if(!drag?.active)return;const h=gH(e.clientY,drag.col),sH=Math.floor(h),sM=Math.round((h-sH)*60/15)*15;
    setDrag(p=>({...p,eH:sH,eM:sM}));};
  const mU=()=>{if(!drag?.active)return;let{date,sH,sM,eH,eM}=drag;
    if(sH>eH||(sH===eH&&sM>=eM))[sH,sM,eH,eM]=[eH,eM,sH,sM];
    if(eH-sH===0&&eM-sM<15)eM=sM+30;setDrag(null);
    setModal({type:"event",date,prefill:{startHour:sH,startMin:sM%60,endHour:eH,endMin:eM%60}});};

  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=7*HH;},[]);

  // All-day events/tasks for header
  const allDay=dates.map(d=>{const ds=$d(d);return{d,
    ad:events.filter(x=>x._allDay&&x.date===ds&&ac.has(x.category)),
    tk:tasks.filter(x=>x.date===ds&&ac.has(x.category))};});
  const hasAllDay=allDay.some(x=>x.ad.length>0||x.tk.length>0);

  return <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}
    onMouseMove={mM} onMouseUp={mU} onMouseLeave={()=>drag?.active&&mU()}>
    {/* STICKY HEADER — stays visible on scroll */}
    <div style={{flexShrink:0,background:T.b2,borderBottom:`1px solid ${T.bd}`,zIndex:10}}>
      <div style={{display:"grid",gridTemplateColumns:`48px repeat(${dates.length},1fr)`}}>
        <div/>
        {dates.map(d=>{const it=$td(d);return <div key={$d(d)} style={{padding:"4px 4px 2px",textAlign:"center",background:it?T.tb:"transparent"}}>
          <div style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase"}}>{DN[d.getDay()]}</div>
          <div style={{fontFamily:SE,fontSize:"1.1rem",color:it?T.ac:T.tx,fontWeight:it?700:400}}>{d.getDate()}</div>
        </div>;})}
      </div>
      {hasAllDay&&<div style={{display:"grid",gridTemplateColumns:`48px repeat(${dates.length},1fr)`,borderTop:`1px solid ${T.bd}`}}>
        <div style={{fontFamily:MO,fontSize:"0.42rem",color:T.t3,padding:"1px 2px",textAlign:"right"}}>ALL</div>
        {allDay.map(({d,ad:dA,tk:dTk})=><div key={$d(d)} style={{padding:"1px 2px",minHeight:16,borderLeft:`1px solid ${T.bd}`}}>
          {dA.map(ev=><div key={ev.id} style={{fontSize:"0.48rem",padding:"0 2px",borderRadius:2,background:cats._academic?.bg,color:cats._academic?.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500}}>{ev.title}</div>)}
          {dTk.slice(0,2).map(tk=>{const cat=cats[tk.category]||cats.other;return <div key={tk.id} style={{fontSize:"0.48rem",padding:"0 2px",borderRadius:2,background:cat.bg,color:cat.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",opacity:tk.done?0.5:1}}>{tk.title}</div>;})}
        </div>)}
      </div>}
    </div>

    {/* SCROLLABLE TIME GRID */}
    <div ref={scrollRef} style={{flex:1,overflow:"auto",userSelect:drag?.active?"none":"auto"}}>
      <div style={{display:"grid",gridTemplateColumns:`48px repeat(${dates.length},1fr)`,position:"relative"}}>
        <div>{HOURS.map(h=><div key={h} style={{height:HH,borderBottom:`1px solid ${T.bd}`,display:"flex",alignItems:"flex-start",justifyContent:"flex-end",paddingRight:4}}>
          <span style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,position:"relative",top:-6}}>{h===0?"":$t(h,0).replace(":00 "," ")}</span></div>)}</div>
        {dates.map(d=>{const ds=$d(d),dEv=events.filter(e=>e.date===ds&&!e._allDay&&ac.has(e.category)),it=$td(d);
          return <div key={ds} onMouseDown={e=>mD(e,ds)} style={{position:"relative",borderLeft:`1px solid ${T.bd}`,background:it?T.tb:"transparent",cursor:"crosshair"}}>
            {HOURS.map(h=><div key={h} style={{height:HH,borderBottom:`1px solid ${T.bd}`}}/>)}
            {dEv.map(ev=>{const cat=cats[ev.category]||cats.other;
              const top=(ev.startHour+(ev.startMin||0)/60)*HH,bot=(ev.endHour+(ev.endMin||0)/60)*HH,ht=Math.max(bot-top,16);
              return <div key={ev.id} onClick={e=>{e.stopPropagation();setModal({type:"event",data:ev});}}
                style={{position:"absolute",top,left:1,right:1,height:ht,background:cat.bg,borderLeft:`3px solid ${cat.color}`,
                  borderRadius:3,padding:"1px 4px",cursor:"pointer",overflow:"hidden",zIndex:5,boxShadow:"0 1px 2px rgba(0,0,0,0.12)"}}>
                <div style={{fontSize:"0.6rem",fontWeight:600,color:T.tx,lineHeight:1.15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
                {ht>22&&<div style={{fontFamily:MO,fontSize:"0.42rem",color:T.t2,marginTop:1}}>{$t(ev.startHour,ev.startMin||0)}–{$t(ev.endHour,ev.endMin||0)}</div>}
                {ht>36&&ev.location&&<div style={{fontFamily:MO,fontSize:"0.4rem",color:T.t3,marginTop:1}}>📍 {ev.location}</div>}
              </div>;})}
            {drag?.active&&drag.date===ds&&(()=>{let{sH:sh,sM:sm,eH:eh,eM:em}=drag;
              if(sh>eh||(sh===eh&&sm>em))[sh,sm,eh,em]=[eh,em,sh,sm];
              const top=(sh+sm/60)*HH,bot=(eh+em/60)*HH;
              return <div style={{position:"absolute",top,left:1,right:1,height:Math.max(bot-top,14),
                background:`${T.ac}25`,border:`1px dashed ${T.ac}`,borderRadius:3,zIndex:6,pointerEvents:"none"}}/>; })()}
            {it&&nowP!==null&&<div style={{position:"absolute",top:nowP,left:0,right:0,height:2,background:T.nl,zIndex:8,boxShadow:`0 0 6px ${T.nl}60`}}>
              <div style={{position:"absolute",left:-3,top:-3,width:8,height:8,borderRadius:"50%",background:T.nl}}/></div>}
          </div>;})}
      </div>
    </div>
  </div>;
}

    return <>
      <div style={{marginBottom:5,marginTop:3}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>{label} Days</label>{DB(cid,dayF)}</div>
      <div style={{marginBottom:4}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>{label} Time</label>{TS(cid,timePre)}</div>
      <div style={{marginBottom:4}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>{label} Location</label>
        <input value={c[locF]||""} onChange={e=>up(cid,locF,e.target.value)} placeholder="e.g. McCosh 50" style={{...IS,width:"100%"}}/></div>
    </>;};

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:T.ov,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:14}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.mb,border:`1px solid ${T.bd}`,borderRadius:14,
      padding:20,width:"100%",maxWidth:560,maxHeight:"88vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{fontFamily:SE,fontSize:"1.2rem",color:T.tx,marginBottom:12}}>Course Setup</div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",gap:5}}>
          {Object.entries(PCAL).map(([k,c])=><button key={k} onClick={()=>setSem(k)} style={{flex:1,padding:"5px 0",border:"none",borderRadius:5,cursor:"pointer",
            fontFamily:MO,fontSize:"0.6rem",letterSpacing:"0.06em",textTransform:"uppercase",
            background:sem===k?T.ac:T.b3,color:sem===k?T.bg:T.t3}}>{c.label}</button>)}
        </div>
      </div>
      {cl.map((c,ci)=><div key={c.id} style={{border:`1px solid ${T.bd}`,borderRadius:7,padding:10,marginBottom:7,
        background:T.b3,borderLeft:`4px solid ${CC[ci%CC.length].c}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <input value={c.name} onChange={e=>up(c.id,"name",e.target.value)} placeholder="Course (e.g. MAT 217)"
            style={{...IS,flex:1,fontWeight:600}}/>
          <button onClick={()=>rm(c.id)} style={{background:"transparent",border:"none",color:T.dg,cursor:"pointer",fontSize:"0.9rem",marginLeft:6}}>✕</button>
        </div>
        <div style={{marginBottom:5}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>Lecture Days</label>{DB(c.id,"lecDays")}</div>
        <div style={{marginBottom:4}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>Lecture Time</label>{TS(c.id,"l")}</div>
        <div style={{marginBottom:6}}><label style={{fontFamily:MO,fontSize:"0.48rem",color:T.t3,letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:2}}>Lecture Location</label>
          <input value={c.lecLoc||""} onChange={e=>up(c.id,"lecLoc",e.target.value)} placeholder="e.g. Fine Hall 214" style={{...IS,width:"100%"}}/></div>
        {Tog({cid:c.id, field:"hasPrec", label:"Has Precept"})}
        {Section({cid:c.id, flag:"hasPrec", dayF:"precDays", timePre:"p", locF:"precLoc", label:"Precept"})}
        {Tog({cid:c.id, field:"hasLab", label:"Has Lab"})}
        {Section({cid:c.id, flag:"hasLab", dayF:"labDays", timePre:"lab", locF:"labLoc", label:"Lab"})}
        {Tog({cid:c.id, field:"hasDrill", label:"Has Drill"})}
        {Section({cid:c.id, flag:"hasDrill", dayF:"drillDays", timePre:"dr", locF:"drillLoc", label:"Drill"})}
      </div>)}
      <button onClick={add} style={{width:"100%",padding:8,background:"transparent",border:`1px dashed ${T.bd}`,
        borderRadius:6,color:T.t3,fontFamily:MO,fontSize:"0.62rem",cursor:"pointer",marginBottom:12}}>+ Add Course</button>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{padding:"6px 14px",borderRadius:6,border:"none",background:T.b3,color:T.t3,cursor:"pointer",fontSize:"0.78rem",fontWeight:500}}>Cancel</button>
        <button onClick={()=>{const v=cl.filter(c=>c.name.trim());onSave(v,sem);}} style={{padding:"6px 18px",borderRadius:6,border:"none",background:T.ac,color:T.bg,cursor:"pointer",fontSize:"0.78rem",fontWeight:600}}>Save &amp; Generate</button>
      </div>
    </div>
  </div>;
}

// ═══ EVENT/TASK MODAL ═══
function EModal({T,modal,setModal,aE,uE,dE,aT,uT,dT,cats,MO,SE}){
  const isEd=!!modal.data;const[tp,setTp]=useState(modal.type);const pf=modal.prefill||{};
  const[title,setTitle]=useState(modal.data?.title||"");
  const[cat,setCat]=useState(modal.data?.category||"personal");
  const[date,setDate]=useState(modal.data?.date||modal.date||$d(new Date()));
  const[sH,setSH]=useState(modal.data?.startHour??pf.startHour??9);
  const[sM,setSM]=useState(modal.data?.startMin??pf.startMin??0);
  const[eH,setEH]=useState(modal.data?.endHour??pf.endHour??10);
  const[eM,setEM]=useState(modal.data?.endMin??pf.endMin??0);
  const[det,setDet]=useState(modal.data?.detail||"");
  const[loc,setLoc]=useState(modal.data?.location||"");
  const[dl,setDl]=useState(modal.data?.deadline||"");
  const[allDay,setAllDay]=useState(modal.data?._allDay||false);
  const[cd2,setCd2]=useState(false);
  const isCE=modal.data?._courseId;

  // Recurrence
  const[recType,setRecType]=useState("none");
  const[recEvery,setRecEvery]=useState(1);
  const[recUnit,setRecUnit]=useState("week");
  const[recDays,setRecDays]=useState([new Date().getDay()]);
  const[recEnd,setRecEnd]=useState("never"); // never, date, after
  const[recEndDate,setRecEndDate]=useState("");
  const[recEndAfter,setRecEndAfter]=useState(10);

  useEffect(()=>{const h=e=>{if(e.key==="Escape")setModal(null);};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);

  const toggleRecDay=(d)=>setRecDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d].sort());

  const save=()=>{
    if(!title.trim())return;
    if(tp==="event"){
      let recur=null;
      if(recType!=="none"){
        recur={type:recType};
        if(recType==="custom"){recur.every=recEvery;recur.unit=recUnit;if(recUnit==="week")recur.days=recDays;}
        if(recType==="weekly")recur.days=recDays;
        if(recEnd==="date")recur.endDate=recEndDate;
        else if(recEnd==="after")recur.endAfter=recEndAfter;
        else recur.endAfter=200;
      }
      const d={title,category:cat,date,startHour:+sH,startMin:+sM,endHour:+eH,endMin:+eM,detail:det,location:loc,_allDay:allDay,_recur:recur};
      if(isEd&&modal.data?.id)uE(modal.data.id,d);else aE(d);
    } else {
      const d={title,category:cat,date,detail:det,deadline:dl};
      if(isEd&&modal.data?.id)uT(modal.data.id,d);else aT(d);
    }
    setModal(null);
  };
  const handleDel=()=>{if(!cd2){setCd2(true);return;}if(modal.data?.id){if(tp==="event")dE(modal.data.id);else dT(modal.data.id);}setModal(null);};

  const IS={width:"100%",background:T.ib,border:`1px solid ${T.ibd}`,borderRadius:6,padding:"6px 8px",color:T.tx,fontFamily:"'DM Sans',sans-serif",fontSize:"0.8rem",outline:"none",WebkitAppearance:"none"};
  const SS={...IS,cursor:"pointer"};
  const LS={fontFamily:MO,fontSize:"0.52rem",color:T.t3,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3,display:"block"};
  const hO=HOURS.map(h=><option key={h} value={h}>{$t(h,0).replace(":00 "," ")}</option>);
  const mO=[0,15,30,45].map(m=><option key={m} value={m}>{String(m).padStart(2,"0")}</option>);

  return <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:T.ov,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.mb,border:`1px solid ${T.bd}`,borderRadius:14,
      padding:20,width:"100%",maxWidth:440,maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{fontFamily:SE,fontSize:"1.1rem",color:T.tx,marginBottom:12}}>{isEd?"Edit":"New"} {tp==="event"?"Event":"Task"}</div>
      {isCE&&<div style={{fontFamily:MO,fontSize:"0.55rem",color:T.ac,background:`${T.ac}15`,padding:"4px 8px",borderRadius:5,marginBottom:8,lineHeight:1.3}}>
        Recurring class — changes only affect this occurrence.</div>}
      {!isEd&&<div style={{display:"flex",marginBottom:10,gap:4}}>
        {["event","task"].map(x=><button key={x} onClick={()=>setTp(x)} style={{flex:1,padding:"4px 0",border:"none",borderRadius:5,cursor:"pointer",
          fontFamily:MO,fontSize:"0.58rem",letterSpacing:"0.06em",textTransform:"uppercase",
          background:tp===x?T.ac:T.b3,color:tp===x?T.bg:T.t3}}>{x}</button>)}</div>}
      <div style={{marginBottom:8}}><label style={LS}>Title</label>
        <input value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()} autoFocus style={IS}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
        <div><label style={LS}>Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={IS}/></div>
        <div><label style={LS}>Category</label><select value={cat} onChange={e=>setCat(e.target.value)} style={SS}>
          {Object.entries(cats).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
      </div>
      {tp==="event"&&<>
        {/* All day toggle */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
          <div onClick={()=>setAllDay(!allDay)} style={{width:32,height:16,background:allDay?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer"}}>
            <div style={{width:10,height:10,background:allDay?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:allDay?18:3,transition:"left 0.2s"}}/></div>
          <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2,letterSpacing:"0.06em",textTransform:"uppercase"}}>All Day</span>
        </div>
        {!allDay&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
          <div><label style={LS}>Start</label><div style={{display:"flex",gap:2}}>
            <select value={sH} onChange={e=>setSH(+e.target.value)} style={{...SS,flex:2}}>{hO}</select>
            <select value={sM} onChange={e=>setSM(+e.target.value)} style={{...SS,flex:1}}>{mO}</select></div></div>
          <div><label style={LS}>End</label><div style={{display:"flex",gap:2}}>
            <select value={eH} onChange={e=>setEH(+e.target.value)} style={{...SS,flex:2}}>{hO}</select>
            <select value={eM} onChange={e=>setEM(+e.target.value)} style={{...SS,flex:1}}>{mO}</select></div></div>
        </div>}
        {/* Location */}
        <div style={{marginBottom:8}}><label style={LS}>Location <span style={{opacity:0.5}}>(optional)</span></label>
          <input value={loc} onChange={e=>setLoc(e.target.value)} placeholder="e.g. Friend Center 101" style={IS}/></div>
        {/* Recurrence (only for new events) */}
        {!isEd&&<div style={{marginBottom:8}}>
          <label style={LS}>Repeat</label>
          <select value={recType} onChange={e=>setRecType(e.target.value)} style={SS}>
            <option value="none">Does not repeat</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="annually">Annually</option>
            <option value="weekdays">Every weekday (Mon–Fri)</option>
            <option value="custom">Custom…</option>
          </select>
          {(recType==="weekly")&&<div style={{marginTop:5}}>
            <label style={{...LS,marginBottom:2}}>On days</label>
            <div style={{display:"flex",gap:2}}>
              {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>
                <button key={d} onClick={()=>toggleRecDay(i)} style={{width:26,height:22,border:`1px solid ${recDays.includes(i)?T.ac:T.bd}`,borderRadius:3,
                  cursor:"pointer",fontFamily:MO,fontSize:"0.46rem",background:recDays.includes(i)?`${T.ac}30`:"transparent",
                  color:recDays.includes(i)?T.ac:T.t3}}>{d}</button>)}
            </div>
          </div>}
          {recType==="custom"&&<div style={{marginTop:5,padding:8,background:T.b2,borderRadius:6,border:`1px solid ${T.bd}`}}>
            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:5}}>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>Every</span>
              <input type="number" min={1} max={99} value={recEvery} onChange={e=>setRecEvery(+e.target.value||1)}
                style={{...IS,width:48,textAlign:"center",padding:"3px 4px"}}/>
              <select value={recUnit} onChange={e=>setRecUnit(e.target.value)} style={{...SS,width:80}}>
                <option value="day">day(s)</option><option value="week">week(s)</option>
                <option value="month">month(s)</option><option value="year">year(s)</option>
              </select>
            </div>
            {recUnit==="week"&&<div style={{marginBottom:5}}>
              <label style={{...LS,marginBottom:2}}>On days</label>
              <div style={{display:"flex",gap:2}}>
                {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>
                  <button key={d} onClick={()=>toggleRecDay(i)} style={{width:26,height:22,border:`1px solid ${recDays.includes(i)?T.ac:T.bd}`,borderRadius:3,
                    cursor:"pointer",fontFamily:MO,fontSize:"0.46rem",background:recDays.includes(i)?`${T.ac}30`:"transparent",
                    color:recDays.includes(i)?T.ac:T.t3}}>{d}</button>)}
              </div>
            </div>}
            <div>
              <label style={{...LS,marginBottom:2}}>Ends</label>
              <select value={recEnd} onChange={e=>setRecEnd(e.target.value)} style={{...SS,marginBottom:4}}>
                <option value="never">Never</option><option value="date">On date</option><option value="after">After # occurrences</option>
              </select>
              {recEnd==="date"&&<input type="date" value={recEndDate} onChange={e=>setRecEndDate(e.target.value)} style={{...IS,marginTop:3}}/>}
              {recEnd==="after"&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}}>
                <input type="number" min={1} max={365} value={recEndAfter} onChange={e=>setRecEndAfter(+e.target.value||1)}
                  style={{...IS,width:60,textAlign:"center",padding:"3px 4px"}}/>
                <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>occurrences</span>
              </div>}
            </div>
          </div>}
          {recType!=="none"&&recType!=="custom"&&<div style={{marginTop:5}}>
            <label style={{...LS,marginBottom:2}}>Ends</label>
            <select value={recEnd} onChange={e=>setRecEnd(e.target.value)} style={{...SS,marginBottom:3}}>
              <option value="never">Never</option><option value="date">On date</option><option value="after">After # occurrences</option>
            </select>
            {recEnd==="date"&&<input type="date" value={recEndDate} onChange={e=>setRecEndDate(e.target.value)} style={{...IS,marginTop:2}}/>}
            {recEnd==="after"&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:2}}>
              <input type="number" min={1} max={365} value={recEndAfter} onChange={e=>setRecEndAfter(+e.target.value||1)}
                style={{...IS,width:60,textAlign:"center",padding:"3px"}}/>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>occurrences</span>
            </div>}
          </div>}
        </div>}
      </>}
      {tp==="task"&&<div style={{marginBottom:8}}><label style={LS}>Deadline</label>
        <input value={dl} onChange={e=>setDl(e.target.value)} placeholder="e.g. Due Thu 3/19 9pm" style={IS}/></div>}
      <div style={{marginBottom:10}}><label style={LS}>Notes</label>
        <textarea value={det} onChange={e=>setDet(e.target.value)} placeholder="Details, readings, links…"
          style={{...IS,minHeight:45,resize:"vertical",lineHeight:1.4}}/></div>
      <div style={{display:"flex",gap:7,justifyContent:"space-between"}}>
        <div>{isEd&&<button onClick={handleDel} style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${T.dg}`,
          background:cd2?T.dg:`${T.dg}15`,color:cd2?"#fff":T.dg,cursor:"pointer",fontSize:"0.76rem",fontWeight:500}}>
          {cd2?"Confirm":"Delete"}</button>}</div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={()=>setModal(null)} style={{padding:"5px 14px",borderRadius:6,border:"none",background:T.b3,color:T.t3,cursor:"pointer",fontSize:"0.76rem",fontWeight:500}}>Cancel</button>
          <button onClick={save} style={{padding:"5px 16px",borderRadius:6,border:"none",background:T.ac,color:T.bg,cursor:"pointer",fontSize:"0.76rem",fontWeight:600}}>{isEd?"Save":"Create"}</button>
        </div>
      </div>
    </div>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
document.getElementById("root").classList.add("ready");
</script>
</body>
</html>
