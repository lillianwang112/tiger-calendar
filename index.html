function $d(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function $p(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function $s(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function $w(d,ws=0){const r=new Date(d);const diff=(r.getDay()-ws+7)%7;r.setDate(r.getDate()-diff);return r;}
function $a(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function $m(y,m){return new Date(y,m+1,0).getDate();}
function $t(h,m){const p=h>=12?"PM":"AM";return`${h%12||12}:${String(m).padStart(2,"0")} ${p}`;}
function $td(d){return $s(d,new Date());}

function isCd(ds,sem){const c=PCAL[sem];if(!c)return false;if(ds<c.cs||ds>c.ce)return false;
  for(const[s,e]of c.brk)if(ds>=s&&ds<=e)return false;return true;}

// Generate recurring events from recurrence rule
function genRecurring(ev){
  if(!ev._recur||ev._recur.type==="none") return [ev];
  const r=ev._recur, results=[], base=$p(ev.date);
  let maxOcc=r.endAfter||365, endDate=r.endDate?$p(r.endDate):$a(base,730);
  let count=0;
  for(let d=new Date(base);d<=endDate&&count<maxOcc;){
    const ds=$d(d);
    let match=false;
    if(r.type==="daily") match=true;
    else if(r.type==="weekly") match=r.days?r.days.includes(d.getDay()):d.getDay()===base.getDay();
    else if(r.type==="monthly") match=d.getDate()===base.getDate();
    else if(r.type==="annually") match=d.getMonth()===base.getMonth()&&d.getDate()===base.getDate();
    else if(r.type==="weekdays") match=d.getDay()>=1&&d.getDay()<=5;
    else if(r.type==="custom"){
      if(r.unit==="day") match=true;
      else if(r.unit==="week") match=r.days?r.days.includes(d.getDay()):d.getDay()===base.getDay();
      else if(r.unit==="month") match=d.getDate()===base.getDate();
      else if(r.unit==="year") match=d.getMonth()===base.getMonth()&&d.getDate()===base.getDate();
    }
    if(match){results.push({...ev,id:gi(),date:ds,_recurParent:ev.id});count++;}
    // Advance
    if(r.type==="daily"||(r.type==="custom"&&r.unit==="day")) d=$a(d,r.every||1);
    else if(r.type==="weekly") d=$a(d,1);
    else if(r.type==="custom"&&r.unit==="week"){
      const next=$a(d,1);
      // If we've cycled through all days of the week, skip ahead
      if(next.getDay()===0&&r.every>1){d=$a(next,(r.every-1)*7);}else{d=next;}
    }
    else if(r.type==="monthly"||(r.type==="custom"&&r.unit==="month")){
      if(!match||count===0) d=$a(d,1);
      else{const n=new Date(d);n.setMonth(n.getMonth()+(r.every||1));d=n;}
    }
    else if(r.type==="annually"||(r.type==="custom"&&r.unit==="year")){
      if(!match) d=$a(d,1);
      else{const n=new Date(d);n.setFullYear(n.getFullYear()+(r.every||1));d=n;}
    }
    else if(r.type==="weekdays") d=$a(d,1);
    else d=$a(d,1);
  }
  return results;
}

function genCourseEv(course,sem){
  const cal=PCAL[sem];if(!cal)return[];
  const evs=[],start=$p(cal.cs),end=$p(cal.ce);
  const slots=[
    {key:"lec",label:"Lecture",days:"lecDays",sh:"lSH",sm:"lSM",eh:"lEH",em:"lEM",loc:"lecLoc",flag:true},
    {key:"prec",label:"Precept",days:"precDays",sh:"pSH",sm:"pSM",eh:"pEH",em:"pEM",loc:"precLoc",flag:"hasPrec"},
    {key:"lab",label:"Lab",days:"labDays",sh:"labSH",sm:"labSM",eh:"labEH",em:"labEM",loc:"labLoc",flag:"hasLab"},
    {key:"drill",label:"Drill",days:"drillDays",sh:"drSH",sm:"drSM",eh:"drEH",em:"drEM",loc:"drillLoc",flag:"hasDrill"},
  ];
  for(let d=new Date(start);d<=end;d=$a(d,1)){
    const ds=$d(d);if(!isCd(ds,sem))continue;
    const dow=d.getDay();
    for(const sl of slots){
      if(sl.flag!==true&&!course[sl.flag])continue;
      if(course[sl.days]?.includes(dow)){
        const loc=course[sl.loc]||"";
        evs.push({id:gi(),title:course.name+" — "+sl.label,category:course.id,date:ds,
          startHour:course[sl.sh],startMin:course[sl.sm],endHour:course[sl.eh],endMin:course[sl.em],
          detail:loc?("📍 "+loc):"",location:loc,_courseId:course.id,_type:sl.key});
      }
    }
  }
  return evs;
}

function ld(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return null;}
function sv(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}

// ═══ FIREBASE AUTH & SYNC HOOKS ═══
function useFirebaseAuth(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(!!FB_AUTH);
  useEffect(()=>{if(!FB_AUTH){setLoading(false);return;}
    const unsub=FB_AUTH.onAuthStateChanged(u=>{setUser(u);setLoading(false);});
    return unsub;
  },[]);
  const signIn=async()=>{if(!FB_AUTH)return;const provider=new firebase.auth.GoogleAuthProvider();
    try{await FB_AUTH.signInWithPopup(provider);}catch(e){if(e.code==="auth/popup-blocked")await FB_AUTH.signInWithRedirect(provider);}};
  const signOut=async()=>{if(FB_AUTH)await FB_AUTH.signOut();};
  return{user,loading,signIn,signOut};
}

function useFirestoreSync(user,localData,setters){
  const syncRef=useRef(false);
  const debounceRef=useRef(null);

  // Download from Firestore when user signs in
  useEffect(()=>{if(!FB_DB||!user)return;
    const docRef=FB_DB.collection("calendars").doc(user.uid);
    docRef.get().then(snap=>{
      if(snap.exists){
        const cloud=snap.data();
        syncRef.current=true;
        if(cloud.events)setters.setEv(cloud.events);
        if(cloud.tasks)setters.setTk(cloud.tasks);
        if(cloud.courses)setters.setCo(cloud.courses);
        if(cloud.cats)setters.setCats(cloud.cats);
        if(cloud.sem)setters.setSem(cloud.sem);
        if(cloud.theme)setters.setTheme(cloud.theme);
        if(cloud.settings)setters.setSettings(cloud.settings);
        if(cloud.exams)setters.setExams(cloud.exams);
        if(cloud.assignments)setters.setAssignments(cloud.assignments);
        if(cloud.showHolidays!==undefined)setters.setShowHolidays(cloud.showHolidays);
        // Also save to localStorage as cache
        sv(cloud);
        setTimeout(()=>{syncRef.current=false;},500);
      } else {
        // First sign-in: upload local data to cloud
        uploadToFirestore(user.uid,localData);
      }
    }).catch(e=>console.warn("Firestore read error:",e));

    // Listen for real-time changes from other devices
    const unsub=docRef.onSnapshot(snap=>{
      if(!snap.exists||syncRef.current)return;
      const cloud=snap.data();
      if(!cloud._ts)return;
      const localTs=localData._ts||0;
      if(cloud._ts>localTs){
        syncRef.current=true;
        if(cloud.events)setters.setEv(cloud.events);
        if(cloud.tasks)setters.setTk(cloud.tasks);
        if(cloud.courses)setters.setCo(cloud.courses);
        if(cloud.cats)setters.setCats(cloud.cats);
        if(cloud.exams)setters.setExams(cloud.exams);
        if(cloud.assignments)setters.setAssignments(cloud.assignments);
        sv(cloud);
        setTimeout(()=>{syncRef.current=false;},500);
      }
    });
    return unsub;
  },[user]);

  // Upload to Firestore when local data changes (debounced)
  const upload=useCallback((data)=>{
    if(!FB_DB||!user||syncRef.current)return;
    clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(()=>{uploadToFirestore(user.uid,data);},2000);
  },[user]);

  return{upload,isSyncing:syncRef};
}

function uploadToFirestore(uid,data){
  if(!FB_DB||!uid)return;
  const clean={...data,_ts:Date.now()};
  FB_DB.collection("calendars").doc(uid).set(clean,{merge:true}).catch(e=>console.warn("Firestore write error:",e));
}

function App(){
  const saved=useMemo(()=>ld(),[]);
  const{user,loading:authLoading,signIn,signOut}=useFirebaseAuth();
  const[theme,setTheme]=useState(saved?.theme||"light");
  const[view,setView]=useState(()=>window.innerWidth<768?"day":"week");
  const[sbM,setSbM]=useState("both");
  const[cd,setCd]=useState(new Date());
  const[events,setEv]=useState(saved?.events||[]);
  const[tasks,setTk]=useState(saved?.tasks||[]);
  const[courses,setCo]=useState(saved?.courses||[]);
  const[cats,setCats]=useState(saved?.cats||{...BCAT});
  const[sem,setSem]=useState(saved?.sem||"spring-2026");
  const[modal,setModal]=useState(null);
  const[csOpen,setCsOpen]=useState(!saved?.courses);
  const[ac,setAc]=useState(()=>{const s=new Set(Object.keys(saved?.cats||BCAT));s.add("personal");s.add("other");s.add("_academic");s.add("_holidays");return s;});
  const[showHolidays,setShowHolidays]=useState(saved?.showHolidays!==false);
  const[settings,setSettings]=useState(saved?.settings||{weekStart:0,timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone,hourFormat:"12"});
  const[settingsOpen,setSettingsOpen]=useState(false);
  const[exams,setExams]=useState(saved?.exams||[]);
  const[assignments,setAssignments]=useState(saved?.assignments||[]);
  const[eaOpen,setEaOpen]=useState(null); // course id to open exams/assignments for
  const[drag,setDrag]=useState(null);
  const[mcM,setMcM]=useState(()=>new Date());
  const[sbO,setSbO]=useState(()=>window.innerWidth>=768);

  useEffect(()=>{
    const onResize=()=>{if(window.innerWidth<768)setSbO(false);};
    window.addEventListener("resize",onResize);return()=>window.removeEventListener("resize",onResize);
  },[]);

  const syncSetters=useMemo(()=>({setEv,setTk:setTk,setCo,setCats,setSem,setTheme,setSettings,setExams,setAssignments,setShowHolidays}),[]);
  const{upload}=useFirestoreSync(user,{events,tasks,courses,cats,sem,theme,showHolidays,settings,exams,assignments},syncSetters);

  useEffect(()=>{setAc(p=>{const n=new Set(p);Object.keys(cats).forEach(k=>n.add(k));n.add("_holidays");return n;});},[cats]);
  useEffect(()=>{
    const data={events,tasks,courses,cats,sem,theme,showHolidays,settings,exams,assignments};
    sv(data);
    if(user)upload(data);
  },[events,tasks,courses,cats,sem,theme,showHolidays,settings,exams,assignments,user]);

  useEffect(()=>{const cal=PCAL[sem];if(!cal)return;
    setEv(p=>{const na=p.filter(e=>e.category!=="_academic"&&e.category!=="_holidays");
      const ae=[];cal.ev.forEach(e=>{
        if(e.de){// Multi-day: create event for each day in range
          for(let d=$p(e.d);d<=$p(e.de);d=$a(d,1))ae.push({id:gi(),title:e.t,date:$d(d),category:"_academic",startHour:0,startMin:0,endHour:0,endMin:0,detail:"",_allDay:true,_multiDay:true,_mdStart:e.d,_mdEnd:e.de});
        } else ae.push({id:gi(),title:e.t,date:e.d,category:"_academic",startHour:0,startMin:0,endHour:0,endMin:0,detail:"",_allDay:true});
      });
      const he=showHolidays?US_HOLIDAYS.map(e=>({id:gi(),title:e.t,date:e.d,category:"_holidays",startHour:0,startMin:0,endHour:0,endMin:0,detail:"",_allDay:true})):[];
      return[...na,...ae,...he];});
  },[sem,showHolidays]);

  const T=theme==="dark"?{bg:"#0d0d0f",b2:"#131316",b3:"#1a1a1f",bd:"#2a2a32",tx:"#e8e6f0",t2:"#9896a8",t3:"#5a5868",
    ac:"#c8b8ff",a2:"#8b7fd4",mb:"#1a1a1f",ov:"rgba(0,0,0,0.65)",ib:"#131316",ibd:"#2a2a32",
    tb:"rgba(200,184,255,0.08)",nl:"#c8b8ff",dg:"#ff6b6b"}:
    {bg:"#f5f3ef",b2:"#eeece8",b3:"#ffffff",bd:"#dddad4",tx:"#1a1820",t2:"#6b6578",t3:"#aaa5b5",
    ac:"#5c4db3",a2:"#8b7fd4",mb:"#ffffff",ov:"rgba(0,0,0,0.35)",ib:"#f5f3ef",ibd:"#dddad4",
    tb:"rgba(92,77,179,0.06)",nl:"#5c4db3",dg:"#d94f4f"};

  const goT=()=>setCd(new Date());
  const nav=(dir)=>{const d=new Date(cd);
    if(view==="day")d.setDate(d.getDate()+dir);
    else if(view==="week")d.setDate(d.getDate()+dir*7);
    else if(view==="month")d.setMonth(d.getMonth()+dir);
    else d.setFullYear(d.getFullYear()+dir);setCd(d);};

  useEffect(()=>{const h=(e)=>{if(modal||csOpen||settingsOpen||eaOpen)return;if(["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName))return;
    switch(e.key){case"t":case"T":goT();break;case"d":case"D":setView("day");break;
    case"w":case"W":setView("week");break;case"m":case"M":setView("month");break;
    case"y":case"Y":setView("year");break;case"ArrowLeft":nav(-1);break;case"ArrowRight":nav(1);break;
    case"n":case"N":setModal({type:"event",date:$d(cd)});break;case"[":setSbO(p=>!p);break;}};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[modal,csOpen,settingsOpen,eaOpen,cd,view]);

  const hl=useMemo(()=>{
    if(view==="day")return`${DNF[cd.getDay()]}, ${MN2[cd.getMonth()]} ${cd.getDate()}, ${cd.getFullYear()}`;
    if(view==="week"){const s=$w(cd,settings.weekStart),e=$a(s,6);
      if(s.getMonth()===e.getMonth())return`${MN2[s.getMonth()]} ${s.getDate()}–${e.getDate()}, ${s.getFullYear()}`;
      return`${MN2[s.getMonth()]} ${s.getDate()} – ${MN2[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`;}
    if(view==="month")return`${MN2[cd.getMonth()]} ${cd.getFullYear()}`;
    return`${cd.getFullYear()}`;
  },[view,cd,settings.weekStart]);

  const aE=(ev)=>{
    // Handle recurring
    if(ev._recur&&ev._recur.type!=="none"){
      const all=genRecurring(ev);
      setEv(p=>[...p,...all]);
    } else setEv(p=>[...p,{...ev,id:gi()}]);
  };

// ═══ TIME GRID (Day/Week) ═══
// The key fix: day headers are in a SEPARATE sticky div OUTSIDE the scrollable area
function TG({T,dates,events,tasks,cats,ac,setModal,MO,SE,drag,setDrag}){
  const scrollRef=useRef(null);
  const[nowP,setNowP]=useState(null);
  const[hh,setHh]=useState(HH);
  const pinchRef=useRef(null);

  useEffect(()=>{const u=()=>{const n=new Date();setNowP(n.getHours()*hh+(n.getMinutes()/60)*hh);};u();const iv=setInterval(u,60000);return()=>clearInterval(iv);},[hh]);

  // Pinch-to-zoom touch handlers
  useEffect(()=>{const el=scrollRef.current;if(!el)return;
    const onTS=(e)=>{if(e.touches.length===2){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      pinchRef.current={dist:d,hh};}};
    const onTM=(e)=>{if(e.touches.length===2&&pinchRef.current){e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const scale=d/pinchRef.current.dist;const nh=Math.round(Math.max(30,Math.min(150,pinchRef.current.hh*scale)));setHh(nh);}};
    const onTE=()=>{pinchRef.current=null;};
    el.addEventListener("touchstart",onTS,{passive:false});el.addEventListener("touchmove",onTM,{passive:false});el.addEventListener("touchend",onTE);
    return()=>{el.removeEventListener("touchstart",onTS);el.removeEventListener("touchmove",onTM);el.removeEventListener("touchend",onTE);};
  },[hh]);

  const gH=useCallback((cY,col)=>{if(!col)return 0;const r=col.getBoundingClientRect();return Math.max(0,Math.min(23.75,(cY-r.top)/hh));},[hh]);
  const mD=(e,ds)=>{if(e.button!==0)return;const col=e.currentTarget,h=gH(e.clientY,col),sH=Math.floor(h),sM=Math.round((h-sH)*60/15)*15;
    setDrag({date:ds,sH,sM,eH:sH,eM:sM+30,active:true,col});};
  const mM=(e)=>{if(!drag?.active)return;const h=gH(e.clientY,drag.col),sH=Math.floor(h),sM=Math.round((h-sH)*60/15)*15;
    setDrag(p=>({...p,eH:sH,eM:sM}));};
  const mU=()=>{if(!drag?.active)return;let{date,sH,sM,eH,eM}=drag;
    if(sH>eH||(sH===eH&&sM>=eM))[sH,sM,eH,eM]=[eH,eM,sH,sM];

          {dTk.slice(0,2).map(tk=>{const cat=cats[tk.category]||cats.other;return <div key={tk.id} style={{fontSize:"0.48rem",padding:"0 2px",borderRadius:2,background:cat.bg,color:cat.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",opacity:tk.done?0.5:1}}>{tk.title}</div>;})}
        </div>)}

    <div ref={scrollRef} style={{flex:1,overflow:"auto",userSelect:drag?.active?"none":"auto"}}>
      <div style={{display:"grid",gridTemplateColumns:`48px repeat(${dates.length},1fr)`,position:"relative"}}>
        <div>{HOURS.map(h=><div key={h} style={{height:hh,borderBottom:`1px solid ${T.bd}`,display:"flex",alignItems:"flex-start",justifyContent:"flex-end",paddingRight:4}}>

          return <div key={ds} onMouseDown={e=>mD(e,ds)} style={{position:"relative",borderLeft:`1px solid ${T.bd}`,background:it?T.tb:"transparent",cursor:"crosshair"}}>
            {HOURS.map(h=><div key={h} style={{height:hh,borderBottom:`1px solid ${T.bd}`}}/>)}
            {dEv.map(ev=>{const cat=cats[ev.category]||cats.other;
              const top=(ev.startHour+(ev.startMin||0)/60)*hh,bot=(ev.endHour+(ev.endMin||0)/60)*hh,ht=Math.max(bot-top,16);
              return <div key={ev.id} onClick={e=>{e.stopPropagation();setModal({type:"event",data:ev});}}
                style={{position:"absolute",top,left:1,right:1,height:ht,background:cat.bg,borderLeft:`3px solid ${cat.color}`,

                {ht>22&&<div style={{fontFamily:MO,fontSize:"0.42rem",color:T.t2,marginTop:1}}>{$t(ev.startHour,ev.startMin||0)}–{$t(ev.endHour,ev.endMin||0)}</div>}
                {ht>36&&ev.location&&<div style={{fontFamily:MO,fontSize:"0.4rem",color:T.t3,marginTop:1}}>📍 {ev.location}</div>}

              if(sh>eh||(sh===eh&&sm>em))[sh,sm,eh,em]=[eh,em,sh,sm];

    setExams(p=>[...p,ex]);syncExamEvent(ex);};

  const delExam=(id)=>{setExams(p=>p.filter(x=>x.id!==id));setEv(p=>p.filter(e=>e._examId!==id));};

  const syncExamEvent=(ex)=>{setEv(p=>{const filtered=p.filter(e=>e._examId!==ex.id);

const TIMEZONES=["America/New_York","America/Chicago","America/Denver","America/Los_Angeles","America/Anchorage","Pacific/Honolulu","America/Phoenix","Europe/London","Europe/Paris","Europe/Berlin","Asia/Tokyo","Asia/Shanghai","Asia/Kolkata","Australia/Sydney","UTC"];

function exportICS(events,cats){
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TigerCalendar//EN","CALSCALE:GREGORIAN"];
  events.filter(e=>!e._allDay||e.category!=="_academic").forEach(ev=>{
    lines.push("BEGIN:VEVENT");
    lines.push("UID:"+ev.id+"@tigercalendar");
    const ds=ev.date.replace(/-/g,"");
    if(ev._allDay){lines.push("DTSTART;VALUE=DATE:"+ds);lines.push("DTEND;VALUE=DATE:"+ds);}
    else{lines.push("DTSTART:"+ds+"T"+String(ev.startHour).padStart(2,"0")+String(ev.startMin||0).padStart(2,"0")+"00");
      lines.push("DTEND:"+ds+"T"+String(ev.endHour).padStart(2,"0")+String(ev.endMin||0).padStart(2,"0")+"00");}
    lines.push("SUMMARY:"+(ev.title||"").replace(/\n/g,"\\n"));
    if(ev.location)lines.push("LOCATION:"+ev.location.replace(/\n/g,"\\n"));
    if(ev.detail)lines.push("DESCRIPTION:"+ev.detail.replace(/\n/g,"\\n"));
    const cat=cats[ev.category];if(cat)lines.push("CATEGORIES:"+cat.label);
    lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  const blob=new Blob([lines.join("\r\n")],{type:"text/calendar"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tigercalendar.ics";a.click();URL.revokeObjectURL(a.href);
}

function parseICS(text){
  const events=[];let cur=null;
  text.split(/\r?\n/).forEach(line=>{
    if(line==="BEGIN:VEVENT")cur={};
    else if(line==="END:VEVENT"&&cur){
      if(cur.title&&cur.date)events.push({id:gi(),title:cur.title,date:cur.date,category:"personal",
        startHour:cur.startHour||0,startMin:cur.startMin||0,endHour:cur.endHour||0,endMin:cur.endMin||0,
        detail:cur.detail||"",location:cur.location||"",_allDay:cur.allDay||false});
      cur=null;
    } else if(cur){
      const[k,...v]=line.split(":");const val=v.join(":");
      if(k==="SUMMARY")cur.title=val.replace(/\\n/g,"\n");
      else if(k==="LOCATION")cur.location=val.replace(/\\n/g,"\n");
      else if(k==="DESCRIPTION")cur.detail=val.replace(/\\n/g,"\n");
      else if(k.startsWith("DTSTART")){
        if(k.includes("VALUE=DATE")){cur.date=val.slice(0,4)+"-"+val.slice(4,6)+"-"+val.slice(6,8);cur.allDay=true;}
        else{cur.date=val.slice(0,4)+"-"+val.slice(4,6)+"-"+val.slice(6,8);cur.startHour=+val.slice(9,11);cur.startMin=+val.slice(11,13);}
      } else if(k.startsWith("DTEND")&&!k.includes("VALUE=DATE")){
        cur.endHour=+val.slice(9,11);cur.endMin=+val.slice(11,13);
      }
    }
  });
  return events;
}

  const[recDays,setRecDays]=useState([new Date().getDay()]);

  const toggleRecDay=(d)=>setRecDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d].sort());

    if(!title.trim())return;

  const IS={width:"100%",background:T.ib,border:`1px solid ${T.ibd}`,borderRadius:6,padding:"6px 8px",color:T.tx,fontFamily:"'DM Sans',sans-serif",fontSize:"0.8rem",outline:"none",WebkitAppearance:"none"};
  const SS={...IS,cursor:"pointer"};
  const LS={fontFamily:MO,fontSize:"0.52rem",color:T.t3,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3,display:"block"};
  const hO=HOURS.map(h=><option key={h} value={h}>{$t(h,0).replace(":00 "," ")}</option>);
  const mO=[0,15,30,45].map(m=><option key={m} value={m}>{String(m).padStart(2,"0")}</option>);

  return <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:T.ov,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.mb,border:`1px solid ${T.bd}`,borderRadius:14,
      padding:20,width:"100%",maxWidth:440,maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{fontFamily:SE,fontSize:"1.1rem",color:T.tx,marginBottom:12}}>{isEd?"Edit":"New"} {tp==="event"?"Event":"Task"}</div>
      {isCE&&<div style={{fontFamily:MO,fontSize:"0.55rem",color:T.ac,background:`${T.ac}15`,padding:"4px 8px",borderRadius:5,marginBottom:8,lineHeight:1.3}}>
        Recurring class — changes only affect this occurrence.</div>}
      {!isEd&&<div style={{display:"flex",marginBottom:10,gap:4}}>
        {["event","task"].map(x=><button key={x} onClick={()=>setTp(x)} style={{flex:1,padding:"4px 0",border:"none",borderRadius:5,cursor:"pointer",
          fontFamily:MO,fontSize:"0.58rem",letterSpacing:"0.06em",textTransform:"uppercase",
          background:tp===x?T.ac:T.b3,color:tp===x?T.bg:T.t3}}>{x}</button>)}</div>}
      <div style={{marginBottom:8}}><label style={LS}>Title</label>
        <input value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()} autoFocus style={IS}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
        <div><label style={LS}>Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={IS}/></div>
        <div><label style={LS}>Category</label><select value={cat} onChange={e=>setCat(e.target.value)} style={SS}>
          {Object.entries(cats).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
      </div>
      {tp==="event"&&<>
        {/* All day toggle */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
          <div onClick={()=>setAllDay(!allDay)} style={{width:32,height:16,background:allDay?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer"}}>
            <div style={{width:10,height:10,background:allDay?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:allDay?18:3,transition:"left 0.2s"}}/></div>
          <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2,letterSpacing:"0.06em",textTransform:"uppercase"}}>All Day</span>
        </div>
        {!allDay&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
          <div><label style={LS}>Start</label><div style={{display:"flex",gap:2}}>
            <select value={sH} onChange={e=>setSH(+e.target.value)} style={{...SS,flex:2}}>{hO}</select>
            <select value={sM} onChange={e=>setSM(+e.target.value)} style={{...SS,flex:1}}>{mO}</select></div></div>
          <div><label style={LS}>End</label><div style={{display:"flex",gap:2}}>
            <select value={eH} onChange={e=>setEH(+e.target.value)} style={{...SS,flex:2}}>{hO}</select>
            <select value={eM} onChange={e=>setEM(+e.target.value)} style={{...SS,flex:1}}>{mO}</select></div></div>
        </div>}
        {/* Location */}
        <div style={{marginBottom:8}}><label style={LS}>Location <span style={{opacity:0.5}}>(optional)</span></label>
          <input value={loc} onChange={e=>setLoc(e.target.value)} placeholder="e.g. Friend Center 101" style={IS}/></div>
        {/* Recurrence (only for new events) */}
        {!isEd&&<div style={{marginBottom:8}}>
          <label style={LS}>Repeat</label>
          <select value={recType} onChange={e=>setRecType(e.target.value)} style={SS}>
            <option value="none">Does not repeat</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="annually">Annually</option>
            <option value="weekdays">Every weekday (Mon–Fri)</option>
            <option value="custom">Custom…</option>
          </select>
          {(recType==="weekly")&&<div style={{marginTop:5}}>
            <label style={{...LS,marginBottom:2}}>On days</label>
            <div style={{display:"flex",gap:2}}>
              {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>
                <button key={d} onClick={()=>toggleRecDay(i)} style={{width:26,height:22,border:`1px solid ${recDays.includes(i)?T.ac:T.bd}`,borderRadius:3,
                  cursor:"pointer",fontFamily:MO,fontSize:"0.46rem",background:recDays.includes(i)?`${T.ac}30`:"transparent",
                  color:recDays.includes(i)?T.ac:T.t3}}>{d}</button>)}
            </div>
          </div>}
          {recType==="custom"&&<div style={{marginTop:5,padding:8,background:T.b2,borderRadius:6,border:`1px solid ${T.bd}`}}>
            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:5}}>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>Every</span>
              <input type="number" min={1} max={99} value={recEvery} onChange={e=>setRecEvery(+e.target.value||1)}
                style={{...IS,width:48,textAlign:"center",padding:"3px 4px"}}/>
              <select value={recUnit} onChange={e=>setRecUnit(e.target.value)} style={{...SS,width:80}}>
                <option value="day">day(s)</option><option value="week">week(s)</option>
                <option value="month">month(s)</option><option value="year">year(s)</option>
              </select>
            </div>
            {recUnit==="week"&&<div style={{marginBottom:5}}>
              <label style={{...LS,marginBottom:2}}>On days</label>
              <div style={{display:"flex",gap:2}}>
                {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>
                  <button key={d} onClick={()=>toggleRecDay(i)} style={{width:26,height:22,border:`1px solid ${recDays.includes(i)?T.ac:T.bd}`,borderRadius:3,
                    cursor:"pointer",fontFamily:MO,fontSize:"0.46rem",background:recDays.includes(i)?`${T.ac}30`:"transparent",
                    color:recDays.includes(i)?T.ac:T.t3}}>{d}</button>)}
              </div>
            </div>}
            <div>
              <label style={{...LS,marginBottom:2}}>Ends</label>
              <select value={recEnd} onChange={e=>setRecEnd(e.target.value)} style={{...SS,marginBottom:4}}>
                <option value="never">Never</option><option value="date">On date</option><option value="after">After # occurrences</option>
              </select>
              {recEnd==="date"&&<input type="date" value={recEndDate} onChange={e=>setRecEndDate(e.target.value)} style={{...IS,marginTop:3}}/>}
              {recEnd==="after"&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}}>
                <input type="number" min={1} max={365} value={recEndAfter} onChange={e=>setRecEndAfter(+e.target.value||1)}
                  style={{...IS,width:60,textAlign:"center",padding:"3px 4px"}}/>
                <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>occurrences</span>
              </div>}
            </div>
          </div>}
          {recType!=="none"&&recType!=="custom"&&<div style={{marginTop:5}}>
            <label style={{...LS,marginBottom:2}}>Ends</label>
            <select value={recEnd} onChange={e=>setRecEnd(e.target.value)} style={{...SS,marginBottom:3}}>
              <option value="never">Never</option><option value="date">On date</option><option value="after">After # occurrences</option>
            </select>
            {recEnd==="date"&&<input type="date" value={recEndDate} onChange={e=>setRecEndDate(e.target.value)} style={{...IS,marginTop:2}}/>}
            {recEnd==="after"&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:2}}>
              <input type="number" min={1} max={365} value={recEndAfter} onChange={e=>setRecEndAfter(+e.target.value||1)}
                style={{...IS,width:60,textAlign:"center",padding:"3px"}}/>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>occurrences</span>
            </div>}
          </div>}
        </div>}
      </>}
      {tp==="task"&&<div style={{marginBottom:8}}><label style={LS}>Deadline</label>
        <input value={dl} onChange={e=>setDl(e.target.value)} placeholder="e.g. Due Thu 3/19 9pm" style={IS}/></div>}
      <div style={{marginBottom:10}}><label style={LS}>Notes</label>
        <textarea value={det} onChange={e=>setDet(e.target.value)} placeholder="Details, readings, links…"
          style={{...IS,minHeight:45,resize:"vertical",lineHeight:1.4}}/></div>
      <div style={{display:"flex",gap:7,justifyContent:"space-between"}}>
        <div>{isEd&&<button onClick={handleDel} style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${T.dg}`,
          background:cd2?T.dg:`${T.dg}15`,color:cd2?"#fff":T.dg,cursor:"pointer",fontSize:"0.76rem",fontWeight:500}}>
          {cd2?"Confirm":"Delete"}</button>}</div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={()=>setModal(null)} style={{padding:"5px 14px",borderRadius:6,border:"none",background:T.b3,color:T.t3,cursor:"pointer",fontSize:"0.76rem",fontWeight:500}}>Cancel</button>
          <button onClick={save} style={{padding:"5px 16px",borderRadius:6,border:"none",background:T.ac,color:T.bg,cursor:"pointer",fontSize:"0.76rem",fontWeight:600}}>{isEd?"Save":"Create"}</button>
        </div>
      </div>
    </div>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
document.getElementById("root").classList.add("ready");
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
