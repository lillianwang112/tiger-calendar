<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TigerCalendar</title>
<meta name="description" content="TigerCalendar — a personal calendar and task manager">
<meta name="theme-color" content="#0d0d0f">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐯</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; }
  /* Hide FOUC */
  #root { opacity: 0; transition: opacity 0.2s; }
  #root.ready { opacity: 1; }
  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a44; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Constants ───
const HOURS = Array.from({ length: 24 }, (_, i) => i);
const HOUR_HEIGHT = 60;
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAY_NAMES_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const CATEGORIES = {
  mat217: { label: "MAT 217", color: "#ff8c69", bg: "rgba(255,140,105,0.12)" },
  cos126: { label: "COS 126", color: "#69d4ff", bg: "rgba(105,212,255,0.12)" },
  chi108: { label: "CHI 108", color: "#ff6fa0", bg: "rgba(255,111,160,0.12)" },
  eco310: { label: "ECO 310", color: "#a8e06a", bg: "rgba(168,224,106,0.12)" },
  hmei:   { label: "HMEI",    color: "#ffd06a", bg: "rgba(255,208,106,0.12)" },
  qcb311: { label: "QCB 311", color: "#b0b0c0", bg: "rgba(176,176,192,0.12)" },
  personal: { label: "Personal", color: "#c8b8ff", bg: "rgba(200,184,255,0.12)" },
  other:  { label: "Other",   color: "#8ecae6", bg: "rgba(142,202,230,0.12)" },
};

const STORAGE_KEY = "tiger_calendar_v1";
const genId = () => "id_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function parseDate(s) {
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function startOfWeek(d) { const r = new Date(d); r.setDate(r.getDate() - r.getDay()); return r; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function formatTime(h,m) { const p = h >= 12 ? "PM" : "AM"; return `${h%12||12}:${String(m).padStart(2,"0")} ${p}`; }
function isToday(d) { return sameDay(d, new Date()); }

// ─── Persistence ───
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function saveData(events, tasks) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ events, tasks }));
  } catch(e) {}
}

// ─── Main App ───
function TigerCalendar() {
  const saved = useMemo(() => loadData(), []);
  const [theme, setTheme] = useState("dark");
  const [view, setView] = useState("week");
  const [sidebarMode, setSidebarMode] = useState("both");
  const [currentDate, setCurrentDate] = useState(new Date());
  const [events, setEvents] = useState(saved?.events || []);
  const [tasks, setTasks] = useState(saved?.tasks || []);
  const [showModal, setShowModal] = useState(null);
  const [activeCategories, setActiveCategories] = useState(new Set(Object.keys(CATEGORIES)));
  const [dragState, setDragState] = useState(null);
  const [miniCalMonth, setMiniCalMonth] = useState(() => new Date());
  const [sidebarOpen, setSidebarOpen] = useState(true);

  // Persist on change
  useEffect(() => { saveData(events, tasks); }, [events, tasks]);

  // Theme CSS vars
  const t = theme === "dark" ? {
    bg: "#0d0d0f", bg2: "#131316", bg3: "#1a1a1f", border: "#2a2a32",
    text: "#e8e6f0", text2: "#9896a8", text3: "#5a5868",
    accent: "#c8b8ff", accent2: "#8b7fd4",
    modalBg: "#1a1a1f", overlay: "rgba(0,0,0,0.65)",
    inputBg: "#131316", inputBorder: "#2a2a32",
    hoverBg: "#1e1d26", todayBg: "rgba(200,184,255,0.08)",
    nowLine: "#c8b8ff", danger: "#ff6b6b",
  } : {
    bg: "#f5f3ef", bg2: "#eeece8", bg3: "#ffffff", border: "#dddad4",
    text: "#1a1820", text2: "#6b6578", text3: "#aaa5b5",
    accent: "#5c4db3", accent2: "#8b7fd4",
    modalBg: "#ffffff", overlay: "rgba(0,0,0,0.35)",
    inputBg: "#f5f3ef", inputBorder: "#dddad4",
    hoverBg: "#f0ede7", todayBg: "rgba(92,77,179,0.06)",
    nowLine: "#5c4db3", danger: "#d94f4f",
  };

  const goToday = () => setCurrentDate(new Date());
  const navigate = (dir) => {
    const d = new Date(currentDate);
    if (view === "day") d.setDate(d.getDate() + dir);
    else if (view === "week") d.setDate(d.getDate() + dir * 7);
    else if (view === "month") d.setMonth(d.getMonth() + dir);
    else d.setFullYear(d.getFullYear() + dir);
    setCurrentDate(d);
  };

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (showModal) return; // don't intercept when modal open
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
      switch(e.key) {
        case "t": case "T": goToday(); break;
        case "d": case "D": setView("day"); break;
        case "w": case "W": setView("week"); break;
        case "m": case "M": setView("month"); break;
        case "y": case "Y": setView("year"); break;
        case "ArrowLeft": navigate(-1); break;
        case "ArrowRight": navigate(1); break;
        case "n": case "N": setShowModal({ type: "event", date: dateKey(currentDate) }); break;
        case "[": setSidebarOpen(p => !p); break;
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [showModal, currentDate, view]);

  const headerLabel = useMemo(() => {
    if (view === "day") return `${DAY_NAMES_FULL[currentDate.getDay()]}, ${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getDate()}, ${currentDate.getFullYear()}`;
    if (view === "week") {
      const s = startOfWeek(currentDate);
      const e = addDays(s, 6);
      if (s.getMonth() === e.getMonth()) return `${MONTH_NAMES[s.getMonth()]} ${s.getDate()}–${e.getDate()}, ${s.getFullYear()}`;
      return `${MONTH_NAMES[s.getMonth()]} ${s.getDate()} – ${MONTH_NAMES[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`;
    }
    if (view === "month") return `${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
    return `${currentDate.getFullYear()}`;
  }, [view, currentDate]);

  // CRUD
  const addEvent = (ev) => setEvents(prev => [...prev, { ...ev, id: genId() }]);
  const updateEvent = (id, data) => setEvents(prev => prev.map(e => e.id === id ? { ...e, ...data } : e));
  const deleteEvent = (id) => setEvents(prev => prev.filter(e => e.id !== id));
  const addTask = (tk) => setTasks(prev => [...prev, { ...tk, id: genId(), done: false }]);
  const updateTask = (id, data) => setTasks(prev => prev.map(t => t.id === id ? { ...t, ...data } : t));
  const deleteTask = (id) => setTasks(prev => prev.filter(t => t.id !== id));
  const toggleTask = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));

  const toggleCategory = (cat) => {
    setActiveCategories(prev => {
      const next = new Set(prev);
      if (next.has(cat)) next.delete(cat); else next.add(cat);
      return next;
    });
  };

  const mono = "'DM Mono', 'SF Mono', monospace";
  const serif = "'DM Serif Display', Georgia, serif";

  return (
    <div style={{
      fontFamily: "'DM Sans', -apple-system, sans-serif",
      background: t.bg, color: t.text,
      height: "100vh", display: "flex", flexDirection: "column",
      transition: "background 0.3s, color 0.3s", overflow: "hidden", fontSize: 14,
    }}>

      {/* ─── Top Bar ─── */}
      <div style={{
        display: "flex", alignItems: "center", gap: 12, padding: "10px 20px",
        borderBottom: `1px solid ${t.border}`, background: t.bg2, flexShrink: 0,
        justifyContent: "space-between", flexWrap: "wrap",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {/* Sidebar toggle */}
          <button onClick={() => setSidebarOpen(p => !p)} title="Toggle sidebar ( [ )" style={{
            background: "none", border: "none", color: t.text2, cursor: "pointer",
            fontSize: "1.1rem", padding: "2px 4px", display: "flex", alignItems: "center",
          }}>☰</button>
          <h1 style={{
            fontFamily: serif, fontSize: "1.35rem", margin: 0,
            letterSpacing: "-0.02em", lineHeight: 1,
          }}>
            Tiger<span style={{ color: t.accent, fontStyle: "italic" }}>Calendar</span>
          </h1>
          <button onClick={goToday} title="Go to today (T)" style={{
            background: "transparent", border: `1px solid ${t.border}`, color: t.text2,
            padding: "4px 12px", borderRadius: 6, cursor: "pointer",
            fontFamily: mono, fontSize: "0.7rem", letterSpacing: "0.05em",
          }}>TODAY</button>
          <div style={{ display: "flex", gap: 2 }}>
            <button onClick={() => navigate(-1)} title="Previous (←)" style={navBtnStyle(t)}>‹</button>
            <button onClick={() => navigate(1)} title="Next (→)" style={navBtnStyle(t)}>›</button>
          </div>
          <span style={{ fontFamily: serif, fontSize: "1.05rem", color: t.text }}>{headerLabel}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{
            display: "flex", background: t.bg3, border: `1px solid ${t.border}`,
            borderRadius: 8, overflow: "hidden",
          }}>
            {["day","week","month","year"].map(v => (
              <button key={v} onClick={() => setView(v)}
                title={`${v.charAt(0).toUpperCase()+v.slice(1)} view (${v[0].toUpperCase()})`}
                style={{
                  padding: "5px 14px", border: "none", cursor: "pointer",
                  fontFamily: mono, fontSize: "0.65rem", letterSpacing: "0.08em",
                  textTransform: "uppercase",
                  background: view === v ? t.accent : "transparent",
                  color: view === v ? t.bg : t.text3,
                  transition: "all 0.15s",
                }}>{v}</button>
            ))}
          </div>
          <div onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
            style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", userSelect: "none" }}>
            <span style={{ fontFamily: mono, fontSize: "0.65rem", color: t.text3, letterSpacing: "0.08em" }}>
              {theme === "dark" ? "☾" : "☀"}
            </span>
            <div style={{
              width: 36, height: 20, background: t.bg3, borderRadius: 10,
              border: `1px solid ${t.border}`, position: "relative", transition: "background 0.3s",
            }}>
              <div style={{
                width: 14, height: 14, background: t.accent, borderRadius: "50%",
                position: "absolute", top: 2, left: theme === "dark" ? 3 : 19,
                transition: "left 0.3s", boxShadow: `0 0 6px ${t.accent}40`,
              }} />
            </div>
          </div>
        </div>
      </div>

      {/* ─── Main Layout ─── */}
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        {sidebarOpen && (
          <Sidebar
            t={t} sidebarMode={sidebarMode} setSidebarMode={setSidebarMode}
            tasks={tasks} events={events}
            activeCategories={activeCategories} toggleCategory={toggleCategory}
            toggleTask={toggleTask} deleteTask={deleteTask}
            setShowModal={setShowModal}
            currentDate={currentDate} setCurrentDate={setCurrentDate}
            miniCalMonth={miniCalMonth} setMiniCalMonth={setMiniCalMonth}
            mono={mono} serif={serif} updateTask={updateTask}
          />
        )}
        <div style={{ flex: 1, overflow: "auto", position: "relative" }}>
          {view === "day" && <DayView t={t} date={currentDate} events={events} tasks={tasks}
            activeCategories={activeCategories} setShowModal={setShowModal}
            mono={mono} serif={serif} dragState={dragState} setDragState={setDragState}
            addEvent={addEvent} deleteEvent={deleteEvent} updateEvent={updateEvent} />}
          {view === "week" && <WeekView t={t} date={currentDate} events={events} tasks={tasks}
            activeCategories={activeCategories} setShowModal={setShowModal}
            mono={mono} serif={serif} dragState={dragState} setDragState={setDragState}
            addEvent={addEvent} deleteEvent={deleteEvent} updateEvent={updateEvent} />}
          {view === "month" && <MonthView t={t} date={currentDate} events={events} tasks={tasks}
            activeCategories={activeCategories} setShowModal={setShowModal}
            mono={mono} serif={serif} setCurrentDate={setCurrentDate} setView={setView} />}
          {view === "year" && <YearView t={t} date={currentDate} events={events} tasks={tasks}
            mono={mono} serif={serif} setCurrentDate={setCurrentDate} setView={setView} />}
        </div>
      </div>

      {showModal && (
        <EventTaskModal t={t} modal={showModal} setShowModal={setShowModal}
          addEvent={addEvent} updateEvent={updateEvent} deleteEvent={deleteEvent}
          addTask={addTask} updateTask={updateTask} deleteTask={deleteTask}
          mono={mono} serif={serif} />
      )}
    </div>
  );
}

function navBtnStyle(t) {
  return {
    width: 28, height: 28, background: "transparent", border: `1px solid ${t.border}`,
    color: t.text2, borderRadius: 6, cursor: "pointer", fontSize: "1rem",
    display: "flex", alignItems: "center", justifyContent: "center",
  };
}

// ═══════════════════════════════════════════════
// ─── SIDEBAR ───
// ═══════════════════════════════════════════════
function Sidebar({ t, sidebarMode, setSidebarMode, tasks, events, activeCategories, toggleCategory,
  toggleTask, deleteTask, setShowModal, currentDate, setCurrentDate,
  miniCalMonth, setMiniCalMonth, mono, serif, updateTask }) {

  const tasksForView = tasks.filter(tk => activeCategories.has(tk.category));
  const doneTasks = tasksForView.filter(t => t.done);
  const pendingTasks = tasksForView.filter(t => !t.done);

  const mcYear = miniCalMonth.getFullYear();
  const mcMonth = miniCalMonth.getMonth();
  const firstDay = new Date(mcYear, mcMonth, 1).getDay();
  const dim = daysInMonth(mcYear, mcMonth);
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);

  return (
    <div style={{
      width: 270, borderRight: `1px solid ${t.border}`, background: t.bg2,
      display: "flex", flexDirection: "column", overflow: "hidden", flexShrink: 0,
    }}>
      {/* Mini calendar */}
      <div style={{ padding: "14px 14px 6px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
          <button onClick={() => setMiniCalMonth(new Date(mcYear, mcMonth - 1, 1))}
            style={{ background: "none", border: "none", color: t.text3, cursor: "pointer", fontSize: 14 }}>‹</button>
          <span style={{ fontFamily: mono, fontSize: "0.68rem", color: t.text2, letterSpacing: "0.06em", textTransform: "uppercase" }}>
            {MONTH_NAMES[mcMonth]} {mcYear}
          </span>
          <button onClick={() => setMiniCalMonth(new Date(mcYear, mcMonth + 1, 1))}
            style={{ background: "none", border: "none", color: t.text3, cursor: "pointer", fontSize: 14 }}>›</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 1, textAlign: "center" }}>
          {DAY_NAMES.map(d => (
            <div key={d} style={{ fontFamily: mono, fontSize: "0.52rem", color: t.text3, padding: "2px 0", letterSpacing: "0.04em" }}>{d[0]}</div>
          ))}
          {cells.map((day, i) => {
            const isT = day && isToday(new Date(mcYear, mcMonth, day));
            const isSel = day && sameDay(new Date(mcYear, mcMonth, day), currentDate);
            return (
              <div key={i} onClick={() => day && setCurrentDate(new Date(mcYear, mcMonth, day))}
                style={{
                  fontSize: "0.7rem", padding: "3px 0", cursor: day ? "pointer" : "default",
                  borderRadius: "50%", color: isT ? t.accent : day ? t.text : "transparent",
                  background: isSel ? `${t.accent}22` : "transparent",
                  fontWeight: isT ? 700 : 400,
                  border: isSel ? `1px solid ${t.accent}44` : "1px solid transparent",
                  transition: "all 0.15s",
                }}>
                {day || ""}
              </div>
            );
          })}
        </div>
      </div>

      {/* Category filters */}
      <div style={{ padding: "6px 14px", display: "flex", flexWrap: "wrap", gap: 3 }}>
        {Object.entries(CATEGORIES).map(([key, cat]) => (
          <span key={key} onClick={() => toggleCategory(key)} style={{
            fontFamily: mono, fontSize: "0.55rem", padding: "2px 7px", borderRadius: 12,
            border: `1px solid ${cat.color}`, color: cat.color, background: cat.bg,
            cursor: "pointer", letterSpacing: "0.04em", textTransform: "uppercase",
            opacity: activeCategories.has(key) ? 1 : 0.25, transition: "opacity 0.15s",
          }}>{cat.label}</span>
        ))}
      </div>

      {/* Sidebar mode tabs */}
      <div style={{ display: "flex", borderTop: `1px solid ${t.border}`, borderBottom: `1px solid ${t.border}` }}>
        {[["tasks","Tasks"],["schedule","Events"],["both","Both"]].map(([k,l]) => (
          <button key={k} onClick={() => setSidebarMode(k)} style={{
            flex: 1, padding: "6px 0", border: "none", cursor: "pointer",
            fontFamily: mono, fontSize: "0.58rem", letterSpacing: "0.06em", textTransform: "uppercase",
            background: sidebarMode === k ? t.accent : "transparent",
            color: sidebarMode === k ? t.bg : t.text3,
            transition: "all 0.15s",
          }}>{l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflow: "auto", padding: "6px 0" }}>
        <div style={{ display: "flex", gap: 5, padding: "4px 14px 8px" }}>
          <button onClick={() => setShowModal({ type: "event", date: dateKey(currentDate) })}
            title="New event (N)" style={{
            flex: 1, padding: "6px 0", background: "transparent", border: `1px dashed ${t.border}`,
            borderRadius: 6, color: t.text3, fontFamily: mono, fontSize: "0.62rem",
            cursor: "pointer", letterSpacing: "0.04em",
          }}>+ Event</button>
          <button onClick={() => setShowModal({ type: "task", date: dateKey(currentDate) })} style={{
            flex: 1, padding: "6px 0", background: "transparent", border: `1px dashed ${t.border}`,
            borderRadius: 6, color: t.text3, fontFamily: mono, fontSize: "0.62rem",
            cursor: "pointer", letterSpacing: "0.04em",
          }}>+ Task</button>
        </div>

        {(sidebarMode === "tasks" || sidebarMode === "both") && (
          <div style={{ padding: "0 14px 10px" }}>
            <div style={{ fontFamily: mono, fontSize: "0.58rem", color: t.text3, letterSpacing: "0.1em",
              textTransform: "uppercase", marginBottom: 5, display: "flex", justifyContent: "space-between" }}>
              <span>Tasks</span>
              <span>{doneTasks.length}/{tasksForView.length}</span>
            </div>
            <div style={{ height: 3, background: t.bg3, borderRadius: 2, marginBottom: 7, overflow: "hidden" }}>
              <div style={{
                height: "100%", background: t.accent, borderRadius: 2,
                width: tasksForView.length ? `${(doneTasks.length/tasksForView.length*100)}%` : "0%",
                transition: "width 0.3s",
              }} />
            </div>
            {pendingTasks.map(tk => (
              <SidebarTask key={tk.id} task={tk} t={t} mono={mono} toggleTask={toggleTask}
                deleteTask={deleteTask} setShowModal={setShowModal} />
            ))}
            {doneTasks.length > 0 && (
              <details style={{ marginTop: 4 }}>
                <summary style={{ fontFamily: mono, fontSize: "0.55rem", color: t.text3, cursor: "pointer",
                  letterSpacing: "0.04em", padding: "4px 0" }}>
                  {doneTasks.length} completed
                </summary>
                {doneTasks.map(tk => (
                  <SidebarTask key={tk.id} task={tk} t={t} mono={mono} toggleTask={toggleTask}
                    deleteTask={deleteTask} setShowModal={setShowModal} />
                ))}
              </details>
            )}
          </div>
        )}

        {(sidebarMode === "schedule" || sidebarMode === "both") && (
          <div style={{ padding: "0 14px 10px" }}>
            <div style={{ fontFamily: mono, fontSize: "0.58rem", color: t.text3, letterSpacing: "0.1em",
              textTransform: "uppercase", marginBottom: 5 }}>Upcoming Events</div>
            {events
              .filter(ev => activeCategories.has(ev.category))
              .sort((a,b) => {
                const da = parseDate(a.date); const db = parseDate(b.date);
                return da - db || a.startHour - b.startHour;
              })
              .slice(0, 15)
              .map(ev => <SidebarEvent key={ev.id} event={ev} t={t} mono={mono} setShowModal={setShowModal} />)
            }
            {events.filter(ev => activeCategories.has(ev.category)).length === 0 && (
              <div style={{ fontSize: "0.72rem", color: t.text3, padding: "6px 0" }}>No events yet</div>
            )}
          </div>
        )}
      </div>

      {/* Keyboard shortcut hint */}
      <div style={{ padding: "6px 14px", borderTop: `1px solid ${t.border}`,
        fontFamily: mono, fontSize: "0.48rem", color: t.text3, letterSpacing: "0.04em", lineHeight: 1.6 }}>
        <span style={{ opacity: 0.7 }}>Keys: D W M Y views · T today · ← → nav · N new · [ sidebar</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// ─── TIME GRID ───
// ═══════════════════════════════════════════════
function TimeGrid({ t, dates, events, tasks, activeCategories, setShowModal, mono, serif,
  dragState, setDragState, addEvent, deleteEvent, updateEvent, showDayHeader = true }) {

  const gridRef = useRef(null);
  const [nowPos, setNowPos] = useState(null);

  useEffect(() => {
    const update = () => {
      const now = new Date();
      setNowPos(now.getHours() * HOUR_HEIGHT + (now.getMinutes() / 60) * HOUR_HEIGHT);
    };
    update();
    const iv = setInterval(update, 60000);
    return () => clearInterval(iv);
  }, []);

  const getHourFromY = useCallback((y) => {
    if (!gridRef.current) return 0;
    const rect = gridRef.current.getBoundingClientRect();
    const scrollTop = gridRef.current.scrollTop;
    const relY = y - rect.top + scrollTop;
    return Math.max(0, Math.min(23.75, relY / HOUR_HEIGHT));
  }, []);

  const handleMouseDown = (e, dateStr) => {
    if (e.button !== 0) return;
    const hour = getHourFromY(e.clientY);
    const snapH = Math.floor(hour);
    const snapM = Math.round((hour - snapH) * 60 / 15) * 15;
    setDragState({ date: dateStr, startHour: snapH, startMin: snapM, endHour: snapH, endMin: snapM + 30, active: true });
  };

  const handleMouseMove = (e) => {
    if (!dragState?.active) return;
    const hour = getHourFromY(e.clientY);
    const snapH = Math.floor(hour);
    const snapM = Math.round((hour - snapH) * 60 / 15) * 15;
    setDragState(prev => ({ ...prev, endHour: snapH, endMin: snapM }));
  };

  const handleMouseUp = () => {
    if (!dragState?.active) return;
    let { date, startHour, startMin, endHour, endMin } = dragState;
    if (startHour > endHour || (startHour === endHour && startMin >= endMin)) {
      [startHour, startMin, endHour, endMin] = [endHour, endMin, startHour, startMin];
    }
    if (endHour - startHour === 0 && endMin - startMin < 15) endMin = startMin + 30;
    setDragState(null);
    setShowModal({
      type: "event", date,
      prefill: { startHour, startMin: startMin % 60, endHour, endMin: endMin % 60 },
    });
  };

  useEffect(() => {
    if (gridRef.current) gridRef.current.scrollTop = 7 * HOUR_HEIGHT;
  }, []);

  // Account for day header + tasks row offset in Y calculation
  const headerOffset = useRef(0);

  return (
    <div ref={gridRef}
      onMouseMove={handleMouseMove}
      onMouseUp={handleMouseUp}
      onMouseLeave={() => dragState?.active && handleMouseUp()}
      style={{ flex: 1, overflow: "auto", position: "relative", userSelect: dragState?.active ? "none" : "auto" }}>

      {showDayHeader && (
        <div style={{
          display: "grid", gridTemplateColumns: `56px repeat(${dates.length}, 1fr)`,
          position: "sticky", top: 0, zIndex: 10, background: t.bg2,
          borderBottom: `1px solid ${t.border}`,
        }}>
          <div />
          {dates.map(d => {
            const isTd = isToday(d);
            return (
              <div key={dateKey(d)} style={{
                padding: "6px 8px 4px", textAlign: "center",
                background: isTd ? t.todayBg : "transparent",
              }}>
                <div style={{ fontFamily: mono, fontSize: "0.58rem", color: t.text3, letterSpacing: "0.08em", textTransform: "uppercase" }}>
                  {DAY_NAMES[d.getDay()]}
                </div>
                <div style={{
                  fontFamily: serif, fontSize: "1.25rem", color: isTd ? t.accent : t.text,
                  fontWeight: isTd ? 700 : 400,
                }}>{d.getDate()}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* All-day tasks row */}
      {(() => {
        const allDayContent = dates.map(d => {
          const dk = dateKey(d);
          const dayTasks = tasks.filter(tk => tk.date === dk && activeCategories.has(tk.category));
          return { date: d, tasks: dayTasks };
        });
        const hasAny = allDayContent.some(x => x.tasks.length > 0);
        if (!hasAny) return null;
        return (
          <div style={{
            display: "grid", gridTemplateColumns: `56px repeat(${dates.length}, 1fr)`,
            borderBottom: `1px solid ${t.border}`, background: t.bg2,
          }}>
            <div style={{ fontFamily: mono, fontSize: "0.52rem", color: t.text3, padding: "3px 4px",
              textAlign: "right", letterSpacing: "0.04em" }}>TASKS</div>
            {allDayContent.map(({ date: d, tasks: dTasks }) => (
              <div key={dateKey(d)} style={{ padding: "2px 3px", minHeight: 22, borderLeft: `1px solid ${t.border}` }}>
                {dTasks.slice(0, 3).map(tk => {
                  const cat = CATEGORIES[tk.category] || CATEGORIES.other;
                  return (
                    <div key={tk.id} onClick={() => setShowModal({ type: "task", data: tk })}
                      style={{
                        fontSize: "0.6rem", padding: "1px 4px", marginBottom: 1,
                        borderRadius: 3, background: cat.bg, color: cat.color,
                        cursor: "pointer", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                        textDecoration: tk.done ? "line-through" : "none", opacity: tk.done ? 0.5 : 1,
                      }}>{tk.title}</div>
                  );
                })}
                {dTasks.length > 3 && (
                  <div style={{ fontSize: "0.52rem", color: t.text3 }}>+{dTasks.length - 3} more</div>
                )}
              </div>
            ))}
          </div>
        );
      })()}

      {/* Time grid */}
      <div style={{
        display: "grid", gridTemplateColumns: `56px repeat(${dates.length}, 1fr)`,
        position: "relative",
      }}>
        <div style={{ position: "relative" }}>
          {HOURS.map(h => (
            <div key={h} style={{
              height: HOUR_HEIGHT, borderBottom: `1px solid ${t.border}`,
              display: "flex", alignItems: "flex-start", justifyContent: "flex-end",
              paddingRight: 8,
            }}>
              <span style={{ fontFamily: mono, fontSize: "0.56rem", color: t.text3,
                position: "relative", top: -7, letterSpacing: "0.04em" }}>
                {h === 0 ? "" : formatTime(h, 0).replace(":00 ", " ")}
              </span>
            </div>
          ))}
        </div>

        {dates.map(d => {
          const dk = dateKey(d);
          const dayEvents = events.filter(ev => ev.date === dk && activeCategories.has(ev.category));
          const isTd = isToday(d);
          return (
            <div key={dk}
              onMouseDown={(e) => handleMouseDown(e, dk)}
              style={{
                position: "relative", borderLeft: `1px solid ${t.border}`,
                background: isTd ? t.todayBg : "transparent", cursor: "crosshair",
              }}>
              {HOURS.map(h => (
                <div key={h} style={{ height: HOUR_HEIGHT, borderBottom: `1px solid ${t.border}` }} />
              ))}

              {dayEvents.map(ev => {
                const cat = CATEGORIES[ev.category] || CATEGORIES.other;
                const top = (ev.startHour + (ev.startMin || 0) / 60) * HOUR_HEIGHT;
                const bot = (ev.endHour + (ev.endMin || 0) / 60) * HOUR_HEIGHT;
                const height = Math.max(bot - top, 20);
                return (
                  <div key={ev.id}
                    onClick={(e) => { e.stopPropagation(); setShowModal({ type: "event", data: ev }); }}
                    style={{
                      position: "absolute", top, left: 2, right: 2, height,
                      background: cat.bg, borderLeft: `3px solid ${cat.color}`,
                      borderRadius: 4, padding: "2px 6px", cursor: "pointer",
                      overflow: "hidden", zIndex: 5,
                      boxShadow: "0 1px 3px rgba(0,0,0,0.15)", transition: "box-shadow 0.15s",
                    }}>
                    <div style={{ fontSize: "0.68rem", fontWeight: 600, color: t.text, lineHeight: 1.2,
                      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ev.title}</div>
                    {height > 30 && (
                      <div style={{ fontFamily: mono, fontSize: "0.52rem", color: t.text2, marginTop: 1 }}>
                        {formatTime(ev.startHour, ev.startMin||0)}–{formatTime(ev.endHour, ev.endMin||0)}
                      </div>
                    )}
                  </div>
                );
              })}

              {dragState?.active && dragState.date === dk && (() => {
                let { startHour: sh, startMin: sm, endHour: eh, endMin: em } = dragState;
                if (sh > eh || (sh === eh && sm > em)) [sh, sm, eh, em] = [eh, em, sh, sm];
                const top = (sh + sm / 60) * HOUR_HEIGHT;
                const bot = (eh + em / 60) * HOUR_HEIGHT;
                return (
                  <div style={{
                    position: "absolute", top, left: 2, right: 2,
                    height: Math.max(bot - top, 15),
                    background: `${t.accent}25`, border: `1px dashed ${t.accent}`,
                    borderRadius: 4, zIndex: 6, pointerEvents: "none",
                  }} />
                );
              })()}

              {isTd && nowPos !== null && (
                <div style={{
                  position: "absolute", top: nowPos, left: 0, right: 0, height: 2,
                  background: t.nowLine, zIndex: 8, boxShadow: `0 0 6px ${t.nowLine}60`,
                }}>
                  <div style={{
                    position: "absolute", left: -4, top: -3, width: 8, height: 8,
                    borderRadius: "50%", background: t.nowLine,
                  }} />
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DayView(props) {
  return <TimeGrid {...props} dates={[props.date]} showDayHeader={true} />;
}

function WeekView(props) {
  const start = startOfWeek(props.date);
  const dates = Array.from({ length: 7 }, (_, i) => addDays(start, i));
  return <TimeGrid {...props} dates={dates} showDayHeader={true} />;
}

// ═══════════════════════════════════════════════
// ─── MONTH VIEW ───
// ═══════════════════════════════════════════════
function MonthView({ t, date, events, tasks, activeCategories, setShowModal, mono, serif, setCurrentDate, setView }) {
  const year = date.getFullYear();
  const month = date.getMonth();
  const dim = daysInMonth(year, month);
  const firstDay = new Date(year, month, 1).getDay();
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);
  while (cells.length % 7) cells.push(null);

  return (
    <div style={{ padding: 12, overflow: "auto", height: "100%" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 1 }}>
        {DAY_NAMES.map(d => (
          <div key={d} style={{
            fontFamily: mono, fontSize: "0.6rem", color: t.text3, padding: "5px 8px",
            letterSpacing: "0.08em", textTransform: "uppercase", textAlign: "center",
          }}>{d}</div>
        ))}
        {cells.map((day, i) => {
          if (!day) return <div key={i} style={{ minHeight: 88, background: t.bg2, borderRadius: 4, opacity: 0.3 }} />;
          const dk = dateKey(new Date(year, month, day));
          const dayEvents = events.filter(ev => ev.date === dk && activeCategories.has(ev.category));
          const dayTasks = tasks.filter(tk => tk.date === dk && activeCategories.has(tk.category));
          const isTd = isToday(new Date(year, month, day));
          return (
            <div key={i}
              onClick={() => { setCurrentDate(new Date(year, month, day)); setView("day"); }}
              style={{
                minHeight: 88, background: isTd ? t.todayBg : t.bg3,
                border: `1px solid ${t.border}`, borderRadius: 4, padding: "4px 5px",
                cursor: "pointer", overflow: "hidden", transition: "background 0.15s",
              }}>
              <div style={{
                fontFamily: serif, fontSize: "0.88rem", color: isTd ? t.accent : t.text,
                fontWeight: isTd ? 700 : 400, marginBottom: 2,
              }}>{day}</div>
              {dayEvents.slice(0, 2).map(ev => {
                const cat = CATEGORIES[ev.category] || CATEGORIES.other;
                return (
                  <div key={ev.id} style={{
                    fontSize: "0.56rem", padding: "1px 4px", marginBottom: 1,
                    borderRadius: 3, background: cat.bg, color: cat.color,
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                  }}>{ev.title}</div>
                );
              })}
              {dayTasks.slice(0, 2).map(tk => (
                <div key={tk.id} style={{
                  fontSize: "0.52rem", padding: "0px 4px", color: t.text3,
                  overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                  textDecoration: tk.done ? "line-through" : "none",
                }}>☐ {tk.title}</div>
              ))}
              {(dayEvents.length + dayTasks.length > 4) && (
                <div style={{ fontSize: "0.5rem", color: t.text3 }}>+{dayEvents.length + dayTasks.length - 4} more</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// ─── YEAR VIEW ───
// ═══════════════════════════════════════════════
function YearView({ t, date, events, tasks, mono, serif, setCurrentDate, setView }) {
  const year = date.getFullYear();
  return (
    <div style={{ padding: 20, overflow: "auto", height: "100%" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 20 }}>
        {Array.from({ length: 12 }, (_, m) => {
          const dim = daysInMonth(year, m);
          const firstDay = new Date(year, m, 1).getDay();
          const cells = [];
          for (let i = 0; i < firstDay; i++) cells.push(null);
          for (let d = 1; d <= dim; d++) cells.push(d);
          return (
            <div key={m}>
              <div onClick={() => { setCurrentDate(new Date(year, m, 1)); setView("month"); }}
                style={{
                  fontFamily: serif, fontSize: "0.92rem", color: t.text, marginBottom: 5, cursor: "pointer",
                }}>{MONTH_NAMES[m]}</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 1 }}>
                {DAY_NAMES.map(d => (
                  <div key={d} style={{ fontFamily: mono, fontSize: "0.4rem", color: t.text3,
                    textAlign: "center", letterSpacing: "0.03em" }}>{d[0]}</div>
                ))}
                {cells.map((day, i) => {
                  if (!day) return <div key={i} />;
                  const dk = dateKey(new Date(year, m, day));
                  const hasContent = events.some(e => e.date === dk) || tasks.some(t => t.date === dk);
                  const isTd = isToday(new Date(year, m, day));
                  return (
                    <div key={i}
                      onClick={() => { setCurrentDate(new Date(year, m, day)); setView("day"); }}
                      style={{
                        fontSize: "0.5rem", textAlign: "center", padding: "2px 0",
                        cursor: "pointer", borderRadius: "50%",
                        color: isTd ? t.accent : t.text2, fontWeight: isTd ? 700 : 400,
                        background: hasContent ? `${t.accent}18` : "transparent",
                      }}>{day}</div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// ─── EVENT / TASK MODAL ───
// ═══════════════════════════════════════════════
function EventTaskModal({ t, modal, setShowModal, addEvent, updateEvent, deleteEvent,
  addTask, updateTask, deleteTask, mono, serif }) {

  const isEdit = !!modal.data;
  const [type, setType] = useState(modal.type);
  const prefill = modal.prefill || {};
  const [title, setTitle] = useState(modal.data?.title || "");
  const [category, setCategory] = useState(modal.data?.category || "personal");
  const [date, setDate] = useState(modal.data?.date || modal.date || dateKey(new Date()));
  const [startHour, setStartHour] = useState(modal.data?.startHour ?? prefill.startHour ?? 9);
  const [startMin, setStartMin] = useState(modal.data?.startMin ?? prefill.startMin ?? 0);
  const [endHour, setEndHour] = useState(modal.data?.endHour ?? prefill.endHour ?? 10);
  const [endMin, setEndMin] = useState(modal.data?.endMin ?? prefill.endMin ?? 0);
  const [detail, setDetail] = useState(modal.data?.detail || "");
  const [deadline, setDeadline] = useState(modal.data?.deadline || "");
  const [confirmDelete, setConfirmDelete] = useState(false);

  // Close on Escape
  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") setShowModal(null); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const save = () => {
    if (!title.trim()) return;
    if (type === "event") {
      const data = { title, category, date, startHour: +startHour, startMin: +startMin, endHour: +endHour, endMin: +endMin, detail };
      if (isEdit && modal.data?.id) updateEvent(modal.data.id, data);
      else addEvent(data);
    } else {
      const data = { title, category, date, detail, deadline };
      if (isEdit && modal.data?.id) updateTask(modal.data.id, data);
      else addTask(data);
    }
    setShowModal(null);
  };

  const handleDelete = () => {
    if (!confirmDelete) { setConfirmDelete(true); return; }
    if (modal.data?.id) {
      if (type === "event") deleteEvent(modal.data.id);
      else deleteTask(modal.data.id);
    }
    setShowModal(null);
  };

  const hourOptions = HOURS.map(h => <option key={h} value={h}>{formatTime(h, 0).replace(":00 ", " ")}</option>);
  const minOptions = [0,15,30,45].map(m => <option key={m} value={m}>{String(m).padStart(2,"0")}</option>);

  const inputStyle = {
    width: "100%", background: t.inputBg, border: `1px solid ${t.inputBorder}`,
    borderRadius: 7, padding: "8px 11px", color: t.text, fontFamily: "'DM Sans', sans-serif",
    fontSize: "0.85rem", outline: "none", WebkitAppearance: "none",
  };
  const selectStyle = { ...inputStyle, cursor: "pointer" };
  const labelStyle = {
    fontFamily: mono, fontSize: "0.6rem", color: t.text3, letterSpacing: "0.1em",
    textTransform: "uppercase", marginBottom: 5, display: "block",
  };

  return (
    <div onClick={() => setShowModal(null)} style={{
      position: "fixed", inset: 0, background: t.overlay, zIndex: 100,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: t.modalBg, border: `1px solid ${t.border}`, borderRadius: 14,
        padding: 26, width: "100%", maxWidth: 480,
        boxShadow: "0 20px 60px rgba(0,0,0,0.3)",
      }}>
        <div style={{ fontFamily: serif, fontSize: "1.25rem", color: t.text, marginBottom: 18 }}>
          {isEdit ? "Edit" : "New"} {type === "event" ? "Event" : "Task"}
        </div>

        {!isEdit && (
          <div style={{ display: "flex", marginBottom: 14, gap: 6 }}>
            {["event","task"].map(tp => (
              <button key={tp} onClick={() => setType(tp)} style={{
                flex: 1, padding: "6px 0", border: "none", borderRadius: 6, cursor: "pointer",
                fontFamily: mono, fontSize: "0.65rem", letterSpacing: "0.06em", textTransform: "uppercase",
                background: type === tp ? t.accent : t.bg3,
                color: type === tp ? t.bg : t.text3, transition: "all 0.15s",
              }}>{tp}</button>
            ))}
          </div>
        )}

        <div style={{ marginBottom: 12 }}>
          <label style={labelStyle}>Title</label>
          <input value={title} onChange={e => setTitle(e.target.value)}
            onKeyDown={e => e.key === "Enter" && save()} autoFocus
            placeholder={type === "event" ? "Meeting, class, study session…" : "What do you need to do?"}
            style={inputStyle} />
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <div>
            <label style={labelStyle}>Date</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>Category</label>
            <select value={category} onChange={e => setCategory(e.target.value)} style={selectStyle}>
              {Object.entries(CATEGORIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
        </div>

        {type === "event" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
            <div>
              <label style={labelStyle}>Start</label>
              <div style={{ display: "flex", gap: 4 }}>
                <select value={startHour} onChange={e => setStartHour(+e.target.value)} style={{ ...selectStyle, flex: 2 }}>{hourOptions}</select>
                <select value={startMin} onChange={e => setStartMin(+e.target.value)} style={{ ...selectStyle, flex: 1 }}>{minOptions}</select>
              </div>
            </div>
            <div>
              <label style={labelStyle}>End</label>
              <div style={{ display: "flex", gap: 4 }}>
                <select value={endHour} onChange={e => setEndHour(+e.target.value)} style={{ ...selectStyle, flex: 2 }}>{hourOptions}</select>
                <select value={endMin} onChange={e => setEndMin(+e.target.value)} style={{ ...selectStyle, flex: 1 }}>{minOptions}</select>
              </div>
            </div>
          </div>
        )}

        {type === "task" && (
          <div style={{ marginBottom: 12 }}>
            <label style={labelStyle}>Deadline <span style={{ opacity: 0.5 }}>(optional)</span></label>
            <input value={deadline} onChange={e => setDeadline(e.target.value)}
              placeholder="e.g. Due Thu 3/19 9pm" style={inputStyle} />
          </div>
        )}

        <div style={{ marginBottom: 14 }}>
          <label style={labelStyle}>Notes <span style={{ opacity: 0.5 }}>(optional)</span></label>
          <textarea value={detail} onChange={e => setDetail(e.target.value)}
            placeholder="Details, readings, links…"
            style={{ ...inputStyle, minHeight: 65, resize: "vertical", lineHeight: 1.5 }} />
        </div>

        <div style={{ display: "flex", gap: 8, justifyContent: "space-between" }}>
          <div>
            {isEdit && (
              <button onClick={handleDelete} style={{
                padding: "8px 16px", borderRadius: 7, border: `1px solid ${t.danger}`,
                background: confirmDelete ? t.danger : `${t.danger}15`,
                color: confirmDelete ? "#fff" : t.danger,
                cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: "0.82rem", fontWeight: 500,
              }}>{confirmDelete ? "Confirm Delete" : "Delete"}</button>
            )}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setShowModal(null)} style={{
              padding: "8px 18px", borderRadius: 7, border: "none",
              background: t.bg3, color: t.text3, cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif", fontSize: "0.82rem", fontWeight: 500,
            }}>Cancel</button>
            <button onClick={save} style={{
              padding: "8px 20px", borderRadius: 7, border: "none",
              background: t.accent, color: t.bg, cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif", fontSize: "0.82rem", fontWeight: 600,
            }}>{isEdit ? "Save" : "Create"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Mount ───
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TigerCalendar />);
document.getElementById("root").classList.add("ready");
</script>
</body>
</html>
