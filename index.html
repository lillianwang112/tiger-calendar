            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:5}}>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>Every</span>
              <input type="number" min={1} max={99} value={recEvery} onChange={e=>setRecEvery(+e.target.value||1)}
                style={{...IS,width:48,textAlign:"center",padding:"3px 4px"}}/>
              <select value={recUnit} onChange={e=>setRecUnit(e.target.value)} style={{...SS,width:80}}>
                <option value="day">day(s)</option><option value="week">week(s)</option>
                <option value="month">month(s)</option><option value="year">year(s)</option>
              </select>
            </div>
            {recUnit==="week"&&<div style={{marginBottom:5}}>
              <label style={{...LS,marginBottom:2}}>On days</label>
              <div style={{display:"flex",gap:2}}>
                {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>
                  <button key={d} onClick={()=>toggleRecDay(i)} style={{width:26,height:22,border:`1px solid ${recDays.includes(i)?T.ac:T.bd}`,borderRadius:3,
                    cursor:"pointer",fontFamily:MO,fontSize:"0.46rem",background:recDays.includes(i)?`${T.ac}30`:"transparent",
                    color:recDays.includes(i)?T.ac:T.t3}}>{d}</button>)}
              </div>
            </div>}
            <div>
              <label style={{...LS,marginBottom:2}}>Ends</label>
              <select value={recEnd} onChange={e=>setRecEnd(e.target.value)} style={{...SS,marginBottom:4}}>
                <option value="never">Never</option><option value="date">On date</option><option value="after">After # occurrences</option>
              </select>
              {recEnd==="date"&&<input type="date" value={recEndDate} onChange={e=>setRecEndDate(e.target.value)} style={{...IS,marginTop:3}}/>}
              {recEnd==="after"&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}}>
                <input type="number" min={1} max={365} value={recEndAfter} onChange={e=>setRecEndAfter(+e.target.value||1)}
                  style={{...IS,width:60,textAlign:"center",padding:"3px 4px"}}/>
                <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>occurrences</span>
              </div>}
            </div>
          </div>}
          {recType!=="none"&&recType!=="custom"&&<div style={{marginTop:5}}>
            <label style={{...LS,marginBottom:2}}>Ends</label>
            <select value={recEnd} onChange={e=>setRecEnd(e.target.value)} style={{...SS,marginBottom:3}}>
              <option value="never">Never</option><option value="date">On date</option><option value="after">After # occurrences</option>
            </select>
            {recEnd==="date"&&<input type="date" value={recEndDate} onChange={e=>setRecEndDate(e.target.value)} style={{...IS,marginTop:2}}/>}
            {recEnd==="after"&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:2}}>
              <input type="number" min={1} max={365} value={recEndAfter} onChange={e=>setRecEndAfter(+e.target.value||1)}
                style={{...IS,width:60,textAlign:"center",padding:"3px"}}/>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>occurrences</span>
            </div>}
          </div>}
        </div>}
      </>}
      {tp==="task"&&<>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <div style={{flex:1}}>
            <label style={LS}>Due Date</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...IS,width:"100%"}}/>
          </div>
          <div style={{flex:1}}>
            <label style={LS}>Due Time</label>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div onClick={()=>setHasDueTime(!hasDueTime)} style={{width:28,height:15,background:hasDueTime?T.ac:T.b2,borderRadius:8,border:`1px solid ${T.bd}`,position:"relative",cursor:"pointer",flexShrink:0}}>
                <div style={{width:9,height:9,background:hasDueTime?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,left:hasDueTime?16:2,transition:"left 0.2s"}}/></div>
              {hasDueTime&&<div style={{display:"flex",gap:2,alignItems:"center"}}>
                <select value={dueHour} onChange={e=>setDueHour(+e.target.value)} style={{...SS,flex:1,fontSize:"0.7rem",padding:"3px 4px"}}>{hO}</select>
                <MinPick value={dueMin} onChange={setDueMin}/>
              </div>}
            </div>
          </div>
        </div>
        <div style={{marginBottom:10}}><label style={LS}>Details <span style={{opacity:0.5,fontFamily:"sans-serif",textTransform:"none",letterSpacing:0}}>(optional)</span></label>
          <NotesField value={det} onChange={setDet} placeholder="Instructions, links, notes…" T={T} MO={MO} IS={IS} minHeight={36}/></div>
      </>}
      {tp==="event"&&<div style={{marginBottom:10}}><label style={LS}>Notes</label>
        <NotesField value={det} onChange={setDet} placeholder="Details, readings, links…" T={T} MO={MO} IS={IS} minHeight={45}/></div>}

      <div style={{display:"flex",gap:7,justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>{isEd&&<button onClick={handleDel} style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${T.dg}`,
          background:cd2?T.dg:`${T.dg}15`,color:cd2?"#fff":T.dg,cursor:"pointer",fontSize:"0.76rem",fontWeight:500}}>
          {cd2?"Confirm":"Delete"}</button>}
          {isEd&&isSB&&<button onClick={()=>{if(!cd3){setCd3(true);return;}dSB(modal.data);setModal(null);}} style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${T.dg}`,
            background:cd3?T.dg:`${T.dg}08`,color:cd3?"#fff":T.dg,cursor:"pointer",fontSize:"0.72rem",fontWeight:500}}>
            {cd3?"Confirm":"Delete series"}</button>}
        </div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={()=>setModal(null)} style={{padding:"5px 14px",borderRadius:6,border:"none",background:T.b3,color:T.t3,cursor:"pointer",fontSize:"0.76rem",fontWeight:500}}>Cancel</button>
          <button onClick={save} style={{padding:"5px 16px",borderRadius:6,border:"none",background:T.ac,color:T.bg,cursor:"pointer",fontSize:"0.76rem",fontWeight:600}}>{isEd?"Save":"Create"}</button>
        </div>
      </div>
    </div>
  </div>;
}

// ═══ TASKS DASHBOARD ═══
const DASH_CATS_DEFAULT=[
  {key:"admin",    label:"Admin",    color:"#f59e0b"},
  {key:"personal", label:"Personal", color:"#8b5cf6"},
  {key:"social",   label:"Social",   color:"#10b981"},
  {key:"other",    label:"Other",    color:"#6b7280"},
];
const TC_DASHCATS_KEY="tc_dashCats_v1";
const EST_OPTS=["","15 min","30 min","45 min","1 hr","1.5 hr","2 hr","3 hr","4+ hr"];

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

function TasksDashboard({T,MO,SE,tasks,cats,courses,aT,uT,dT,tT,pushUndo}){
  // ── Persisted custom categories (excludes "coursework" which is always built-in) ──
  const[dashCats,setDashCats]=useState(()=>{
    try{const s=localStorage.getItem(TC_DASHCATS_KEY);if(s)return JSON.parse(s);}catch(e){}
    return DASH_CATS_DEFAULT;
  });
  useEffect(()=>{try{localStorage.setItem(TC_DASHCATS_KEY,JSON.stringify(dashCats));}catch(e){}}, [dashCats]);

  // ── UI state ──
  const[filter,setFilter]=useState("all");
  const[courseFilter,setCourseFilter]=useState("all");
  const[timeFilter,setTimeFilter]=useState("all"); // "all" | "week" | "two-weeks" | "month"
  const[showDone,setShowDone]=useState(false);
  const[editModal,setEditModal]=useState(null);
  const[addOpen,setAddOpen]=useState(false);
  const[catMgrOpen,setCatMgrOpen]=useState(false);
  const[expandNote,setExpandNote]=useState(null); // "add" | "edit" — which notes popup is open
  // cat manager internal state
  const[cmEditing,setCmEditing]=useState(null);   // key of cat being edited, or null
  const[cmLabel,setCmLabel]=useState("");
  const[cmColor,setCmColor]=useState("#6b7280");
  const[cmAddLabel,setCmAddLabel]=useState("");
  const[cmAddColor,setCmAddColor]=useState("#3b82f6");
  const[cmDelConfirm,setCmDelConfirm]=useState(null); // key pending delete confirm

  // new task form
  const[nTitle,setNTitle]=useState("");
  const[nDue,setNDue]=useState("");
  const[nHasDueTime,setNHasDueTime]=useState(false);
  const[nDueHour,setNDueHour]=useState(23);
  const[nDueMin,setNDueMin]=useState(59);
  const[nCat,setNCat]=useState(dashCats[0]?.key||"other");
  const[nCourse,setNCourse]=useState(courses&&courses[0]?.id||"");
  const[nUrgent,setNUrgent]=useState(false);
  const[nEst,setNEst]=useState("");
  const[nEstManual,setNEstManual]=useState(false);
  const[nNote,setNNote]=useState("");
  // edit task form
  const[eTitle,setETitle]=useState("");
  const[eDue,setEDue]=useState("");
  const[eHasDueTime,setEHasDueTime]=useState(false);
  const[eDueHour,setEDueHour]=useState(23);
  const[eDueMin,setEDueMin]=useState(59);
  const[eCat,setECat]=useState(dashCats[0]?.key||"other");
  const[eCourse,setECourse]=useState("");
  const[eUrgent,setEUrgent]=useState(false);
  const[eEst,setEEst]=useState("");
  const[eEstManual,setEEstManual]=useState(false);
  const[eNote,setENote]=useState("");

  const allDash=useMemo(()=>tasks,[tasks]);
  const total=allDash.length;
  const doneCount=allDash.filter(t=>t.done).length;
  const pct=total?Math.round(doneCount/total*100):0;

  // All selectable categories for forms: coursework + custom dashCats
  const allCatOpts=useMemo(()=>[
    {key:"coursework",label:"Coursework",color:T.ac,_builtin:true},
    ...dashCats,
  ],[dashCats,T.ac]);

  // ── Helpers to resolve a task's display color/bg/label ──
  const courseIds=useMemo(()=>new Set((courses||[]).map(c=>c.id)),[courses]);

  const resolveColor=(tk)=>{
    // course task → use TigerCalendar cats map
    if(courseIds.has(tk.category)){const c=cats[tk.category];return c?c.color:T.ac;}
    // custom dash category
    const dc=dashCats.find(d=>d.key===tk._dashCat||d.key===tk.category);
    if(dc)return dc.color;
    // fallback to cats map
    const c=cats[tk.category];return c?c.color:T.t3;
  };
  const resolveBg=(tk)=>{const col=resolveColor(tk);return hexToRgba(col,0.12);};
  const resolveLabel=(tk)=>{
    const co=(courses||[]).find(c=>c.id===tk.category);if(co)return co.name;
    const dc=dashCats.find(d=>d.key===(tk._dashCat||tk.category));if(dc)return dc.label;
    return tk._dashCat||tk.category||"other";
  };

  // ── Filtering ──
  const filtered=useMemo(()=>{
    let ts=allDash;
    // Apply time filter
    if(timeFilter!=="all"){
      const today=new Date();today.setHours(0,0,0,0);
      const todayStr=$d(today);
      let endStr;
      if(timeFilter==="week"){
        // current week: Sunday through Saturday
        const ws=$w(today,0);
        endStr=$d($a(ws,6));
      } else if(timeFilter==="two-weeks"){
        endStr=$d($a(today,13));
      } else if(timeFilter==="month"){
        const last=new Date(today.getFullYear(),today.getMonth()+1,0);
        endStr=$d(last);
      }
      ts=ts.filter(t=>{
        if(!t.date)return true; // undated tasks always visible
        if(t.date<todayStr)return true; // overdue tasks always visible
        return t.date<=endStr;
      });
    }
    // Apply category filter
    if(filter==="coursework"){
      ts=ts.filter(t=>courseIds.has(t.category));
      if(courseFilter!=="all")ts=ts.filter(t=>t.category===courseFilter);
    } else if(filter!=="all"){
      ts=ts.filter(t=>t._dashCat===filter||(!courseIds.has(t.category)&&t.category===filter));
    }
    return ts;
  },[allDash,filter,courseFilter,courseIds,timeFilter]);

  const urgent=filtered.filter(t=>t._urgent&&!t.done);
  const normal=filtered.filter(t=>!t._urgent&&!t.done);
  const done=filtered.filter(t=>t.done);

  const estMap={"15 min":0.25,"30 min":0.5,"45 min":0.75,"1 hr":1,"1.5 hr":1.5,"2 hr":2,"3 hr":3,"4+ hr":4};
  const parseEst=(v)=>{if(!v)return 0;if(estMap[v]!==undefined)return estMap[v];const hrM=v.match(/(\d+\.?\d*)\s*(h|hr|hrs|hour|hours)/i);if(hrM)return parseFloat(hrM[1]);const minM=v.match(/(\d+\.?\d*)\s*(m|min|mins|minute|minutes)/i);if(minM)return parseFloat(minM[1])/60;const n=parseFloat(v);return isNaN(n)?0:n;};
  const totalEst=[...urgent,...normal].reduce((s,t)=>s+parseEst(t._est||""),0);

  // ── Task CRUD ──
  const resolveCatVal=(dashCatKey,courseId)=>{
    if(dashCatKey==="coursework")return courseId||"other";
    return dashCatKey;
  };
  const[editMode,setEditMode]=useState(false); // false = view, true = edit
  const openEdit=(tk)=>{
    setETitle(tk.title);setEDue(tk.date||"");
    setEHasDueTime(!!tk.hasDueTime);setEDueHour(tk.dueHour??23);setEDueMin(tk.dueMin??59);
    setECat(tk._dashCat||(courseIds.has(tk.category)?"coursework":dashCats[0]?.key||"other"));
    setECourse(tk.category||(courses&&courses[0]?.id)||"");
    setEUrgent(!!tk._urgent);
    const savedEst=tk._est||"";
    setEEst(savedEst);
    setEEstManual(!!savedEst&&!EST_OPTS.includes(savedEst));
    setENote(tk.detail||"");
    setEditMode(false); // always open in view mode
    setEditModal(tk);
  };
  const closeEdit=()=>{setEditModal(null);setEditMode(false);};
  const saveEdit=()=>{
    if(!editModal||!eTitle.trim())return;
    uT(editModal.id,{title:eTitle.trim(),date:eDue||undefined,
      hasDueTime:eHasDueTime,dueHour:eHasDueTime?+eDueHour:undefined,dueMin:eHasDueTime?+eDueMin:undefined,
      category:resolveCatVal(eCat,eCourse),_dashCat:eCat,_urgent:eUrgent,_est:eEst,detail:eNote});
    closeEdit();
  };
  const addTask=()=>{
    if(!nTitle.trim())return;
    aT({title:nTitle.trim(),date:nDue||undefined,
      hasDueTime:nHasDueTime,dueHour:nHasDueTime?+nDueHour:undefined,dueMin:nHasDueTime?+nDueMin:undefined,
      category:resolveCatVal(nCat,nCourse),_dashCat:nCat,_urgent:nUrgent,_est:nEst,detail:nNote,done:false});
    setNTitle("");setNDue("");setNHasDueTime(false);setNDueHour(23);setNDueMin(59);
    setNUrgent(false);setNEst("");setNNote("");setNCourse(courses&&courses[0]?.id||"");setAddOpen(false);
  };

  // ── Category manager actions ──
  const cmStartEdit=(dc)=>{setCmEditing(dc.key);setCmLabel(dc.label);setCmColor(dc.color);setCmDelConfirm(null);};
  const cmSaveEdit=()=>{
    if(!cmLabel.trim())return;
    setDashCats(p=>p.map(d=>d.key===cmEditing?{...d,label:cmLabel.trim(),color:cmColor}:d));
    // also retag tasks if label changed (key stays same, so colors just update live)
    setCmEditing(null);
  };
  const cmCancelEdit=()=>setCmEditing(null);
  const cmAddCat=()=>{
    if(!cmAddLabel.trim())return;
    const key="dc_"+Math.random().toString(36).slice(2,8);
    setDashCats(p=>[...p,{key,label:cmAddLabel.trim(),color:cmAddColor}]);
    setCmAddLabel("");setCmAddColor("#3b82f6");
  };
  const cmDeleteCat=(key)=>{
    // reassign tasks in that cat to "other"
    tasks.filter(t=>t._dashCat===key).forEach(t=>uT(t.id,{_dashCat:"other",category:"other"}));
    setDashCats(p=>p.filter(d=>d.key!==key));
    if(filter===key)setFilter("all");
    setCmDelConfirm(null);setCmEditing(null);
  };

  // ── Filter tabs (dynamic) ──
  const filterTabs=useMemo(()=>{
    const courseCount=allDash.filter(t=>!t.done&&courseIds.has(t.category)).length;
    const tabs=[{key:"all",label:"All",color:T.ac,count:allDash.filter(t=>!t.done).length},
      {key:"coursework",label:"Coursework",color:T.ac,count:courseCount}];
    dashCats.forEach(dc=>{
      const count=allDash.filter(t=>!t.done&&(t._dashCat===dc.key||(!courseIds.has(t.category)&&t.category===dc.key))).length;
      tabs.push({key:dc.key,label:dc.label,color:dc.color,count});
    });
    return tabs;
  },[allDash,dashCats,courseIds,T.ac]);

  // ── Hour options for time picker ──
  const hO=HOURS.map(h=><option key={h} value={h}>{$t(h,0).replace(":00 "," ")}</option>);

  // ── Shared style helpers ──
  const FieldLabel=({children})=><div style={{fontFamily:MO,fontSize:"0.5rem",fontWeight:600,letterSpacing:"0.07em",
    textTransform:"uppercase",color:T.t2,marginBottom:4}}>{children}</div>;
  const IS2={width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${T.bd}`,
    background:T.ib,color:T.tx,fontSize:"0.78rem",fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"};
  const UrgToggle=({val,set})=><label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",
    fontFamily:MO,fontSize:"0.52rem",color:T.t2,userSelect:"none"}}>
    <div onClick={()=>set(p=>!p)} style={{width:28,height:15,background:val?T.dg:T.b2,borderRadius:8,
      border:`1px solid ${val?T.dg:T.bd}`,position:"relative",cursor:"pointer",flexShrink:0,transition:"all 0.2s"}}>
      <div style={{width:9,height:9,background:val?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,
        left:val?16:3,transition:"left 0.2s"}}/></div>
    Mark as urgent</label>;

  const CatSelect=({val,set,courses,showCourse,courseVal,setCourse})=><>
    <div style={{flex:"1 1 130px"}}>
      <FieldLabel>Category</FieldLabel>
      <select value={val} onChange={e=>set(e.target.value)} style={IS2}>
        {allCatOpts.map(o=><option key={o.key} value={o.key}>{o.label}</option>)}
      </select>
    </div>
    {val==="coursework"&&courses&&courses.length>0&&<div style={{flex:"1 1 130px"}}>
      <FieldLabel>Course</FieldLabel>
      <select value={courseVal} onChange={e=>setCourse(e.target.value)} style={IS2}>
        {courses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
      </select>
    </div>}
  </>;

  // ── Task Row ──
  const TaskRow=({tk})=>{
    const cc=resolveColor(tk),cb=resolveBg(tk),cl=resolveLabel(tk);
    return <div onClick={()=>openEdit(tk)}
      style={{display:"flex",alignItems:"flex-start",gap:12,padding:"13px 18px",
        background:T.b3,border:`1px solid ${T.bd}`,
        borderLeft:tk._urgent&&!tk.done?`3px solid ${T.dg}`:`1px solid ${T.bd}`,
        borderRadius:9,opacity:tk.done?0.45:1,transition:"background 0.12s",cursor:"pointer"}}
      onMouseEnter={e=>e.currentTarget.style.background=T.b2}
      onMouseLeave={e=>e.currentTarget.style.background=T.b3}>
      <div onClick={e=>{e.stopPropagation();tT(tk.id);}} style={{width:22,height:22,borderRadius:5,border:`1.5px solid ${cc}`,
        background:tk.done?cc:"transparent",flexShrink:0,marginTop:2,cursor:"pointer",
        display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
        {tk.done&&<span style={{color:"#fff",fontSize:"0.6rem",lineHeight:1}}>✓</span>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:"0.92rem",fontWeight:500,lineHeight:1.35,color:T.tx,
          textDecoration:tk.done?"line-through":"none",marginBottom:3}}>{tk.title}</div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontFamily:MO,fontSize:"0.54rem",padding:"2px 8px",borderRadius:10,
            background:cb,color:cc,border:`1px solid ${hexToRgba(cc,0.25)}`,letterSpacing:"0.03em"}}>{cl}</span>
          {tk._urgent&&!tk.done&&<span style={{fontFamily:MO,fontSize:"0.52rem",padding:"2px 7px",borderRadius:10,
            background:hexToRgba(T.dg,0.12),color:T.dg,border:`1px solid ${hexToRgba(T.dg,0.25)}`}}>urgent</span>}
          {!tk.date&&!tk.done&&<span style={{fontFamily:MO,fontSize:"0.52rem",padding:"2px 7px",borderRadius:10,
            background:"rgba(249,115,22,0.12)",color:"#f97316",border:"1px solid rgba(249,115,22,0.25)"}}>ASAP</span>}
          {tk._est&&<span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t3}}>⏱ {tk._est}</span>}
          {tk.date&&<span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>📅 {tk.date}{tk.hasDueTime&&tk.dueHour!=null?` at ${$t(tk.dueHour,tk.dueMin||0)}`:""}</span>}
          {tk.detail&&<span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t3,overflow:"hidden",
            textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:220}}>
            <RenderNotes text={tk.detail} T={T} inline={true} style={{fontSize:"0.52rem",color:T.t3}}/>
          </span>}
        </div>
      </div>
      <button onClick={e=>{e.stopPropagation();pushUndo();dT(tk.id);}} title="Delete"
        style={{background:"none",border:"none",cursor:"pointer",color:T.t3,
          fontSize:"1.1rem",padding:"4px 6px",borderRadius:4,lineHeight:1,flexShrink:0,marginTop:0}}>✕</button>
    </div>;
  };

  const Section=({label,items,accent})=>{
    if(!items.length)return null;
    return <div style={{marginBottom:6}}>
      <div style={{fontFamily:MO,fontSize:"0.56rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",
        color:accent||T.t3,padding:"12px 0 5px",display:"flex",alignItems:"center",gap:5}}>
        {accent&&<div style={{width:7,height:7,borderRadius:"50%",background:accent,flexShrink:0}}/>}
        {label}<span style={{color:T.t3,fontWeight:400,marginLeft:2}}>{items.length}</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {items.map(tk=><TaskRow key={tk.id} tk={tk}/>)}
      </div>
    </div>;
  };

  // ── Category Manager Modal ──
  const CatMgrModal=()=><div onClick={e=>{if(e.target===e.currentTarget){setCatMgrOpen(false);setCmEditing(null);setCmDelConfirm(null);} }}
    style={{position:"fixed",inset:0,background:T.ov,zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:T.b3,border:`1px solid ${T.bd}`,borderRadius:12,padding:20,
      width:"100%",maxWidth:460,maxHeight:"85vh",display:"flex",flexDirection:"column",gap:0,overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div style={{fontFamily:SE,fontSize:"1rem",color:T.tx,fontWeight:400}}>Manage Categories</div>
        <button onClick={()=>{setCatMgrOpen(false);setCmEditing(null);setCmDelConfirm(null);}}
          style={{background:"none",border:"none",cursor:"pointer",color:T.t3,fontSize:"1rem",lineHeight:1,padding:"2px 4px"}}>✕</button>
      </div>
      {/* Built-in notice */}
      <div style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3,letterSpacing:"0.04em",marginBottom:10,
        padding:"6px 10px",background:T.b2,borderRadius:6,border:`1px solid ${T.bd}`}}>
        <span style={{color:T.ac}}>Coursework</span> is a built-in category linked to your courses and cannot be edited here.
      </div>
      {/* Existing cats list */}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,marginBottom:14,paddingRight:2}}>
        {dashCats.map(dc=>{
          const isEd=cmEditing===dc.key;
          const isDel=cmDelConfirm===dc.key;
          const taskCount=tasks.filter(t=>t._dashCat===dc.key||(!courseIds.has(t.category)&&t.category===dc.key)).length;
          return <div key={dc.key} style={{border:`1px solid ${T.bd}`,borderRadius:8,overflow:"hidden"}}>
            {/* Row */}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:T.b2}}>
              <div style={{width:12,height:12,borderRadius:"50%",background:dc.color,flexShrink:0,
                border:`2px solid ${hexToRgba(dc.color,0.35)}`}}/>
              <span style={{flex:1,fontSize:"0.8rem",fontWeight:500,color:T.tx}}>{dc.label}</span>
              <span style={{fontFamily:MO,fontSize:"0.44rem",color:T.t3}}>{taskCount} task{taskCount!==1?"s":""}</span>
              {!isEd&&!isDel&&<>
                <button onClick={()=>cmStartEdit(dc)} title="Edit"
                  style={{background:"none",border:`1px solid ${T.bd}`,cursor:"pointer",color:T.t2,
                    fontSize:"0.7rem",padding:"2px 7px",borderRadius:4,fontFamily:MO}}>Edit</button>
                <button onClick={()=>setCmDelConfirm(dc.key)} title="Delete"
                  style={{background:"none",border:`1px solid ${T.dg}33`,cursor:"pointer",color:T.dg,
                    fontSize:"0.7rem",padding:"2px 7px",borderRadius:4,fontFamily:MO}}>Delete</button>
              </>}
            </div>
            {/* Edit inline */}
            {isEd&&<div style={{padding:"10px 12px",borderTop:`1px solid ${T.bd}`,display:"flex",flexDirection:"column",gap:8}}>
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <div style={{flex:1}}>
                  <FieldLabel>Name</FieldLabel>
                  <input value={cmLabel} onChange={e=>setCmLabel(e.target.value)} style={{...IS2,width:"100%"}}
                    onKeyDown={e=>e.key==="Enter"&&cmSaveEdit()} autoFocus/>
                </div>
                <div>
                  <FieldLabel>Color</FieldLabel>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    {["#f59e0b","#ef4444","#10b981","#3b82f6","#8b5cf6","#ec4899","#f97316","#14b8a6","#6b7280"].map(col=>
                      <div key={col} onClick={()=>setCmColor(col)} style={{width:18,height:18,borderRadius:"50%",
                        background:col,cursor:"pointer",flexShrink:0,
                        outline:cmColor===col?`3px solid ${col}`:"3px solid transparent",outlineOffset:2,transition:"outline 0.1s"}}/>
                    )}
                    <label title="Custom color" style={{cursor:"pointer",position:"relative",display:"flex",alignItems:"center"}}>
                      <div style={{width:18,height:18,borderRadius:"50%",background:cmColor,
                        border:`2px dashed ${T.bd}`,cursor:"pointer",
                        outline:!["#f59e0b","#ef4444","#10b981","#3b82f6","#8b5cf6","#ec4899","#f97316","#14b8a6","#6b7280"].includes(cmColor)?`3px solid ${cmColor}`:"3px solid transparent",outlineOffset:2}}/>
                      <input type="color" value={cmColor} onChange={e=>setCmColor(e.target.value)}
                        style={{position:"absolute",opacity:0,width:0,height:0,pointerEvents:"none"}}/>
                    </label>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                <button onClick={cmCancelEdit} style={{padding:"4px 12px",borderRadius:5,border:`1px solid ${T.bd}`,
                  background:"transparent",color:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.5rem"}}>Cancel</button>
                <button onClick={cmSaveEdit} style={{padding:"4px 14px",borderRadius:5,border:"none",
                  background:T.ac,color:T.bg,cursor:"pointer",fontFamily:MO,fontSize:"0.5rem",fontWeight:600}}>Save</button>
              </div>
            </div>}
            {/* Delete confirm inline */}
            {isDel&&<div style={{padding:"8px 12px",borderTop:`1px solid ${T.bd}`,background:hexToRgba(T.dg,0.06),
              display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <span style={{fontFamily:MO,fontSize:"0.48rem",color:T.dg}}>
                {taskCount>0?`Reassign ${taskCount} task${taskCount!==1?"s":""} to "Other" and delete?`:"Delete this category?"}
              </span>
              <div style={{display:"flex",gap:5,flexShrink:0}}>
                <button onClick={()=>setCmDelConfirm(null)} style={{padding:"3px 10px",borderRadius:5,
                  border:`1px solid ${T.bd}`,background:"transparent",color:T.t2,cursor:"pointer",
                  fontFamily:MO,fontSize:"0.48rem"}}>Cancel</button>
                <button onClick={()=>cmDeleteCat(dc.key)} style={{padding:"3px 10px",borderRadius:5,border:"none",
                  background:T.dg,color:"#fff",cursor:"pointer",fontFamily:MO,fontSize:"0.48rem",fontWeight:600}}>Delete</button>
              </div>
            </div>}
          </div>;
        })}
      </div>
      {/* Add new category */}
      <div style={{borderTop:`1px solid ${T.bd}`,paddingTop:14}}>
        <div style={{fontFamily:MO,fontSize:"0.48rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",
          color:T.t2,marginBottom:8}}>Add New Category</div>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <div style={{flex:1}}>
            <FieldLabel>Name</FieldLabel>
            <input value={cmAddLabel} onChange={e=>setCmAddLabel(e.target.value)} placeholder="e.g. Research, Health…"
              style={{...IS2,width:"100%"}} onKeyDown={e=>e.key==="Enter"&&cmAddCat()}/>
          </div>
          <div>
            <FieldLabel>Color</FieldLabel>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              {["#3b82f6","#ef4444","#10b981","#f59e0b","#8b5cf6","#ec4899","#f97316","#14b8a6"].map(col=>
                <div key={col} onClick={()=>setCmAddColor(col)} style={{width:16,height:16,borderRadius:"50%",
                  background:col,cursor:"pointer",flexShrink:0,
                  outline:cmAddColor===col?`3px solid ${col}`:"3px solid transparent",outlineOffset:2,transition:"outline 0.1s"}}/>
              )}
              <label title="Custom color" style={{cursor:"pointer",position:"relative",display:"flex",alignItems:"center"}}>
                <div style={{width:16,height:16,borderRadius:"50%",background:cmAddColor,
                  border:`2px dashed ${T.bd}`,cursor:"pointer"}}/>
                <input type="color" value={cmAddColor} onChange={e=>setCmAddColor(e.target.value)}
                  style={{position:"absolute",opacity:0,width:0,height:0,pointerEvents:"none"}}/>
              </label>
            </div>
          </div>
          <button onClick={cmAddCat} disabled={!cmAddLabel.trim()}
            style={{padding:"7px 16px",borderRadius:6,border:"none",
              background:cmAddLabel.trim()?T.ac:T.b2,color:cmAddLabel.trim()?T.bg:T.t3,
              cursor:cmAddLabel.trim()?"pointer":"default",fontFamily:MO,fontSize:"0.52rem",fontWeight:600,
              whiteSpace:"nowrap",transition:"all 0.15s",flexShrink:0}}>
            + Add
          </button>
        </div>
      </div>
    </div>
  </div>;

  // ── Main render ──
  return <div style={{flex:1,overflow:"auto",display:"flex",justifyContent:"center",padding:"28px 32px 48px",background:T.bg}}>
    <div style={{width:"100%",maxWidth:1100}}>
      {/* Header */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <h2 style={{fontFamily:SE,fontSize:"2rem",fontWeight:400,margin:0,color:T.tx,letterSpacing:"-0.02em"}}>
              Task<span style={{color:T.ac,fontStyle:"italic"}}> Dashboard</span>
            </h2>
            <div style={{fontFamily:MO,fontSize:"0.6rem",color:T.t2,letterSpacing:"0.05em",marginTop:4}}>
              {doneCount} of {total} done &nbsp;·&nbsp; {total-doneCount} remaining
              {totalEst>0&&<> &nbsp;·&nbsp; ~{totalEst%1===0?totalEst:totalEst.toFixed(1)}h estimated</>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={()=>{setCatMgrOpen(true);setCmEditing(null);setCmDelConfirm(null);}}
              style={{padding:"9px 16px",borderRadius:7,border:`1px solid ${T.bd}`,background:T.b3,
                color:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.58rem",letterSpacing:"0.05em"}}>
              ⚙ Categories
            </button>
            <button onClick={()=>setAddOpen(p=>!p)}
              style={{padding:"9px 20px",borderRadius:7,border:"none",background:T.ac,color:T.bg,
                cursor:"pointer",fontFamily:MO,fontSize:"0.62rem",fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase"}}>
              {addOpen?"✕ Cancel":"+ New Task"}
            </button>
          </div>
        </div>
        <div style={{marginTop:14,height:6,background:T.b2,borderRadius:3,overflow:"hidden",border:`1px solid ${T.bd}`}}>
          <div style={{height:"100%",background:T.ac,borderRadius:3,width:`${pct}%`,transition:"width 0.4s",opacity:0.85}}/>
        </div>
      </div>

      {/* Add Task Form */}
      {addOpen&&<div style={{background:T.b3,border:`1px solid ${T.bd}`,borderRadius:10,padding:"16px",marginBottom:16}}>
        <div style={{fontFamily:MO,fontSize:"0.5rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:T.t2,marginBottom:12}}>New Task</div>
        <div style={{marginBottom:10}}>
          <FieldLabel>Title</FieldLabel>
          <input value={nTitle} onChange={e=>setNTitle(e.target.value)} placeholder="What needs to get done?"
            style={IS2} onKeyDown={e=>e.key==="Enter"&&addTask()} autoFocus/>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          <CatSelect val={nCat} set={setNCat} courses={courses} courseVal={nCourse} setCourse={setNCourse}/>
          <div style={{flex:"1 1 110px"}}>
            <FieldLabel>Due Date</FieldLabel>
            <input type="date" value={nDue} onChange={e=>setNDue(e.target.value)} style={IS2}/>
          </div>
          <div style={{flex:"1 1 130px"}}>
            <FieldLabel>Due Time</FieldLabel>
            <div style={{display:"flex",alignItems:"center",gap:5,height:32}}>
              <div onClick={()=>setNHasDueTime(p=>!p)} style={{width:28,height:15,background:nHasDueTime?T.ac:T.b2,borderRadius:8,
                border:`1px solid ${nHasDueTime?T.ac:T.bd}`,position:"relative",cursor:"pointer",flexShrink:0,transition:"all 0.2s"}}>
                <div style={{width:9,height:9,background:nHasDueTime?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,
                  left:nHasDueTime?16:3,transition:"left 0.2s"}}/></div>
              {nHasDueTime&&<div style={{display:"flex",gap:3,alignItems:"center"}}>
                <select value={nDueHour} onChange={e=>setNDueHour(+e.target.value)}
                  style={{...IS2,padding:"3px 4px",fontSize:"0.7rem",width:"auto"}}>{hO}</select>
                <MinPick value={nDueMin} onChange={setNDueMin}/>
              </div>}
            </div>
          </div>
          <div style={{flex:"1 1 110px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <FieldLabel>Est. Time</FieldLabel>
              <button onClick={()=>{setNEstManual(p=>{if(p&&!EST_OPTS.includes(nEst))setNEst("");return!p;});}} title={nEstManual?"Use presets":"Enter manually"}
                style={{padding:"1px 6px",borderRadius:4,border:`1px solid ${T.bd}`,background:nEstManual?T.ac:"transparent",
                  color:nEstManual?T.bg:T.t3,cursor:"pointer",fontFamily:MO,fontSize:"0.42rem",letterSpacing:"0.04em",lineHeight:1.6}}>
                {nEstManual?"preset":"custom"}
              </button>
            </div>
            {nEstManual
              ?<input value={nEst} onChange={e=>setNEst(e.target.value)} placeholder="e.g. 1.5 hr, 45 min" style={IS2}/>
              :<select value={nEst} onChange={e=>setNEst(e.target.value)} style={IS2}>
                {EST_OPTS.map(o=><option key={o} value={o}>{o||"— none —"}</option>)}
              </select>}
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
            <FieldLabel>Notes <span style={{fontWeight:400,textTransform:"none",letterSpacing:0}}>(optional)</span></FieldLabel>
            <button onClick={()=>setExpandNote("add")} title="Expand notes"
              style={{padding:"1px 6px",borderRadius:4,border:`1px solid ${T.bd}`,background:"transparent",
                color:T.t3,cursor:"pointer",fontFamily:MO,fontSize:"0.42rem",lineHeight:1.6}}>⤢ expand</button>
          </div>
          <NotesField value={nNote} onChange={setNNote} placeholder="Links, context, instructions…" T={T} MO={MO} IS={IS2} minHeight={80}/>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <UrgToggle val={nUrgent} set={setNUrgent}/>
          <button onClick={addTask} style={{padding:"7px 20px",borderRadius:6,border:"none",
            background:T.ac,color:T.bg,cursor:"pointer",fontFamily:MO,fontSize:"0.56rem",fontWeight:600,letterSpacing:"0.06em"}}>
            Add Task
          </button>
        </div>
      </div>}

      {/* Time filter */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
        <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t3,letterSpacing:"0.06em",textTransform:"uppercase",marginRight:2}}>Due:</span>
        {[["all","All"],["week","This Week"],["two-weeks","Next 2 Weeks"],["month","This Month"]].map(([k,label])=>{
          const isActive=timeFilter===k;
          return <button key={k} onClick={()=>setTimeFilter(k)}
            style={{padding:"4px 12px",borderRadius:10,cursor:"pointer",
              fontFamily:MO,fontSize:"0.54rem",letterSpacing:"0.04em",
              background:isActive?T.b2:"transparent",
              color:isActive?T.tx:T.t3,
              border:`1px solid ${isActive?T.bd:"transparent"}`,transition:"all 0.12s"}}>
            {label}
          </button>;
        })}
      </div>

      {/* Filter tabs */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
        {filterTabs.map(ft=>{
          const isActive=filter===ft.key;
          const col=ft.color||T.ac;
          return <button key={ft.key} onClick={()=>{setFilter(ft.key);setCourseFilter("all");}}
            style={{display:"flex",alignItems:"center",gap:5,padding:"5px 14px",borderRadius:12,cursor:"pointer",
              fontFamily:MO,fontSize:"0.58rem",letterSpacing:"0.04em",textTransform:"uppercase",
              background:isActive?col:"transparent",
              color:isActive?"#fff":T.t2,
              border:`1px solid ${isActive?col:T.bd}`,transition:"all 0.15s"}}>
            {ft.key!=="all"&&ft.key!=="coursework"&&<div style={{width:7,height:7,borderRadius:"50%",
              background:isActive?"rgba(255,255,255,0.7)":col,flexShrink:0}}/>}
            {ft.label}
            {ft.count>0&&<span style={{fontFamily:MO,fontSize:"0.5rem",
              background:isActive?"rgba(255,255,255,0.22)":hexToRgba(col,0.15),
              color:isActive?"#fff":col,borderRadius:8,padding:"0 5px",minWidth:16,textAlign:"center"}}>{ft.count}</span>}
          </button>;
        })}
      </div>

      {/* Course sub-filter */}
      {filter==="coursework"&&courses&&courses.length>1&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
        <button onClick={()=>setCourseFilter("all")} style={{padding:"3px 11px",borderRadius:10,cursor:"pointer",
          fontFamily:MO,fontSize:"0.54rem",letterSpacing:"0.04em",
          background:courseFilter==="all"?T.b2:"transparent",
          color:courseFilter==="all"?T.tx:T.t3,border:`1px solid ${courseFilter==="all"?T.bd:"transparent"}`}}>All courses</button>
        {courses.map(c=>{const col=(cats[c.id]||cats.other)?.color||T.ac;return<button key={c.id} onClick={()=>setCourseFilter(c.id)}
          style={{padding:"3px 11px",borderRadius:10,cursor:"pointer",fontFamily:MO,fontSize:"0.54rem",
            background:courseFilter===c.id?hexToRgba(col,0.15):"transparent",color:courseFilter===c.id?col:T.t3,
            border:`1px solid ${courseFilter===c.id?hexToRgba(col,0.4):"transparent"}`}}>{c.name}</button>;})}
      </div>}

      {/* Task sections */}
      <Section label="Urgent / time-sensitive" items={urgent} accent={T.dg}/>
      <Section label={urgent.length?"Other tasks":"Active tasks"} items={normal} accent={null}/>
      {done.length>0&&<div>
        <button onClick={()=>setShowDone(p=>!p)} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",
          cursor:"pointer",fontFamily:MO,fontSize:"0.56rem",fontWeight:600,textTransform:"uppercase",
          letterSpacing:"0.08em",color:T.t3,padding:"12px 0 5px"}}>
          <span style={{fontSize:"0.7rem"}}>{showDone?"▾":"▸"}</span>
          Completed ({done.length})
        </button>
        {showDone&&<div style={{display:"flex",flexDirection:"column",gap:5}}>
          {done.map(tk=><TaskRow key={tk.id} tk={tk}/>)}
        </div>}
      </div>}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"56px 0",fontFamily:MO,
        fontSize:"0.7rem",color:T.t3,letterSpacing:"0.06em"}}>
        No tasks in this category. Add one above ↑
      </div>}
    </div>

    {/* Task Modal — view mode on tap, edit on explicit button */}
    {editModal&&<div onClick={e=>{if(e.target===e.currentTarget)closeEdit();}}
      style={{position:"fixed",inset:0,background:T.ov,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:T.b3,border:`1px solid ${T.bd}`,borderRadius:12,padding:20,
        width:"100%",maxWidth:440,display:"flex",flexDirection:"column",gap:12}}>

        {!editMode?<>
          {/* ── VIEW MODE — no inputs, no keyboard ── */}
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:SE,fontSize:"1.15rem",color:T.tx,lineHeight:1.3,wordBreak:"break-word",
                textDecoration:editModal.done?"line-through":"none",opacity:editModal.done?0.55:1}}>
                {editModal.title}
              </div>
              {editModal._urgent&&<span style={{display:"inline-block",marginTop:5,fontFamily:MO,fontSize:"0.5rem",
                padding:"2px 8px",borderRadius:8,background:hexToRgba(T.dg,0.12),color:T.dg,
                border:`1px solid ${hexToRgba(T.dg,0.25)}`}}>urgent</span>}
            </div>
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              <button onClick={()=>{tT(editModal.id);setEditModal(p=>({...p,done:!p.done}));}}
                title={editModal.done?"Mark undone":"Mark done"}
                style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${T.bd}`,background:"transparent",
                  color:editModal.done?T.ac:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.5rem"}}>
                {editModal.done?"↩ Undo":"✓ Done"}
              </button>
              <button onClick={closeEdit}
                style={{background:"none",border:"none",cursor:"pointer",color:T.t3,fontSize:"1.1rem",lineHeight:1,padding:"2px 4px"}}>✕</button>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {(()=>{const cc=cats[editModal.category]||cats.personal;return<div style={{display:"flex",alignItems:"center",gap:7}}>
              <div style={{width:9,height:9,borderRadius:"50%",background:cc?.color||T.ac,flexShrink:0}}/>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>{cc?.label||editModal.category}</span>
            </div>;})()}
            {editModal.date&&<div style={{display:"flex",gap:7,alignItems:"center"}}>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t3}}>📅</span>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>{editModal.date}
                {editModal.hasDueTime&&editModal.dueHour!=null&&<> at {$t(editModal.dueHour,editModal.dueMin||0)}</>}
              </span>
            </div>}
            {editModal._est&&<div style={{display:"flex",gap:7,alignItems:"center"}}>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t3}}>⏱</span>
              <span style={{fontFamily:MO,fontSize:"0.52rem",color:T.t2}}>{editModal._est}</span>
            </div>}
            {editModal.detail&&<div style={{background:T.b2,borderRadius:7,padding:"10px 12px",border:`1px solid ${T.bd}`}}>
              <RenderNotes text={editModal.detail} T={T} style={{fontSize:"0.82rem",color:T.tx,lineHeight:1.65}}/>
            </div>}
          </div>
          <div style={{display:"flex",gap:7,justifyContent:"space-between",borderTop:`1px solid ${T.bd}`,paddingTop:10}}>
            <button onClick={()=>{pushUndo();dT(editModal.id);closeEdit();}}
              style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.dg}`,
                background:`${T.dg}10`,color:T.dg,cursor:"pointer",fontFamily:MO,fontSize:"0.52rem"}}>
              Delete
            </button>
            <button onClick={()=>setEditMode(true)}
              style={{padding:"6px 22px",borderRadius:6,border:"none",background:T.ac,color:T.bg,
                cursor:"pointer",fontFamily:MO,fontSize:"0.56rem",fontWeight:600}}>
              Edit
            </button>
          </div>
        </>:<>
          {/* ── EDIT MODE ── */}
          <div style={{fontFamily:SE,fontSize:"1rem",color:T.tx,fontWeight:400}}>Edit Task</div>
          <div><FieldLabel>Title</FieldLabel>
            <input value={eTitle} onChange={e=>setETitle(e.target.value)} style={{...IS2,fontSize:"1rem"}} autoFocus/></div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <CatSelect val={eCat} set={setECat} courses={courses} courseVal={eCourse} setCourse={setECourse}/>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <div style={{flex:1}}><FieldLabel>Due Date</FieldLabel>
              <input type="date" value={eDue} onChange={e=>setEDue(e.target.value)} style={{...IS2,fontSize:"1rem"}}/></div>
            <div style={{flex:"1 1 140px"}}>
              <FieldLabel>Due Time</FieldLabel>
              <div style={{display:"flex",alignItems:"center",gap:5,height:32}}>
                <div onClick={()=>setEHasDueTime(p=>!p)} style={{width:28,height:15,background:eHasDueTime?T.ac:T.b2,borderRadius:8,
                  border:`1px solid ${eHasDueTime?T.ac:T.bd}`,position:"relative",cursor:"pointer",flexShrink:0,transition:"all 0.2s"}}>
                  <div style={{width:9,height:9,background:eHasDueTime?T.bg:T.t3,borderRadius:"50%",position:"absolute",top:2,
                    left:eHasDueTime?16:3,transition:"left 0.2s"}}/></div>
                {eHasDueTime&&<div style={{display:"flex",gap:3,alignItems:"center"}}>
                  <select value={eDueHour} onChange={e=>setEDueHour(+e.target.value)}
                    style={{...IS2,padding:"3px 4px",fontSize:"1rem",width:"auto"}}>{hO}</select>
                  <MinPick value={eDueMin} onChange={setEDueMin}/>
                </div>}
              </div>
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                <FieldLabel>Est. Time</FieldLabel>
                <button onClick={()=>{setEEstManual(p=>{if(p&&!EST_OPTS.includes(eEst))setEEst("");return!p;});}}
                  style={{padding:"1px 6px",borderRadius:4,border:`1px solid ${T.bd}`,background:eEstManual?T.ac:"transparent",
                    color:eEstManual?T.bg:T.t3,cursor:"pointer",fontFamily:MO,fontSize:"0.42rem",letterSpacing:"0.04em",lineHeight:1.6}}>
                  {eEstManual?"preset":"custom"}
                </button>
              </div>
              {eEstManual
                ?<input value={eEst} onChange={e=>setEEst(e.target.value)} placeholder="e.g. 1.5 hr, 45 min" style={{...IS2,fontSize:"1rem"}}/>
                :<select value={eEst} onChange={e=>setEEst(e.target.value)} style={{...IS2,fontSize:"1rem"}}>
                  {EST_OPTS.map(o=><option key={o} value={o}>{o||"— none —"}</option>)}
                </select>}
            </div>
          </div>
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <FieldLabel>Notes</FieldLabel>
              <button onClick={()=>setExpandNote("edit")}
                style={{padding:"1px 6px",borderRadius:4,border:`1px solid ${T.bd}`,background:"transparent",
                  color:T.t3,cursor:"pointer",fontFamily:MO,fontSize:"0.42rem",lineHeight:1.6}}>⤢ expand</button>
            </div>
            <NotesField value={eNote} onChange={setENote} placeholder="Links, context, instructions…" T={T} MO={MO} IS={IS2} minHeight={80}/>
          </div>
          <UrgToggle val={eUrgent} set={setEUrgent}/>
          <div style={{display:"flex",gap:8,justifyContent:"space-between",borderTop:`1px solid ${T.bd}`,paddingTop:10}}>
            <button onClick={()=>setEditMode(false)}
              style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.bd}`,
                background:"transparent",color:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.52rem"}}>← Back</button>
            <button onClick={saveEdit}
              style={{padding:"6px 20px",borderRadius:6,border:"none",background:T.ac,color:T.bg,
                cursor:"pointer",fontFamily:MO,fontSize:"0.56rem",fontWeight:600}}>Save</button>
          </div>
        </>}
      </div>
    </div>}

    {/* Category Manager Modal */}
    {catMgrOpen&&<CatMgrModal/>}

    {/* Expanded Notes Popup */}
    {expandNote&&<div onClick={e=>{if(e.target===e.currentTarget)setExpandNote(null);}}
      style={{position:"fixed",inset:0,background:T.ov,zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:T.b3,border:`1px solid ${T.bd}`,borderRadius:12,padding:20,
        width:"100%",maxWidth:640,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontFamily:SE,fontSize:"1rem",color:T.tx,fontWeight:400}}>Notes</div>
          <button onClick={()=>setExpandNote(null)} style={{background:"none",border:"none",cursor:"pointer",color:T.t3,fontSize:"1rem",lineHeight:1,padding:"2px 4px"}}>✕</button>
        </div>
        <NotesField
          value={expandNote==="add"?nNote:eNote}
          onChange={v=>{if(expandNote==="add")setNNote(v);else setENote(v);}}
          placeholder="Links, context, instructions…"
          T={T} MO={MO}
          IS={{width:"100%",padding:"12px",borderRadius:6,border:`1px solid ${T.bd}`,
            background:T.ib,color:T.tx,fontSize:"0.85rem",fontFamily:"'DM Sans',sans-serif",
            resize:"vertical",lineHeight:1.6,outline:"none",boxSizing:"border-box"}}
          minHeight={280}/>
        <div style={{display:"flex",justifyContent:"flex-end"}}>
          <button onClick={()=>setExpandNote(null)} style={{padding:"6px 18px",borderRadius:6,border:"none",
            background:T.ac,color:T.bg,cursor:"pointer",fontFamily:MO,fontSize:"0.56rem",fontWeight:600}}>Done</button>
        </div>
      </div>
    </div>}
  </div>;
}

// ═══ NOTES DASHBOARD ═══
function NotesDashboard({T,MO,SE,quickNotes,setQuickNotes,journalEntries,setJournalEntries}){
  const[notesTab,setNotesTab]=useState("notes");
  const[journalTab,setJournalTab]=useState("write");
  const[journalMode,setJournalMode]=useState("daily");
  const[journalDate,setJournalDate]=useState($d(new Date()));
  const getMonday=(ds)=>{const d=$p(ds);const day=d.getDay();const diff=day===0?-6:1-day;const m=new Date(d);m.setDate(d.getDate()+diff);return $d(m);};
  const[weekStart,setWeekStart]=useState(()=>getMonday($d(new Date())));
  const[editorHtml,setEditorHtml]=useState("");
  const[browseSel,setBrowseSel]=useState(null);
  const[browseFilter,setBrowseFilter]=useState("all");
  const[notesSaved,setNotesSaved]=useState(false);
  const saveTimerRef=useRef(null);
  const[vw,setVw]=useState(window.innerWidth);
  useEffect(()=>{const h=()=>setVw(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  const isMobile=vw<768;

  // ── Document tabs for Quick Notes ──
  const parseNoteTabs=(raw)=>{
    if(raw&&typeof raw==="string"&&raw.startsWith('{"tabs"')){
      try{return JSON.parse(raw);}catch{}
    }
    return{tabs:[{id:"1",title:"Untitled",html:raw||""}],active:"1"};
  };
  const[docTabState,setDocTabState]=useState(()=>parseNoteTabs(quickNotes));
  const docTabs=docTabState.tabs;
  const activeDocTabId=docTabState.active;
  const[editingTabId,setEditingTabId]=useState(null);
  const[editTabTitle,setEditTabTitle]=useState("");
  const[syncGen,setSyncGen]=useState(0);
  const lastSavedRef=useRef(quickNotes);
  const persistDocTabs=(tabs,active)=>{
    const s=JSON.stringify({tabs,active});
    lastSavedRef.current=s;
    setQuickNotes(s);setNotesSaved(false);
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(()=>setNotesSaved(true),800);
  };
  // Sync local state when quickNotes is updated externally (e.g. cloud/Firestore sync)
  useEffect(()=>{
    if(quickNotes&&quickNotes!==lastSavedRef.current){
      setDocTabState(parseNoteTabs(quickNotes));
      lastSavedRef.current=quickNotes;
      setSyncGen(g=>g+1);
    }
  },[quickNotes]);
  const addDocTab=()=>{
    const id=Date.now().toString();
    const newTab={id,title:`Untitled ${docTabs.length+1}`,html:""};
    const tabs=[...docTabs,newTab];
    setDocTabState({tabs,active:id});
    persistDocTabs(tabs,id);
  };
  const closeDocTab=(id,e)=>{
    e.stopPropagation();
    if(docTabs.length===1)return;
    const tabs=docTabs.filter(t=>t.id!==id);
    const newActive=id===activeDocTabId?tabs[tabs.length-1].id:activeDocTabId;
    setDocTabState({tabs,active:newActive});
    persistDocTabs(tabs,newActive);
  };
  const switchDocTab=(id)=>{
    setDocTabState(p=>({...p,active:id}));
    persistDocTabs(docTabs,id);
  };
  const commitTabRename=()=>{
    if(!editingTabId)return;
    const tabs=docTabs.map(t=>t.id===editingTabId?{...t,title:editTabTitle||t.title}:t);
    setDocTabState(p=>({...p,tabs}));
    persistDocTabs(tabs,activeDocTabId);
    setEditingTabId(null);
  };
  const activeDocTab=docTabs.find(t=>t.id===activeDocTabId)||docTabs[0];
  const handleNotesChange=(v)=>{
    const tabs=docTabs.map(t=>t.id===activeDocTabId?{...t,html:v}:t);
    setDocTabState(p=>({...p,tabs}));
    persistDocTabs(tabs,activeDocTabId);
  };

  const entryKey=journalMode==="daily"?journalDate:weekStart;
  const entryType=journalMode==="daily"?"daily":"weekly";
  const findEntry=(key,type)=>(journalEntries||[]).find(e=>e.date===key&&(e.type===type||(type==="daily"&&!e.type)));
  const currentEntry=findEntry(entryKey,entryType);
  const initialContent=currentEntry?.content||currentEntry?.text||"";

  const saveEntry=()=>{
    const html=editorHtml.trim();
    const plainText=html.replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
    if(!plainText){
      setJournalEntries(p=>(p||[]).filter(e=>!(e.date===entryKey&&(e.type===entryType||(entryType==="daily"&&!e.type)))));
      return;
    }
    setJournalEntries(p=>{
      const arr=p||[];
      const existing=findEntry(entryKey,entryType);
      if(existing)return arr.map(e=>e.id===existing.id?{...e,content:html,text:plainText,_updatedAt:Date.now()}:e);
      return[...arr,{id:gi(),date:entryKey,type:entryType,content:html,text:plainText,_createdAt:Date.now()}];
    });
  };

  const autoSaveTimerRef=useRef(null);
  const onEditorChange=(html)=>{
    setEditorHtml(html);
    if(autoSaveTimerRef.current)clearTimeout(autoSaveTimerRef.current);
    autoSaveTimerRef.current=setTimeout(()=>{
      const plain=html.replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
      if(plain){
        setJournalEntries(p=>{
          const arr=p||[];
          const existing=(arr||[]).find(e=>e.date===entryKey&&(e.type===entryType||(entryType==="daily"&&!e.type)));
          if(existing)return arr.map(e=>e.id===existing.id?{...e,content:html,text:plain,_updatedAt:Date.now()}:e);
          return[...arr,{id:gi(),date:entryKey,type:entryType,content:html,text:plain,_createdAt:Date.now()}];
        });
      }
    },2000);
  };

  const deleteEntry=(key,type)=>{
    setJournalEntries(p=>(p||[]).filter(e=>!(e.date===key&&(e.type===type||(type==="daily"&&!e.type)))));
    setBrowseSel(null);
  };

  const weekLabel=(ms)=>{const s=$p(ms),e=$a(s,6);return `${s.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${e.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;};
  const todayStr=$d(new Date());
  const allEntries=[...(journalEntries||[])].sort((a,b)=>b.date.localeCompare(a.date));
  const filteredEntries=browseFilter==="all"?allEntries
    :browseFilter==="weekly"?allEntries.filter(e=>e.type==="weekly")
    :allEntries.filter(e=>e.type==="daily"||!e.type);

  const NavBtn={padding:"5px 12px",borderRadius:6,border:`1px solid ${T.bd}`,background:"transparent",
    color:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.54rem",whiteSpace:"nowrap"};
  const SegBtn=(active)=>({padding:"5px 14px",border:"none",cursor:"pointer",fontFamily:MO,
    fontSize:"0.54rem",background:active?T.ac:"transparent",color:active?T.bg:T.t3,
    transition:"background 0.15s,color 0.15s"});

  return <div style={{flex:1,overflow:"auto",padding:isMobile?"0":"0",background:T.bg,
    boxSizing:"border-box",display:"flex",flexDirection:"column"}}>

    {/* ── Tab toggle bar ── */}
    <div style={{borderBottom:`1px solid ${T.bd}`,background:T.b2,padding:"0 16px",
      display:"flex",alignItems:"center",gap:0,flexShrink:0}}>
      {[["notes","Quick Notes"],["journal","Journal"]].map(([k,l])=>
        <button key={k} onClick={()=>setNotesTab(k)}
          style={{padding:"12px 20px",border:"none",background:"transparent",
            cursor:"pointer",fontFamily:MO,fontSize:"0.58rem",fontWeight:700,
            color:notesTab===k?T.ac:T.t3,
            borderBottom:notesTab===k?`2px solid ${T.ac}`:"2px solid transparent",
            transition:"color 0.15s,border-color 0.15s",letterSpacing:"0.04em",
            textTransform:"uppercase"}}>
          {l}
          {k==="notes"&&notesSaved&&<span style={{marginLeft:6,fontSize:"0.45rem",color:T.ac,opacity:1}}>✓</span>}
        </button>)}
      <div style={{marginLeft:"auto",padding:"0 4px"}}>
        <span style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3}}>
          {notesTab==="notes"?"Auto-saves":`${allEntries.length} entr${allEntries.length===1?"y":"ies"}`}
        </span>
      </div>
    </div>

    {/* ── Quick Notes panel ── */}
    {notesTab==="notes"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
      {/* ── Document tab bar ── */}
      <div style={{background:T.b2,borderBottom:`1px solid ${T.bd}`,display:"flex",
        alignItems:"flex-end",overflowX:"auto",flexShrink:0,
        scrollbarWidth:"none",WebkitOverflowScrolling:"touch",gap:2,padding:"4px 8px 0"}}>
        {docTabs.map(tab=>{
          const isActive=tab.id===activeDocTabId;
          return <div key={tab.id}
            style={{display:"flex",alignItems:"center",gap:4,
              padding:"6px 12px 5px",borderRadius:"6px 6px 0 0",cursor:"pointer",flexShrink:0,
              background:isActive?T.b3:"transparent",
              border:isActive?`1px solid ${T.bd}`:"1px solid transparent",
              borderBottom:isActive?`1px solid ${T.b3}`:"none",
              marginBottom:isActive?-1:0,
              transition:"background 0.12s"}}
            onClick={()=>switchDocTab(tab.id)}>
            {editingTabId===tab.id
              ?<input autoFocus value={editTabTitle}
                  onChange={e=>setEditTabTitle(e.target.value)}
                  onBlur={commitTabRename}
                  onKeyDown={e=>{if(e.key==="Enter")commitTabRename();if(e.key==="Escape"){setEditingTabId(null);}}}
                  onClick={e=>e.stopPropagation()}
                  style={{width:90,fontSize:"0.78rem",fontFamily:"'DM Sans',sans-serif",
                    background:"transparent",border:"none",outline:"none",color:T.tx,padding:0}}/>
              :<span onDoubleClick={e=>{e.stopPropagation();setEditingTabId(tab.id);setEditTabTitle(tab.title);}}
                  style={{fontSize:"0.78rem",fontFamily:"'DM Sans',sans-serif",
                    color:isActive?T.tx:T.t3,whiteSpace:"nowrap",maxWidth:120,
                    overflow:"hidden",textOverflow:"ellipsis",userSelect:"none"}}>
                  {tab.title}
                </span>}
            {docTabs.length>1&&<button
              onClick={e=>closeDocTab(tab.id,e)}
              style={{background:"none",border:"none",color:T.t3,cursor:"pointer",
                fontSize:"0.7rem",padding:"0 0 0 2px",lineHeight:1,opacity:isActive?1:0.5}}>✕</button>}
          </div>;
        })}
        <button onClick={addDocTab}
          style={{flexShrink:0,padding:"6px 10px 5px",background:"transparent",
            border:"none",color:T.t3,cursor:"pointer",fontSize:"1rem",lineHeight:1,
            borderRadius:"6px 6px 0 0",marginBottom:0}}>+</button>
      </div>
      {/* ── Active tab editor ── */}
      <RichTextEditor key={activeDocTabId+"-"+syncGen} initialValue={activeDocTab?.html||""}
        onChange={handleNotesChange} T={T} MO={MO}
        placeholder="Start writing…"
        minHeight={isMobile?300:500}/>
    </div>}

    {/* ── Journal panel ── */}
    {notesTab==="journal"&&<div style={{flex:1,overflow:"auto",padding:isMobile?"10px 10px 48px":"20px 24px 56px",boxSizing:"border-box"}}>
      <div style={{maxWidth:860,margin:"0 auto"}}>

        {/* Journal top bar */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",background:T.b2,border:`1px solid ${T.bd}`,borderRadius:7,overflow:"hidden"}}>
            {[["daily","Daily"],["weekly","Weekly"]].map(([k,l])=>
              <button key={k} onClick={()=>{setJournalMode(k);setJournalTab("write");setBrowseSel(null);}}
                style={SegBtn(journalMode===k)}>{l}</button>)}
          </div>
          <div style={{display:"flex",background:T.b3,border:`1px solid ${T.bd}`,borderRadius:7,overflow:"hidden"}}>
            {[["write","Write"],["browse",`Browse (${allEntries.length})`]].map(([k,l])=>
              <button key={k} onClick={()=>{setJournalTab(k);setBrowseSel(null);}}
                style={SegBtn(journalTab===k)}>{l}</button>)}
          </div>
        </div>

          {/* ── WRITE TAB ── */}
          {journalTab==="write"&&<div style={{background:T.b3,border:`1px solid ${T.bd}`,borderRadius:10,overflow:"hidden",
            boxShadow:"0 2px 12px rgba(0,0,0,0.07)"}}>

            {/* Date navigation bar */}
            <div style={{padding:"10px 16px",borderBottom:`1px solid ${T.bd}`,background:T.b2,
              display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              {journalMode==="daily"&&<>
                <input type="date" value={journalDate} onChange={e=>setJournalDate(e.target.value)}
                  style={{padding:"4px 9px",borderRadius:5,border:`1px solid ${T.bd}`,background:T.ib,
                    color:T.tx,fontSize:"0.82rem",fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                <button onClick={()=>setJournalDate($d($a($p(journalDate),-1)))} style={NavBtn}>‹</button>
                <button onClick={()=>setJournalDate(todayStr)} disabled={journalDate===todayStr}
                  style={{...NavBtn,color:journalDate===todayStr?T.t3:T.ac,borderColor:journalDate===todayStr?T.bd:T.ac,
                    cursor:journalDate===todayStr?"default":"pointer"}}>Today</button>
                <button onClick={()=>setJournalDate($d($a($p(journalDate),1)))} disabled={journalDate>=todayStr}
                  style={{...NavBtn,color:journalDate>=todayStr?T.t3:T.t2,cursor:journalDate>=todayStr?"default":"pointer"}}>›</button>
                <span style={{marginLeft:"auto",fontFamily:MO,fontSize:"0.48rem",color:currentEntry?T.ac:T.t3}}>
                  {currentEntry?"✎ editing":"+ new entry"}
                </span>
              </>}
              {journalMode==="weekly"&&<>
                <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.84rem",color:T.tx,
                  padding:"4px 10px",borderRadius:5,border:`1px solid ${T.bd}`,background:T.ib,whiteSpace:"nowrap"}}>
                  {weekLabel(weekStart)}
                </span>
                <button onClick={()=>setWeekStart(getMonday($d($a($p(weekStart),-7))))} style={NavBtn}>‹</button>
                <button onClick={()=>setWeekStart(getMonday(todayStr))} disabled={weekStart===getMonday(todayStr)}
                  style={{...NavBtn,color:weekStart===getMonday(todayStr)?T.t3:T.ac,borderColor:weekStart===getMonday(todayStr)?T.bd:T.ac,
                    cursor:weekStart===getMonday(todayStr)?"default":"pointer"}}>This week</button>
                <button onClick={()=>setWeekStart(getMonday($d($a($p(weekStart),7))))} disabled={weekStart>=getMonday(todayStr)}
                  style={{...NavBtn,color:weekStart>=getMonday(todayStr)?T.t3:T.t2,cursor:weekStart>=getMonday(todayStr)?"default":"pointer"}}>›</button>
                <span style={{marginLeft:"auto",fontFamily:MO,fontSize:"0.48rem",color:currentEntry?T.ac:T.t3}}>
                  {currentEntry?"✎ editing":"+ new entry"}
                </span>
              </>}
            </div>

            {/* Editor */}
            <RichTextEditor key={entryKey+entryType} initialValue={initialContent}
              onChange={onEditorChange} T={T} MO={MO}
              placeholder={journalMode==="weekly"
                ?"How did this week go? Reflect, plan, note wins and challenges…"
                :"What's on your mind today? Reflect, plan, or just ramble…"}
              minHeight={isMobile?220:340}/>

            {/* Footer actions */}
            <div style={{padding:"10px 16px",borderTop:`1px solid ${T.bd}`,background:T.b2,
              display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
              {currentEntry&&<button onClick={()=>deleteEntry(entryKey,entryType)}
                style={{padding:"6px 14px",borderRadius:6,border:"1px solid rgba(239,68,68,0.35)",
                  background:"transparent",color:"#ef4444",cursor:"pointer",fontFamily:MO,fontSize:"0.54rem"}}>Delete</button>}
              <span style={{fontFamily:MO,fontSize:"0.46rem",color:T.t3}}>Auto-saves</span>
              <button onClick={saveEntry}
                style={{padding:"7px 22px",borderRadius:6,border:"none",background:T.ac,
                  color:T.bg,cursor:"pointer",fontFamily:MO,fontSize:"0.6rem",fontWeight:700,
                  boxShadow:"0 2px 8px rgba(0,0,0,0.12)"}}>Save Entry</button>
            </div>
          </div>}

          {/* ── BROWSE TAB ── */}
          {journalTab==="browse"&&<div>
            <div style={{display:"flex",gap:6,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontFamily:MO,fontSize:"0.5rem",color:T.t3}}>Show:</span>
              {[["all","All"],["daily","Daily"],["weekly","Weekly"]].map(([k,l])=>
                <button key={k} onClick={()=>setBrowseFilter(k)}
                  style={{padding:"4px 12px",borderRadius:14,border:`1px solid ${browseFilter===k?T.ac:T.bd}`,
                    background:browseFilter===k?`${T.ac}18`:"transparent",
                    color:browseFilter===k?T.ac:T.t3,cursor:"pointer",fontFamily:MO,fontSize:"0.5rem",
                    transition:"all 0.15s"}}>{l}</button>)}
            </div>
            {filteredEntries.length===0&&<div style={{textAlign:"center",padding:"60px 0",fontFamily:MO,
              fontSize:"0.62rem",color:T.t3,letterSpacing:"0.06em"}}>
              No entries yet — switch to Write to start journaling.
            </div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filteredEntries.map(entry=>{
                const isSel=browseSel===entry.id;
                const isWeekly=entry.type==="weekly";
                const rawLabel=isWeekly?weekLabel(entry.date):$p(entry.date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
                const isToday=entry.date===todayStr;
                const previewText=(entry.content||entry.text||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
                return <div key={entry.id}
                  style={{background:T.b3,border:`1px solid ${isSel?T.ac:T.bd}`,borderRadius:10,
                    overflow:"hidden",transition:"border-color 0.15s",
                    boxShadow:isSel?`0 0 0 2px ${T.ac}22`:"none"}}>
                  <div onClick={()=>setBrowseSel(isSel?null:entry.id)}
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"12px 16px",background:isSel?`${T.ac}0d`:T.b2,cursor:"pointer",
                      transition:"background 0.15s"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:isSel?0:4}}>
                        <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.88rem",fontWeight:600,
                          color:isSel?T.ac:T.tx}}>{rawLabel}</span>
                        {isWeekly&&<span style={{fontFamily:MO,fontSize:"0.43rem",padding:"2px 6px",borderRadius:8,
                          background:`${T.ac}20`,color:T.ac}}>weekly</span>}
                        {isToday&&<span style={{fontFamily:MO,fontSize:"0.43rem",padding:"2px 6px",borderRadius:8,
                          background:`${T.ac}18`,color:T.ac}}>today</span>}
                      </div>
                      {!isSel&&<div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",color:T.t3,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"90%"}}>
                        {previewText.slice(0,160)}{previewText.length>160?"…":""}
                      </div>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0,marginLeft:12}}>
                      <button onClick={e=>{e.stopPropagation();
                        if(isWeekly){setJournalMode("weekly");setWeekStart(entry.date);}
                        else{setJournalMode("daily");setJournalDate(entry.date);}
                        setJournalTab("write");}}
                        style={{padding:"4px 12px",borderRadius:5,border:`1px solid ${T.bd}`,background:"transparent",
                          color:T.t2,cursor:"pointer",fontFamily:MO,fontSize:"0.5rem"}}>Edit</button>
                      <span style={{color:T.t3,fontSize:"0.78rem",userSelect:"none"}}>{isSel?"▴":"▾"}</span>
                    </div>
                  </div>
                  {isSel&&<div style={{padding:"18px 20px",borderTop:`1px solid ${T.bd}`}}>
                    {entry.content
                      ?<div className="rte-wrap" style={{fontSize:"0.92rem",color:T.tx,lineHeight:1.85,
                          fontFamily:"'DM Sans',sans-serif"}}
                          dangerouslySetInnerHTML={{__html:entry.content}}/>
                      :<div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.92rem",color:T.tx,
                          lineHeight:1.85,whiteSpace:"pre-wrap"}}>{entry.text}</div>}
                    <div style={{marginTop:14,display:"flex",justifyContent:"flex-end"}}>
                      <button onClick={()=>deleteEntry(entry.date,entry.type||"daily")}
                        style={{padding:"5px 14px",borderRadius:6,border:"1px solid rgba(239,68,68,0.35)",
                          background:"transparent",color:"#ef4444",cursor:"pointer",fontFamily:MO,
                          fontSize:"0.5rem"}}>Delete Entry</button>
                    </div>
                  </div>}
                </div>;
              })}
            </div>
          </div>}

      </div>
    </div>}
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
document.getElementById("root").classList.add("ready");
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
